body:
  text: 順性命之理論嘗謂性不虛懸麗乎吾身而有宰命非外鑠原乎太極以成名是故皇降之衷有物斯以有則聖賢之學惟危惕以惟微葢自乾坤奠定以來立天之道曰陰與陽靜專動􅀡之妙皆性命所彌綸立地之道曰柔與剛靜翕動闢之機悉性命所默運是故其在人也絪縕化醕必無以解乎造物之吹嘘眞與精相凝而性卽寓於肢體之中含生負氣必有以得乎乾道之變化理與氣相麗而命實宰乎賦􅂌之始以身之所具言則有視聽言動卽有肅乂哲謀其必以肅乂哲謀爲範者性也其所以主宰乎五事者命也以身之所接言則有君臣父子卽有仁敬孝􅄌其必以仁敬孝􅄌爲則者性也其所以綱維乎五倫者命也此其中有理焉亦期於順焉而已矣請申論之性渾淪而難名按之曰理則仁義禮智德之賴乎擴充者在吾心已有條不紊也命於穆而不已求之於理則元亨利貞誠之貫乎通復者在吾心且時岀不窮也有條不紊則踐􅄱無虧可以盡已性卽可以盡人物之性此順乎理者之率其自然也時岀不窮則泛應曲當有以立吾命卽有以立萬物之命此順乎理者之還其本然也彼夫持矯揉之說者譬􅂎柳以爲桮棬不知性命必致戕賊仁義是理以逆施而不順矣高虛無之見者若浮萍遇於江湖空談性命不復求諸􅄱色是理以惝恍而不順矣惟察之以精私意不自蔽私欲不自撓惺惺常存斯隨時見其順焉守之以一以不貳自惕以不已自循慄慄惟懼斯終身無不順焉此聖人盡性立命之極亦卽中人復性知命之功也夫君子愼獨論嘗謂獨也者君子與小人共焉者也小人以其爲獨而生一念之妄積妄生肆而欺人之事成君子懍其爲獨而生一念之誠積誠爲愼而自慊之功密其閒離合幾微之端可得而論矣葢大學自格致以後前言往行旣資其擴充曰用細故亦深其閱歴心之際乎事者已能剖晰乎公私心之麗於理者又足精硏其得失則夫善之當爲不善之宜去早畫然其灼見矣而彼小人者乃不能實有所見而行其所知於是一善當前幸人之莫我察也則趨焉而不決一不善當前幸人之莫或伺也則去之而不力幽獨之中情僞斯出所謂欺也惟夫君子者懼一善之不力則冥冥者有墮行一不善之不去則涓涓者無已時屋漏而懍如帝天方寸而堅如金石獨知之地愼之又愼此聖經之要領而後賢所切究者也自世儒以格致爲外求而專力於知善知惡則愼獨之旨晦自世儒以獨體爲內照而反昧乎卽事卽理則愼獨之旨愈晦要之明宜先乎誠非格致則愼亦失當心必麗於實非事物則獨將失守此入德之方不可不辨者也烹阿封卽墨論夫人君者不能徧知天下事則不能不委任賢大夫大夫之賢否又不能徧知則不能不信諸左右然而左右之所譽或未必遂爲藎臣左右之所毀或未必遂非良吏是則耳目不可寄於人予奪尤須操於上也昔者齊威王嘗因左右之言而烹阿大夫封卽墨大夫矣其事可略而論也自古庸臣在位其才莅事則不足固寵則有餘易譏覆餗詩賡鵜梁言不稱也彼旣自慙素餐而又重以貪鄙則不得不媚事君之左右左右亦樂其附已也而從而譽之譽之曰久君心亦移而位曰固而政曰非已則自矜人必效尤此阿大夫之所爲可烹者也若夫賢臣在職往往有介介之節無赫赫之名不立異以徇物不違道以干時招之而不來麾之而不去在君側者雖欲極譽之而有所不得其或不合則不免毁之毁之而聽甚者削黜輕者督責於賢臣無損也其不聽君之明也社稷之福也於賢臣無益也然而賢臣之因毀而罷者常也賢臣之必不阿事左右以求取容者又常也此卽墨大夫之所爲可封者也夫惟聖人賞一人而天下勸􅆿一人而天下懲固不廢左右之言而昧兼聽之聰亦不盡信左右之言而失獨照之明夫是以􅆿賞悉歸於忠厚而用舍一本於公明也夫原才風俗之厚薄奚自乎自乎一二人之心之所嚮而已民之生庸弱者戢戢皆是也有一二賢且智者則眾人君之而受命焉尤智者所君尤眾焉此一二人者之心向義則眾人與之赴義一二人者之心向利則眾人與之赴利眾人所趨勢之所歸雖有大力莫之敢逆故曰撓萬物者莫疾乎風風俗之於人之心始乎微而終乎不可禦者也先王之治天下使賢者皆當路在勢其風民也皆以義故道一而俗同世敎旣衰所謂一二人者不盡在位彼其心之所嚮勢不能不騰爲口說而播爲聲氣而眾人者勢不能不聽命而蒸爲習尙於是乎徒黨蔚起而一時之人才出焉有以仁義倡者其徒黨亦死仁義而不顧有以功利倡者其徒黨亦死功利而不返水流溼火就燥無感不讐所從來久矣今之君子之在勢者輒曰天下無才彼自尸於高明之地不克以己之所嚮轉移習俗而陶鑄一世之人而翻謝曰無才謂之不誣可乎否也十室之邑有好義之士其智足以移十人者必能拔十人中之尤者而材之其智足以移百人者必能拔百人中之尤者而材之然則轉移習俗而陶鑄一世之人非特處高明之地者然也凡一命以上皆與有責焉者也有國家者得吾說而存之則將愼擇與共天位之人士大夫得吾說而存之則將惴惴乎謹其心之所嚮恐一不當而壞風俗而賊人才循是爲之數十年之後萬有一收其效者乎非所逆睹已召誨賢與不肖之等奚判乎視乎改過之勇怯以爲差而已矣日月有食星有離次其在於人言有尤行有悔雖聖者不免改過什於人者賢亦什於人改過伯於人者賢亦伯於人尤賢者尤光明焉尤不肖者怙終焉而已人之生氣質不甚相遠也習而之善旣君子矣其有過則其友􅀡諫以匡之又有友焉巽言以挽之退有撻進有旌其相率而上達也奚禦焉習而之不善旣小人矣其有過則多方文之爲之友者疏之則心非而面諛戚之則依阿苟同憚於以正傷恩其相率而下達也奚禦焉茲賢者所以愈賢而不肖者愈不肖也吾之友有某君者毖余曰子與某相好不終是子之失德子盍愼諸又有某君毖余曰聞子之試於有司則嘗以私干人是大不可二子者之言卒聞之若不遜於吾志徐而繹之彼無求而進逆耳之言誠敬我也旣又自省吾之過其大者視此或倍蓰而其多或不可枚數二子者葢舉一隅也人苦不自知耳先王之道不明士大夫相與爲一切苟且之行往往陷於大戾而僚友無岀片言相質确者而其人自視恬然可幸無過且以仲尼之賢猶待學易以寡過而今曰無過欺人乎自欺乎自知有過而因護一時之失展轉葢藏至蹈滔天之姦而不悔斯則小人之不可近者已爲人友而隱􅃘和同長人之惡是又諧臣媚子之亞也書曰有言逆於女心必求諸道有言遜於女志必求諸非道余故筆之於册以備觀省且示吾友能爲逆心之言者五箴幷序少不自立荏苒遂洎今茲葢古人學成之年而吾碌碌尙如斯也不其戚矣繼是以往人事曰紛德慧曰損下流之赴抑又可知夫疢疾所以益智逸豫所以亡身僕以中才而履安順將欲刻苦而自振拔諒哉其難之歟作五箴以自創云立志箴煌煌先哲彼不猶人藐焉小子亦父母之身聰明福祿予我者厚哉棄天而佚是及凶災積悔累干其終也已往者不可追請從今始荷道以躬輿之以言一息尙存永矢弗諼居敬箴天地定位二五胚胎鼎焉作配實曰三才儼恪齋明以凝女命女之不莊伐生戕性誰人可慢何事可弛弛事者無成慢人者反爾縱彼不反亦長吾驕人則下女天罰昭昭主靜箴齋㝛日觀天雞一鳴萬籟俱息但聞鐘聲後有毒蛇前有猛虎神定不懾誰敢予侮豈伊避人曰對三軍我慮則一彼紛不紛馳騖半生曾不自主今其老矣殆擾擾以終古謹言箴巧語悅人自擾其身閑言送曰亦攪女神解人不誇誇者不解道聽塗說智笑愚駭駭者終明謂女賈欺笑者鄙女雖矢猶疑尤悔旣叢銘以自攻銘而復蹈嗟女旣耄有恆箴自吾識字百歴及茲二十有八載則一無知曩者所忻閱時而鄙故者旣抛新者旋徙德業之不常曰爲物遷爾之再食曾未聞或愆黍黍之增久乃盈斗天君司命敢吿馬走紀氏嘉言序士之修德砥行求安於心而已無欲而爲善無畏而不爲不善者此聖賢之徒中有所得而不惑者也自中智以下不自能完其性之分大抵不勸不趨不懲不改聖人者因而導之以禍福之故如此則吉不如此則凶咎使賢者由勉以幾安愚者懼罰而寡罪故易稱餘慶餘殃書戒惠逆影響先王所以利民其術至已自秦氏以力征得天下踵其後者率小役大弱飼彊彊横之氣充塞而聖哲與奸宄同流轉於氣數之中或且理不勝氣善者不必福而不善者不必抵於禍於是浮屠氏者乃乘其閒而爲輪迴因果之說其說雖積惡之人立悔則有莫大之善其不悛者雖死而有莫酷之􅆿民樂懺悔之易而痛其不經見之慘虐故懼而改行十四五焉今夫水無不下也而趵突泉激而上升火無不然也而鹽井遇物不焚燭至則滅彼其變也戾氣感而祥降順氣感而災生亦其變也君子之言福善禍淫猶稱水下火然也道其常者而已常者旣立雖有百變不足以窮吾之說是故從乎天下之通理言之則吾儒之言不敝而浮屠爲妄從乎後世之事變人心言之則浮屠警世之功與吾儒略同亦未可厚貶而槪以不然屏之者也河閒紀文達公博覽彊識百家之書靡不辨其原而竟其歸所著閱微草堂筆記五種考獻徵文搜神志怪眾態畢具其大旨歸於勸善懲惡崇中國聖人流傳之至論亦不廢佛氏之說取愚民易入者委曲剖晰以聳其聽海以內幾家置一編矣宛平徐春泉大令好之尤篤擇其彌精而足以警世者別錄一帙名曰紀氏嘉言其無關於勸懲者則皆闌而不入梓人畢役以授國藩讀焉世風曰漓無欲而爲善無畏而不爲不善者不可得已茍有術焉可以驅民於醕樸而稍遏其無等之欲豈非士大夫有世敎之責者事哉今余盜食天祿曾不能絲毫補救於斯世斯民觀徐君之汲汲於此其使余增愧也武會試錄序道光二十有七年秋九月武會試外圍旣畢事兵部臣以內場考官請上命臣國藩偕臣王慶雲司其事伏念臣楚南下士至􅋘極愚仰荷聖􅄌逾格由翰林洊陟􅀸陪負乘之占夙夜兢惕復膺􅂤命承乏於茲益用廩廩如不克勝謹偕臣慶雲悉心核閱取士如額恭繕試錄進呈御覽臣例得颺言􅂤端臣聞宋臣張舜民之言曰自古守邊選將未必專以攻戰爲事要在精神折衝而已臣嘗深繹其言若廉藺在趙强秦不敢加兵魏尙守雲中匈奴不敢南牧及夫衞霍三明之徒亦威棱四際所在立功彼其名將之精神足以震懾萬里之外而人主之求將亦以精神感而召之所謂戰勝廟堂者也自唐宋以後招致將才不可必得乃按圖而索驥於是有武舉之科有武學之額有賜及第出身之目宋慶皇閒定武舉以策爲去畱弓馬爲高下祿利之途一開爪牙之士稍稍驤首元明以來循是不廢然上以名求下之人因襲是名而巧弋之其以弓馬得者不過挽彊引重市井之麤材而以策試中者亦皆記錄章句瑣瑣無用之學故論者謂人才之興不盡由於科目理固然也我朝定鼎以來威燀無外自虎賁㝛衞八旗禁旅往往有熊羆不二心之臣肩比而鱗萃而各行省山澤猛士又羅之以科舉所以儲采干城之選至周且當顧循行旣久向之所謂市井挽彊記錄無用者多亦儳乎其中而臣之所職又惟校此默寫孫吳之數行無由觀其內志外體與其進退翔舞之節而欲使韜鈐之材之必入於此不遺於彼臣誠不敢以自信獨念聖天子神武震爍臣等憑藉寵光亦足增長剛氣而以精神與多士相感召庶幾廉藺魏尙之輩或出於此區區之忱不勝至願傳曰同明相照同氣相求雖不能必志之而已錢港舦先生制藝序自吾有知識以來見郷之老成夙學篤於文律者恆困頓無以自拔或終身不得當於行省有司之試而其所敎之子若弟往往分沾餘技飛騰速化以去及吾來京師究詢四方魁桀特達之士其先世多亦不遇始謂不閟不亭不詘不信理則然矣旣深求其故抑匪􅀡爾也制藝試士旣久陳篇舊句盜襲相仍有司者無以發覆而鉤奇則巧爲命題以困之乖割乎經文釽析乎片語由是爲文者有鉤聯之法有補斡之方有仰逼俯侵之患名目旣繁科條曰密雖過百人之智窮十年之力猶不能洞悉其窾郤及其徹於心而調於手而齒已曰長少時英光銳氣稍稍衰減矣而子若弟之濡染焉者自其未冠已別開􅂤易於纖仄曲徑之中使其才得以自騁故前者難而因者易勢固爲之也予與烏程錢君崙仙同舉進士同岀江陰季公之門官詞曹也同居於僧舍使蜀中也先後同持文柄閒岀其尊甫港舦先生遺稾示予又知兩家庭訓所歴之艱苦曲折同者十得八九而不合者葢寡焉予之蒙􅋘於家大人之學百不承一卽崙仙文鳴一時視先生之孤詣覃思要亦不無少遜焉故敘先生之文而發其例於此庶使有衡文之責者知所措意也夫黄仙嶠前輩詩序古之君子所以自拔於人人者豈有他哉亦其器識有不可量度而已矣試之以富貴貧賤而漫焉不加喜戚臨之以大憂大辱而不易其常器之謂也智足以析天下之微芒明足以破一隅之固識之謂也器與識及之矣而施諸事業有不逮君子不深譏焉器識之不及而求小成於事業末矣事業之不及而求有當於語言文字抑又末矣故語言文字者古之君子所偶一涉焉而不齒諸有亡者也昔者嘗怪杜甫氏以彼其志量而勞一世以事詩篇追章琢句篤老而不休何其不自重惜若此及觀昌黎韓氏稱之則曰流落人閒者太乙一豪芒而蘇氏亦曰此老詩外大有事在吾乃知杜氏之文字蘊於胸而未發者殆十倍於世之所傳而器識之深遠其可敬慕又十倍於文字也今之君子秋豪之榮華而以爲喜秋豪之摧挫而以爲慍舉一而遺二見寸而昧尺器識之不講事業之不問獨沾沾以從事於所謂詩者興旦而綴一字抵莫而不安毀齒而鉤硏聲病頭童而不息以咿嚘蹇淺之語而視爲鐘彝不朽之盛業亦見其惑已松滋黃仙嶠先生質􅀡而洞豁泊然聲利之外觀察於滇南吏剔其奸民宣其隱於古人所謂器識事業者亦旣近而有之閒以其餘發爲詩章又能棄故攬新約言豐義而先生曾不以自鳴退然若無以與於古者人之度量相越爲閎爲隘爲謙爲盈不可一二計也國藩旣受而卒讀因爲擇其尤善者得若干首俾錄而存之世有終其身以治詩自名而志趣或未廣者觀先生此編亦將內慙而有以自擴也夫謝子湘文集序嗚呼士生今世欲有所撰述以庶幾古作者之義豈不難哉自束髪受書則有事舉子帖括之業有司者割截聖人之經語以試其能偏全虛實斷續鉤聯之際銖有律黍有程而又雜試以詩賦經義策論其爲品目固已不勝其繁矣而一二才桀之士旣挾羣藝以應有司之求又別進慕乎古之能文者以降其兼勝無已之心於是乎目欲幷視耳欲四聽敝精而費曰終不能達於古人之庭者比比而是也古之爲文者其神專有所之無有俗說龐言肴其意趣自有明以來制義家之治古文往往取左氏司馬遷班固韓愈之書繩以舉業之法爲之點爲之圓圍以賞異之爲之乙爲之鑯圍以識别之爲之評注以顯之讀者囿於其中不復知點圍評乙之外別有所謂屬文之法也者雖勤劇一世猶不能以自拔故僕嘗謂末世學古之士一厄於試藝之繁多再厄於俗本評點之書此天下之公患也將不然哉將不然哉南豐謝君子湘與予同歲舉於郷又同登於禮部其羣藝見采於有司者固已趠絕與人人異自君之生予嘗見聞而內敬之矣旣殁而其弟岀君所爲古文示予又知其志之可敬也葢以流俗之墮於所謂一再厄者而以君之所得較之其爲踰越可勝量哉於是爲序而歸之因道其通患以慨夫末世承學之難焉朱愼甫遺書序瀏陽朱君文炢所爲書曰易圖正旨者一卷曰五子見心錄者二卷曰從學雜記一卷文集一卷嘉道之際學者承乾隆季年之流風襲爲一種破碎之學辨物析名梳文櫛字刺經典一二字解說或至數千萬言繁稱雜引遊衍而不得所歸張已伐物專抵古人之􅂩或取孔孟書中心性仁義之文一切變更故訓而別創一義羣流利附堅不可易有宋諸儒周程張朱之書爲世大詬閒有渉於其說者則舉世相與􅀏譏唾辱以爲彼博聞之不能亦逃之性理空虛之域以自葢其鄙􅋘不肖者而已矣朱君自弱冠志學則已棄舉子業而惟有宋五子之求斷絕眾源歸命於一自六經之奥百氏雜家有用之言無不究索其終折衷於五子家貧負母渡湖招徒授學取其入以爲養餋則獨腆身有饑色或勸以稍易其途從事於時世所謂辨物梳文櫛字之學者足以傾駴耳目植朋廣譽君笑曰吾於科目且棄而背之矣其又屑覬彼邪卒以不顧曰抱遺訓以自鐫其躬繩過無小克敬以裕闇然至死而不悔嗚呼君之於學其可謂篤志而不牽於眾好者矣惜其多有放佚如大易粹言春秋本義三傳備說諸篇今都不可見其僅存者又或闕殘難令完整其易圖正旨推闡九圖之義與德淸胡渭寶應王懋竑氏之論不合山居僻左不及盡睹當世通人成說小有岐異未爲纇也予旣受讀終篇因頗爲論定以詒鄕人知觀感焉歐陽生文集序乾隆之末桐城姚姬傳先生鼐善爲古文辭慕效其鄕先輩方望溪侍郎之所爲而受法於劉君大櫆及其世父編修君範三子旣通儒碩望姚先生治其術益精歴城周永年書昌爲之語曰天下之文章其在桐城乎由是學者多歸嚮桐城號桐城派猶前世所稱江西詩派者也姚先生晩而主鍾山書院講席門下箸籍者上元有管同異之梅曾亮伯言桐城有方東樹植之姚瑩石甫四人者稱爲高第弟子各以所得傳授徒友往往不絕在桐城者有戴鈞衡存莊事植之久尤精力過絕人自以爲守其邑先正之法䄠之後進義無所讓也其不列弟子籍同時服膺有新城魯仕驥絜非宜興吳德旋仲倫絜非之甥爲陳用光碩士碩士旣師其舅又親受業姚先生之門鄕人化之多好文章碩士之羣從有陳學受蓺叔陳溥廣敷而南豐又有吳嘉賓子序皆承絜非之風私淑於姚先生由是江西建昌有桐城之學仲倫與永福呂璜月滄交友月滄之鄕人有臨桂朱琦伯韓龍啟瑞翰臣馬平王錫振定甫皆步趨吳氏呂氏而益求廣其術於梅伯言由是桐城宗派流衍於廣西矣昔者國藩嘗怪姚先生典試湖南而吾鄕岀其門者未聞相從以學文爲事旣而得巴陵吳敏樹南屛稱述其術篤好而不厭而武陵楊彝珍性農善化孫鼎臣芝房湘陰郭嵩燾伯琛漵浦舒燾伯魯亦以姚氏文家正軌違此則又何求最後得湘潭歐陽生生吾友歐陽兆熊小岑之子而受法於巴陵吳君湘陰郭君亦師事新城二陳其漸染者多其志趨嗜好舉天下之美無以易乎桐城姚氏者也當乾隆中葉海內魁儒畸士崇尙鴻博繁稱旁證考核一字累數千言不能休別立幟志名曰漢學深擯有宋諸子義理之說以爲不足復存其爲文尤蕪雜寡要姚先生獨排眾議以爲義理考据詞章三者不可偏廢必義理爲質而後文有所附考据有所歸一編之內惟此尤兢兢當時孤立無助傳之五六十年近世學子稍稍誦其文承用其說道之廢興亦各有時其命也歟哉自洪楊倡亂東南荼毒鍾山石城昔時姚先生撰杖都講之所今爲犬羊窟宅深固而不可拔桐城淪爲異域旣克而復失戴鈞衡全家殉難身亦歐血死矣余來建昌問新城南豐兵燹之餘百物蕩盡田荒不治蓬蒿沒人一二文士轉徙無所而廣西用兵九載羣盜猶洶洶驟不可爬梳龍君翰臣又物故獨吾鄕少安二三君子尙得優游文學曲折以求合桐城之轍而舒燾前卒歐陽生亦以瘵死老者牽於人事或遭亂不得竟其學少者或中道夭殂四方多故求如姚先生之聰明早達太平壽考從容以躋於古之作者卒不可得然則業之成否又得謂之非命也􅁘歐陽生名勳字子和沒於咸豐五年三月年二十有幾其文若詩淸縝喜往復亦時有亂離之􅁣莊周云逃空虛者聞人足音跫然而喜而况昆弟親戚之謦欬其側者乎余之不聞桐城諸老之謦欬也久矣觀生之爲則豈直足音而已故爲之序以塞小岑之悲亦以見文章與世變相因俾後之人得以考覽焉孫芝房侍講芻論序咸豐九年三月善化孫芝房侍講鼎臣以書抵余建昌軍中寄所爲芻論屬爲裁定凡二十五篇曰論治者六論鹽者三論漕者三論幣者二論兵者三通論唐以來大政者七論明賦餉者一其首章追溯今曰之亂源深咎近世漢學家言用私意分別門戶其語絕痛明年四月復得芝房書則疾革吿別之詞而芝房以三月死矣旣爲位而哭且以書吿仁和邵君懿辰於是爲敘諸􅂤首而歸諸其孤葢古之學者無所謂經世之術也學禮焉而已周禮一經自體國經野以至酒漿􅌀市巫小繕稾天鳥蠱蟲各有專官察及纖悉吾讀杜元凱春秋釋例歎􅏀明之發凡仲尼之權衡萬變大率秉周之舊典故曰周禮盡在魯矣自司馬氏作史猥以禮書與封禪平準竝列班范而下相􅆓不察唐杜佑纂通典言禮者居其泰半始得先王經世之遺意有宋張子朱子益崇闡之聖淸膺命巨儒輩岀顧亭林氏著書以扶植禮敎爲己任江愼修氏纂禮書綱目洪纖畢舉而秦樹灃氏遂修五禮通考自天文地理軍政官制都萃其中旁綜九流細破無內國藩私獨宗之惜其食貨稍缺嘗欲集鹽漕賦稅國用之經別爲一編傅於秦書之次非徒廣己於不可畔岸之域先聖制禮之體之無所不賅固如是也以世之多故握槧之不可以茍未及事事而齒髪固已衰矣往者漢陽劉傳瑩茮雲實究心漢學者之說而疾其單辭碎義輕笮宋賢閒嘗語余學以反求諸心而已泛博胡爲至有事於身與家與國則當一一詳核焉而求其是考諸室而市可行驗諸獨而眾可從又曰禮非考据不明學非心得不成國藩則大韙之以爲知言者徒也未幾茮雲卽世臨絕爲先令處分後事壹秉古禮國藩旣銘其墓又爲家傳麤道漢學得失主客之宜藏諸劉氏之祏君子之言也平則致和激則召爭辭氣之輕重積久則移易世風黨仇訟爭而不知所止曩者良知之說誠非無蔽必謂其釀晩明之禍則少過矣近者漢學之說誠非無蔽必謂其致粤賊之亂則少過矣芻論所考諸大政葢與顧氏江氏秦氏之指爲近彼數子者固漢學家所奉以爲歸者也而芝房首篇譏之已甚其果有剖及毫釐千里者􅁘抑將憤夫一二鉅人長德曲學阿世激極而一鳴􅁘芝房之志大而鋭進也與茮雲同其卒也寄書抵余以吿永訣亦與茮雲同其自芻論外別有詩十卷文十一卷河防紀略四卷著書之多與茮雲異而其博觀而愼取則同其嫉夫以漢學標揭也亦同而立言少異余故稍附諍論以明不􅃘死友之義亦以見二子者之不竟其志非僅余之私痛也經史百家􅂤編序自六籍燔於秦火漢世掇拾殘遺徵諸儒能通其讀者支分節解於是有章句之學劉向父子勘書祕閣刊正脫誤稽合同異於是有校讐之學梁世劉勰鍾嶸之徒品藻詩文襃貶前哲其後或以丹黃識別高下於是有評點之學三者皆文人所有事也前明以四書經藝取士我朝因之科場有勾股點句之例葢猶古者章句之遺意試官評定甲乙用硃墨旌別其旁名曰圏點後人不察輒仿其法以塗抹古書大圈密點狼籍行閒故章句者古人治經之盛業也而今專以施之時文圈點者科場時文之􅋘習也而今反以施之古書末流之遷變何可勝道惟校讐之學我朝獨爲卓絕乾嘉閒巨儒輩岀講求音聲故訓校勘疑誤冰解的破度越前世矣咸豐十年余選經史百家之文都爲一集又擇其尤者四十八首錄爲􅂤本以詒余弟沅甫沅甫重寫一册請余勘定乃稍以己意分別節次句絕而章乙之閒亦釐正其謬誤評騭其精華雅與鄭竝奏而得與失參見將使一家昆弟子姪啟發證明不復要塗人而强同也鳴原堂論文序常棣爲燕兄弟之詩小宛爲兄弟相戒以免禍之詩而皆以脊令起興葢脊令之性最急其用情最切故常棣以喻急難之誼而小宛以喻征邁努力之忱余久困兵閒溫甫沅浦兩弟之從軍其初皆因急難而來沅浦堅忍果摯遂成大功余用是獲免於戾因與沅弟常以暇逸相誡期於夙興夜寐無忝所生爰取兩詩脊令之旨名其堂曰鳴原堂云王􅂳山遺書序王􅂳山先生遺書同治四年十月刻竣凡三百二十二卷國藩校閱者禮記章句四十九卷張子正蒙注九卷讀通鑑論三十卷宋論十五卷四書易詩春秋諸經稗疏考異十四卷訂正譌脫百七十餘事軍中鮮暇不克細紬全編乃爲序曰昔仲尼好語求仁而雅言執禮孟氏亦仁義竝稱葢聖王所以平物我之情而息天下之爭內之莫大於仁外之莫急於禮自孔孟在時老莊已鄙棄禮敎楊墨之指不同而同於賊仁厥後眾流歧岀載籍焚燒微言中絕人紀紊焉漢儒掇拾遺經小戴氏乃作記以存禮於什一又千餘年宋儒遠承墜緒橫渠張氏乃作正蒙以討論爲仁之方􅂳山先生注正蒙數萬言注禮記數十萬言幽以究民物之同原顯以綱維萬事弭世亂於未􅄱其於古昔明體達用盈科後進之旨往往近之先生名夫之字而農以崇禎十五年舉於郷目覩是時朝政刻覈無親而士大夫又馳騖聲氣東林復社之徒樹黨伐仇頽俗曰敝故其書中黜申韓之術嫉朋黨之風長言三歎而未有已旣一仕桂藩爲行人司知事終不可爲乃匿迹永郴衡邵之閒終老於湘西之石􅂳山聖淸大定訪求隱逸鴻博之士次第登進雖顧亭林李二曲輩之艱貞徵聘尙不絕於廬獨先生深閟固藏邈焉無與平生痛詆黨人標榜之習不欲身隱而文著來反脣之訕笑用是其身長遯其名寂寂其學亦竟不顯於世荒山敝榻終歲孶孶以求所謂育物之仁經邦之禮窮探極論千變而不離其宗曠百世不見知而無所於悔先生沒後巨儒迭興或攻良知捷􅀗之說或辨易圖之鑿或詳考名物訓詁音韻正詩集傳之疏或修補三禮時享之儀號爲卓絕先生皆已發之於前與後賢若合符契雖其箸述太繁醕駁互見然固可謂博文約禮命世獨立之君子已道光十九年先生裔孫世全始刊刻百五十卷新化鄧顯鶴湘皋實主其事湘潭歐陽兆熊曉晴贊成之咸豐四年寇犯湘潭板毀於火同治初元吾弟國荃乃謀重刻而增益百七十二卷仍以歐陽君董其役南匯張文虎嘯山儀徵劉毓崧伯山等分任校讐庀局於安慶蕆事於金陵先生之書於是麤備後之學者有能秉心敬恕綜貫本末將亦不釋乎此也衡陽彭氏譜序吾少時讀家譜曾子十五世孫據以關內侯避王莾之亂南遷爲南州諸曾之祖私怪據事蹟不見於他書舊譜於何取徴後讀歐陽文忠公集見其答曾子固書亦以關內侯據爲疑引史例以諷之乃知吾曾氏本據爲始遷之祖相􅆓且千歲由來舊矣歐陽公譜牒之學號爲精審然其所箸唐宰相世系表於巨族旣推其本源岀於某帝某王又歴敘漢世名賢如琅邪王氏已稱岀周靈王子晉之後而又敘王吉王駿之系蘭陵蕭氏已稱出帝嚳之後而又敘蕭何望之之系相承不絕如屈伸指而數庭樹略無參稽猶豫之辭公嘗譏司馬遷不能闕疑後人又譏歐陽氏不善闕疑所謂目能見千里而不能自見其睫也君子愼度身世信諸心則蒙大難決大計而不懼未信諸心則雖坦途而不肎輕試其於臨文亦若是焉可耳衡陽彭雪琴侍郎以諸生從戎十有三載肅淸長江克名城以百計殕巨憝於金陵當其提挈飢軍岀入鋒鏑誓不與此賊同戴三光天下稱爲烈士及夫勳勞曰著朝廷授爲安徽巡撫授爲漕運總督皆屢疏固辭不拜退然若漆雕之內不自信卒不輕於一試又何愼也同治四五年閒東南大定侍郎與其宗長老修訂彭氏家譜彭氏本貫江西之泰和至明世有曰聲揚者始遷於衡其後八傳曰步南者肇修譜牒我朝康熙中再修之道光十三年侍郎之考贈光祿君三修之及是四次修纂族之材俊子弟奮迹師中積功累伐珥貂相望簪紱雲興皆著於錄彭氏曰益光大矣其系表斷自聲揚公凡前世達人曁同姓異望之顯者別爲一編不與本宗相淆葢凜凜乎闕疑之誼云國藩之先世亦自江西遷居衡陽至明季更遷湘郷而祠廟今尙在衡與彭氏擊柝相聞墟煙相接曩者不揆愚􅋘嘗􅁣然欲重訂家譜述其可知者而差其可疑者區爲別錄不求盡合於歐曾大儒但求慊於吾心久困兵閒未遑執􅂤感侍郎急於先務故爲之序以答其請因抒余之夙懷曰愼齋詩草序李生春甫余癸卯典試蜀中所得士也時生方少貌玉立文似韓慕廬翛然塵􅙟之表心賞之勖以讀書希古而別而生侍老親疾累年不應禮部試丁未爲百韻詩貽余余賦詩報之曰不見李生今四載我有情懷浩如海又曰汝曹報國好身手似我蹉跎已老醜思之抑勖之也庚戌春正月生入都來見遂成進士官翰林余大喜壬子夏散館改官􅆿部余重惜之生悒悒不自得余持節江西生以詩送行有惘然若失意旣聞以同知之任滇中會天下多故久不得生消息不數年聞生官知府奉使徵餉遇賊不屈死矣余大慟淚如雨下其門人韓西舫孝廉以生滇中詩集竝毀於賊􅊧羅散佚得十之五由吳春海太史寄余屬爲序余何言烏虖天賦生以穎異之資復予生以淸華之選其待生不可謂不厚乃乍予之而乍奪之使之鬱伊無憀激而爲一官萬里之行夫以生之才中外皆可自效使天益其年以富其學其建樹當可想見卽其詩之所詣當不僅若此然死者人所不免犯敵捐軀與老死牖下其輕重固自有別而絕不意生之死之慘毒如是且竝其詩殉之亦零落無存而僅僅掇拾於風霜兵燹之餘也悲夫回憶癸卯識生後以詩倡醻而今已矣莊叟曰身非女有此天地之委􅄱也生旣浩然長往矣何有於身後之名然則余爲生悲竝悲及生之詩亦達士之所笑也雖然莊論達矣而亦未盡也如生忠魂英魄歴劫不化當如睢陽爲厲以殺賊非泯泯以沒者况夫朝廷恤之門人思之有增秩之文有延世之賞有遺集之刻以永其傳均有身盡而我不與之俱盡者在生亦可以含笑九京也夫國朝先正事略序余嘗以大淸達人傑士超越古初而紀述闕如用爲歎憾道光之末聞嘉興錢衎石給事儀吉仿明焦竑獻徵錄爲國朝徵獻錄因屬給事從子應溥寫其目錄得將相大臣循良忠節儒林文苑等凡八百餘人積二三百卷借名人之碑傳存名人之事蹟自別京師久從征役而此目錄册者不可復睹同治初又得鄢陵蘇源生文集具述其師錢給事於徵獻錄之外復節錄名臣爲先正事略於是知錢氏頗有造述不僅鈔纂諸家之文矣又二年而得吾鄕李元度次靑所箸先正事略命名乃適與錢氏相合前此二百餘年未有成書近三十年中錢氏編摩於汴水次靑成業於湖湘斯足徵通儒意趣之同抑地下達人傑士其靈爽不可終閟也自古英哲非常之君往往得人鼎盛若漢之武帝唐之文皇宋之仁宗元之世祖明之孝宗其時皆異材㪍起俊彥雲屯焜燿􅂤編然考其流風所被率不過數十年而止惟周之文王曁我聖祖仁皇帝乃閱數百載而風流未沬周自后稷十五世集大成於文王而成康以洎東周多士濟濟皆若秉文王之德我朝六祖一宗集大成於康熙而雍乾以後英賢輩岀皆若沐聖祖之敎此在愚氓亦似知之其所以然者雖大智莫能名也聖祖嘗自言年十七八時讀書過勞至於咯血而不肎少休老耄而手不釋卷臨摹名家手卷多至萬餘寫寺廟扁榜多至千餘葢雖寒畯不能方其專北征度漠南巡治河雖卒役不能踰其勞祈雨禱疾步行天壇幷醢醬􅐽鹽而不御年逾六十猶扶病而力行之凡前聖所稱至德純行殆無一而不備上而天象地輿厤算音樂考禮行師􅆿律農政下至射御醫藥奇門壬遁滿蒙西域外洋之文書字母殆無一而不通且無一不創立新法別啟津途後來高才絕藝終莫能岀其範圍然則雍乾嘉道累葉之才雖謂皆聖祖敎育而成誰曰不然今上皇帝嗣位大統中興雖去康熙益遠矣而將帥之乘運會立勳名者多出一時章句之儒則亦未始非聖祖餘澤陶冶於無窮也如次靑者葢亦章句之儒從事戎行咸豐甲寅乙卯之際與國藩患難相依備嘗艱險厥後自領一隊轉戰數年軍每失利輒以公義糾劾罷職論者或咎國藩執法過當亦頗咎次靑在軍偏好文學奪治兵之日力有如莊生所譏挾策而亡羊者久之中外大臣數薦次靑緩急可倚國藩亦草疏密陳李元度下筆千言兼人之才臣昔彈劾太嚴至今內疚惟朝廷量予褎省當時雖爲吏議所格天子終右之起家復任黔南軍事師比有功超拜雲南按察使而是書亦於黔中吿成聖祖有言曰學貴初有決定不移之志中有勇猛精進之心末有堅貞永固之力次靑提兵四省屢蹶仍振所謂貞固者非邪發憤箸書鴻編立就亦云勇猛矣願益以貞固之道持之尋訪錢氏遺書參訂修補矜練歲年愼襃貶於錙銖酌羣言而取衷終成聖淸鉅典上躋周家雅頌誓誥之林不尤足壯矣哉重刻茗柯文編序武進張大令式曾將重刻其曾祖王父皋聞先生茗柯文集而以寫本示余屬爲之序葢文章之變多矣高才者好異不已往往造爲瑰瑋奇麗之辭倣效漢人賦頌繁聲僻字號爲復古曾無才力氣勢以驅使之有若附贅懸疣施膠漆於深衣之上但覺其不􅀋耳敘述朋舊狀其事蹟動稱卓絕若合古來名德至行備於一身譬之畫師寫眞眾美畢具偉則偉矣而於其所圖之人固不肖也吾嘗執此以衡近世之文能免於二者之譏實鮮蹈之者多矣皋聞先生編次七十家賦評量殿最不失銖黍自爲賦亦恢閎絕麗至其他文則空明澄澈不復以博奥自高平生師友多超特不世之才而下筆稱述􅃴如其量若帝天神鬼之監臨襃譏不敢少溢何其愼歟自考據家之道旣昌說經者專宗漢儒厭薄宋世義理心性等語甚者詆毀洛閩披索疵瑕枝之蒐而忘其本流之逐而遺其源臨文則繁徵博引考一字辨一物累數千萬言不能休名曰漢學前者自矜創􅀗後者附和偏詖而不知返君子病之先生求陰陽消息於易虞氏求前聖制作於禮鄭氏辨說文之諧聲剖晰毫芒固亦循漢學之軌轍而虛衷硏究絕無陵駕先賢之意萌於至隱文辭溫潤亦無考證辨駮之風盡取古人之長而退然若無一長可恃意其藴蓄者厚遏而蔽之能焉而不伐歛焉而愈光殆天下之神勇古之所謂大雅者歟張氏之先兩世賢母撫孤課讀一日不能再食舉家習爲故常孝友艱苦遠近歎慕自粤賊縱横東南麋爛常潤等郡室廬蕩然張氏之窮約殆有甚於疇昔書籍刻板皆摧燒不復可詰矣余昔讀張氏諸書旣欽其篤行茲重覽茗柯文編樂其復顯於世也乃忘其􅋘而序之湖南文徵序吾友湘潭羅君硏生以所編籑湖南文徵百九十卷示余而屬爲序其端國藩􅋘甚齒又益衰奚足以語文事竊聞古之文初無所謂法也易書詩儀禮春秋諸經其體勢聲色曾無一字相襲卽周秦諸子亦各自成體持此衡彼畫然若金玉與卉木之不同􅀋是烏有所謂法者後人本不能文强取古人所造而摹擬之於是有合有離而法不法名焉若其不俟摹擬人心各具自然之文約有二端曰理曰情二者人人之所固有就吾所知之理而筆諸書而傳諸世稱吾愛惡悲愉之情而綴辭以達之若剖肺肝而陳􅂤策斯皆自然之文性情敦厚者􅀋能爲之而淺深工拙則相去十百千萬而未始有極自羣經而外百家箸述率有偏勝以理勝者多闡幽造極之語而其弊或激宕失中以情勝者多悱惻感人之言而其弊常豐縟而寡實自東漢至隋文人秀士大抵義不孤行辭多儷語卽議大政考大禮亦每綴以排比之句閒以婀娜之聲歴唐代而不改雖韓李銳志復古而不能革舉世駢體之風此皆習於情韻者類也宋興旣久歐陽曾王之徒崇奉韓公以爲不遷之宗適會其時大儒迭起相與上探鄒魯硏討微言羣士慕效􅀋皆法韓氏之氣體以闡明性道自元明至聖朝康雍之閒風會略同非是不足與於斯文之末此皆習於義理者􅀋也乾隆以來鴻生碩彥稍厭舊聞別啟涂軌遠搜漢儒之學因有所謂考據之文一字之音訓一物之制度辨論動至數千言曩所稱義理之文淡遠􅂤樸者或屏棄之以爲空疏不足道此又習俗趨嚮之一變已湖南之爲邦北枕大江南薄五嶺西接黔蜀羣苗所萃葢亦山國荒僻之亞然周之末屈原岀於其閒離騷諸篤爲後世言情韻者所祖逮乎宋世周子復生於斯作太極圖說通書爲後世言義理者所祖兩賢者皆前無師承創立高文上與詩經周易同風下而百代逸才舉莫能越其範圍而况湖湘後進沾被流風者乎玆編所錄精於理者葢十之六善言情者約十之四而駢體亦頗有甄采不言法而法未始或紊惟考據之文蒐集極少前哲之倡導不宏後世之欣慕亦寡硏生之學稽說文以究達詁箋禹貢以晰地志固亦深明考據家之說而論文但崇體要不尙繁稱博引取其長而不溺其偏其猶君子愼於擇術之道歟雲槳山人詩序代季師作自韓愈氏有言懽愉之詞難工窮苦之音易好歐陽公效之亦稱詩必窮而後工後之論者大率祖述其說以謂宮音和溫難於聳聽商音悽厲易以感人故盛世之巨公其詩歌往往不及衰世之孤臣逐客而廟堂􅀸相例不能與窮巷憔悴專一之士角文藝之短長數十年來人人相與持是說而不變所從來久已芝昌嘗究觀詩敎之終始竊獨以爲未必然也鄭氏所譔三百篇譜大氐成周盛時賢人有位之作爲多東遷以降王迹旣熄詩亦替矣西漢蘇李東漢班張號爲能詩亦當兩京全盛之日李唐之世詞人百輩累迹而興然世所稱爲四唐者雖愚者亦知有初盛而貶中晚葢聲音之道與政相通國家鼎隆之日太和充塞庶物恬愉故文人之氣盈而聲亦上騰反是則其氣歉而聲亦從而下殺達者之氣盈矣而志能斂而之內則其聲可以薄無際而感鬼神窮者之氣旣歉而志不克劃然而自申則甕牖窮老而不得一篇之工亦常有之然則謂盛世之詩不敵衰季􅀸相不敵窮巷之士是二者殆皆未爲篤論已吾師長白宮保相國光輔聖主二十餘年智深而量遠果決而閒定暇日以所爲詩二册見示芝昌受而讀之􅂤肅淸夷不名一能篇帙不繁而行役之作扈從之章生平政蹟略備於斯抑有詩史之遺意其於六朝唐宋諸家若合眾金以融一冶而鑄爲重器觀者但知器之良而忘其所采爲誰氏之金也於時皇淸承平已二百祀重熙累洽遐邇禔安跂行喙息之倫莫不茹仁踐義時會可謂極隆而吾師入總百揆岀領三輔門生故吏吐哺延接天憲岀內曹司白事手批口答曰以百計而乃從容揮斥時從事於吟咏若行所無事者才分之優絀什百千萬如此其遠也觀吾師所際之時與夫詩之所詣而後知曩之宗韓歐之說者亦所謂察其一未睹其二者哉讀旣竟因附陳微義識於􅂤端用質知言者焉道光二十有七年九月某日門人季芝昌謹序錢選制藝序乘椎輪於金根玉輅之旁夫人以爲􅋘矣服草衣卉服於衮冕繡裳之朝夫人以爲悖矣甚哉時之不可已也泥橇而山樏夏葛而冬裘適時則貴失時則捐昔馮唐終身不遇而曰文帝好老而臣尙少武帝好少而臣已老豈曰非材如不遇時何矧夫習制藝以弋取科名而有不附聲比貌求合時宜者乎雖然趨時之道豈一端哉天下之事其始葢有一二巧者標新領異以駴羣聽其次則能者慕效之又其次則拙者剽竊之慕而效之是謂風氣剽而竊之是謂流弊不數十年而昔之新且異者將厭棄矣則又有巧者移易之又數十年而亦厭棄矣人情賤同而思異物窮則變自古然也故善趨時者貴先時不貴後時場屋之文何獨不然國家以制藝取士二百年來爲體屢遷乾隆嘉慶之際學者硏鍊經義負聲振采醲郁葩華道光初年稍患文勝詞豐而義寡栀蠟其外而塗泥其中者往往而有於是有志者􅁣然思以易之刊其支蔓矯以淸眞當其始出若撥霧而見山厭肥膩而飮太羹也而今已二十年矣諺曰城中好高髻四方高一尺城中好廣眉四方成半額自往者標爲淸眞之目近乃頗事佻巧拋棄詩書或一挑半剔以爲顯排句㬪調以爲勁抑之無實揚之無聲所謂歴久而厭棄者其不然乎所謂物窮則變者其將在茲乎善趨時者當以此時振翱翔之骨發鏗訇之響鎔經史而鑄偉詞揆以好異之人情驗以將變之風氣吾知其必有合也僕不敏嘗欲采近科墨彙爲一帙以爲趨時者先聲之導人事滋劇卒鮮休暇同年錢君崙仙頃岀茲編見示揀新汰弊先得我心茍有能者慕效則風氣從此移易錢君其巧者與抑吾又有說焉風氣者必變者也而規矩者不變者也今夫斲木爲輿軫方以象地葢圓以象天可規可萭可水可縣可量可權而後岀而合轍深衣之制袂圓以應規曲袷如矩以應方兼以應􅀡應平而後非奇衰之服制藝之有規矩先輩葢詳言之錢君此選奇正濃淡不名一能要其引繩削墨其有悖於前人之程式者鮮矣苟舍是而別求先時之巧是猶行遠者有說輻之占製錦者之不得要領也將可乎哉送郭筠仙南歸序凡物之驟爲之而遽成焉者其器小也物之一覽而易盡者其中無有也郭君筠仙與余友九年矣卽之也溫挹之常不盡道光甲辰乙巳兩試於禮部畱京師主於余促膝而語者四百餘日乃得盡窺其藏甚哉人不易知也將別於是爲道其深坿於回路贈言之義而以吾之忠効焉葢天之生材或相千萬要於成器以適世用而已材之小者視尤小者則優矣茍尤小者琢之成器而小者不利於用則君子取其尤小者焉材之大者視尤大者則絀矣茍尤大者不利於用而大者琢之成器則君子取其大者焉天賦大始人作成物傳曰人不天不因天不人不成不極擴充追琢之能雖有周公之才終棄而已矣余所友天下賢士或以德稱或以藝顯􅀋有以自成者而若筠仙躬絕異之姿退然深貶語其德若無可名學古人之文章入焉旣深而其外猶若鉏鋙而不安其無所成者與匠石斲方寸之木斤之削之不移瞬而成物矣及乎裁徑尺之材以爲榱桷不閱曰而成矣及至伐連抱之楩枏爲天子營總章太室之梁棟經旬累月而不得成焉其器瘉大就之瘉艱淺者欲以一槪律之難矣且所號爲賢者謂其絕拘攣之見曠觀於廣大之區而不以尺寸繩人者也若夫逢世之技智足以與時物相發力足以與機勢相會此則眾人之所共覩者矣君子則不然赴勢甚鈍取道甚迂德不茍成業不茍名艱勤錯迕遲久而後進銖而積寸而累旣其純熟則聖人之徒其力造焉而無扞格則亦不失於令名造之不力歧出無範雖有瓌質終亦無用孟子曰五穀不熟不如荑稗誠哉斯言也筠仙勖哉去其所謂扞格者以蘄至於純熟則幾矣人亦病不爲耳若夫自揣旣熟而或不達於時軌是則非余之所敢知也送謝吉人之宫江左序吾湘郷當乾隆時人才殷盛鄧筆山爲雲南布政使羅九峯爲禮部侍郎而謝薌泉先生爲御史三人者皆起家翰林而御史君名震天下是時和珅柄國聲張勢厲家奴乘高車横行都市無所憚御史君巡城遇焉捽之岀而鞭之火其車於衢世所稱燒車御史者也其後二十餘年御史君之子果堂以河南縣令卓薦召見上從容問曰汝卽燒車御史之子乎不數月遷四川知府又十餘年而謝吉人邦鑑復以進士出爲江南縣令吉人御史君之孫而知府君之弟之子也將之官其常所酬酢者或爲詩送之吉人乃索予爲序而乞言以糾其不逮於是拜手吿曰子今長人矣四封之內尊無與二堂上頣指堂下趨者百人所識窮乏仰而待命設館以延賓友貌敬而情離卽有不善彼所謂趨者待命者貌敬者或知之而不諫或諫焉而不力吾以其身巍然處於眾人之上而聰明識量又誠越而倍之前有唯後有諾於是予聖自雄之習囂然起矣而左右之人又多其術以餂我內之傲者曰勝外之欺者曰眾茲其所以舛也昔者宓子賤治單父孔子曰子何施而眾悅對曰此地民有賢於不齊者五人不齊事之而稟度焉皆敎不齊所以治人之道孔子歎曰其大者乃於此乎有矣魯使樂正子爲政孟子曰好善優於天下東漢龐參爲漢陽太守先􅃸隱居任棠棠不與言但以薤一大本水一盂置戶屏前抱兒孫伏戶下參會其意曰水者欲吾淸也拔大本薤欲吾擊彊宗也抱兒當戶欲吾開門恤孤也故古人之學莫大乎求賢以自輔小智之夫矜己而貶物以爲眾人卑卑無足益我夫不反求諸己而一切掩他人之長而蔑視之何其易與詩曰國雖靡止或聖或否民雖靡膴或哲或謀或肅或乂謂求賢而終不能得者非篤論也今震澤宰左君靑峙吾湘郷之賢者也任俠而不矜諳事而不計利害子往試求之必有所以益子者友仁以礪德利器以善事旣以上繩祖武又以紹諸鄕先輩之徽無棄爾輔員于爾輻靑峙子之輔也抑吾聞江南爲仕宦鱗萃之邦或因靑峙而得盡交其賢士大夫是尤余所望也送周荇農南歸序天地之數以奇而生以偶而成一則生兩兩則還歸於一一奇一偶互爲其用是以無息焉物無獨必有對太極生兩儀倍之爲四象重之爲八卦此一生兩之說也兩之所該分而爲三殽而爲萬萬則幾於息矣物不可以終息故還歸於一天地絪縕萬物化醕男女搆精萬物化生此兩而致於一之說也一者陽之變兩者陰之化故曰一奇一偶者天地之用也文字之道何獨不然六籍尙已自漢以來爲文者莫善於司馬遷遷之文其積句也皆奇而義必相輔氣不孤伸彼有偶焉者存焉其他善者班固則毗於用偶韓愈則毗於用奇蔡邕范蔚宗以下如潘陸沈任等比者皆師班氏者也茅坤所稱八家皆師韓氏者也傳相祖述源遠而流益分判然若白黑之不􅀋於是刺議互興尊丹者非素而六朝隋唐以來駢偶之文亦已久王而將厭宋代諸子乃承其敝而倡爲韓氏之文而蘇氏遂稱曰文起八代之衰非􅀡其才之足以相勝物窮則變理固然也豪傑之士所見􅀋不甚遠韓氏有言孔子必用墨子墨子必用孔子不相用不足爲孔墨由是言之彼其於班氏相師而不相非明矣耳食者不察遂附此而抹摋一切又其言多根六經頗爲知道者所取故古文之名獨尊而駢偶之文乃屏而不得與於其列數百千年無敢易其說者所從來遠矣國家承平奕􅥴列聖修禮右文碩學鴻儒往往多有康熙雍正之閒魏禧汪琬姜宸英方苞之屬號爲古文專家而方氏最爲無纇純皇帝武功文德壹邁古初徵鴻博以考藝開四庫館以招延賢儁天下翕然爲浩博稽核之學薄先輩之空言爲文務閎麗胡天游邵齊燾孔廣森洪亮吉之徒蔚然四起是時郎中姚鼐息影金陵私淑方氏如碩果之不食可謂自得者也􅆓及今曰方姚之流風稍稍興起求如天游齊燾輩閎麗之文闃然無復有存者矣閒者吾鄕人淩君玉垣孫君鼎臣周君壽昌乃頗從事於此而周君爲之尤可喜其才雅贍有餘地而奇趣迭生葢幾於能者夫適王都者或道晉或道齊要於達而巳司馬遷文家之王都也如周君之所道進而不已則且達於班氏而不爲韓氏所非又不已則王都矣周君以道光乙巳成進士選翰林院庶吉士値皇太后萬壽天子大孝錫􅀋臣下得榮其親將奉誥命以歸覲岀所爲文示余余乃略述文家原委明奇偶互用之道假贈言之義以爲同志者勖嗟乎區區而以文字相討論是則余之􅋘而不賢者識小之􅀋也送陳岱雲岀守吉安序道光二十五年十一月曰長至翰林編修茶陵陳君奉命岀守吉安明曰入謝上曰禮官章上汝妻與請旌表有諸卽頓首敬謝臣源兖妻蒙恩旌表孝行其可旌柰何則隱約情事具對十一上嘉歎所以尉敕良厚陳君岀涕泣吿人天子乃能省源兖家事源兖何以報先是陳君嘗大病妻易安人傾死力營救最後刲臂和藥飮君君病瘳而安人遘疾又數月而生子子生彌月而安人卒余昔銘其墓所稱憂勞積劇焉可支者也旣歸喪陳君之母語其親戚曰是善事我又有功陳氏先祖語鄕人亦如之郷人上其行有司以達於禮官禮官章上不數曰而陳君有吉安之命於是陳君益不自克且曰吾有君親殊恩妻又貰我死吾負三不報其何以酬向人輒吁歎曰夜嗛然內疚亡何將岀國門國藩乃進而稱曰子之方寸幾矣抑未知所持也夫忠孝者每事而迹之則曰不勝要惟行吾心之不得已者斯可矣民之初葢有不忍於其所生先王制爲事親之禮溫凊而定省疾則嘗藥諫則號泣因人之情而爲文達之其於事君也亦然父母者育我天者先父母而生我君者後天而成我者也有不􅃘忘本於父母者而後愛身以及子姓有不􅃘忘本於天者而後愛吾君以及人民庶物故入而供弟子之職岀而力王家勤民事非􅀡好爲觀美內有所激發不得已而爲之者也先王之敎旣熄人不能自道於道乃始慕名號而從事其中則漠無所動滫􅔱以養親而非必中有所愛踧踖以覲君而非必中有所敬及其居官朝令曰編保甲夕令曰興水利復常平擇名號尤美者而張之漫不省其所以然外之標識如彼內而隳壞如此故名目者所以喪人之良心而墮凡事也仲尼曰人而不仁如禮何言本心旣亡不堪以文爲塗附之也賢者思以易之獨宜求諸心之不得已者耳盜賊公行不得巳而立保甲旱澇饑饉不得已而興水利常平行之不合不得已而思亟思亟問必盡善而後已鍥而不舍靡物不斷古有刲臂療病而立應者彼迫於無可如何其神固已深入金石矣今或浮慕奇行而以號於眾曰吾將效刲肉故事要名之念熾於中責效之情流於外則臨事必不爲爲之且不應然則子欲上不負君親下不媿令妻可以知所從事矣吾辱相知重他無可言者至離合之故則別繫以詩送唐先生南歸序古者道一化行自􅀸大夫之弟子與凡民之秀皆上之人置師以敎之於鄕有州長黨正之儔於國有師氏保氏天子旣兼君師之任其所擇大抵皆道藝兩優敎尊而禮嚴弟子摳衣趨隅進退必愼內以有所憚而生其敬外緝業以興其材故曰師道立而善人多此之謂也周衰敎澤不下流仲尼干諸侯不見用退而講學於洙泗之閒從之游者如市師門之盛振古無儔然自是人倫之中別有所謂先生徒眾者非長民者所得與聞矣仲尼旣沒徒人分布四方轉相流衍吾家宗聖公傳之子思盂子號爲正宗其他或離道而專趨於藝商瞿授易於馯臂子弓五傳而爲漢之田何子夏之詩五傳而至孫􅀸其後爲魯申培左氏受春秋八傳而至張蒼是以兩漢經生各有淵源源遠流歧所得漸纖道亦少裂焉有宋程子朱子岀紹孔氏之絕學門徒之繁儗於鄒魯反之躬行實踐以究羣經要旨博求萬物之理以尊聞而行知數百千人粲乎彬彬故言藝則漢師爲勤言道則宋師爲大其說允矣元明及我朝之初流風未墜每一先生岀則有徒黨景附雖不必束脩自上亦循循隅坐應唯敬對若金許嶭胡陸稼書張念芝之儔論乎其德則闇然諷乎其言則犂然而當理考乎其從遊之徒則踐規蹈矩儀型鄕國葢先王之敎澤得以僅僅不斬頑夫有所忌而發其廉恥者未始非諸先生講學與羣從附和之力也詩曰風雨如晦雞鳴不巳誠珍之也今之世自鄕試禮部試舉主而外無復所謂師者閒有一二高才之士鉤稽故訓動稱漢京聞老成倡爲義理之學者則罵譏唾侮後生欲從事於此進無師友之援退犯萬眾之嘲亦遂卻焉吾鄕善化唐先生三十而志洛閩之學特立獨行詬譏而不悔歲庚子以方伯內召爲太常􅀸吾黨之士三數人者曰就而考德問業雖以國藩之不才亦且爲義理所薰蒸而確然知大閑之不可踰未知於古之求益者何如然以視夫世之貌敬舉主與厭薄老成而沾沾一得自矜者吾知免矣丙午二月先生致仕得請將歸老於湖湘之閒故作師說一首以識年來嚮道之由且以告吾鄕之人茍有志於强立未有不嚴於事長之禮而可以成德者也送江小帆同年視學湖北序今天下郡縣牧民之吏大抵以􅆿强齊之耳任􅃖蚩者自爲啄息喜怒一不顧問至其犯法小者桎梏大者棄市豪强者漏網弱者糜爛苟以掩耳目而止原國家所以立法之意豈爾爾哉葢亦欲守土者曰教民以孝弟仁義之經不率而後􅆿之其率敎而有文者則以進於學使者而登之庠序旣登之矣則以授於校官而常飭之故古者飮射讀法在今曰則守令之職而今之學政也者不過因文藝以別羣士之優劣因士之優劣以知守令敎民之勤惰故巡撫者天子所使以察守土者餋民之善與否也學政者天子所使以察守土者敎民之善與否也承平旣久法意寖失郡縣有司不知三物爲何事而敎民之任獨以責之學政與校官而所謂校官者􅀋多衰疾晩暮之徒其祿不足自贍往往與學宮弟子爭錐刀之末不特不克助宣敎化或轉餂言以蔽學政之耳目彼學政者孤懸客寄於一行省之中守土者皆貌敬而神拒之曰憊精於文字而角機智於千百詭弊之場而欲以餘力敎民以仁義孝弟之經其不亦難矣哉然則如之何而可弊之除也先其甚者利之興也先其易者其可矣自功利之說中於膏肓學者求速化之方束髪而敝精於制藝窮老而不休六經至不能舉其篇目何有於他書今欲稍返積習莫若使之姑置制藝而從事經史奬一二博通之士以風其餘於覆名扃試之外別求旁搜廣采之術凡郡縣莫不有書院大率廩給其才者而絀其不能者名曰膏火所以濟學校之不及也學政下車之始則牒各縣令曰明年吾視某縣學當以某經試士能背誦否某史試士能言否其爲我播吿偏隅咸使知之牒校官曰吾按臨之始每縣當選諸生廿人說書有不至惟女罰及其按郡招諸生來前果使背誦某經說某史某卷大指能誦說者予以書院之廩資尤能者倍之三之尤能者牒送省會之書院亦倍其廩資其不能者廩生削其餼附生懲辱之每縣試以三四人則餘者懼矣自六經外如史漢莊騷說文水經文選宋五子及杜韓歐蘇曾王專集之屬每縣使習一部焉歲試使習者科試則易之覆名試以制藝以彰朝廷之公令面試說書以鳴使者之私好二者竝行而不悖皆善矣則拔而貢之成均使彼邦之人曉然知吾好博通之才庶幾由文以溯本舉一以勸百然後孝弟仁義之敎可以漸而興也乘傳所徑之地有書院焉則入而詔諸生以大義彼邦有搢紳多聞者則禮而薦之爲郡縣書院之長於是其亦可以樹之風聲矣同年友江君小帆之視湖北學也所以講求職思者甚備余乃別思一搜采之術無啟弊之竇而有補敎之旌者於是以戔戔之說進焉送劉君椒雲南歸序聖人之異於眾人者安在乎耳目口鼻心知百體皆得其職而已矣天之生夫人也耳職聽而目職視口體職言動心職思非所聽而濫焉非所視而淫焉於官爲不法可以視窮者而吾弗能盡焉可以聽達者而吾弗能盡焉於官爲不稱其於口體心思也亦然不稱者才絀不法者知而奸之罪又甚焉聖人者不軌不耳不度不目其自一室之米鹽推而極於天下之大鬼神之幽離於人倫殽於萬事凡視聽所宜晰無不晰凡言動所宜審無不審凡心思所宜條理無不條而理之使夫一身得職而天地萬物各安其分以位以育以效吾之官司所謂踐􅄱者也周公之所以爲周公孔子之所以爲孔子其不以此也哉今之君子之爲學者吾惑焉耳無眞受眾耳之所傾亦傾之目無真悅眾目之所注亦注之奸視而回聽言不道而動不端無過而非焉者曹好所在而不之趨焉則不相賓異矣爲考据之說者曰古之人古之人如此則幾彼則否爲詞章之說者曰古之人古之人如此則幾彼則否起一强有力者之手口羣數十百人蟻而附之朝記而暮誦課迹而責音竭己之耳目心思以承奉人之意氣曾不數紀風會一變蕩然澌滅又將有他說者出爲羣意氣之所會則又焦神悴力而趨之鈞是五官百骸也不踐聖人之􅄱而逐眾人之好疲一世以奔命於庸夫之毀譽竟死而不悔可謂大愚不靈者也漢陽劉君椒雲湛深而敦厚非其視不視非其聽不聽內志外體一準於法矣而所以擴充官骸之用又將推極知識博綜百氏以求竟乎其量余猶懼其敝身心以役於眾好也於其別也書是以貞之然余固亦頗涉前二說者之流而奔命於眾好之場者又因以自砭焉易問齋之母壽詩序古者以言相贈處至六朝唐人朋知分隔爲餞送詩動累卷帙於是別爲序以冠其端昌黎韓氏爲此體尤繁閒或無詩而徒有序於義爲已乖矣元明以來始有所謂壽序者夫人之生飢食而渴飮積曰而成年苟不已必且增至六十七十又不已則至大耋期頣彼特累曰較多耳非有絕特不可幾之理也胡序之云而爲此體者又率稱功頌德累牘不休無書而名曰序無故而諛人以言是皆文體之詭不可不辨也道光乙巳六月爲易柳恭人七十誕辰嗣君問齋郎中徵求士大夫之詩至數十篇而屬余爲序其􅂤端問齋其能辯文體者矣余讀諸君詩知恭人事贈君先生豈非所謂代有終者哉初先生以長且賢理家事無劇易必躬佔畢之業稍棄矣恭人來歸一代任焉米鹽淩雜不復關白先生由是得專精舉子業嘉慶戊午舉於郷戊辰遂成進士葢內顧無憂壹志以底於成恭人之力也先生官陜西恭人以舅姑春秋高畱侍養不隨之官所旣而太夫人就養秦中恭人又畱治家務旣而先生移官山東恭人仍畱里居計先生宦遊三十餘年而恭人僅一入秦再之山東之郯不過三年耳婦人􅀋以從官爲榮鄕里齷齪不足自適一旦朱幩翟茀稱爲命婦入則鼎食出則武夫前呼侍女如雲此常情所最稱意恭人恬然不以爲榮獨習勞居僻郷爲先生經畫家政敗袽敝革儲以待用甘麤糲以自菲歳時親戚承問無缺藥餌餘糧全活貧弱下戶躬操作以率先子婦此其識有過人者以視擁象輿以命婦自􅋑頣使侍婢俯仰如神者其賢否當有辨也詩人之祝女子曰無非無儀易此而以才能自詡則於道爲悖矣如恭人者所事不出閨闥所行不越庸德獨其相夫以發名成業而不慕從官之榮此有人所難能而其他葢可知矣余故揭其大者著於篇若其稱述懿行頌禱繁祉則諸君之詩實詳故不及云陳岱雲太守爲母生曰讌集賓僚詩序易曰雷岀地奮先王以作樂崇德葢古者雖有艱大阨塞聖人窮力畢精削除荒纇人心夷悅而後作樂以宣幽滯譬若春雷奮發而秋冬之沈痼蔽塞於地中固已久矣故曰患難所以開聖憂勞所以興國古之通義也至夫賢逹之起􅀸大夫之家莫不以然其初􅀋有非常之撼頓顚蹶戰兢僅而得全疢疾生其德術荼蘖堅其筋骨是故安而思危樂而不荒如彼其自克也豈偶然哉茶陵陳岱雲太守成童而喪父事無巨細壹操於母劉太恭人家故微也又多奇閔藥醫不絕於室期功之喪不絕於門椸無縷盎無儲者數數然也方太守就傅於外天盛寒家惟二衾一實以棉一單衾耳太恭人不􅃘子以窶凍爲人所詬强以棉衾予太守而自以單衾擁二幼子太守不忍母寒而已獨溫則虛衾而終不御太恭人亦終不以酷窮而令子廢學居無何太守以進士通籍爲翰林而家之艱於謀食如故而太恭人之勤約自刻亦如故道光二十四五年天子以海氛初靖亟思振興吏治以修內而攘外特􅂤近臣以守要郡乙巳仲冬太守用是有吉安之命明年量移廣信於是祿入稍豐寖寖怡裕矣其年十一月爲太恭人六十生曰太守開閤觴客韻以絲竹本省之僚屬所部之士民與他邦之客游茲土者凡若干人爲詩歌上壽者凡若干篇乃書抵京師屬國藩序之夫陽不可盈樂不可極故禮主靜而樂主反勝則流矣太守思前者􅄌母支持之艱與今者天子􅂤用之重將必有穆然深念者是則承歡之大者歟唐鏡海先生七十生曰同人寄懷詩序善化唐太常先生以道光丙午致仕還湘明年年七十矣五月七曰寔初度之辰六安吳君廷棟始爲寄懷詩略寓詩人戩穀俾臧之義旣而師宗竇君垿及某君某君皆踵爲之凡得詩若干首大抵惜繼見之不可常頌長者之多祉先生之姊子黃君兆麟與其弟倬命國藩爲之序竊嘗觀古之君子其載德而荷道者必有人焉帥而掖之而後後者有所階而進必有人焉輔而翼之而後前者有所託而傳水非水而不續人非人而不承葢桐鄕張考夫先生之興則有凌渝安何商隱沈石長諸子爲之附太倉陸道威先生之起則有盛聖傳陳確菴江藥園諸子爲之與二先生之爲道至寂寞也而諸子者相從於太羹元音之際殆於遯世不見稱而無怨彼各有其志爾唐先生之內召爲太常􅀸也以道光庚子僦屋於內城之西南分聽事四之一爲讀書之室袤得周尺之步廣半步耳自國藩之修􅃸或月一至或再三至未嘗不見先生手一編危坐其中它人見者亦然此所謂寂寞者非邪民之情好聲利而惡澹泊淺者趨死祿仕深者博文多藝獵取浮譽亦足以降其好勝之私先生爲外吏二十年蕭然無資積以自存旣當世之所謂迂闊而其爲學也又惟自治其身心之急或不沾沾於文藝之短長以故士之騖才技而競聲稱者亦罕過而勤焉而吳竇諸君子獨相尋於澹泊究道而考德夙參而莫造旣其違離而作爲詩歌以抒懷想斯豈曩者凌渝安何商隱及沈盛陳江之疇邪何其篤也自明代以來年齒至五十以上則人多爲詩以祝之諛媚殆於亡等又有所謂壽序者余昔書歸有光文集已痛詆其􅋘其他則又不足譏今諸君子旣舍聲利而別有所尙而其爲詩又約旨斂辭頌無溢量豈不本末竝茂不與人人同科者哉於是畢讀而序之世有達於文體之君子庶終覽焉朱心垣先生五十六壽序於余爲兄弟行結交最少久而彌摯者屈指無幾人也則有若朱嘯山富春於余爲父執又早器余余愛慕而不敢侮者亦無幾人也則有若姻伯心垣先生嘯山爲先生冡嗣其交余也先生實令之也先是先生與家嚴君同學互相掖重兩家世好旣篤重之以婚姻故余知先生特詳前歲丙申先生年五十嘯山謀稱觴乞余以言侑爵先生曰是何爲者傳曰恆言不稱老今吾方託堂上之蔭將不以禮處我乎抑以諛詞誣我乎且古者下壽六十今吾猶未也固請不獲又數年嘯山舉於鄕偕余北上從容謂曰吾父所以固辭頌禱者善則歸親義不得專也今吾欲匄子文爲寒門作家慶圖使吾父上有以承祖父母懽下有以自娛而即以爲吾父壽可乎余曰可昔董召南隱居孝義昌黎韓子爲詩紀其事姚氏三瑞堂世以孝稱東坡亦作詩美之今君欲以娛重闈者娛其親是孝子等而上之之義也賢哉吾不能以詩壽先生請覼陳君家天倫之樂以娛先生之志今夫科名宦達豈以寵身亦借以顯揚之資也先生以第一人補弟子員再躓場屋遂棄舉業其天懷恬淡視靑紫不値一吷耳乃其督課子姪則銳意進取惟恐後時討論史事旁及制藝書學皆得窾卻而勖以法度在先生豈徒欲弋取時榮哉不過欲博膝下之懽使老人聞之曰阿孫才今試已列前茅矣阿孫能可以與賢書選矣因而鼓舞後進怡然忘老此其可娛者一也君家田園足以自給先生周視原野物土之宜稻粱之外雜蒔嘉蔬種秫二頃穫以釀酒名曰延齡殺雞佐之但以奉親不以勸客有餘則度置焉門外方塘廣可百畝旁置小艇宜釣宜網當春種魚秋則取之以强半供甘旨其他則請所與子姓醉飽波及羣下其可娛者又一也君家早歲頗有外侮自先生綜家政敬宗收族袒免以下一視同仁閭里細民强梗者鋤之不肖者勸之貧無吿者周卹之竭力之所勝而不德焉比來一境怗然曩時箕舌之怨雀角之爭皆以潛消而高堂暮齒亦得晏安無患其可娛者又一也抑聞之夫妻好合兄弟旣翕父母其順矣先生早占炊臼續以鸞膠不聞有遇虐後母之事非􅆿于之道乎方鳳台先生之以計偕入都也先生曰予弟行役不可以勞門閭之望丈夫何憚萬里哉乃杖策送弟北征而衛以俱返不賢而能之乎邇年以來弟姪能文者先生爲之延師課讀肄武者爲之料量魚服竹閉之具使之皆得成名以故牀第之閒秩如也昆弟翼翼如也寢門之內訢訢如也此甚可娛者一也又先生熟於􅄱家之言往爲大母卜佳城備極勞瘁終乃永臧今腰腳尙健暇則陟層嶺披蒙茸裹糧而從一奚遊覽旣審歸而吿於堂上曰某水某山大人所經歴也有佳兆當貴至徹侯某宅某田大人所釣弋之所也居之後必昌因與指畫􅄱勢兼誦撼龍疑龍之經而堂上亦傾聽不倦或佯諾之微笑其幻渺此亦可娛之一端也夫天倫之樂豈有􅄱哉曰用優游之地行之而不著習矣而不察道路傳爲盛談或油然興感而當境者行其心之所安視爲固有而不足怪以先生之德之遇凡所謂可以自娛卽以娛親者皆已自得之而自忘之不知此中眞樂雖三公不足以易也卻老延年之道有進於此者乎嘯山歸述吾言酌而祝焉可也嘯山拜曰善遂書以爲之序田崑圃先生六十壽序道光某年月爲我年伯崑圃先生六十初度其嗣君敬堂同年匄余以文爲壽且曰古者稱壽不必攬揆之辰壽人以序抑非古也然震川歸氏望溪方氏嘗爲之是或有道焉余曰然壽序者猶昔之贈序云爾贈言之義粗者論事精者明道旌其所已能而蘄其所未至是故稱人之善而識小以遺鉅不明也溢而飾之不信也述先德而過其實是不以君子之道事其親者也爲人友而不相勖以君子者不忠也今子所以壽親者於意云何敬堂曰吾父固好質言凡生平庸行眾人所恆稱道者不足爲君述吾父早歲以課徒爲業迄今幾四十年嘗曰塾師鹵莽塞責誤人子弟不淺吾不敢也戊戌雨公幸成進士選庶常吾父書來戒以初登仕版勿輕干人於戲安得此有道之言乎葢自秦氏燔羣籍敎澤蕩然漢武帝始立五經於學宮使諸生各崇本師置博士舉明經而聖言乃絕而復續明太祖以制藝取士竝立程朱之義使天下翕然尊尚而聖賢之精蘊始照灼於幽明二君者葢見夫學校之不可復故定爲功令使人以此爲祿利之徒而陰以崇儒術而闡大義由今言之明聖道於煨燼之餘而炳若曰星表宋儒之精理使僻陬下士皆得聞道者不得不歸功於二君然使人人以詩書爲干澤之具援飾經術而蕩棄廉恥者又未始非二君有以啟之也今世之士自束髪受書卽以干祿爲鵠惴惴焉恐不媚悅於主司得矣又挾其術以釣譽而徼福祿利無盡境則干人無窮期下以此求上以此應學者以此學敎者以此敎所從來久矣百步之矢視其所發差若毫釐謬以千里振古君子多塗未有不自不干人始者也小人亦多塗未有不自干人始者也今先生之誡子首在不輕干人則平曰之立敎所謂不誤人子弟者槪可知矣出處取與之閒士大夫或置焉不講而鄕里老師耆儒往往以敎其家繩其門徒吾父課徒山中亦有年所每戒小子輒曰儉約者不求人與先生辭旨略同而吾黨郭君雨三亦得父訓以成名當交相毖勉力求所以自立者以圖無忝所生不然先生不欲誤人子弟而吾輩一離膝下乃反自誤其身曰愒月玩委棄而不克自振終且不免於干人也吾言不足以重先生而猶不敢諛詞欺吾友是或爲先生之所許乎敢以爲長者壽朱玉聲先生七十三壽序天可補海可塡南山可移日月旣往不可復追其過如駟其去如矢雖有大智神勇莫可誰何夸父之追魯陽之揮戈陶士行之惜陰有以哉有以哉余與朱堯階以道光十年論交於長沙當時相見恨晚曾幾須臾遂閱一終一屋終矣前歲戊戌余乞假旋里値玉聲先生七十誕辰堯階以壽親之文見屬余忻然不辭遷延未報一諾三年甚哉光陰之遷流如此其足畏也人固可自暇逸哉以余玩愒時曰有言不踐學問不加進而堯階不務顯揚之實徒欲以祝史徽言娛親志二者均非先生之所許也何足以爲先生壽雖然吾與堯階交舊矣不可不略抒固􅋘表先生之闇修以徵其所以延齡之由以卜將來無量之祜以慰吾堯階以勖吾堯階也葢先生則可謂不自暇逸者矣先生少失怙旣冠又失恃家成貧破屋數椽兄弟謀析產先生以其稍完者付諸昆而指其􅂩地一弓自予去之賈不數年致千金已而散去又如是又散去屢裕屢絀晏如也先生有嫂早寡窮不能自存乃爲之謀生計撫孤兒終節婦之世無衣食慮復出資爲之表其節聞於有司與其大母幷建總坊尤慷􅁣好義宗族中有不能自贍者佽之心給有沒不能終葬具者周之必無缺禮子姪有游惰無常職者掖之培之視其材必俾有成他如聯族譜建支祠治祖塋置祭產凡事關本原之大者經之營之有廢必舉有初必終故其所以屢絀者人皆知之爲其急公也爲其義也其所以屢裕者人或不知傳曰民生在勤勤則不匱先生之所爲常致充盈綽綽有餘者勤而已矣不自暇逸而已矣計自少壯以洎今曰拮据飄搖幾無虛曰今夫天恢恢大圓終古磨旋今夫山終古常峙海終古常流其盛大而生物不測由其不貳不貳故不息不息故久夫人也亦若是焉矣守其樸者完其素勞其力者貞而固戶樞不敝磨鐵不蝕胥是道也以先生之不自暇逸而得康强逢吉又何疑乎又何疑乎余與堯階相友以心相砭以道義今堯階幸得啜菽飮水承歡膝下而余一官匏繫旣不能拾遺補闕有絲毫裨益於時又不能歸侍晨昬又不得奉板輿以迎養余自是有羈旋之感矣風有陟岵之章雅有四牡之什皆以行役在外睠懷門閭孔子曰父母之年不可不知也願吾堯階佩玦管調滑甘愛光陰如拱璧舞綵服如嬰兒由是而後先生樂孫曾之蕃昌欣琴瑟之靜好耄耋期頣怡然忘老則堯階庶不負讀書之志不忝於盛德大業耳君子進德修業欲及時也時乎時乎事親者可或忽乎此所以勖堯階以慰堯階而卽以爲先生壽者爾王翰城刺史五十壽序古無生日之禮顔氏家訓稱江南風俗是日有􅉆頓聲樂葢此禮始於齊梁之閒後世自貴逮賤無不崇飾開筵稱壽習以爲典癸卯夏王君翰城將岀牧冀甯卽於是秋五十壽辰同人或謀祝之翰城曰非古也其友人曾國藩亦曰非古也雖然子將別矣不可無以贈子葢古者四十而仕五十服官政服政云者爲大夫以長人布政得自專也古者建官無穴立法無繁故任人靡不專而事靡不理後世天下之事萃於六曹六曹之屬無慮千計法令日密吏胥便之每事至吏以意討例官則睨吏意以行吏頣使則官可之吏目止則官否之屬官所左􅀸長亦左之事無定見惟眾之隨故近日服官得專政者內惟樞府外惟牧令樞府數人或意見各歧則得專者尤莫如牧令也牧令朝行一政朝及於民福民則我實福之也殃民則我實殃之也然牧令或不賢往往不自爲政上則伺大府之喜怒下則時胥徒之向背雖欲自專而有所不能翰城讀書四十餘年今以服政之日爲天子之刺史吾知其能自專矣夫爲刺史而得自專而不爲大府與胥徒箝制者豈徒然哉其殆必有所以矣翰城勉乎哉他日聞有供頓聲樂躋堂而稱壽者必天子所付託刺史之百姓也子行矣吾以是贈卽以爲祝焉王蔭之之母夀序壽序非古也明歸太僕數鄙之而數爲之以爲崑山之俗張此尤盛閭巷之士狃於習而不求其說立言者雖知其事微薄而不􅃘拒孝養者之請牽率以從事宜也當是時吾同年王君蔭之以其母黃太安人之壽屬予爲序云蔭之知言者也不宜循世俗故事以娛其親仲尼曰麻冕禮也今也純儉吾從眾積習染人甚於丹靑久矣雖爲父母者亦皆以生日爲慶以文字道其生平爲祥人子因而順之不亦可乎先是贈君琴雅先生之棄養蔭之與其仲氏皆未冠季尚毁齒耳內而饘粥零雜外而官租私逋皆太安人搉畫之贈君以諾名鄕里㝛負故無劵主者以是弛責太安人曰夫子信者也是固然無疑立貨別業盡償之贈君疾革命曰雖飢寒母令吾兒廢學家故微也又歲經水潦益流落太安人力支之卒不令諸子遷業初服舅姑之服繼服夫之服哀毁至矣皆節以禮喪女子者四喪子婦者五悲傷之餘亦以禮裁之葢蔭之之爲余述者如此易曰地道無成而代有終方贈君顧命諄諄豈必後嗣果自成立今蔭之通籍爲天子近臣文意爾雅率諸弟子姓爲醕樸之學所謂代終非邪國家以大器儲詞臣不殽之以吏事使之優游成德以餋公輔之望至深厚也以國藩之不肖謬廁斯任無足言矣如蔭之者要當博觀約守仔肩天下而後無忝是職不然彼太安人時時稱贈君之末命以相申儆者豈徒在祿仕通顯也哉歐陽公之母常述父訓以教子卒爲有宋名臣彼何人也吾何畏彼哉蔭之誠能曰進不怠太安人當益顧之適志怡然忘老矣余承蔭之之命終不敢以世俗之義爲長者誦也於是爲道其大焉者江小帆之母壽序古者設科有目如漢曰賢良方正曰􅀡言極諫曰軍謀宏遠曰湻厚質直唐曰秀才曰明經曰進士曰明法曰明字曰明算若此者不一其稱惟人主之所欲而因時命名所謂目也明初盡革前制取士止進士一科則有科而無目矣旣成進士天子親策於廷臨軒唱第分甲授職一甲止三人曰狀元榜眼探花制所定也士大夫稱爲鼎甲云進取之途旣隘天下魁傑瑰瑋之士莫不甘心於專科搤腕以求所謂鼎甲者而巴蜀滇黔西南萬里或數百年而不得一人葢其難也􅄌父母之於子總角則祝之而令子順孫承歡堂上亦無先於此者至於今五百年矣同年友江君小帆故吾楚郴人也徙居四川之大竹道光戊戌以第三人及第四川之鼎甲自小帆始而小帆退然貶抑匔匔不足問之曰母敎也余曰何如則盡述太安人之賢及贈君春湖先生之德而再誦焉且曰吾母今年六十矣吾子嫻古文義法其爲我銓次太安人懿行略仿今世之壽敘而益以箴言勖余使吾母懽慰而吾亦奉以爲事親之則可乎余曰可葢江氏之自楚而蜀家微矣贈君之與昆弟析居僅受田三畝耳而折償㝛負者略半贈君力貧績學授讀郷里稍佐饔飱太安人蒔蔬蓺菽以精潔羞舅姑而以其惡者自御小帆兒時嘗隨太安人鋤豆於北原抬木棉於西㵎之陂每語此未嘗不太息祿餋之已晩也嘉慶庚申辛酉之閒四川遭敎匪之亂郷鄰依堡砦以居賊來恃堡爲固賊去還家事耕作太安人提挈子女裹糗糧與贈君奔竄於風雨谿谷之中其事尤艱阻卒以無恐小帆旣官編修太安人就餋京師而贈君道卒長安哀毀之餘毫髪盡禮與前服舅姑之服略同計太安人數十年中困於貧厄於兵顚沛於喪事而亦以勞矣傳所謂動心􅃘性生於憂患其不信然邪士大夫由科第通籍大抵先人茹其辛而後人食其報如小帆之掇取巍科三持文衡以詞賦受聖主特達之知豈可不知其所自邪自古舉士之法未有三百年不變者帝不􅆓樂王不襲禮物窮則易固其理也經義取士亦已久矣議者多謂帖括道卑難收得人之效小帆勉旃益務通經達用使天下後世謂偉人某某者未嘗不岀制義之科也旣以塞辨者之口又有以慰高堂無窮之望事親之則不當如是乎太安人聞之其必不訾吾言矣遂書以爲壽何傅巖先生七十壽序國藩讀詩至常棣之篇而歎曰旨哉仁人之言也朋友平居宴樂有急則掉臂不顧兄弟天性也非至不仁可以手足而胡越乎同年友何君丹谿官編修其兄璜谿官武昌同知兄弟相敬愛至篤無已他曰余謂丹谿曰子之親未耄也二君者皆不迎養於義謂何則吿曰吾大父母之棄養吾父七齡耳實依兩世父以生世父長曰晴瀾次曰雲巖吾父曰傅巖事兩兄維䖍謀必咨岀必吿有財必歸之有疾侍藥必躬至以身禱雲巖世父下世事寡嫂尤恭今吾父母之不肎就餋官所徒以長兄寡嫂在耳余聞之悚然當吾世而猶有嚴於弟道如此者乎又二年而所謂長兄寡嫂者相繼逝璜谿執期之喪旣除因卓薦入見天子遂乞假南歸躬迎二親養於武昌官舍又明年丙午春爲傅巖先生及張太恭人七十誕辰同年生謀所以壽者屬余爲頌禱之言丹谿曰子母效世俗人世俗所爲壽序至􅋘而非古子但略述吾親實行使吾昆弟子姓有所法而向善而吾親亦將顧而忘老足矣勿虛諛也余曰子之親云何曰吾父年十八補縣學生嘉慶癸酉以選拔貢入成均凡試於郷十六役不得售異時苗匪寇鄰縣世父率鄕勇岀堵賊吾父守城書檄調遣胥岀一手事平縣令曁監司適主鄕試闈事欲因以私報力謝之敎人以立品敦倫爲先前後從遊千餘人課徒所得餘金則盡刊印世所傳感應篇註案者以勸愚民吾母以不逮事舅姑爲恨事夫之兄如嚴上事姒婦如姑葢體吾父友恭之誠如此古者大功同財自秦人子壯出分後世􅆓以爲俗兄弟有視如塗人者矣而爲之婦者伺其夫之旨而加刻焉片語之􅂩荆棘叢生累世不能泯其嫌夫一木之枝或榮或悴常也而常人之情睹他人之榮則以爲分隔於已無與睹兄弟之榮以其切近則相妬相妬則爭而榮者之視悴者漠然而疏望望焉若將浼已葢三物之敎不行而俗之偷也久矣先生以次子嗣仲兄後顧不肎隨二子之官終不令己獨榮而兄與寡嫂獨落莫此其足以激薄俗爲何如而其用心之仁厚豈有極哉余爲掲其大者俾璜谿兄弟守此無怠則先生與太恭人所以娛老者或亦在此卽以爲長者壽可也郭璧齋先生六十壽序莊子曰木以不材自全雁以材自保我其處材不材之閒乎旨哉斯言可以壽世矣雖然抑有未盡也此其中有天焉魁岸之材有深自韜匿者去健羨識止足天乃使之馳驅後先殫精竭力而不能自怡有銳意進取者天或反阨之使之蓄其光采以昌其後而永其年迹似阨之實則厚之材鈞也或顯而吝或晦而光非人所能自處也天也我年伯璧齋先生天之處之殆厚矣哉先生少讀書有大志旣冠補博士弟子員旋以優等食餼屢躓場屋貢入成均試京兆仍絀權當陽校官數月儒術濟濟翕然景從其居鄕也外和而中􅀡不惡而人畏之優伶雜劇至不敢入境諺曰桃李無言下自成蹊􅀡其表而影曲者吾未之聞也先生孝友可以施於政尊行可以加人課徒而得與校而士慕附處于鄕而不肖知勸此天予以有用之材也使得所藉手舞長褏而囘旋其展布當何如顧乃蹭蹬􅁄闈連不得志前歲乙未恭遇覃恩臣僚得榮其親維時先生之冢嗣觀亭前輩旣由翰林官西曹兩世封贈如例而先生猶以有事秋試遷延不得請於是先生橐筆鄕闈十餘役矣從遊之士得其口講指畫或皆扶搖􅀡上而觀亭前輩昆仲皆得庭訓而翔步詞林後先輝映獨先生黜抑良久曾不一騁騏驥之足固可解乎夫以先生之德之能於科名何與輕重其達觀內外何嘗不晲靑紫如糠粃然終不自畫誠欲有所白於時而又惡夫庸庸者一蹶而不復振乃借恬退之名以文􅋘而售其巧故思有以厲之耳以志則如彼以遇則如此此豈盡有司之咎哉葢所謂天也天者可知而不可知無可據而自有權衡崐山之玉鄧林之大木生非不材也貢之廊廟非不貴也鑿之琢之尋斧縱之剖其璞傷其本向之潤澤而輪囷者蕩然無餘天欲厚之則不如韞於石而光愈遠叢之豐草之中而蔭愈廣而枝愈蕃向使先生假鴻漸之羽激昂雲路􅏡歴中外詎不快於志而裨益於時而所發旣宏所積漸薄天與於前或靳於後精神有時而竭福蔭有時而單是亦琢玉斲木之說也謂能優游林泉頣神彌性如今曰也乎謂能澤流似續光大門閥如今曰也乎本年某月先生六十壽辰次嗣君雨山與余爲同年友謬相知愛將稱觴介壽屬余以言侑爵吾聞君子之事親也可以無所不至獨稱其親之善則不敢溢詞以鄰於誣君子之於友也可以無所不至道揚世德則不敢虛述以近於諛余悉先生嘉言篤行稔矣今欲敷陳盛美頌禱龐祺深懼其諛也故不具論第論天之生材此豐彼嗇大有權衡以徵先生所以延年受祉之由亦使觀亭前輩昆仲知今曰之蜚聲騰實其鬱積者有自非一朝一夕之故也欽念哉欽念哉小子竊祿於朝葢吾父之溷迹名場撼頓不得伸亦有年矣持是以思則先生之緝熙純嘏天之厚之正未有艾耳質之先生或以斯言爲不謬􅁘金殿珊先生六十壽序往余讀韓退之符讀書城南詩私怪彼不以聖賢之道敎子而誘之以公􅀸祿位何其􅋘也旣伏思之古今之所以設科取士何爲也哉豈不欲得明先王忠孝之道而力行之者與之共天位乎道莫備於羣經故漢唐重明經之選而明及我朝皆以經義試士操其文以劵其行庶幾忠孝之彥之或岀乎此是上之人法固未嘗不良而意固未嘗不美卽爲人父母者冀其子以文行上達於朝廷斯亦天理人情之至然則退之之志其亦未可深譏矣世衰而俗敝應舉者不揆君公求士之本義茍以獵取浮榮少壯而違父母之餋窮老而不歸眈眈於王畿勢要之場未仕則發憤忘家旣仕則迎妻子與共安樂而父母以衰晚之年與子婦幼孫曠隔音書闊疏享封誥之虛名受枯寂寒飢之實禍雖疾病厄苦不忍吿聞以恐其子而爲子者冥然不以介懷方藉口於趙苞賊母溫嶠絕裾之義夫彼旣恝棄其親尙何有於君國本先撥矣國家亦安貴此喪失良知之人而歲舉數千百輩以糜無窮之祿糈哉故吾嘗曰朝廷以忠孝求士未爲失而士之應之大相悖也父母以仕宦望子未爲失而子之於親大相悖也噫此豈細故也哉吾鄕金殿珊先生官翰林十載宦況絕迫隘力貧節用歲寄少資以佐甘旨旣奉父諱哀毁滅性服闋矣依母徐太恭人不復欲仕久之嗣君可亭侍講舉於郷徐太恭人强先生攜子北上乃樸被獨行畱賢配楊恭人養姑維謹道光戊戌可亭以第二人及第先生曰兒輩幸有立吾親老矣卽吿餋歸與其弟承歡左右晷刻不離於戲先生其可謂無負朝廷之求無忝父母之所期者矣歲丁未爲先生六十壽辰先歲可亭以陜甘學使任滿受代乃書吿國藩曰僕將以瓜代之際乞假省親幸蒙天子錫􅀋之恩得捧誥軸歸獻堂上吾父母誕辰洗爵上壽子若敘述吾意使吾親歡娛而盡釂貺莫大焉乃別紙述先生官侍御􅀡聲震世家居訓課生徒周卹族黨恭人歉歳購婢賑窮豐歲擇配遣之諸善行甚悉余都不具論獨著其拳拳愛親之意俾可亭守此而不失使吾郷後進應舉之士知舍此則悖乎朝廷之本義雖得之不足爲榮庶以救末俗之偸而國藩守官八年不克歸侍晨昏又以誌余之抱慚而不能自克也先生及恭人聞之儻肎爲盡一觴乎黃矩􅀸師之父母壽序國家歲値大慶必推恩羣下褎及所生而吾師昆明少司馬黄公以乙巳覃恩得封我太公通奉大夫太母太夫人越二年丁未太公夀八十太母亦七十有四是歲春初天子以海內淸晏太和翔洽必有人瑞以潤色休嘉詔問一二品大臣有親年八十以上者有司以聞於是協揆濰縣陳公司馬江甯何公倉場侍郎新城陳公之母司空濱州杜公之父及吾師之父母竝以遐齡上徹天聽賚勞有差其三月爲太公攬揆之辰黃公稱觴京邸以揚家慶而銘君恩門下士相與言曰陳何諸公僅有母杜公僅有父因其所慶或觸所卹獨吾師以名儒位九列而二親大年賓敬不衰計德度祉當世無雙吾輩宜以文紀其盛且遙致私忱於太公若鞠􅎽奉斚者乃以諉國藩國藩伏思自宋景濂以壽文入集厥後踵爲之者大抵甄敘行能終以諛頌雖以歸有光方苞之博通不能洗此􅋘習夫無故而敘述人之生平事蹟與無故而貢人以譽二者皆達於文者之所譏也惟因事而致其敬相與爲辭以示不忘則古多有之其爲辭也貴約而韻質而不蔓君子尙焉吾師自總角以逮服官壹秉庭訓其初入學則督之以討源之功先本而後華及視學四川無曰不面戒之弊孔之難塞士之十拔而虞一失官京朝無時不寓書而申儆之富貴之靡常職思之不可須臾隕故吾師仕􅀸貳而不驕年五十而恂恂有弟子之色未始非庭闈警敕之所致也今太公太母巋然爲天下大老親見其子爲聖主所毗道德文章冠冕人倫其娛樂葢可度而知而吾輩出門下者獨摭其敎子之大節爲之祝詞以託於因事致敬之義此固吾師所深願諒亦太公所許而不甚斁者巳於是及門各獻祝辭而國藩爲之唱且爲序之詩曰我皇膺運膏流滂溥誕降醕耆龐眉俁俁實育公孤陳何與杜維我黃公有恃有怙怙也園綺恃則孟桓帝褎厥德天露有漙春􅂞南詔曰永長安仙醞三爵僚寀同懽文小南之父七十生日壽詩序道光二十有七年五月上旬爲衡山荻堂文先生七十生日嗣君小南以農部入贊樞垣先二歲迎養京師至期將觴賓於邸第以博堂上一曰之懽於是鄕之人官輦下者各爲詩篇以致頌禱奚斯歌魯麥邱獻齊幼之祝長與下之祝上其誼一也旣成册以授國藩而屬序焉竊嘗維人之所以久視於世大端有二一者所踐甚厚居能移氣傳所稱取精多用物宏亦自足延歴歳年彼得之天焉者也一者履孝蹈友至行純備其精力不使敝於亡等之欲其惠氣所迓亦自以貞於永久此古守身之君子所從事者也外是二者則滔滔凡民天下皆是貿焉以生懵焉以長積曰旣多亦不得不謂之修齡要之無譏焉耳先生總角孤露公私赤立非自營不得晏食非自憤不得就學其所踐之不厚而不克一曰爲貿焉以生之凡民亦可知矣先生茹艱漬苦痛繩於學奉母之敎事有命雖大不濡過有敕雖細不貳旣而餼於學官貢於成均母王太宜人每吿人曰吾寡居四十年所堪報地下者有子克家耳方贈君琴臺翁之棄養先生甫四歲有弟二齡耳先生旣績學發名而弟鬱悒不得伸又以脫略損資產及其逝也先生盡償其責恤其嫠而再以已子嗣焉由此觀之所謂履孝蹈友至行純備者非邪􅇝範曰不協於極不罹於咎皇則受之曰予攸好德女則錫之福如先生之孝友純備豈􅀡不協吉不罹咎之謂哉殆所稱好德而宜錫以福者矣然則先生迪嘉離祉而小南之食報無涯又何疑哉國藩固亦凡民之貿焉生懵焉長者因緣際遇忽不自知所踐之巳厚塵埃擾擾敝精從欲每覩先生之容未嘗不內恧而興企也故於鄕人之爲祝詩輒爲推明致此之由又以卜方來享年之未有屆爲序其略如此亦別爲詩以附於後詩曰昔我婦翁衡之歐陽屢道先生宜表宜坊我來曰下實交哲嗣修謁長者淵乎玉粹强圉之歲星煥南弧下爥蘭戺朗映中樞大斗分頌眾賓醉止各摛祝辭用介繁祉何母廖夫人八十生曰詩序道光二十有七年六月上旬吾鄕道州何母廖夫人八十生辰宮太保文安公之良配也先期鄕之人語國藩曰子夙􅋘明季文士遇人生曰輒以諛詞相溷爲不達於屬文之律旣聞其說矣竊聞古者因事致敬則相與爲辭以篤不忘魯侯作閟宮奚斯有頌晉獻文子成室張老有禱施之少者有冠禮三加之辭施之老者有祝鯁祝噎之誼及敦彝款識亦往往祈以永命萬年葢前以表德音後以敕方來詩人之敎也今太和翔洽人瑞蕃臻而夫人以湻樸之德克享遐齡郷之人相與作爲祝辭託諸因事致敬之義不亦可乎國藩曰其可雖然君子於其所尊敬不敢爲溢量之語故詩人戩穀俾臧諸篇其稱之也質其祈願也無奢今吾人欲託茲義則摛辭之斂侈可勿審諸葢夫人之歸何氏家微也文安公􅋘巷孤貧貿力以食晝而授徒宵而自繩於學春而岀長至而不歸家中有無壹委夫人夫人綴畸緝斷公私井井厚其親以及其所愛無或不豐堅忍其身以及其子無或不嗇嘗攣生二子越三曰而襁兒出汲卽子貞編修與其仲弟也又嘗負兒入山採薪竹萌拂左目迄亦廢視艱窮之境殆非人履而夫人泰然無不自得迨文安公及第以命服迎之入都而守約帥初不變旣而公位尙書天子倚如柱石屢司文柄門下士且盈干編修昆季先後列甲乙科諸孫蔚然興矣而夫人卒帥初不變非布衣不御非粗糲不甘葢余得之見聞者如此夫稱述艱難以慰膺者而飭無窮君子之義也貢人以諛而辰溢志亦非君子所宜出也以文安公創業之劬而夫人承之之不易推察受福離祉之由亦豈惟型吾郷哉雖風天下可矣然則撰擬祝詩附諸古義以博長者之娛而與編修昆季相劭勉者宜在於此不得在彼於是鄕之人各賦一詩別繕爲册而國藩和之且次其語而爲之序詩曰九疑南奥有濂一谿在宋嘉祐大賢所栖閱祀七百閎儒纘烈光輔聖淸爲天喉舌雖是閎儒遭家未肥舒屯􅀝困爰有淑妃宛宛女宗亦班亦姞百櫱在嘗曰甘如蜜台星雖悶婺女孔明暉澤四濩宜曜宜康亦有似君三館之特開閤觴賓以聲母德有酒如池有羞孔時四筵盡釂各補笙詩黎樾喬之兄六十夀序國家歲逢大慶嘉與臣下旣褎揚其所生又令私其尤戚者得推已所宜膺之封以貤封之所以廣仁播誼至無巳也道光二十五年皇太后七十萬壽天子大孝錫􅀋凡一命以上無不得曲展私親吾郷黎樾喬侍御旣榮其先人因謝已所宜膺者貤封其伯兄梅村先生爲中憲大夫兄嫂爲恭人明年圅錦軸齎至其家又明年梅村君六十生曰侍御謀所以篤兄歡者乃放蘇氏兄弟以詩相壽之義自爲一篇以寓祈禱又匄郷人之老於文者各賦一章爲老人光悅旣繕冊以授國藩而命序焉且言曰吾兄天性樸誠少依王父嫻篤幼儀王父棄養雖丱也哀毀如成人及事二親雖老也愛慕如嬰兒親有所欲不以貧而不致諸弟有所求不以瑣而不謀與人無賢愚一飮以和里有爭搆一諭以理初若難釋徐亦枝開節解怗然各退故自家之子姓鄕鄰之眾寡無不沐其誠服其􅀡所之亦之焉有役則趨焉吾嫂陳恭人祇順劬恭羣女師慕葢侍御爲余述者如此近世以來士大夫相與爲縣遁之言縣遁者設與之論東方則泛稱西事以應之又變而之北或變而之南將東矣則詭辭以遁之虛縣其語而四無所薄終不使其機牙一相抵觸友朋會合咨寒而問暄伺唯而共諾漠然不能相仁臣下入吿則擇其進無所拂退無所傷者言之一有不安終不敢言一時率爲孤縣善遁之習背怨向利所從來深已往者辛丑壬寅之際海國不恬侍御日夜憂維傾智倒慮思效片語以補萬一國藩頗感其誠又嘉其􅀡今卽侍御所稱梅村君者觀之以里巷雀鼠之小怨無關於己之端且竭誠以行直道如此况於身有言責而目擊艱大者乎昔司馬相如讓巴蜀之民不能急公冒義而歸咎於父兄之敎不先然則侍御慷􅁣樸質之風亦可知其所自來矣君之仁於鄕者如彼敎其弟子以施於邦國者又如此其造福於物葢未有量豈論區區一身之康强久視者哉余善侍御之壽其兄有道旣推明其所以而因以旁及乎薄俗之不可常使覽者有警焉曹潁生侍御之繼母七十壽序往余讀後漢書列女傳竊怪范氏自誇體大思精而不達於修史之義葢司馬氏創立紀傳以爲天地之所以不敝者獨賴有偉人焉以經緯之故備載聖君賢相瑰智瑋材謂若而人者皆以倫次乾坤法戒來葉而范氏乃取數女子廁其閒於經世之旨何與焉且其所載如桓孟之流皆門內庸行無絕特可驚之迹抑又不足述私蓄此疑久矣旣而思之天下者合億萬家以成天下者也一家之中男職外女職內其輕重略相等而女子所處往往有艱難迫隘處之曲當卽曰用飮食之恆雖神聖當之不能越乎其軌然則婦女有可稱述固不宜聽其幽隱而不彰則范氏立篇之意誠亦不爲無見也同年友曹潁生侍御之繼母李太恭人未笄而歸贈公禹川先生歸五年而寡處贈公之仕江西旋橐如灑其沒也責負如山太恭人盡徹服御壹償㝛逋旣歸櫬堂上老姑年八十矣欲以夫喪入吿則重傷姑心乃詭稱遷官遠郡外則箴帨侍姑內則椎胸茹痛其視侍御兄弟戒敕而違嚴逾所生者倍焉願望而慰喜逾自得者倍焉侍御爲詞臣無曰不厲以本原之學官諫垣巡視輦轂無曰不申儆之以君恩之不易案牘之不可以漫慮國藩嘗卽是求之豈所謂門內庸行無絕特可驚者邪抑艱難迫隘處之曲當神聖不能越其軌者邪今年春爲太恭人六十生曰郷之後進年家之子相與作爲祝詩以致祈禱而命國藩序其端末世稱誦女史好道其奇特者或有刲臂徇身之事駭人聽覩而苦節之婦貞持數十年冰蘖百端兢兢細務反不得與彼激烈者速一曰之聲譽參觀竝論久暫難易較然可辨自范氏創立女傳厥後晉魏諸史皆踵爲之率以奇特相勝茍以新耳目而止而門內庸行恭儉劬苦反或置而不道使高者慕義而過激常者無稱而不知勸而後知范氏之識猶有見於古聖人正家之大原而未可深爲譏議也余旣承同人之屬爲敘述其厓略而因以明夫至庸至難之道不事畸異爲修史傳列女者訓焉楊母張孺人七十壽序予旣與湘潭袁潄六編修爲篤古之交又申之以㛰姻於是通知其內外戚好與其賢懿長者之行歲在戊申某月爲編修之妻之母楊母張孺人七十生曰編修來吿曰往予家居歲時慶燕則鞠􅎽捧觴爲尊者壽今官挂朝籍而外姑旣耄不克前獻一尊於心嗛焉擬爲詩一章遙展私忱祝其彊飮彊食深長難老使妻之兄弟歌之以侑其親子如韙余則請爲敘述作詩之意而倂致之對曰敬諾編修遂言曰外姑吾邑張顧堂先生之孫幼隨祖父汾州同知任張故巨室也年二十歸我外舅武陵楊介亭先生先生之父雲齋公官邳州知州外舅姑竝侍官所邳州君之爲政挈鉅釐細秋豪必躬傾身從公凡私家之務外焉委之介亭先生內焉委其賢配劉太宜人而外姑實贊襄之矣外姑貰姑之勞代夫之劬先眾手而作後一家而息飮饌旨甘非親調不以進囊筐瑣雜非手鐍不以吿由是闔署疏戚必是之爲􅀝僕婢必是之爲服邳州君旣罷官家湘潭旋捐館舍介亭先生以哀毀得心疾或旬歲不省人事而劉太宜人亦以年邁羸弱不時病作外姑兩侍湯藥夙嚴莫戒旣煩且殆未幾而太宜人棄養介亭先生亦貞疾不瘳沈廢二十餘年外姑飾性篤終畢慮自支自藥餌以及諸奇珍產凡可以衞夫之病亡所不致自己身以及子女之耆凡所以損家之故亡所不嗇葢其行誼之稱於人者大率􅀋此國藩窺觀世祿之家習佚崇奢安坐而不事事其端多起於婦人孺人以張氏之子室於楊氏張氏屢葉承明靑赤之綬數十孺人祖父皆爲外吏叔父經田巡撫貴州愨田守衢州慧田官敎諭而楊氏以宰相尙書之後華轂高葢世不絕人孺人內外名家履豐薦盛其勢宜日卽驕靡乃惇謹樸懿壹法乎貧薄遠慮者之所爲可謂秉心塞淵較然拔乎塵滓者也其膺多福不亦宜乎編修之爲是詩亦頗表其履泰思約之德而推原其壽康之由故余爲敘述大几亦以忝居㛰媾之末欲使吾家女子聞此風範知所效法焉曹西垣同年之父母壽序子自道光乙未以公車應禮部徵卽與同年友曹君西垣相善時則有若鄭君敦謹鄒君振杰金君樹榮王君永時鄧君庭枏數輩皆朝夕聚處醉飽驩虞意氣丰盛明年各報罷歸去又二年戊戌子成進士假歸一載而後還朝西垣亦再返再上不常處京師然予與西垣未嘗帀歳而不相遇在京師未嘗五日而不見見未嘗不深語未嘗偶有射志也夫人情多溺於所同而蔽其所不見與野人道巖廊纓紱則茫然而駭與世祿之子語米鹽艱苦之事則倦聽而思臥子與西垣皆貧士也自先世忠厚之積田家耕織之劬閭里歲時問遺之狀兩家大率相􅀋故常抵掌稱道彌瑣細而彌津津焉西垣之稱其親霽樓先生也以爲勤無􅂩休儉無毛棄推讓晜弟卻肥而取瘠敎督孫子多苛而少貰稱其母柳太孺人也以爲奉事舅姑勺水必親嘗鞠育五子寸縷必手製皆與吾父母之行若合符契以是西垣於諸同年中尤昵好矣竊嘗􅁣夫世之馳逐於名位者營營焉而未有已時子壹不知其指歸謂何方寸之口一日之需無幾七尺之軀一歲之靡無幾不必名位而後能給也而人皆曰爲榮親計夫親之所賴於子者定省甘旨疾痛苛癢請席請袵亦不必名位而後能給也求而不得遠遊遲滯而父母之年加老焉至於衰髦而心思一見其子而口不言者往往然也人坐不察耳國藩竊祿冒利去家十年卽西垣羈畱京輦亦越七載於茲此又吾兩人所每懷內疚而未敢須臾忘者也歲在戊申西垣以敎習宗室子弟期滿天子用爲縣令將歸覲其親􅃴􅀡先生及太孺人六十壽辰同年鄭鄒諸君咸爲詩贈送而屬國藩序之子乃追溯夫歴年之交契因槪論事親之道在此不在彼者以勖西垣安居而弗出而誌予之愧焉霽樓先生及柳太孺人聞之其亦陶然而盡一觴也夫王靜菴同年之母七十壽序國藩嘗讀孝經竊歎仲尼所偁之孝與今之爲人子者之從事則不侔矣其言自天子以至庶人其爲道各不同葢古者諸侯世國大夫世家士之子恆爲士農之子恆爲農貴有常尊賤有定等是以人各安其分而事其親而無敢妄干後世以制科爵人或布衣旦莫而至公􅀸於是人子咸思以祿仕尊其親而父母亦惟恐其子終身庶人而亟望其進取徼幸躁競之徒皆得藉口於榮親之說此今之言孝與古之道異者一矣經又曰立身行道顯名於後世古之所謂名者有孝悌之實達乎州巷播乎上下稱其內行無虧焉爾後世輕德術而右文藝雖有曾閔之行不敵帖括之工之馳譽速也一藝之能一文之善至薄也而國人稱願父母亦嘉許焉否則聞譽不著父母不忻此今之言孝與古之道異者二矣居今之曰而悖俗從古不藉祿與名而悅其親者雖賢者有所不能賢者之異於眾人獨能於祿與名之外別敦古人之至行以自力於門以内而已同年友王君靜菴惇樸而愿懿自其少時聞望已傾輩流旣成進士官水曹所謂祿與名亦旣兼得而其內行肫焉常若不足奉母楊太宜人在官夙問而莫勤言警而行惕每食母以將子子以􅄌母未嘗不展轉溫劭每寢未嘗不再三周察爲子稱太宜人之德自相夫敎子以及娣姒僕婢澣濯刀匕之微未嘗纖末而不述言及贈君東堂先生之遺事未嘗不嗚噎語太宜人少歲飢寒黽勉之狀未嘗不茹喟無窮也余以是敬之處今之世競逐於聲利之場而其所事壹合乎孝經之道固吾靜菴之自厲乎抑太宜人之敕於子而施於家者有以軼乎恆俗萬萬矣今歲十一月爲太宜人七十生曰同人多爲祝詩屬國藩敘其端余以素欽靜菴之至行不敢以末議陳長者之前因􅁣論夫古今言孝之變以勖靜菴亦以自策於隱微焉孫鼎菴先生六十夀序程子有言科舉之學不患妨功但患奪志葢學者之始業於制舉之文也未嘗不稽經辨義求肖於聖人之言以得有司之一當其志猶射者之在鵠無惡於君子也其後熏心仕宦外以印綬饜其心目內習一切茍得之術猶挾寸餌以釣巨魚旣得則幷其綸竿而棄之曩時稽經辨義之志乃大爲纍纍若若者之所奪此先儒所用爲􅁣然也通州孫鼎菴先生阜學而績文其於六經之藴百氏精義之說亦旣轢其庭而據其席矣乃屢應舉而不售十進於省試五上於春官僅而得償一似汲汲於科舉者及其旣得則絕意仕宦去之唯恐凂焉其所求者正鵠反身之道而所棄者紛華溺心之場是豈非志定不奪之君子軼於末流萬萬者哉人之意量相去什伯干萬至不齊也鈞是試於科目也或爭榮一時偷以攫取富貴或謀慮深遠爲積累無窮之計各蓄所懷若背馳焉先生之先人自高祖以下兩世成名進士官中外各有聲先生念非發憤特達則無以趾前美而啟後光於是旣自繩於學復篤敕其子先曰岀而興後雞鳴而息寢有誠食有警迨甲午歲與嗣君蘭檢學士同舉於鄕而刻厲不改旣而學士官詞曹屢操文柄門下士以百數而先生猶不改又數年以甲辰得雋禮部投紱歸去高臥林下宜可少弛矣而自繩以課孫者卒帥初而不改窺其意以爲不得有司者之甄采終無以驗吾學之果成與否而子弟少年桀驁之氣非繩之以帖括繁重之業終無以內於程範而上紹累葉詩書之澤於此見先生之意量爲何如豈與夫尋常試於科目者比竝而論短長哉今年十月爲先生六十生曰同人各爲祝詩彙書成帙屬國藩序其端余與學士同登乙科又忝翰林後輩幼承庭訓聞家大人之論急於科舉而澹於仕宦者又與先生之識趣相類故掇其大者著於篇冀以博長者之歡娛若其􅆿於家而式於郷醕德穆行所以昭令問而膺多福者雜見於同人詩歌中非甚緒要遂不及云江岷樵之父母壽序道光二十有九年春正月吾友江君岷樵以縣令之官浙江將行吿別於常所交知其色若歉焉內疚或問之曰得百里而長之以子之才行子之志天下之至裕也吳越湖山天下之至怡也而子歉焉疚者何也岷樵曰古者學而入官非以官學也吾智術短淺無以澤人一負疚吾父今歲年齒七十吾母六十七矣舍晨昬之餋而從事簿書其或不職又詒之羞二負疚抱此二者吾奚以自克於是交知感其意旣以言贈別又別爲歌詩致祝於封翁一峯先生與陳太孺人願長者眉壽無替以尉薦遊子孺慕之心旣編次成冊乃屬國藩序其端葢先生之少則貧乏甚矣無田以爲賴乃授徒而內其執贄之儀口敝而手疲昕警而夕戒終歲之人以十之六仰事堂上而中分其四半以爲俯畜之需半以急郷里之義舉邑中立賓興會以贍寒士省試之資行郷約以殲妖賊之反側皆先生發之其赴義也蹈人之所不敢爲而其自奉也極世之所不能堪太孺人承闕緝匱壹秉夫志或累歲食粥而舅姑甘旨甚渥也國藩與岷樵知好以來爲余稱述者數數矣人情莫不躭逸而惡勞饕富貴而羞貧賤至學道之君子不然或忍飢甘凍窶於原顔而其中坦然有以自愉或峩冠曳綬呵前衞後而憂思展轉若旦夕不能自安者彼各有其志也南面而君一邑息動而雷震頣指而風行僕從一怒百姓重足識者固當自惕不當自憙而浙水東西自辛壬海上之役創夷未復有司者又刮其脂而吮其血譬若醫者撫積瘵之人有不蹙頞而思所振之豈情也哉岷樵自被命以後諏賢而訪友思其不逮而虞其墮職惴惴焉內疚無已此與先生之安貧自樂其志趣同􅁘否􅁘吾聞岷樵之需次入京師也先生屬曰吾不願女以美官博封誥無使百姓唾罵吾夫婦足矣如此見君子之敎子視世俗相去何如而岷樵所以娛親而餋志者宜何道之從哉諸君子之爲詩依於古人戩穀難老之誼所以祝禱先生與太孺人至周且厚余乃略述先生平曰學道之意以期岷樵之篤信而謹守而因以博長者之驩娛凡居官而言餋親者覽吾斯文亦將有所興起焉陳仲鸞同年之父母七十壽序天之生賢人也大氐以剛􅀡葆其本眞其囘枉柔靡者常滑其自然之性而無以全其純固之天卽幸而苟延精理已銷恆榦僅存君子謂之免焉而巳國藩嘗采輯國朝諸儒言行本末若孫夏峯顧亭林黃棃洲王而農梅勿菴之徒皆碩德貞隱年登耄耋而皆秉剛􅀡之性寸衷之所執萬夫非之而不可動三光晦五岳震而不可奪故常全其至健之質躋之大壽而神不衰不似世俗孱懦豎子依違濡忍偸爲一切不可久長者也同年生陳君仲鸞與余交十餘年每相與議論平生慷􅁣不橈或品第當世人倫意所不可睥睨譏切無所復忌同人或謂仲鸞居吏部曹司身處卑穴更事未深宜其囂囂不詘若移置要地稍稍練習文法亦且破觚而爲圓矣旣而仲鸞果以考第入􅀡軍機而戇􅀡發憤芒角森然曾不減其曩者之舊吾乃私怪生民剛􅀡之性其稟之有厚有薄未可以一概度量也閒輒與仲鸞語家世之詳及太公太母之行仲鸞爲余言封翁蔭召先生生而伉爽屢經艱險履之如夷遇人有心所不許雖豪貴人必唾棄之卽心之所許雖孤嫠卑賤必引而翼之愈窮阨愈禮敬與鈞自親族州閭皆服其誠信遠近紛難就之決遣凡所論斷久而輒應封母高太恭人祗順惇篤尊尙節義葢皆有剛􅀡之風然後知仲鸞之激烈不阿雖受性獨厚亦其稟之庭闈者歲漸月染􅇽濡之久而不自知也人固視乎所習朝有媕娿之老則羣下相習於詭隨家有骨鯁之長則子弟相習於矩矱倡而爲風效而成俗匪一身之爲利害也今年八月爲先生曁太宜人七十生曰年家之子同官之良咸稱觴仲鸞之邸第作爲詩篇以祝難老屬國藩爲之序余乃略述平昔與仲鸞言論大指以著先生之節概因推國初諸儒以剛􅀡而享大年者爲先生致善禱之誼亦使世之君子聞之而有所警焉季仙九師五十壽序粤以庚子之年建寅之月我仙九夫子大人奉命視學浙江門弟子等攜侯芭之酒薦顯父之蒲恭餞於國門之外淸風在道輿從無譁擊節而歌林木鏗其振韻刺􅂳一去海濤起而移情是歳九月爲夫子五秩夀辰乃復謀郵陳皇邸遙慶龎禠以祝史之徽言希君子之善禱奚斯頌魯麥邱祝齊斯事雖細不可闕也獨是二首六身乃藝林之陳語交棃火棗亦仙界之浮詞使徒侈說長生掞張繁祉比附陀移之國揣侔兜率之天文勝則史不其諛矣若第羨聲華之盛誇遭遇之隆則無雙之譽久齊聲於許愼稽古之力宜蔑視夫桓榮中朝大官咸詢以今事古事海內英彥早仰爲經師人師覼縷稱揚抑又贅矣夫葆真純固當推其致此之由美意延年要識其本原之量母諛母贅請得而言今夫連抱之材經雪虐風饕而成用步光之劍因千辟萬灌而稱神從古至今偉人畸士莫不劬勞撼頓忍性動心何者精神以磨鍊而强智慮以艱危而􅃉夫子承廉吏之門風屬紹庭之多故楊太尉代傳淸德朱仲􅀸家靡餘財昔橋蔭之尙依已罍空之欲恥旣而槐花强踏桂樹初攀跋浪南圖出門西笑陸生遠適鴻鵠之品望斯高伯樂難逢驊驑之霜蹏屢蹶由是以吳中才士爲國子先生黃甲看人靑氊作客守生涯於麤繒大布嘗世味於朝􅐽莫鹽開筐而觀殘稾多於敝服借車而岀飛埃盛於同雲葢至壬辰年以第三人又第而前此之抑塞屈蟠非一曰矣然且不槪於心彌貞於道刀無厚而善藏玉有輝而待賈此我夫子之歴練也若夫􅀟騶稱娛四牡駪征采東岱之琳民傳南宮之衣缽藥籠儲於江右竹箭采於會稽英蕩持衡旋回舞袖斯固時人所震盪今昔所同矜也而夫子匔匔如畏毣毣殫思巨眼澄空初心辛苦魚龍夜冷燒銀燭以照遺珠桃李春開灑金壺而濡甘露其於外也砥節首公樹聲示肅潁川文學能爲執俎之容魯國諸生半在門牆之內修明雅術實竭勳勞今春去浙之前二曰猶指鬢髪示國藩曰昔校士臨淄猷爲靡鹽旣勤三載遂見二毛異時歸自浙東此􅆴􅆴者殆皓然矣鞅掌獨賢周詩有北山之什苞苴不竭漢使無南越之裝此我夫子之靖共也聖朝廷試詞臣數年一舉夫子再登上考洊陟崇階蘇頲爲文書史防其脫腕相如作賦天子幸其同時中外人士亦旣傾風而仰鏡企采而翹華矣而乃進思退思大讓小讓下問不恥多聞闕疑懼書馬之訛愼霓雌之辯早朝罷則陳書徧覽夜漏深而吟事方酣一字未安較輜銖於同輩片長必奬假毛羽於後生推之石奮家風過路馬而必軾晏嬰儉德衣狐裘而累年此我夫子之敬愼也昔者崔邠側帽潘岳奉輿母養之隆稱爲盛事彼皆鄰於寵飾未必篤於屬離我夫子行不違仁恩能錫􅀋感枯魚之銜索詠有獺之在河陟岵載瞻萬里而白雲無極循陔言采三春而愛曰常暉曩者瞻依今茲孺慕殊恩旣被令問斯皇朱壽昌五十之年效萊子而添綵戲衛尙書八座之母有中丞以問起居敦牟卮匜龍爲炙而玉爲酒媊星􅀸月前有輝而後有光猶復喜懼交深形聲密察幾同厠牏之親滌無改菽水之昔歡此我夫子之孝思也夫瑞玉常堅藴蓄者久也戶樞不敝勤動者恆也愼戒必恭聖有謨訓大德必得古有明徵準斯四者可以言壽矣國藩醉翁門下之人補闕春官之士良苗不實有負煙鋤庸櫟非材曾經月斧金丹許換共絳帳以聆音玉署叨陪乃霓裳之同詠遙想錦樹山高之地黄花酒熟之天籌添望海之樓弧設重雲之會官吏黎收而拜門人繦屬而來習瓠葉者五百人祝靈椿以八千歲何其盛也繫匏有職負笈難從徒瓦奏而桴宣莫捧觴而僎爵區區此志能不懷哉道阻且長溯洄在西湖之水光遠有耀茀蔚瞻南極之星鋪張􅇝算肸飾龎祺知有能者匪所詳矣曾文正公詩集卷一四言題楊忠愍公二疏手草古孰無死曾不可班輕者鴻毛重者泰山楊公正氣充塞兩閒遺文妙墨深播人寰馬市一疏聲振薄海更擊賊臣五奸十罪心追逢比身甘菹醢取義須臾歸仁千載翩翩諫草猶存手稾古柏拏空似枯彌好鬱此英風輔以文藻長有白虹爥茲瓌寶題易公筠亭遺像昔歲在丑喆人西遊我作挽辭比許文休馬磨旣甘不競不絿亦有月旦胸剖九流東崖奉親朝戲綵舞暮歸讀書羣言藻斧鄕闈屢試爨無完桐文章憎命淚灑秋風不於其躬迺祚其子濯濯芳蘭芥拾靑紫弓冶不墮載述先芬瞻言遺像永播靑塵五古雜詩九首早歲事􅉢槧傲兀追前軌張網挈陬維登山追岌㠖述作窺韓愈功名鄴侯儗三公渺如稊萬金睨如屣腸胃鬱千奇不敢矜爪觜稍待蘭蕙滋烈芬行可喜豈期撾駑駘前驅不踰咫滔滔大江流年光激若矢春秋三十一頑然亦如此染絲不成章橘遷化爲枳壯盛百無能老蒼眞可恥樗散吾所甘多是慚毛裏西山何鬱鬱白日馳昭昭六街淨如練雙闕淩神霄沈沈府中居員并鏤瓊瑤罘罳周四角窗霧漾鮫綃公子盛文藻九陌鳴金鑣羣從袂成幄掠風馬蹏驕紅燭舞絳雪會宴皆金貂朝餐羅鯖鯉晩衙沸笙簫今夕旣相酢明日還見招天高地則厚何事不逍遙手皸不烘煁足趼不趨徑問我何自苦我歌君且聽激湍無駐波止水光凝凝榱棟與欂櫨豈曰非天定束蒿代虹梁於道未爲稱朝菌濡濃露天天不及暝適意一須臾骨朽猶詬病可憐繁華子醉夢幾時醒􅋑妝豈無服自媒羞妾媵巳矣吾何營閉戶覽明鏡傷禽悲􅁌聲遊魚驚月影丈夫貴倔强女子多虚警强弧有時弛夷塗有時梗颶風揚海濤潮平已復靜君子別有憂眾人恐未省霜落萬瓦寒天高月浩浩美人在何許相思心如擣我昔覿美人對面如蓬㠀神光薄軒墀朱霞蕩初曉彩鳳儀丹霄顧視無凡鳥意密恩還疏微誠不敢道貽我彤管煒粲兮希世寶可憐金屋恩長門閟秋草謠諑日以多覯閔曾不少寵眷難再得蛾眉行衰老區區抱私愛夜夜祝蒼昊天雞鳴半夜六合未淸曉烏鵲鳴向晨羽毛誇矯矯一旦金丸驚戢翼喑百鳥鴟鴞流惡聲萬方憂集蓼靑蠅鳴棘樊繆彰復虚皛閒鳴百無補嗟爾秦吉了螻蟈草閒鳴亂人徒擾擾入門忽怳怳出門復皇皇嗟我素心人各在天一方庸夫厭鼎食誼士謀糟糠奔走徧天下歸去仍空囊秋老江湖闊何以慰淒涼勿勞我之思我今足稻粱所憂非所職所樂殊未央日暮登高邱四顧何茫范落葉東南飛孤雁西北翔思君不得覯慘澹詠斯章松柏翳危巖􅁑藟相鉤帶兄弟非它人患難亦相賴行酒烹肥羊嘉賓塡門外喪亂一以聞寂寞何人會維鳥有鶼鶼維獸有狼狽兄弟審無猜外侮將予柰願爲同岑石無爲水下瀨水急不可磯石堅猶可磕誰謂百年長倉皇已老大我邁而斯征辛勤共麤糲來世安可期今生勿玩愒誰能烹雋燕我願燎桑薪誰能釣巨鼇我願理其綸南㵎芼蘋藻可以羞鬼神大材與小辨相須會有因嗟余不足役豈謂時無人里胥牛羊忽竄突邨社雜喧豗昨聞府牒下今見里胥來召募赴戎行羽檄馳如雷後期不汝宥行矣胡遲􅅆老嫗搥胸哭哭聲亦何哀龍鍾六十餘伶仃惟一兒弱小不識事黃犢母之隨筋力儻可食或免一家飢薄命不足惜兒去傷永離老嫗泣未闌老翁跪致辭王事亦云棘婦人那得知螻蟻穴寸土自荷皇天􅄌天威有震㬪小人敢疑猜貧者當敵愾富者當輸財便當遣兒去不勞火急催所媿無酒食與吏佐晨炊貧者勉自效富者更可悲隸卒突兀至誅求百不支蒨蒨紈袴子纍纍飽鞭笞前卒貪如狼後隊健如犛應募幸脫免傾蕩無餘貲吁嗟朝廷意兵以衞民爲守令愼其柄無使胥吏持此輩如狐鼠蓁蓁肆恣睢聊爲遒人徇敢吿良有司送吳榮楷之官浙江三首讀書三十年今來始一試自抱輪囷材搆廈隨所置世人苦寒儉舞褏先擇地斤削不能遷罌盎各自器君子儲百用多藏如列肆深厲與淺揭所向皆如志君本靑雲士摩空排健翄置之承明廬枚馬當偃幟才多厭閒散翩然去作吏方今淸華秩騈拇僅云備不如膺專城張弛從吾意觀魚莫結網網過酷於餌治絲莫求多緒多亂神智聖朝淪洽恩陬澨實漸被可憐蚩蚩氓惸惸還好義願君愷弟思隨時勞撫字西湖吾未到夢想若遇之荷花夏如海當春萬柳垂秋月隨潮湧暮霽天無涯三百六十寺嵐翠渺迷離君去事幽討抉剔發天倪餘慳收昔遁奇賞獲新知朝餐吸山綠暮雨張水嬉尋碑嗅梅蘂獨往無人隨政成無一事風流方在茲懷抱一如彼江山復如斯此樂可持贈寄我千首詩鄕閭昔相從殷勤託詩酒再來長安道舟車竝攜手如今彌曠遠脫然絕窠臼少年尙意氣崢嶸各自狃風塵飽所諳蒼然皆老醜激湍亦已平眞氣充戶牖相見無藩籬灑落眞吾友昨夜秋風來嫋嫋涼生柳念子當乖離旁皇如失守萬族各有營歡聚焉可久意趣茍無違秦越如左右後會知何年今茲歲在丑題錢崙仙同年􅄌竹平安圖二首冉冉南山竹柯葉互檀欒上有一片雲下有九畹蘭淸風相戛擊虚碧鳴秋寒竛竮走鞭散抗衡勁節干養成兩雛鳳文彩何姍姍高枝足棲㝛芳實供朝餐歸昌忽采律言振九霄翰引吭發鈞奏俯視失鵷鸞卻顧篔簹谷依舊靑琅玕年年託美蔭歲歲祝平安紅塵日夜深遊子思無已倦鳥有時還桑弧有時弛我有山中廬槿籬夾綠水修竹倚大椿重重互幡纚發條播芳蕤淸陰亦何美依戀會有因庶往恭桑梓殷勤寸草心區區方在此寄懷劉孟容淸晨采黃鞠薄莫不盈襭甯知弟昆好忍此四年別四年亦云已萬事安可說昔者初結交與世固殊轍垂頭對鐙火一心相媚悅炯然急難情熒熒光不滅漣濱一揮手南北音塵絕君臥湘水湄辟人苦扃鐍懷璧誤一投巳遭官長刖我作燕山囚衾襪冷如鐵塵土塞中腸經旬閒嘔泄夢魂互往還邂逅在嵽嵲君魂畏豺虎我魂阻蛇蠍明年會長沙對牀殊呐呐可憐郭生賢日夜依我闥三子展殷勤五旬恣猖獗自從有兩儀無此好日月決渠東西流人事有蹉跌當時別江干懸知成久闊郭生從我行再踏長安雪束蒿貢廊廟塗丹强作闑磐松困㵎底千歲老不屈行藏一以歧會合焉可必知君障污塵憎我逐煩熱摧蘭擣作臡本馨固難奪皇天造羣倫位置各成列煌煌帝者都峩峩集勳閱前庭充組圭後閣煖淸瑟大馬疾如飛高車如電掣􅋘巷時騎過牆震窗紙裂而我支肘眠朦朧兀頑劣視蔭呼晚飯終年曾不缺癡兒亦肯堂四齡已饕餮所愧偸太倉無異哀窮乞羨君老巖阿閒味甘於蜜嗟哉趣豈殊所處良不一坦蕩觀皇途轉側思家室永懷素心人悠悠難具述題周小邨前輩塞外課經圖肉食多亨途通儒遘百閔時蹇心匪乖身窮道未窘周君信奇侅天機苦捷敏昔歲乘靑驄羣飛畏秋隼偶被金丸驚可憐翠羽隕十年遼海行九月邊風緊銅雀夢觚棱鐵衣錦繢純自信茲遊豪甘受世人哂日日抱叢書森森如束筍吾道儻欲東獨善良不忍此邦盛球琳多士紛簵箘斧斤試一施彀率聊可引弟子初反車先生大倒囷文囿張百旃經畬接千畛但期道傳薪未要歸載稛昨者唱刀環塞外囘文軫勝事吿友朋餘味足咀吮方今柄師儒華秩半􅀸尹虎觀車如龍辟雍市如蜃會看招旌旓且須嚴韅靷稽古榮復榮吾言非蠢蠢地用莫如馬二章思賢也地用莫如馬越險思驍騰豈無汗血種相求亮未曾萬鍾繼稟粟千金甃鉤膺隆儀茍一闕市駿休漫稱人用莫如龜幽室能廢燭吿猶儻見從外侮敢余毒從短翻棄長惜哉支牀足良無藻梲登不如塗泥辱題龍九詩李唐盛聲律初響鏗華鐘逮及下衰時切切鳴寒蟲扶輿發朝氣百彙曜麟龍缺月夜騰光不與東昇同秋霜入科木色黯蒿與蓬文章說心腑本不從窳隆能者自植立餘子靡隨風孰於眾音颯玉振開羣聾君才美無度大圭宜廟中君詩如春融秋爽亦自工肉好用爲賢瑑刻生芒鋒南軺斐然作山水滌襟胸雜什多未芼略可芟厖茸要道鍥不舍金木隨所攻且況力肎窮奥阼辨西東終然到聖處今古誰雌雄贈李生生名嗣元是科四川十九名余在闈中最賞其文揭曉來謁則神淸似郭筠仙愈傾愛之看書亦不少眞美才也年廿二歳因作古風一首贈之云岷山萬仞雪太古人迹稀中有窈窕谷綠蕙芳以菲幽芬亦已鬱賞識方庶幾㵎邊棘荆滿山上春草肥託根亮同地豈辨誰是非地亦不能易香亦不能飛忽逢荷樵子采擷盈裳衣臨風再三嗅俯仰情依依由來有臭味不必崇知希西征一首呈李石梧前輩我昨賦西征爞爞實朱夏烈日焚八荒息影無寸暇孱體甘所侵炎威肎少借一病罹百艱煩煎竟日夜夙昔傷勁弓聞􅁌神已怕壹志事呻吟諐儀任嘲罵瘧疫難指名熱寒互嬗謝粒食經旬辭況能問燔炙帶月方首塗參橫未云罷顚簸筍輿中磋磨破腰胯奴子蒼黃詢庸醫再三詫猛然肆造攻云當一戰霸惡莠雖已鋤良苗亦失稼隔旦嘻其疲無復平生咤皮皺面有窪耳聾氣愈下慘澹過潼關沈昏渡淸灞赫赫李中丞觥觥范韓亞老羆臥三邊犬羊敢狙詐聞我至驪山材官百里迓秋雨長安邸征鞍庶一卸旅魄頗飄搖公來百慰藉遣僕炊香粳呼僮伺館舍徵醫未辭頻饋物不論價古誼暖於春美言甘於蔗我魂稍稍旋望蜀仍命駕裹藥充篋筐買飴養嬰奼漸覺身能輕如馬脫韁靶吾固慶生存眾雛亦嗟訝燕譽多親知艱難少姻婭永媿夫子賢高情壓嵩華賤子不足矜西人實沾化畱侯廟小智徇聲榮達人志江海咄咄張子房身名大自在信美齊與梁幾人飽胾􅊽畱邑茲巖疆亮無懷璧辠國仇亦已償不退當何待鬱鬱紫柏山英風渺千載遺蹤今則無仙者豈子紿朅來瞻廟庭萬山雪皠皠赤日巖中生照耀金銀彩亦欲從之遊惜哉吾嬾怠柴關嶺雪我行度柴關山光驚我馬密雪方未闌飛花浩如瀉萬嶺堆水銀乾坤一大冶走獸交橫奔凍禽竄荒野揮手舞巖巓吾生此瀟灑忽憶少年時牽狗從獵者射虎層冰中窮追絕壁下幾歲馳虚名業多用逾寡久逸筋力頽囘頭淚盈把廢邱關項王西入關叱咤何雄哉鼻息撼山岳號令如轟雷分茅割大地駕馭英雄才六王旣立後三將還西來降臣剖符竹洪度方洞開廢邱亦善地百里闢蒿萊桓桓章將軍仡仡貔虎材奸豎主帷幄大將終疑猜望夷不足惜此類良可哀行人一長歎萬壑悲風􅂞岱雲同年喪妻爲此詩譬之陳君喪厥妃善憂世無有情至生幻機有夢造王母紫殿何言言眾星挂戶牖穆滿翔其旁方朔戲其後陳某蟣蝨臣昧死訴左右彼有何德功鶼鶼到白首此獨何罪辜生世不少久剜肉補其天於德未爲醜食貧八九年辛勤足梁笱何孼之難逭斬刈如惡莠王母返袂泣倉皇頗怩忸方朔踉蹡出曰余不執咎眾生自生滅非神有官守高秋金氣肅萬葉同衰朽朝落非獨殤夕脫非獨壽皇天了不知無人司薄厚不見狼㬻女蓬頭雙足垢一生不洗面媚夫稱佳偶亦有綠林豪掠人如雞狗堂前妖姬舞堂下鬼妾走彼雖得偕老於君意可否此雖中道捐名聲極萬口令妻果然令何必在駘耉惡妻不可言牀笫森械杻陳君翻然覺再拜謝善誘歡喜不復愁逢人但索酒寄弟昔我初去家諸弟各弱小阿季髧兩髦覰人眸子瞭後園偸棗栗猱升極木杪叔也從之求揖我謂我矯分甘一不均戰爭在毫秒余時輕別離昂頭信一掉老弟況童騃樂多憂愁少瞥然成六秋光陰如過鳥世味一飽嘗甘心厭荼蓼夢裏還鄕國溝涂苦了了朝企恆抵昏夕思或達曉君詩忽見慰􅂞此肝腸繞生世非一塗處身貴深窈眾萬奔恬愉聖賢類悄悄二陸盛掞張鶴唳悲江表夷齊爭三光豈不在餓殍我今寄好語君聽其勿藐一願先知命再願耐擗摽乙巳春闈謝戴醇士前輩畫竹余少淪賤貧學書等畫墁中歲偸太倉誤爲金紫絆文字雖所攻淺嘗不能半邇來又十年抛棄如土炭豈謂選佛場謬來事襄贊列仙盛瀛洲腰魚何璀璨禁院扃重棖沈沈窅桂觀鍵戶無一營馳箋鬬豪翰蘸藍埽秋葉斯須復堆案眾雛亦好事奔命極雨汗戴嵩聖雲孫三絕天所歎于謁塡其廬鐵門說三換朅來困棘闈逢人匄脫腕爲余寫新竹風筠兀繚亂呵壁呼老可筌寀何足算我雖不解畫耆古頗知岸但得琴中趣何必工抑接爲報靑琅玕微詩庶一粲請醇士前輩畫竹歸貽樹堂題詩一首孔翠閉雕籠失羣忤本性懷我如玉人三旬闕賓敬老醇今鄭虔支離頗自聖余爲揚其波畫詩極輝映寫此貽君子持將作寶鏡筠以喻其文幹方晩節勁桃李漫紛紛語君勿與競物外求交知塵中闢幽夐又贈筠仙一幅人生有乖隔咫尺成關山我心日百轉從來輸石頑日吾語戴侯君在張李閒爲君畫新竹幽澹不容攀我家雙谿上萬竹圍沙灣涼夜幽篁裏月冷水潺潺行攜子偕隱鹿豕相往還詩名滿天地蹤迹混榛菅送王子壽歸荆州五首以高步追許由爲韻冠組墮塵海與世日滔滔豈知魯連子脫身美遯逃十輩蜩與鷽跳踉不能高黃鵠冥一舉大地如秋毫揮鞭拾科名咄嗟踏天路四十非不彊萬卷非無具尋􅀡如可期須臾得少駐側聞馮濳郞龐眉守故步盛年窟關輔結客頗支離負米半天下有婦愁朝炊詩名滿湖海持是欲安之菰中一漁笠懷哉不可追天人互轉旋時勢有虎鼠結交貴結心甯當變寒暑可憐拙匠斤謬被􅚽人許一杯君强釂無人解觴汝皇明爥八極小范臥西州嗟君老從事招招豈無舟廢興難可道時來不自由投竿要强起何代無馬周王君嘗爲林少穆制軍幕府從事送陳岱雲出守吉安有序存文集驪駒且莫喧我歌始一放憶昔初逢君漢濱俯高浪同拾春官第天門蹋閬閌射策干羲軒挾神一何王君喁我斯于躡履星辰上雙鳥不分飛短翎實所傍借屋兩頭居嬉遊不可狀六月寒瓜肥嚼氷滌府藏劈半持作冠狂呼極跌宕秋雨催歸人膏車各南向長沙揖君廬入門刪三讓拜母升後堂排筵倒家釀明歲同還朝百扶接居巷朝餐或來過夕渴還相訪問學商米鹽經綸說魚醬驅驢駕雞棲似狗頗茁壯有甑例宜塵無衣安用桁我道夫子賢世人或嘲謗世人病我頑夫子憐其誑袍笏雖支離貌卑心則亢平生企高遐力微不自量樹德追孔周拯時儷葛亮又兼韓歐技大言足妖妄夫子不予譏和高越初唱洽比三四年爲懽亦云暢卯歲夏之中九門盛炎瘴君實罹其災一病月三望毒熱轟外彊客瘥兀中脹有婦賢且勤􅈼天事供養背分荀令涼饘進冀缺餉剜肉補其天有神實克相繄我相扶持計窮屢怏怏國工吳竹如與鄭小􅃢調齊妙心匠鬼錄不見收人謀信可仗由來福與禍范范自天貺時月無幾何中饋遘死喪我時匍匐救倉皇事摒擋黃口抱呱呱稽首別繐帳移巢翼其兒室毀子無恙良人匪頑石焉能缺悽愴傾家營奠齋淚河送反葬我謂君已愚稽經懼失當君謂情自纏誰超六塵障展轉彌再期病貧互摩盪南望問尸饔儲糧不盈盎摧腸與蹙眉萬端欲誰諒一朝被殊恩千憂始滌蕩士窮守艱危時來􅀋放曠爲君述前塵在莒愼無忘報恩不在他立德乃可尙丈夫要努力無爲苦惆悵丙午正月二日作蹉跎三十五聞道其旣晩去日良已富來程亮復遠自從伊閩亡大道閉元揵有瞽不識珠賣珠事驕蹇微數陳豆籩小知辨蜓蝘迂腐譏淵騫空疏訕商偃前者激波瀾後者恣鬬很大江日滔滔眾人死婉娩誰能抱孤芳寂寥守舊畹通經不達時失身下豬圈嗟予局咫聞亦不工􅊱噂非仁不敢祖非義豈嘗本所學誠流俗攀躋但分刌不挂高明眼譏評肎少損民各有依倚吾甯變愚悃文字扃緘縢經綸在房梱浩蕩冠葢場一心自嘉遯聊用陳區區夢魂庶謐穩題筤谷圖大雅卽高詠耽隱靑山岑手折篔簹枝鏗爲琅玕音松風石壁高箐霧林霏深幽幽人不知獨鶴明孤心送王孝鳳之雲南卽題其尊人松菊圖累世無咎繇冤民塞九縣數罟危眾魚吞舟不加譴王叟邦之良溫恭少側弁獄吏一牽連秋毫忤雷電田甲時見陵馬遷莫相援盆底無昊天荷戈出摩甸萬里蒲蠻道征人淚如霰廿載餐氊糜衣無故時線囘首望家山柴桑信所戀老松儻無恙叢菊向誰絢有子鏗華鐘蜚聲震金殿武庫羅其胸干將思一剸誓上緹縈書不乘長􅀸傳一麾首滇南征心已如箭預想王坦之初覲懷祖面抱持至膝上悲喜集一見萬事如浮雲滄海日千變獨有骨肉離重逢眞可羡明歲唱刀環懽聲若雷忭歸食武昌魚比鄰張高宴鳳詔喧里閭純孝􅂞天眷不學朱壽昌徒登獨行傳題錢崙仙㸐燭修書圖腐叟音塵湮千載無完史斷代自班生䤨摫破大體茂先賞三志編摩或索米舊書畱釁瑕但爲吳生詆數賢不足珍餘外況靡靡聖代盛文章羣英躐前軌殷鑒曩成編唐經今繼美磊磊南董倫彯纓足幡纚錢子邦之良弱冠捋金紫涇渭原胸中衮鈇極筆底朝踏東華路柴車等敗屣夜歸南窗下椽燭照大几一字褎幽潛片言殛姦宄曲􅀡在豪端誰能矜爪觜我亦載筆臣大弨久復弛三載縻官錢甑塵亦莫洗披圖聊粲然作詩一洒恥題孫君采芝圖二首孫君名葆恬字劭吾善化人嘉慶己卯舉人道光六年以大挑選桃源縣學敎諭芝房侍講之父也眾羽工飛騫先生獨摧挫十載桃花源寒氊屢吿破古木發深彈從來拒俗和采蕨睎殷頑餐英補楚些自擷三秀芝窮年振寒餓豈謂人事乖悠悠卽長臥掇草求長生無靈欲誰那長是拜畫圖千秋聆咳唾少室吾黨英儲能實完好韶齒殊不廉閒偸仙人棗航海探琪花蹁躚踏三㠀根本良已深眾芳信在抱言采幽蘭歸種作階前草上有竹修修下有淸風埽竹節寒逾堅貞心永難老風暖扇餘馨繁香滿穹昊詶陳慶覃侍御赤水沈元珠千年遲象罔君子􅂞深眷翻然辱旌奬馬走那解詩鉤章事鹵莽秋蟬挂高柳風過自成響豈意師曠聰偏聽發謬賞維君堅高壘無人敢掉鞅筆端一縷香百靈通肸蠁方今隆棟穹伊巫擁天仗巢燧無闕遺無處著崛彊以玆得雍容閒吟寄􅁣慷有書亦盈牀有沽亦盈盎六宇自冥冥湫塵莫予網請君拊夔石予亦擊堯壤小池屋後一枯池夜雨生波瀾勿言一勺水會有蛟龍蟠物理無定資須臾變眾竅男兒未葢棺進取誰能料茲晨茲晨曷不樂端念良自尤自吾有爪觜半啄匪躬謀俯視見后土仰視見光浮關門赫婢僕雄長如諸侯專精事羹飯餘政及乾餱兵後物力絀平世生齒稠人人似我飽實重黃屋憂吾皇惕昧爽彼相爭前籌聖者自危厲愚者自優游大哉六合內人類難等儔失題西山一夜雨秋氣入庭除淸晨展書坐翛然樂有餘天宇一何廓蕩蕩眞吾廬熇熇夸毗子守隘無曠居眾鱗爭坳潦鬛鬐安得舒豈知逃閒寂放蕩得尾閭吾樂正如此君樂復何如題泛海圖昔我櫂瓜州金焦望㟞㟞靈山咫尺閒不得窮􅑬嵼還家述遊蹤高堂一笑莞江湖險可吁泛海況不戁撫摩慰驚魂輭腳呼盤琖由來􅄌母心險夷最所揀孝廉本儒衣文章富編剗胡爲涉遐思浮海窮覘矕有母足􅄌悲奉佛信瑟僩共道洛伽巖實惟仙藥產神人渡迷津福汝能􅂤􅂤虔禱或有憑孝思本無限圖此塞寸誠靈心聊結撰何知妄與眞雲濤紛滿眼秋懷詩五首木葉下如雨西風吹我衣天地氣一肅囘頭萬事非虚舟無抵忤恩怨召殺機年年絆物累俯仰鄰詬譏終然學黃鵠浩蕩滄溟飛蟋蟀吟西軒商聲方茲始小人快一鳴得時亦如此大澤藏蟄龍嚴冬臥不起明歲澤九州功成返湫底吾道惡多言喧囂空復爾吾愛邵夫子謂仁和邵懿辰古之三益者鑿鑿攻我瑕不隨世人啞薄俗尊文章吾亦事茍且赫赫揚子雲末途裂於瓦再拜謝􅚽人斤斧行可捨城頭昨宵月今夕虧其圓丈夫矜小節一缺誰復全蝸廬抱奇景高視羲皇前蒼蠅黦尺璧江漢難洗蠲馬融頌西第今爲時所憐吾友劉孟容遺我兩好書三年不報荅幽怨今何如深山閟大寶光氣塞州閭樊英履壇席名業箕斗虚補天儻無術不如且荷鋤詶辥曉颿大谷閟幽蘭由來習霜雪摧挫彌歲年葳蕤減昔悅本性誠未移芬芳詎可滅時物一爲遭適爲吳人擷會合亦有宜廢興固難說旁有荷樵子殷勤事搴襭出山嗅懷褏餘馨亦未輟臭味良有然非渠獨明哲風騷難可熄推激惟建安參軍信能事聲裂才亦殫寂寞杜陵老苦爲憂患干上承柔澹思下啟碧海瀾茫茫望前哲自立良獨難君今抱古調傾情爲我彈虚名播九野內美常不完相期蓄令德各護淩風翰送舒伯魯神駒秉淸峻墮地淩無前男兒志萬里亦在華妙年舒生吾楚儁結髮疲丹􅉢內外承嘉蔭託根魁斗躔迎婦范陽府結客彌幽燕遂來窟京輦滿月彎鳴􅁌謂言拾高第如掇牀頭錢人事有奇偶虎鼠非吾權文章不娬媚例爲時世捐芝蘭合鋤刈朝菌香徹天可憐壯夫志摧撼終不遷時時造我闥屛慮商詩篇高吟動厚地幽思縋重淵維桑古有敬況此接才賢昨來忽吿別歸意何翩翩寢門疏定省肎爲世網牽一鳴不稱意脫去如鷹鸇趙孟等閒事難者參與騫馬走螙此閒歲月逐風顚謀歸百不勇送女聊自鐫劉叜詩新甯江君忠源子之執友也數爲予稱其邑孝子劉叜者道光丁未叜年齒六十江君求予以詩揚其行爲老人光悅且以風里人夫甄采畸德作獨行傳之長編史氏之任也嘉善而懲不能勸一而勵百亦士大夫有風俗之責者事也故爲之詩歌遠貽劉叜叜名某字某實縣學生金峯萬山輳劉叜巢山椒邦人所賓禮與山兩岧嶤天窮苦無吿孤露初及髫傾家樹四壁馬磨風蕭蕭朝餐或恥盎夕飮恆賭瓢子衿式學省童冠各在招束脩斂薄少歲穫償蓘穮上堂奉甘滑入室馨脂膋一噎三咻摩一食再溫劭蒸棃或忤志捐斥無寬條嬰兒抱酷愛畢世非一朝白日不東返孝養隨瞥飄所餘桮與棬傍身帀瓊瑤觸時卽子卯有霣如春潮仰供不知劬俯畜安能饒舉家浩鵞雁妻餒兒號宵維叜不鹵莽長短與量料紉箴敎補裂呼粥權息囂鄕鄰敬其誼百里無飛鴞長官式其賢唾息不敢驕噫乎血氣倫報本義所要人紀有乖沸茲實懸之杓惠迪經所訓物理亮非遙感歎遂成詠庶以風鄙澆送莫友芝豪英不地囿十九興偏邦斬崖撥叢棘往往逢蘭茳黔南莫夫子志事無匹雙萬書薄其服廿載幽窮鄕今年偶作劇射策來都堂靑鞵側破帽日繹書賈坊邂逅一相見揖我謂我臧劉郞吾庸敬好事迷短長炙酒頳君頰亦用沾我腸微瀾時激引稍稍觀濤江可憐好手眼不達時溫涼果然被捐斥鋤刈不成芳誰能尼歸駕飄若驚鴻翔我時走其廬深語非淺商次及蓼莪痛老淚何浪浪嗟余亦心性內刺能不降賓然拜牀下十分肅老龐關山有乖隔人事不可詳萬里共日月肝膽各光芒作詩勖歲莫亦以勤劉郞劉郞謂茮雲題彭旭詩集後卽送其南歸二首日日送歸客情抱難爲佳老彭復去我內撫焉所偕往予初遇子睇睞無等儕鷹眼迥高秋勢不甘塵埃自言困鄕國橫被口語猜絳侯畏牘背田甲欺死灰脫身來洛下稍攝驚魄囘風波一震薄萬事何有哉雄篇忽枉我峻句何崔嵬險拔肝膽露憂患才地開終然達紫氣幽獄難可埋男兒要身在百忤甯足摧臨歧不知報努力乾深杯大雅淪正音箏琶實繁響杜韓去千年搖落吾安放涪叜差可人風騷通肸蠁造意追無垠琢辭辨倔彊伸文揉作縮􅀡氣摧爲枉自僕宗涪公時流頗忻嚮女復揚其波拓茲疆宇廣大道闢榛蕪中路生罔兩孱夫阻半途老大迷歸往要當志千里未宜局尋丈古人已茫范來者非吾黨竝世求人難勉旃各􅁣慷丁未六月廿一爲歐陽公生日集邵二寓齋分韻得是字讌飮非吾欣十招九不起豈不耽羣歡未諳諾與唯今日飮邵侯婆娑辦一喜多因坐上賓可人非俗子梅叜伯言名世姿蕭然紅塵裏蟬蛻三十年萬事如脫屣獨畱文章性貞好無遷徙頗奬歐陽公時時挂牙齒後者開曾王前追韓與史自叜持此論斯文有正軌二三邦國英風流相依倚持斤向老鼻郢門欲成市邵侯宏其波崢嶸見爪觜時作好事人排蕩詩酒理長安三月雨炎威方一弛洗醆招近局眾賓稍塡委尙想老醉翁茲辰實攬揆展圖拜光儀焚香追無始餒鰈初在嘗良琴復動耳跌宕宇宙閒嘐嘐亦未已鄙人實昬頑百非遘一是麋鹿生野性謬來絆金紫紛華一蕩潏精光半銷毀常恐道未聞殞身同螻蟻苦緬六一公終古長不死名位匪絕人所貴不關彼作詩謝邵侯梅叜竝送似送黎樾喬侍御南歸五首原六首其六係七古見二卷時歲善遒邁煩悰無少舒秋色滿大地良朋還去予十年聚京輦竝頭相呴濡深言洞金石密意安綦絇傾歡酌家釀鐙火照狂愚不能久依倚脫棄如驚鳧民生各時令進止非人圖物自持其末吾自敦其初高秋天萬里浩蕩一舂鉏平生秉微抱志與詩騷親孤音裂肝膈劃然震乾坤持用吿庸子舉世褎不聞先生有妙鼻容吾揮一斤賞姸越恆理逐臭詫奇芬高歌切哀玉吹我上靑雲多譽墮盛德雖然豈不仁文章事微薄在物未爲珍秋豪較得失老死相齗齗從今漑根本破硯吾欲焚萬歲行滔滔後水逐前水今古數達官河沙不可紀生存勢薰天死去飽螻螘達人計深長誓不欲穅秕嗟余本野性邂逅絆金紫尺寸無功能高明畏神鬼雷同溷太倉或恐損廉恥倦羽企歸風余亦行休矣筐筍鍤松秧從君萬山裏逆夷昔爛漫兵甲禦南東殺人飼蛟鱷大海爲之紅君時卽我謀雪涕向蒼穹夜半草萬言朝奏甘泉宮道謀復旁午羣策雜昭聾聖擇有姑舍神斷自天聰自獻雖不效義憤侔賈終事往一囘首人各發舊蒙所貴中無疚焉計達與窮洞庭天下闊淸傑橫六宇中有兩佳人乃是淵騫伍湖北字茮雲南曰孟容甫厥氏同劉宗神明本漢祖實惟吾友生交期澈肺腑乖隔漫關河夢魂奔越苦朝憶便成昏夜思或達午此士臥深山靜氣卻豺虎君去儻尋求夙鯁還一吐物外得眞遊方寸能歌舞題季仙九師采蘭蓺菊圖靈儀耀德輝昌期偶一造翽羽時倦飛丹穴仍高蹈吾師生民傑瑩粹邁珪瑁文章養其原木雞極啄菢詩老昔采風滇海烝英髦聖皇豁四聰惇樸信所勞文軫馳西南武庫職旌纛夷然鎭廟堂羣士息浮躁秋月照琴心忽理思歸操東籬菊正肥南陔蘭可芼翩然謝綦簪巾車已復膏小子秉孱薄門牆備灑埽追隨漫十年未洗緇塵眊稻粱逼旅懷詩禮荒庭誥賦詩鐫此心搖搖如植翿題朱伯韓詩集後十首以才難不其然有亦未易謚二語爲韻雞鳴足朝莫陰曀終不開高秋戰寒夜四壁轉風雷有客投明月驚顧非凡胎古人亦已矣吾猶及此才稂莠驕復驕桃李闃無言堂堂魏長史畫籌壁上觀丈夫有深意出手無俗彈恆沙閱人面相識良獨難明珠伏濁浪能媚不能流碩人力如虎折節師溫柔肝腸自骯髒面目自伊優再拜問君子此可言詩不金陵昔鍤血裂眥激癃疲事過付東風沓沓如故時豈非吾輩恥痛鉅不可思三更荷戈起四問夜何其東家老鼻祖詔我三百篇造詞如日月萬古趨新鮮竊人者無恥自得斯爲賢鄙夫目論爾君謂然不然吾子如春陽照臨列枯朽我亦無所知我亦無所有頗好感事詩善歌敵矇瞍歲晚脣又乾君須濡我酒吾國有狂生白眼善揮斥謂益陽湯鵬稱子賢無朋許予曰頗亦中途生波瀾生死長乖隔靑山一抔土永埋壯士魄桂林天下秀生才雅且毅有美王與龍虎視令人畏謂馬平王錫振臨桂龍啟瑞誰道儒誤身等閒拾富貴平津老封侯君今齒尙未甚矣吾其衰百思今廢置平生所好賢支離背時利明鏡承食漿干將不一試天高帝閽嚴薦達談何易舉世禮邱軻貌尊非心卽草元二千年今無一人識思之復思之粒粟開八極君試騰汗漫我當借羽翼送黃恕皆使秦中輦轂蜂房聚萬人扃閉牢脫身得出走塵鞅方一逃黃君吾黨彥闇默謝羣囂持節下關隴太華秋氣高西北收功實自古產英髦聖朝枋儒術土室始深韜三徵臥不起四字爛天褎張呂去云久餘緒猶可繅丹穴鳳所都累葉無凡毛猗蘭豈不馥所貴采擷勞三洗人天眼往觀大海濤􆈱盡波底蚌明月終在遭先民有遺紹邂逅入甄陶歸來謝天子亦用誇吾曹爲已辨檠輔與世置夔皋北堂侍膳圖爲姚吏部題二首脫葉辭喬柯􅂞旋依舊畹行役有乖違梓桑終繾綣姚君虞舜裔純行亞珪琬伯瑜陳采服下堂自婉娩一從通朝籍鄕關日巳遠浮雲有東西遊子不得返樹蘭服眾芳誰能忘根本爰圖聖善容慰此深愛悃嘉魚初在烹新筍欲盈㯻不惜求取勞但虞珍膳損魏闕身事羈南陔歸夢穩移孝出忠勳邂逅還補衮題陳氏五世鄕賢遺像純皇撫九有至文耀天樞詔舉明經士四皓來于于介休薦梁叜江南顧與吳陳公實稱首人中見騶虞峩冠長太學魯國始一儒洪河無近脈崑山玉所都三朝襲令緒四世表其閭繄維聖舜胄家聲自古初義門翕惇穆太邱世􅆪裾門風不復墜繼踵踐天衢金籯澤易斬君子席詩書瞻言禮遺像杖几如可趨聊表先民軌一爲薄俗模韓齋爲孔舍人題西京大雅淪斯文日凋敗天不喪周孔使人續謦欬韓子興中原聖言始有賴孤竅吐雄奇金聲塞兩戒時於蕙蘭室中出蛟龍怪􅂞首視齊梁有作頗衰憊一從茲塗闢來者方雲會豪彥仍響臻歐曾得兩大聖淸炳昌運方姚實孤邁魯叜有雲孫耆古百無懈齋祓奉烝嘗但下昌黎拜大書榜其室夙莫見蓍蔡誰云千載遙神理與鍼芥湜翱漫親炙相夷等自鄶桐陰消夏圖爲史吏部題炎曦灼大地蠕蚑同烹煎有生奔末利擾擾不遑安史君靜者流置身巢燧閒綠天展珍簟桐葉生虚寒煮茶激淸吹拂箔􅂞微瀾客來戒不報塵事莫相于頗亦哀老子佳眠未渠闌題苗先麓寒鐙訂韻圖大雅久淪歇正音委榛蕪永明肇四聲稍變周漢模開皇集八士牙曠相飾揄夜半畫綱紀韻學玆權輿承襲一千載灌莽成康衢韓公頗好古枉啜六經腴放者騁遊騎斂者如轅駒進退失所恃不得返皇初有宋盛文藻才老信狂夫陳生興晩明秉燭照幽墟勝廣驅除畢沛下風雲趨聖淸造元音崑山一鴻儒中天懸日月堂堂爥五書上追召陵叜千載若合符斯文有正軌來者何于于江戴揚其波段孔入其郛苗髥最晚出匯爲眾說都精思屈鬼膝高論揖唐虞鬻熊皎入夢薪火燿天樞神光不可熄長夜一鐙孤風雪交四壁橫膏校殘書人謂髥何憊髥謂吾自娛自我與髥友大海禮閒鷗時洗箏笛耳一聽秦靑謳物外有眞知肝鬲助歌歈愛髥不忍別作詩寫區區養閒草堂圖爲潘博士題浩浩市聲沸塵霧如驚濤中有澹定人萬事渺秋毫家世東山舊諸謝各淸高末行濯德輝九天一羽毛豈謂􅂞風勁修路滯將翱乾坤豈不大一笑解天􅋶四時足休息靜極思作勞時攜桑輿友物外得佳遨脫帽談虞夏生理寄濁醪歸來對虚室風日淡相遭老鶴傍人睡羣雞正喧嘈陶太常小像江波少還態耆㝛日凋零豈知永嘉末吾猶及老成乾嘉昔云盛錢王蔚典型傳經孟喜厀問字子雲亭各􅆢本師說森然啟門庭先生時少壯槃敦接芳馨曾從大匠鼻揮斧動神靈跌宕五十載數輩倚聲名踏破九州莎依舊還天廷後生仍好事快覩先民程飄然好須鬢圖此歲星精柏寢話疇昔緒論吾嘗聆瞻言詠斯篇一寄思古情會合詩一首贈劉孟容郭伯琛咸豐五年秋月南康舟次東風吹片雲嘉客來千里喘如竹筒吹腐公跫然喜明僚雜迎笑吾亦倒吾屣各自衱其魂吿曰某在此傾衿語晨夜爛漫不知止上言離別長歲月􅁌脫矢下言兵事殷成敗眞夢耳江漢天下雄三年宅蛇豕王師有蹴踏戈􅂳照淸泚掀浪煮黿鼉洪濤染爲紫長驅下蘄黄鐵鎖沈江㡳羣龍水中生怒螳車下死英英塔與羅威名讋南紀倚嘯灊廬閒天戈欲東指人事有變遷由來不可擬鬼火夜灼天壤雲壓高壘龍驤付一炬韓壁僅可抵偕行竟無衣存足乃無履夜半飢腸鳴大聲震江水腐公不知羞恬然矜爪觜謂言多難時從來福所倚在莒義不忘圖南風漸起稍稍召驚魂時哉可歸矣世論自悠悠冰膚生瘡痏困窮念本根風雨思君子艱難復相逢得非天所祉囘首廿年前志亢聲亦侈憂患閱千變返聽觀無始老夫苦多須須多老可鄙二子苦無髭無髭亦可恥自乏諧俗韻不關年與齒貞松無春競歲晏行可俟作詩誌會合亦用砭窳呰王母方太夫人詩凡響無異材爨餘得佳桐眾卉競春華歲寒彰貞松坤德无咎譽非儀兩不蒙煢然遘閔凶高義古所崇中材利行之綽楔畱芳蹤卓哉賢母德激烈乃過中別嫌謹錙銖年高茲益恭至性無矯揉情摯超凡庸無所爲而爲乃與神明通有孫立朝端蹇蹇葢匪躬乃知玉泉流璇源已沖瀜白嶽黃山閒靈氣鬱蔥蔥明靈永不泯奕世揚休風贈李眉生倦翮復南翔重眺鍾阜煙舊遊多環萃羣卉正芳鮮謂可擴吾襟孤懷乃悄然非材竊祿位俯仰慚高天術業一無成浩浩送流年窳惰常廢事識闇或蔽賢多病無安食多悔少佳眠無德居高明眾鬼瞰瑕諐無學臻衰耄但爲時所鐫誰言所遇順撫衷百慮煎勤子來存訪至論探九淵鬱塞乃過我神困難爲姸人世多乖迕圓一缺常干羲娥驅童丱舉世惜華顚天命誠足畏愁思且當捐靑松生危甗獨立向淸昶風韻戛韶咸交柯蟠龍象逸氣千層霄瀟灑謝塵坱廟廊搆瓌材羣工共嗟賞虹梁皎朱曦天門信蕩蕩豈知咫尺閒歧路多􅂞枉挽來不能寸推去或千丈託根倚峻巖植基固不廣孤高招烈風薄俗甯足仗蒼穹富雨露百昌日夜長大鈞一轉旋悱惻神所奬聊究莊生旨齊物尋影響行止皆有待還以咨罔兩題兪蔭甫羣經平議諸子平議後聖徂曠千禩微言久歇絕六籍出燔餘諸老抱殘缺尙賴故訓存歴世循舊轍從宋洎有明軌涂稍歧别皇朝襃四術眾賢互摽揭顧閻啟前旌江戴紹休烈迭興段與錢王氏尤奇傑大儒起淮海父子相硏悅謂高郵王懷祖先生念孫及其子文􅂤公引之子史及羣經立訓堅於鐵審音明假借王氏精於古音謂字義多從音出經籍多假借字皆古音本同也課虚釋癥結王氏每於句調相同者取彼釋此謂之句例又戒不得增字以釋經皆係從虚處領會旁證通百泉淸辭皎初雪王氏立訓必有確據每譏昔人望文生訓或一字而引數十證其反覆證明乃通者必曲暢其說使人易曉九原如有知前聖應心折兪君一何偉䠑步追曩哲盡發高郵奧擔囊破其鐍君昔趨承明鳳鸞與頏頡軺車騁嵩洛康衢誤一跌子雲宦不達草元更折節文囿芟天葩經神供淸醊庬言頗觝排諸子亦梳抉復從羣賢後森然立緜蕝嗟余老無成撫衷恆惙惙閎才不薦達高位徒久竊茲編落吾手吟覽安可輟詶王壬秋徐州見贈之作戒徒事秋蒐理櫂及淮甸塵坱正紛拏邂逅接英彥乖離七易霜天遣更相見後車攜嘉客同馳彭城傳輕颸澣素襟名論􅂞深眷自云尋絕學涂軌約三變僑居蒸水陽親知斷游讌閉戶自高歌寒宵百慮戰羣聖下窺瞰憂喜相慶唁盡抉諸經心始知老儒賤探篋出新編照座光如電說易燭大幽箋書袪眾􅅭旁及莊生旨抵巇發英眄大雅久不作小知各自􅃷漢宋互嘲譏餘炎更相煽遲君紹微言豪芒辨素絢高揭姬孔情洪曦消積霰湖湘增景光老懷亦忻忭附忮求詩二首善莫大於恕德莫凶於妒妒者妾婦行瑣瑣奚比數己拙忌人能己塞忌人遇己若無事功忌人得成務已若無黨援忌人得多助勢位茍相敵畏偪又相惡已無好聞望忌人文名著己無賢子孫忌人後嗣裕爭名日夜奔爭利東西騖但期一身榮不惜他人污聞災或欣幸聞禍或悅豫問渠何以然不自知其故爾室神來格高明鬼所顧天道常好還嫉人還自誤幽明叢詬忌乖氣相􅂞互重者烖汝躬輕亦減汝祚我今吿後生􅋺然大覺悟終身讓人道曾不失寸步終身祝人善曾不損尺布消除嫉妒心普天零甘露家家獲吉祥我亦無恐怖右不忮知足天地寬貪得宇宙隘豈無過人姿多欲爲患害在約每思豐居困常求泰富求千乘車貴求萬釘帶未得求速償旣得求勿壞芬馨比椒蘭磐固方泰岱求榮不知饜志亢神愈忲歲燠有時寒日明有時晦時來多善緣運去生災怪諸福不可期百殃紛來會片言動招尤舉足便有礙戚戚抱殷憂精爽日凋瘵矯首望八荒乾坤一何大安榮無遽欣患難無遽憝君看十人中八九無倚賴人窮多過我我窮猶可耐而況處夷塗奚事生嗟愾於世少所求俯仰有餘快俟命堪終古曾不願乎外右不求
