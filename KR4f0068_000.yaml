body:
  text: 卷一順性命之理論君子愼獨論烹阿封即墨論原才召誨五針並序立志針居敬針主靜針謹言針有恆針紀氏嘉言序武會試録序錢港先生制藝序黃仙嶠前輩詩序謝子湘文集序朱愼甫遺書序歐陽生文集序孫芝房侍講芻論序經史百家簡編序鳴原堂論文序王船山遺書序衡陽彭氏譜序曰慎齋詩草序國朝先正事略序重刻茗柯文編序湖南文徵序雲槳山人詩序代季師作錢選制藝序送郭筠仙南歸序送謝吉人之官江左序送周荇農南歸序送陳岱雲出守吉安序送唐先生南歸序送江小帆同年視學湖北序送劉君椒雲南歸序易問齋之母夀詩序陳岱雲太守為母生曰宴集賓僚詩序唐鏡海先生七十生曰同人寄懷詩序朱心垣先生五十六壽序田崑圃先生六十壽序朱玉聲先生七十三壽序王翰城刺史五十壽序王蔭之之母壽序江小帆之母壽序何傅巖先生七十壽序郭璧齋先生六十壽序金殿珊先生六十壽序黃矩卿師之父母壽序文小南之父七十生曰壽詩序何母廖夫人八十生曰詩序黎樾喬之兄六十壽序曹潁生侍御之繼母七十壽序楊母張孺人七十壽序曹西垣同年之父母夀序王靜菴同年之母七十壽序孫鼎菴先生六十壽序江岷樵之父母壽序陳仲鸞同年之父母七十壽序季仙九師五十壽序卷二求闕齋記新寧縣增修城垣記槐陰書屋圖記餋晦堂記湘鄉縣賓興堂記聖哲畫像記畢君殉難碑記林君殉難碑記湖口縣楚軍水師昭忠祠記何君殉難碑記針言書院記修治金陵城垣缺口碑記靈谷龍神廟碑記金陵軍營官軍昭忠祠記金陵湘軍陸師昭忠祠記金陵楚軍水師昭忠祠記湘鄉昭忠祠記江寧府學記鈔朱子小學書後書歸震川文集後書扁鵲倉公傳書學案小識後書王雁汀前輩勃海圖説後書周忠介公手札後書儀禮釋官後經史百家雜鈔題語大潛山房詩題語孟子要略敘跋跋衍聖公孔恭慤公墓志銘刻本補侍講缺呈請謝恩狀癸卯八月初四日討粵匪檄祭韓公祠文祭湯海秋文歲暮設奠告王考文正月八日王考生辰告文丁卯四月求降雨澤告辭廣東嘉應州知州劉君事狀書何母陳恭人事漢陽劉君家傳葛寅軒先生家傳歐陽氏姑婦節孝家傳湖北按察使趙君神道碑江忠烈公神道碑羅忠節公神道碑銘李忠武公神道碑銘李勇毅公神道碑銘卷三隨州李君墓表錢塘丁烈婦墓表桃源縣學教諭孫君墓表武昌張府君墓表翰林院庶吉士遵義府學教授莫君墓表鄧湘皋先生墓表戶部員外郎彭君墓表大界墓表台洲墓表海寧州訓導錢君墓表新寧劉君墓碑銘母弟溫甫哀詞吳君墓志銘彭母曾孺人墓志銘余安人墓志銘陳岱雲妻易安人墓志銘新化鄒君墓志銘單縣典史張君墓志銘前海寧州知州長沙李君母黃宜人墓志銘適朱氏妹墓志滿妹碑志荆門州學正郭君墓銘善化夏母楊宜人墓志銘祖四世元吉公墓銘國子監學正漢陽劉君墓志銘錢塘戴府君墓志崇仁謝君墓志銘劉母談孺人墓志銘湘陰郭府君墓志銘誥封光祿大夫曾府君墓志劉君季霞墓志銘季弟事恆墓志銘閩浙總督季公墓志銘仁和邵君墓志銘張君樹程墓志銘苗先簏墓志銘唐確愼公墓志銘歐陽府君墓志銘翰林院侍讀學士丁君墓志銘郭依永墓志銘羅君伯宜墓志銘寧津龐君墓志銘遵義黎君墓志銘劉忠壯公墓志銘曾文正公文集三卷門人合肥李瀚章筱泉編次遵義黎庶昌蓴齋武昌張裕釗廉卿參校東湖王定安鼎丞長沙曹耀湘鏡初校字長沙段文益刻字曾文正公詩集目録卷一四言題楊忠愍公二疏手草題易公筠亭遺像五言古雜詩九首里胥送吳榮楷之官浙江三首題錢崙仙同年慈竹平安圖二首寄懷劉孟容題周小村前輩塞外課經圖地用莫如馬二章思賢也題龍九詩贈李生西征一首呈李石梧前輩留侯廟柴關嶺雪廢邱關岱雲同年喪妻為此詩譬之寄弟乙巳春闈謝戴醇士前輩畫竹請醇士前輩畫竹歸貽樹堂題詩一首又贈筠仙一幅送王子壽歸荆州五首以高步追許由為韻送陳岱雲出守吉安丙午正月二日作題筤谷圖送王孝鳳之雲南即題其尊人松菊圖題錢崙仙㸐燭修書圖題孫君采芝圖二首酬陳慶覃侍御小池茲晨失題題泛海圖秋懷詩五首酬辥曉帆送舒伯魯劉叟詩送莫友芝題彭旭詩集後即送其南歸二首丁未六月草一為歐陽公生日集邵二寓齋分韻得是字送黎樾喬侍御南歸五首題季仙九師采蘭藝菊圖題朱伯韓詩集後十首送黃恕皆使秦中北堂侍膳圖為姚吏部題二首題陳氏五世鄉賢遺像韓齋為孔舍人題桐陰消夏圖為史吏部題題苗先麓寒鐙訂韻圖養間草堂圖為潘博士題陶太常小像會合詩一首贈劉孟容郭伯琛王母方太夫人詩贈李眉生題俞蔭甫羣經平議諸子平議後酬王壬秋徐州見贈之作附忮求詩二首卷二七言古謝疊山賣卜研為劉太守題送淩九歸送楊春皆歸題毛西垣詩集後即送之歸巴陵五首題顧南雅先生畫梅應何子貞傲奴瑣瑣行戲簡何子敬乞醃菜反長歌行題畫蘭三首應田敬堂同年贈何子貞前輩題唐鏡海先生二圖感春六首為何大令題明趙忠毅公鐵如意喜筠仙至即題其詩集後六月二十八日大雨馮君樹堂周君荇農郭君筠仙方以試事困於場屋念此殆非所堪詩以調之荇農既和余詩而三子者皆見録於有司乃復次韻題明陳忠愍公雪聲堂硯為唐觀察樹義作題醇士前輩為滇生師畫竹疊前韻酬岷樵移居偶成陳慶覃詩鈔題辭三首憩紅詩課戲題一詩於後書朱皋亭家傳後送周文泉大令之官城武送淩十一歸長沙五首送謝果堂前輩歸江南題王少鶴嬃砧課讀圖丙午初冬寓居報國寺賦詩五首酬李生三首次韻戴醇士邵蕙西見過題平谷山莊圖題王麓屛扁舟歸養圖二首書嚴太守大關賑糶詩後送黎樾喬侍御南歸題張石舟煙雨歸耕圖太學石鼓歌題朱伯韓侍御之尊人詩卷手迹題篬筤谷圖答李生題唐本説文木部應莫郘亭孝廉贈吳南屛遊金山觀東坡玉帶詩卷三五言律早起憶九弟二首得郭筠仙書並詩卻寄六首寄弟三首獨出訪苗先麓懷劉蓉歲暮雜感十首桂湖五首至日二首雨送吳英樾之官浙江兼簡魏黃生大令三首送鄧伯昭兼簡家伯醇秀才三首莫過竹如東鄰杜氏義孰送王少鶴送金竺虔之官閩中七言律歲暮雜感十首寄郭筠仙浙江四首三十二初度次日書懷憶弟二首漫與聞客話里中近事元戎溫甫讀書城南寄示二首早發沔縣遇雨初入四川境喜晴梓潼道中有懷馮樹堂陳岱雲早發武連驛憶弟三十三生日三首國士橋哭少時同學某送妹夫王五歸五首酬九弟四首贈梅伯言二首夜直苦寒吳宮黃病中屬市鹿尾臘八日夜直失題四首丁未六月七日考試漢教習試院作二首武會試闈中作送孫芝房使貴州二首書邊褎石詩集後二首送梅伯言歸金陵三首酬李芋仙二首次韻何廉昉太守感懷述事十六首讀吳南屛送毛西垣之即墨長歌即題其集五言絶句讀李義山詩集七言絶句入陜西境六絶句題畫竹次醇士前輩韻二首送唐鏡海先生九首壬戌四月沅弟克復巢縣和州含山等城賦詩四首沅甫弟四十一初度
