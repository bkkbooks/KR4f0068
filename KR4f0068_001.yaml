body:
  text: 順性命之理論嘗謂性不虛懸麗乎吾身而有宰命非外鑠原乎太極以成名是故皇降之衷有物斯以有則聖賢之學惟危惕以惟微蓋自乾坤奠定以來立天之道曰陰與陽靜專動直之妙皆性命所彌綸立地之道曰柔與剛靜翕動闢之機悉性命所默運是故其在人也絪縕化醇必無以解乎造物之吹噓真與精相凝而性即寓於肢體之中含生負氣必有以得乎乾道之變化理與氣相麗而命實宰乎賦卑之始以身之所具言則有視聽言動即有肅乂哲謀其必以肅乂哲謀為範者性也其所以主宰乎五事者命也以身之所接言則有君臣父子即有仁敬孝慈其必以仁敬孝慈為則者性也其所以綱維乎五倫者命也此其中有理焉亦期於順焉而已矣請申論之性渾淪而難名按之曰理則仁義禮智德之賴乎擴充者在吾心已有條不紊也命於穆而不已求之於理則元亨利貞誠之貫乎通復者在吾心且時出不窮也有條不紊則踐形無虧可以盡已性即可以盡人物之性此順乎理者之率其自然也時出不窮則泛應曲當有以立吾命即有以立萬物之命此順乎理者之還其本然也彼夫持矯揉之説者譬𣏌柳以為杯棬不知性命必致戕賊仁義是理以逆施而不順矣高虛無之見者若浮萍遇於江湖空談性命不復求諸形色是理以惝恍而不順矣惟察之以精私意不自蔽私欲不自撓惺惺常存斯隨時見其順焉守之以一以不二自惕以不已自循栗栗惟懼斯終身無不順焉此聖人盡性立命之極亦即中人復性知命之功也夫君子愼獨論嘗謂獨也者君子與小人共焉者也小人以其為獨而生一念之妄積妄生肆而欺人之事成君子懍其為獨而生一念之誠積誠為愼而自慊之功密其間離合幾微之端可得而論矣蓋大學自格致以後前言往行既資其擴充曰用細故亦深其閲歷心之際乎事者已能剖晰乎公私心之麗於理者又足精研其得失則夫善之當為不善之宜去早畫然其灼見矣而彼小人者乃不能實有所見而行其所知於是一善當前幸人之莫我察也則趨焉而不決一不善當前幸人之莫或伺也則去之而不力幽獨之中情偽斯出所謂欺也惟夫君子者懼一善之不力則冥冥者有墮行一不善之不去則涓涓者無已時屋漏而懍如帝天方寸而堅如金石獨知之地愼之又愼此聖經之要領而後賢所切究者也自世儒以格致為外求而專力於知善知惡則愼獨之旨晦自世儒以獨體為內照而反昧乎即事即理則愼獨之旨愈晦要之明宜先乎誠非格致則愼亦失當心必麗於實非事物則獨將失守此入德之方不可不辨者也烹阿封即墨論夫人君者不能遍知天下事則不能不委任賢大夫大夫之賢否又不能遍知則不能不信諸左右然而左右之所譽或未必遂為藎臣左右之所毀或未必遂非良吏是則耳目不可寄於人豫奪尤須操於上也昔者齊威王嘗因左右之言而烹阿大夫封即墨大夫矣其事可略而論也自古庸臣在位其才蒞事則不足固寵則有餘易譏覆餗詩賡鵜梁言不稱也彼既自慙素餐而又重以貪鄙則不得不媚事君之左右左右亦樂其附已也而從而譽之譽之曰久君心亦移而位曰固而政曰非已則自矜人必效尤此阿大夫之所為可烹者也若夫賢臣在職往往有介介之節無赫赫之名不立異以徇物不違道以干時招之而不來麾之而不去在君側者雖欲極譽之而有所不得其或不合則不免毁之毁之而聽甚者削黜輕者督責於賢臣無損也其不聽君之明也社稷之福也於賢臣無益也然而賢臣之因毀而罷者常也賢臣之必不阿事左右以求取容者又常也此即墨大夫之所為可封者也夫惟聖人賞一人而天下勸刑一人而天下懲固不廢左右之言而昧兼聽之聰亦不盡信左右之言而失獨照之明夫是以刑賞悉歸於忠厚而用舍一本於公明也夫原才風俗之厚薄奚自乎自乎一二人之心之所嚮而已民之生庸弱者戢戢皆是也有一二賢且智者則衆人君之而受命焉尤智者所君尤衆焉此一二人者之心向義則衆人與之赴義一二人者之心向利則衆人與之赴利衆人所趨勢之所歸雖有大力莫之敢逆故曰撓萬物者莫疾乎風風俗之於人之心始乎微而終乎不可禦者也先王之治天下使賢者皆當路在勢其風民也皆以義故道一而俗同世教既衰所謂一二人者不盡在位彼其心之所嚮勢不能不騰為口説而播為聲氣而衆人者勢不能不聽命而蒸為習尚於是乎徒黨蔚起而一時之人才出焉有以仁義倡者其徒黨亦死仁義而不顧有以功利倡者其徒黨亦死功利而不返水流溼火就燥無感不讐所從來久矣今之君子之在勢者輒曰天下無才彼自尸於高明之地不克以己之所嚮轉移習俗而陶鑄一世之人而翻謝曰無才謂之不誣可乎否也十室之邑有好義之士其智足以移十人者必能拔十人中之尤者而材之其智足以移百人者必能拔百人中之尤者而材之然則轉移習俗而陶鑄一世之人非特處高明之地者然也凡一命以上皆與有責焉者也有國家者得吾説而存之則將愼擇與共天位之人士大夫得吾説而存之則將惴惴乎謹其心之所嚮恐一不當而壞風俗而賊人才循是為之數十年之後萬有一收其效者乎非所逆睹已召誨賢與不肖之等奚判乎視乎改過之勇怯以為差而已矣日月有食星有離次其在於人言有尤行有悔雖聖者不免改過什於人者賢亦什於人改過伯於人者賢亦伯於人尤賢者尤光明焉尤不肖者怙終焉而已人之生氣質不甚相遠也習而之善既君子矣其有過則其友直諫以匡之又有友焉巽言以挽之退有撻進有旌其相率而上達也奚禦焉習而之不善既小人矣其有過則多方文之為之友者疏之則心非而面諛戚之則依阿苟同憚於以正傷恩其相率而下達也奚禦焉茲賢者所以愈賢而不肖者愈不肖也吾之友有某君者毖余曰子與某相好不終是子之失德子盍愼諸又有某君毖余曰聞子之試於有司則嘗以私干人是大不可二子者之言卒聞之若不遜於吾志徐而繹之彼無求而進逆耳之言誠敬我也既又自省吾之過其大者視此或倍蓰而其多或不可枚數二子者蓋舉一隅也人苦不自知耳先王之道不明士大夫相與為一切苟且之行往往陷於大戾而僚友無出片言相質確者而其人自視恬然可幸無過且以仲尼之賢猶待學易以寡過而今曰無過欺人乎自欺乎自知有過而因護一時之失展轉蓋藏至蹈滔天之姦而不悔斯則小人之不可近者已為人友而隱忍和同長人之惡是又諧臣媚子之亞也書曰有言逆於女心必求諸道有言遜於女志必求諸非道余故筆之於册以備觀省且示吾友能為逆心之言者五針並序少不自立荏苒遂洎今茲蓋古人學成之年而吾碌碌尚如斯也不其戚矣繼是以往人事曰紛德慧曰損下流之赴抑又可知夫疢疾所以益智逸豫所以亡身僕以中才而履安順將欲刻苦而自振拔諒哉其難之歟作五針以自創云立志針煌煌先哲彼不猶人藐焉小子亦父母之身聰明福祿豫我者厚哉棄天而佚是及凶災積悔纍干其終也已往者不可追請從今始荷道以躬輿之以言一息尚存永矢弗諼居敬針天地定位二五胚胎鼎焉作配實曰三才儼恪齋明以凝女命女之不莊伐生戕性誰人可慢何事可弛弛事者無成慢人者反爾縱彼不反亦長吾驕人則下女天罰昭昭主靜針齋宿日觀天雞一鳴萬籟俱息但聞鐘聲後有毒蛇前有猛虎神定不懾誰敢豫侮豈伊避人曰對三軍我慮則一彼紛不紛馳騖半生曾不自主今其老矣殆擾擾以終古謹言針巧語悅人自擾其身間言送曰亦攪女神解人不誇誇者不解道聽塗説智笑愚駭駭者終明謂女賈欺笑者鄙女雖矢猶疑尤悔既叢銘以自攻銘而復蹈嗟女既耄有恆針自吾識字百歷及茲二十有八載則一無知曩者所欣閲時而鄙故者既拋新者旋徙德業之不常曰為物遷爾之再食曾未聞或愆黍黍之增久乃盈斗天君司命敢告馬走紀氏嘉言序士之修德砥行求安於心而已無欲而為善無畏而不為不善者此聖賢之徒中有所得而不惑者也自中智以下不自能完其性之分大抵不勸不趨不懲不改聖人者因而導之以禍福之故如此則吉不如此則凶咎使賢者由勉以幾安愚者懼罰而寡罪故易稱餘慶餘殃書戒惠逆影響先王所以利民其術至已自秦氏以力征得天下踵其後者率小役大弱飼強強橫之氣充塞而聖哲與姦宄同流轉於氣數之中或且理不勝氣善者不必福而不善者不必抵於禍於是浮屠氏者乃乘其間而為輪回因果之説其説雖積惡之人立悔則有莫大之善其不悛者雖死而有莫酷之刑民樂懺悔之易而痛其不經見之慘虐故懼而改行十四五焉今夫水無不下也而趵突泉激而上升火無不然也而鹽井遇物不焚燭至則滅彼其變也戾氣感而祥降順氣感而災生亦其變也君子之言福善禍淫猶稱水下火然也道其常者而已常者既立雖有百變不足以窮吾之説是故從乎天下之通理言之則吾儒之言不敝而浮屠為妄從乎後世之事變人心言之則浮屠警世之功與吾儒略同亦未可厚貶而概以不然屏之者也河間紀文達公博覽強識百家之書靡不辨其原而竟其歸所著閲微草堂筆記五種考獻徵文搜神志怪衆態畢具其大旨歸於勸善懲惡崇中國聖人流傳之至論亦不廢佛氏之説取愚民易入者委曲剖晰以聳其聽海以內幾家置一編矣宛平徐春泉大令好之尤篤擇其彌精而足以警世者別録一帙名曰紀氏嘉言其無關於勸懲者則皆闌而不入梓人畢役以授國藩讀焉世風曰漓無欲而為善無畏而不為不善者不可得已茍有術焉可以驅民於醇朴而稍遏其無等之欲豈非士大夫有世教之責者事哉今余盜食天祿曾不能絲毫補救於斯世斯民觀徐君之汲汲於此其使余增愧也武會試録序道光二十有七年秋九月武會試外圍既畢事兵部臣以內場考官請上命臣國藩偕臣王慶雲司其事伏念臣楚南下士至陋極愚仰荷聖慈逾格由翰林洊陟卿陪負乘之占夙夜兢惕復膺簡命承乏於茲益用廩廩如不克勝謹偕臣慶雲悉心核閲取士如額恭繕試録進呈御覽臣例得揚言簡端臣聞宋臣張舜民之言曰自古守邊選將未必專以攻戰為事要在精神折衝而已臣嘗深繹其言若廉藺在趙強秦不敢加兵魏尚守雲中胸奴不敢南牧及夫衛霍三明之徒亦威稜四際所在立功彼其名將之精神足以震懾萬里之外而人主之求將亦以精神感而召之所謂戰勝廟堂者也自唐宋以後招致將才不可必得乃按圖而索驥於是有武舉之科有武學之額有賜及第出身之目宋慶皇間定武舉以策為去留弓馬為高下祿利之途一開爪牙之士稍稍驤首元明以來循是不廢然上以名求下之人因襲是名而巧弋之其以弓馬得者不過挽強引重市井之粗材而以策試中者亦皆記録章句瑣瑣無用之學故論者謂人才之興不盡由於科目理固然也我朝定鼎以來威燀無外自虎賁宿衛八旗禁旅往往有熊羆不二心之臣肩比而鱗萃而各行省山澤猛士又羅之以科舉所以儲采干城之選至周且當顧循行既久向之所謂市井挽強記録無用者多亦儳乎其中而臣之所職又惟校此默寫孫吳之數行無由觀其內志外體與其進退翔舞之節而欲使韜鈐之材之必入於此不遺於彼臣誠不敢以自信獨念聖天子神武震爍臣等憑藉寵光亦足增長剛氣而以精神與多士相感召庶幾廉藺魏尚之輩或出於此區區之忱不勝至願傳曰同明相照同氣相求雖不能必志之而已錢港舦先生制藝序自吾有知識以來見鄉之老成夙學篤於文律者恆困頓無以自拔或終身不得當於行省有司之試而其所教之子若弟往往分沾餘技飛騰速化以去及吾來京師究詢四方魁桀特達之士其先世多亦不遇始謂不閟不亭不詘不信理則然矣既深求其故抑匪直爾也制藝試士既久陳篇舊句盜襲相仍有司者無以發覆而鉤奇則巧為命題以困之乖割乎經文釽析乎片語由是為文者有鉤聯之法有補斡之方有仰逼俯侵之患名目既繁科條曰密雖過百人之智窮十年之力猶不能洞悉其窾郤及其徹於心而調於手而齒已曰長少時英光鋭氣稍稍衰減矣而子若弟之濡染焉者自其未冠已別開簡易於纖仄曲徑之中使其才得以自騁故前者難而因者易勢固為之也豫與烏程錢君崙仙同舉進士同出江陰季公之門官詞曹也同居於僧舍使蜀中也先後同持文柄間出其尊甫港舦先生遺稿示豫又知兩家庭訓所歷之艱苦曲折同者十得八九而不合者蓋寡焉豫之蒙陋於家大人之學百不承一即崙仙文鳴一時視先生之孤詣覃思要亦不無少遜焉故敘先生之文而發其例於此庶使有衡文之責者知所措意也夫黃仙嶠前輩詩序古之君子所以自拔於人人者豈有他哉亦其器識有不可量度而已矣試之以富貴貧賤而漫焉不加喜戚臨之以大憂大辱而不易其常器之謂也智足以析天下之微芒明足以破一隅之固識之謂也器與識及之矣而施諸事業有不逮君子不深譏焉器識之不及而求小成於事業末矣事業之不及而求有當於語言文字抑又末矣故語言文字者古之君子所偶一涉焉而不齒諸有亡者也昔者嘗怪杜甫氏以彼其志量而勞一世以事詩篇追章琢句篤老而不休何其不自重惜若此及觀昌黎韓氏稱之則曰流落人間者太乙一豪芒而蘇氏亦曰此老詩外大有事在吾乃知杜氏之文字蘊於胸而未發者殆十倍於世之所傳而器識之深遠其可敬慕又十倍於文字也今之君子秋豪之榮華而以為喜秋豪之摧挫而以為慍舉一而遺二見寸而昧尺器識之不講事業之不問獨沾沾以從事於所謂詩者興旦而綴一字抵莫而不安毀齒而鉤研聲病頭童而不息以咿嚘蹇淺之語而視為鐘彝不朽之盛業亦見其惑已松滋黃仙嶠先生質直而洞豁泊然聲利之外觀察於滇南吏剔其姦民宣其隱於古人所謂器識事業者亦既近而有之間以其餘發為詩章又能棄故攬新約言豐義而先生曾不以自鳴退然若無以與於古者人之度量相越為閎為隘為謙為盈不可一二計也國藩既受而卒讀因為擇其尤善者得若干首俾録而存之世有終其身以治詩自名而志趣或未廣者觀先生此編亦將內慙而有以自擴也夫謝子湘文集序嗚呼士生今世欲有所撰述以庶幾古作者之義豈不難哉自束髮受書則有事舉子帖括之業有司者割截聖人之經語以試其能偏全虛實斷續鉤聯之際銖有律黍有程而又雜試以詩賦經義策論其為品目固已不勝其繁矣而一二才桀之士既挾羣藝以應有司之求又別進慕乎古之能文者以降其兼勝無已之心於是乎目欲並視耳欲四聽敝精而費曰終不能達於古人之庭者比比而是也古之為文者其神專有所之無有俗説龐言肴其意趣自有明以來制義家之治古文往往取左氏司馬遷班固韓愈之書繩以舉業之法為之點為之圓圍以賞異之為之乙為之鑯圍以識别之為之評注以顯之讀者囿於其中不復知點圍評乙之外別有所謂屬文之法也者雖勤劇一世猶不能以自拔故僕嘗謂末世學古之士一厄於試藝之繁多再厄於俗本評點之書此天下之公患也將不然哉將不然哉南豐謝君子湘與豫同歲舉於鄉又同登於禮部其羣藝見采於有司者固已趠絶與人人異自君之生豫嘗見聞而內敬之矣既殁而其弟出君所為古文示豫又知其志之可敬也蓋以流俗之墮於所謂一再厄者而以君之所得較之其為踰越可勝量哉於是為序而歸之因道其通患以慨夫末世承學之難焉朱愼甫遺書序瀏陽朱君文炢所為書曰易圖正旨者一卷曰五子見心録者二卷曰從學雜記一卷文集一卷嘉道之際學者承乾隆季年之流風襲為一種破碎之學辨物析名梳文櫛字刺經典一二字解説或至數千萬言繁稱雜引遊衍而不得所歸張已伐物專抵古人之隙或取孔孟書中心性仁義之文一切變更故訓而別創一義羣流利附堅不可易有宋諸儒周程張朱之書為世大詬間有涉於其説者則舉世相與笑譏唾辱以為彼博聞之不能亦逃之性理空虛之域以自蓋其鄙陋不肖者而已矣朱君自弱冠志學則已棄舉子業而惟有宋五子之求斷絶衆源歸命於一自六經之奧百氏雜家有用之言無不究索其終折衷於五子家貧負母渡湖招徒授學取其入以為養餋則獨腆身有飢色或勸以稍易其途從事於時世所謂辨物梳文櫛字之學者足以傾駴耳目植朋廣譽君笑曰吾於科目且棄而背之矣其又屑覬彼邪卒以不顧曰抱遺訓以自鐫其躬繩過無小克敬以裕暗然至死而不悔嗚呼君之於學其可謂篤志而不牽於衆好者矣惜其多有放佚如大易粹言春秋本義三傳備説諸篇今都不可見其僅存者又或闕殘難令完整其易圖正旨推闡九圖之義與德淸胡渭寶應王懋竑氏之論不合山居僻左不及盡睹當世通人成説小有岐異未為纇也豫既受讀終篇因頗為論定以詒鄉人知觀感焉歐陽生文集序乾隆之末桐城姚姬傳先生鼐善為古文辭慕效其鄉先輩方望溪侍郎之所為而受法於劉君大櫆及其世父編修君範三子既通儒碩望姚先生治其術益精歷城周永年書昌為之語曰天下之文章其在桐城乎由是學者多歸嚮桐城號桐城派猶前世所稱江西詩派者也姚先生晚而主鍾山書院講席門下箸籍者上元有管同異之梅曾亮伯言桐城有方東樹植之姚瑩石甫四人者稱為高第弟子各以所得傳授徒友往往不絶在桐城者有戴鈞衡存莊事植之久尤精力過絶人自以為守其邑先正之法禪之後進義無所讓也其不列弟子籍同時服膺有新城魯仕驥潔非宜興吳德旋仲倫潔非之甥為陳用光碩士碩士既師其舅又親受業姚先生之門鄉人化之多好文章碩士之羣從有陳學受藝叔陳溥廣敷而南豐又有吳嘉賓子序皆承潔非之風私淑於姚先生由是江西建昌有桐城之學仲倫與永福呂璜月滄交友月滄之鄉人有臨桂朱琦伯韓龍啓瑞翰臣馬平王錫振定甫皆步趨吳氏呂氏而益求廣其術於梅伯言由是桐城宗派流衍於廣西矣昔者國藩嘗怪姚先生典試湖南而吾鄉出其門者未聞相從以學文為事既而得巴陵吳敏樹南屛稱述其術篤好而不厭而武陵楊彝珍性農善化孫鼎臣芝房湘陰郭嵩燾伯琛漵浦舒燾伯魯亦以姚氏文家正軌違此則又何求最後得湘潭歐陽生生吾友歐陽兆熊小岑之子而受法於巴陵吳君湘陰郭君亦師事新城二陳其漸染者多其志趨嗜好舉天下之美無以易乎桐城姚氏者也當乾隆中葉海內魁儒畸士崇尚鴻博繁稱旁證考核一字纍數千言不能休別立幟志名曰漢學深擯有宋諸子義理之説以為不足復存其為文尤蕪雜寡要姚先生獨排衆議以為義理考據詞章三者不可偏廢必義理為質而後文有所附考據有所歸一編之內惟此尤兢兢當時孤立無助傳之五六十年近世學子稍稍誦其文承用其説道之廢興亦各有時其命也歟哉自洪楊倡亂東南荼毒鍾山石城昔時姚先生撰杖都講之所今為犬羊窟宅深固而不可拔桐城淪為異域既克而復失戴鈞衡全家殉難身亦歐血死矣余來建昌問新城南豐兵燹之餘百物蕩盡田荒不治蓬蒿沒人一二文士轉徙無所而廣西用兵九載羣盜猶洶洶驟不可爬梳龍君翰臣又物故獨吾鄉少安二三君子尚得優遊文學曲折以求合桐城之轍而舒燾前卒歐陽生亦以瘵死老者牽於人事或遭亂不得竟其學少者或中道夭殂四方多故求如姚先生之聰明早達太平壽考從容以躋於古之作者卒不可得然則業之成否又得謂之非命也耶歐陽生名勳字子和沒於咸豐五年三月年二十有幾其文若詩淸縝喜往復亦時有亂離之慨莊周云逃空虛者聞人足音跫然而喜而况昆弟親戚之謦咳其側者乎余之不聞桐城諸老之謦咳也久矣觀生之為則豈直足音而已故為之序以塞小岑之悲亦以見文章與世變相因俾後之人得以考覽焉孫芝房侍講芻論序咸豐九年三月善化孫芝房侍講鼎臣以書抵余建昌軍中寄所為芻論屬為裁定凡二十五篇曰論治者六論鹽者三論漕者三論幣者二論兵者三通論唐以來大政者七論明賦餉者一其首章追溯今曰之亂源深咎近世漢學家言用私意分別門戶其語絶痛明年四月復得芝房書則疾革告別之詞而芝房以三月死矣既為位而哭且以書告仁和邵君懿辰於是為敘諸簡首而歸諸其孤蓋古之學者無所謂經世之術也學禮焉而已周禮一經自體國經野以至酒漿門里市巫小繕稿天鳥蠱蟲各有專官察及纖悉吾讀杜元凱春秋釋例歎􅏀明之發凡仲尼之權衡萬變大率秉周之舊典故曰周禮盡在魯矣自司馬氏作史猥以禮書與封禪平準並列班范而下相沿不察唐杜佑纂通典言禮者居其泰半始得先王經世之遺意有宋張子朱子益崇闡之聖淸膺命巨儒輩出顧亭林氏著書以扶植禮教為己任江愼修氏纂禮書綱目洪纖畢舉而秦樹灃氏遂修五禮通考自天文地理軍政官制都萃其中旁綜九流細破無內國藩私獨宗之惜其食貨稍缺嘗欲集鹽漕賦稅國用之經別為一編傅於秦書之次非徒廣己於不可畔岸之域先聖制禮之體之無所不賅固如是也以世之多故握槧之不可以茍未及事事而齒髮固已衰矣往者漢陽劉傳瑩茮雲實究心漢學者之説而疾其單辭碎義輕笮宋賢間嘗語余學以反求諸心而已泛博胡為至有事於身與家與國則當一一詳核焉而求其是考諸室而市可行驗諸獨而衆可從又曰禮非考據不明學非心得不成國藩則大韙之以為知言者徒也未幾茮雲即世臨絶為先令處分後事一秉古禮國藩既銘其墓又為家傳粗道漢學得失主客之宜藏諸劉氏之祏君子之言也平則致和激則召爭辭氣之輕重積久則移易世風黨仇訟爭而不知所止曩者良知之説誠非無蔽必謂其釀晚明之禍則少過矣近者漢學之説誠非無蔽必謂其致粵賊之亂則少過矣芻論所考諸大政蓋與顧氏江氏秦氏之指為近彼數子者固漢學家所奉以為歸者也而芝房首篇譏之已甚其果有剖及毫釐千里者耶抑將憤夫一二巨人長德曲學阿世激極而一鳴耶芝房之志大而鋭進也與茮雲同其卒也寄書抵余以告永訣亦與茮雲同其自芻論外別有詩十卷文十一卷河防紀略四卷著書之多與茮雲異而其博觀而愼取則同其嫉夫以漢學標揭也亦同而立言少異余故稍附諍論以明不忍死友之義亦以見二子者之不竟其志非僅余之私痛也經史百家簡編序自六籍燔於秦火漢世掇拾殘遺徵諸儒能通其讀者支分節解於是有章句之學劉向父子勘書祕閣刊正脫誤稽合同異於是有校讐之學梁世劉協鍾嶸之徒品藻詩文褒貶前哲其後或以丹黃識別高下於是有評點之學三者皆文人所有事也前明以四書經藝取士我朝因之科場有勾股點句之例蓋猶古者章句之遺意試官評定甲乙用硃墨旌別其旁名曰圈點後人不察輒仿其法以塗抹古書大圈密點狼籍行間故章句者古人治經之盛業也而今專以施之時文圈點者科場時文之陋習也而今反以施之古書末流之遷變何可勝道惟校讐之學我朝獨為卓絶乾嘉間巨儒輩出講求音聲故訓校勘疑誤冰解的破度越前世矣咸豐十年余選經史百家之文都為一集又擇其尤者四十八首録為簡本以詒余弟沅甫沅甫重寫一册請余勘定乃稍以己意分別節次句絶而章乙之間亦釐正其謬誤評騭其精華雅與鄭並奏而得與失參見將使一家昆弟子姪啓發證明不復要塗人而強同也鳴原堂論文序常棣為燕兄弟之詩小宛為兄弟相戒以免禍之詩而皆以脊令起興蓋脊令之性最急其用情最切故常棣以喻急難之誼而小宛以喻征邁努力之忱余久困兵間溫甫沅浦兩弟之從軍其初皆因急難而來沅浦堅忍果摯遂成大功余用是獲免於戾因與沅弟常以暇逸相誡期於夙興夜寐無忝所生爰取兩詩脊令之旨名其堂曰鳴原堂云王船山遺書序王船山先生遺書同治四年十月刻竣凡三百二十二卷國藩校閲者禮記章句四十九卷張子正蒙注九卷讀通鑑論三十卷宋論十五卷四書易詩春秋諸經稗疏考異十四卷訂正訛脫百七十餘事軍中鮮暇不克細紬全編乃為序曰昔仲尼好語求仁而雅言執禮孟氏亦仁義並稱蓋聖王所以平物我之情而息天下之爭內之莫大於仁外之莫急於禮自孔孟在時老莊已鄙棄禮教楊墨之指不同而同於賊仁厥後衆流歧出載籍焚燒微言中絶人紀紊焉漢儒掇拾遺經小戴氏乃作記以存禮於什一又千餘年宋儒遠承墜緒橫渠張氏乃作正蒙以討論為仁之方船山先生注正蒙數萬言注禮記數十萬言幽以究民物之同原顯以綱維萬事弭世亂於未形其於古昔明體達用盈科後進之旨往往近之先生名夫之字而農以崇禎十五年舉於鄉目覩是時朝政刻核無親而士大夫又馳騖聲氣東林復社之徒樹黨伐仇頽俗曰敝故其書中黜申韓之術嫉朋黨之風長言三歎而未有已既一仕桂藩為行人司知事終不可為乃匿迹永郴衡邵之間終老於湘西之石船山聖淸大定訪求隱逸鴻博之士次第登進雖顧亭林李二曲輩之艱貞徵聘尚不絶於廬獨先生深閟固藏邈焉無與平生痛詆黨人標榜之習不欲身隱而文著來反脣之訕笑用是其身長遁其名寂寂其學亦竟不顯於世荒山敝榻終歲孶孶以求所謂育物之仁經邦之禮窮探極論千變而不離其宗曠百世不見知而無所於悔先生沒後巨儒迭興或攻良知捷獲之説或辨易圖之鑿或詳考名物訓詁音韻正詩集傳之疏或修補三禮時享之儀號為卓絶先生皆已發之於前與後賢若合符契雖其箸述太繁醇駁互見然固可謂博文約禮命世獨立之君子已道光十九年先生裔孫世全始刊刻百五十卷新化鄧顯鶴湘皋實主其事湘潭歐陽兆熊曉晴贊成之咸豐四年寇犯湘潭板毀於火同治初元吾弟國荃乃謀重刻而增益百七十二卷仍以歐陽君董其役南匯張文虎嘯山儀徵劉育嵩伯山等分任校讐庀局於安慶蕆事於金陵先生之書於是粗備後之學者有能秉心敬恕綜貫本末將亦不釋乎此也衡陽彭氏譜序吾少時讀家譜曾子十五世孫據以關內侯避王莾之亂南遷為南州諸曾之祖私怪據事迹不見於他書舊譜於何取徴後讀歐陽文忠公集見其答曾子固書亦以關內侯據為疑引史例以諷之乃知吾曾氏本據為始遷之祖相沿且千歲由來舊矣歐陽公譜牒之學號為精審然其所箸唐宰相世系表於巨族既推其本源出於某帝某王又歷敘漢世名賢如琅邪王氏已稱出周靈王子晉之後而又敘王吉王駿之系蘭陵蕭氏已稱出帝嚳之後而又敘蕭何望之之系相承不絶如屈伸指而數庭樹略無參稽猶豫之辭公嘗譏司馬遷不能闕疑後人又譏歐陽氏不善闕疑所謂目能見千里而不能自見其睫也君子愼度身世信諸心則蒙大難決大計而不懼未信諸心則雖坦途而不肯輕試其於臨文亦若是焉可耳衡陽彭雪琴侍郎以諸生從戎十有三載肅淸長江克名城以百計殕巨憝於金陵當其提挈飢軍出入鋒鏑誓不與此賊同戴三光天下稱為烈士及夫勳勞曰著朝廷授為安徽巡撫授為漕運總督皆屢疏固辭不拜退然若漆雕之內不自信卒不輕於一試又何愼也同治四五年間東南大定侍郎與其宗長老修訂彭氏家譜彭氏本貫江西之泰和至明世有曰聲揚者始遷於衡其後八傳曰步南者肇修譜牒我朝康熙中再修之道光十三年侍郎之考贈光祿君三修之及是四次修纂族之材俊子弟奮迹師中積功纍伐珥貂相望簪紱雲興皆著於録彭氏曰益光大矣其系表斷自聲揚公凡前世達人暨同姓異望之顯者別為一編不與本宗相淆蓋凜凜乎闕疑之誼云國藩之先世亦自江西遷居衡陽至明季更遷湘鄉而祠廟今尚在衡與彭氏擊柝相聞墟煙相接曩者不揆愚陋嘗慨然欲重訂家譜述其可知者而差其可疑者區為別録不求盡合於歐曾大儒但求慊於吾心久困兵間未遑執簡感侍郎急於先務故為之序以答其請因抒余之夙懷曰愼齋詩草序李生春甫余癸卯典試蜀中所得士也時生方少貌玉立文似韓慕廬翛然塵􅙟之表心賞之勗以讀書希古而別而生侍老親疾纍年不應禮部試丁未為百韻詩貽余余賦詩報之曰不見李生今四載我有情懷浩如海又曰汝曹報國好身手似我蹉跎已老醜思之抑勗之也庚戌春正月生入都來見遂成進士官翰林余大喜壬子夏散館改官刑部余重惜之生悒悒不自得余持節江西生以詩送行有惘然若失意既聞以同知之任滇中會天下多故久不得生消息不數年聞生官知府奉使徵餉遇賊不屈死矣余大慟淚如雨下其門人韓西舫孝廉以生滇中詩集並毀於賊􅊧羅散佚得十之五由吳春海太史寄余屬為序余何言烏呼天賦生以穎異之資復豫生以淸華之選其待生不可謂不厚乃乍豫之而乍奪之使之鬱伊無憀激而為一官萬里之行夫以生之才中外皆可自效使天益其年以富其學其建樹當可想見即其詩之所詣當不僅若此然死者人所不免犯敵捐軀與老死牖下其輕重固自有別而絶不意生之死之慘毒如是且並其詩殉之亦零落無存而僅僅掇拾於風霜兵燹之餘也悲夫回憶癸卯識生後以詩倡酬而今已矣莊叟曰身非女有此天地之委形也生既浩然長往矣何有於身後之名然則余為生悲並悲及生之詩亦達士之所笑也雖然莊論達矣而亦未盡也如生忠魂英魄歷劫不化當如睢陽為厲以殺賊非泯泯以沒者况夫朝廷恤之門人思之有增秩之文有延世之賞有遺集之刻以永其傳均有身盡而我不與之俱盡者在生亦可以含笑九京也夫國朝先正事略序余嘗以大淸達人傑士超越古初而紀述闕如用為歎憾道光之末聞嘉興錢衎石給事儀吉仿明焦竑獻徵録為國朝徵獻録因屬給事從子應溥寫其目録得將相大臣循良忠節儒林文苑等凡八百餘人積二三百卷借名人之碑傳存名人之事迹自別京師久從征役而此目録册者不可復睹同治初又得鄢陵蘇源生文集具述其師錢給事於徵獻録之外復節録名臣為先正事略於是知錢氏頗有造述不僅鈔纂諸家之文矣又二年而得吾鄉李元度次靑所箸先正事略命名乃適與錢氏相合前此二百餘年未有成書近三十年中錢氏編摩於汴水次靑成業於湖湘斯足徵通儒意趣之同抑地下達人傑士其靈爽不可終閟也自古英哲非常之君往往得人鼎盛若漢之武帝唐之文皇宋之仁宗元之世祖明之孝宗其時皆異材勃起俊彥雲屯焜耀簡編然考其流風所被率不過數十年而止惟周之文王暨我聖祖仁皇帝乃閲數百載而風流未沫周自后稷十五世集大成於文王而成康以洎東周多士濟濟皆若秉文王之德我朝六祖一宗集大成於康熙而雍乾以後英賢輩出皆若沐聖祖之教此在愚氓亦似知之其所以然者雖大智莫能名也聖祖嘗自言年十七八時讀書過勞至於咯血而不肯少休老耄而手不釋卷臨摹名家手卷多至萬餘寫寺廟扁榜多至千餘蓋雖寒畯不能方其專北征度漠南巡治河雖卒役不能踰其勞祈雨禱疾步行天壇並醢醬􅐽鹽而不御年逾六十猶扶病而力行之凡前聖所稱至德純行殆無一而不備上而天象地輿曆算音樂考禮行師刑律農政下至射御醫藥奇門壬遁滿蒙西域外洋之文書字母殆無一而不通且無一不創立新法別啓津途後來高才絶藝終莫能出其範圍然則雍乾嘉道纍葉之才雖謂皆聖祖教育而成誰曰不然今上皇帝嗣位大統中興雖去康熙益遠矣而將帥之乘運會立勳名者多出一時章句之儒則亦未始非聖祖餘澤陶冶於無窮也如次靑者蓋亦章句之儒從事戎行咸豐甲寅乙卯之際與國藩患難相依備嘗艱險厥後自領一隊轉戰數年軍每失利輒以公義糾劾罷職論者或咎國藩執法過當亦頗咎次靑在軍偏好文學奪治兵之日力有如莊生所譏挾策而亡羊者久之中外大臣數薦次靑緩急可倚國藩亦草疏密陳李元度下筆千言兼人之才臣昔彈劾太嚴至今內疚惟朝廷量豫褎省當時雖為吏議所格天子終右之起家復任黔南軍事師比有功超拜雲南按察使而是書亦於黔中告成聖祖有言曰學貴初有決定不移之志中有勇猛精進之心末有堅貞永固之力次靑提兵四省屢蹶仍振所謂貞固者非邪發憤箸書鴻編立就亦云勇猛矣願益以貞固之道持之尋訪錢氏遺書參訂修補矜練歲年愼褒貶於錙銖酌羣言而取衷終成聖淸巨典上躋周家雅頌誓誥之林不尤足壯矣哉重刻茗柯文編序武進張大令式曾將重刻其曾祖王父皋聞先生茗柯文集而以寫本示余屬為之序蓋文章之變多矣高才者好異不已往往造為瑰瑋奇麗之辭倣效漢人賦頌繁聲僻字號為復古曾無才力氣勢以驅使之有若附贅懸疣施膠漆於深衣之上但覺其不類耳敘述朋舊狀其事迹動稱卓絶若合古來名德至行備於一身譬之畫師寫真衆美畢具偉則偉矣而於其所圖之人固不肖也吾嘗執此以衡近世之文能免於二者之譏實鮮蹈之者多矣皋聞先生編次七十家賦評量殿最不失銖黍自為賦亦恢閎絶麗至其他文則空明澄徹不復以博奧自高平生師友多超特不世之才而下筆稱述適如其量若帝天神鬼之監臨褒譏不敢少溢何其愼歟自考據家之道既昌説經者專宗漢儒厭薄宋世義理心性等語甚者詆毀洛閩披索疵瑕枝之搜而忘其本流之逐而遺其源臨文則繁徵博引考一字辨一物纍數千萬言不能休名曰漢學前者自矜創獲後者附和偏詖而不知返君子病之先生求陰陽消息於易虞氏求前聖制作於禮鄭氏辨説文之諧聲剖晰毫芒固亦循漢學之軌轍而虛衷研究絶無陵駕先賢之意萌於至隱文辭溫潤亦無考證辨駮之風盡取古人之長而退然若無一長可恃意其藴蓄者厚遏而蔽之能焉而不伐斂焉而愈光殆天下之神勇古之所謂大雅者歟張氏之先兩世賢母撫孤課讀一日不能再食舉家習為故常孝友艱苦遠近歎慕自粵賊縱橫東南麋爛常潤等郡室廬蕩然張氏之窮約殆有甚於疇昔書籍刻板皆摧燒不復可詰矣余昔讀張氏諸書既欽其篤行茲重覽茗柯文編樂其復顯於世也乃忘其陋而序之湖南文徵序吾友湘潭羅君研生以所編饌湖南文徵百九十卷示余而屬為序其端國藩陋甚齒又益衰奚足以語文事竊聞古之文初無所謂法也易書詩儀禮春秋諸經其體勢聲色曾無一字相襲即周秦諸子亦各自成體持此衡彼畫然若金玉與卉木之不同類是烏有所謂法者後人本不能文強取古人所造而摹擬之於是有合有離而法不法名焉若其不俟摹擬人心各具自然之文約有二端曰理曰情二者人人之所固有就吾所知之理而筆諸書而傳諸世稱吾愛惡悲愈之情而綴辭以達之若剖肺肝而陳簡策斯皆自然之文性情敦厚者類能為之而淺深工拙則相去十百千萬而未始有極自羣經而外百家箸述率有偏勝以理勝者多闡幽造極之語而其弊或激宕失中以情勝者多悱惻感人之言而其弊常豐縟而寡實自東漢至隋文人秀士大抵義不孤行辭多儷語即議大政考大禮亦每綴以排比之句間以婀娜之聲歷唐代而不改雖韓李鋭志復古而不能革舉世駢體之風此皆習於情韻者類也宋興既久歐陽曾王之徒崇奉韓公以為不遷之宗適會其時大儒迭起相與上探鄒魯研討微言羣士慕效類皆法韓氏之氣體以闡明性道自元明至聖朝康雍之間風會略同非是不足與於斯文之末此皆習於義理者類也乾隆以來鴻生碩彥稍厭舊聞別啓塗軌遠搜漢儒之學因有所謂考據之文一字之音訓一物之制度辨論動至數千言曩所稱義理之文淡遠簡朴者或屏棄之以為空疏不足道此又習俗趨嚮之一變已湖南之為邦北枕大江南薄五嶺西接黔蜀羣苗所萃蓋亦山國荒僻之亞然周之末屈原出於其間離騷諸篤為後世言情韻者所祖逮乎宋世周子復生於斯作太極圖説通書為後世言義理者所祖兩賢者皆前無師承創立高文上與詩經周易同風下而百代逸才舉莫能越其範圍而况湖湘後進沾被流風者乎茲編所録精於理者蓋十之六善言情者約十之四而駢體亦頗有甄采不言法而法未始或紊惟考據之文搜集極少前哲之倡導不宏後世之欣慕亦寡研生之學稽説文以究達詁箋禹貢以晰地志固亦深明考據家之説而論文但崇體要不尚繁稱博引取其長而不溺其偏其猶君子愼於擇術之道歟雲槳山人詩序代季師作自韓愈氏有言歡愈之詞難工窮苦之音易好歐陽公效之亦稱詩必窮而後工後之論者大率祖述其説以謂宮音和溫難於聳聽商音悽厲易以感人故盛世之巨公其詩歌往往不及衰世之孤臣逐客而廟堂卿相例不能與窮巷憔悴專一之士角文藝之短長數十年來人人相與持是説而不變所從來久已芝昌嘗究觀詩教之終始竊獨以為未必然也鄭氏所撰三百篇譜大氐成周盛時賢人有位之作為多東遷以降王迹既熄詩亦替矣西漢蘇李東漢班張號為能詩亦當兩京全盛之日李唐之世詞人百輩纍迹而興然世所稱為四唐者雖愚者亦知有初盛而貶中晚蓋聲音之道與政相通國家鼎隆之日太和充塞庶物恬愈故文人之氣盈而聲亦上騰反是則其氣歉而聲亦從而下殺達者之氣盈矣而志能斂而之內則其聲可以薄無際而感鬼神窮者之氣既歉而志不克劃然而自申則甕牖窮老而不得一篇之工亦常有之然則謂盛世之詩不敵衰季卿相不敵窮巷之士是二者殆皆未為篤論已吾師長白宮保相國光輔聖主二十餘年智深而量遠果決而間定暇日以所為詩二册見示芝昌受而讀之簡肅淸夷不名一能篇帙不繁而行役之作扈從之章生平政迹略備於斯抑有詩史之遺意其於六朝唐宋諸家若合衆金以融一冶而鑄為重器觀者但知器之良而忘其所采為誰氏之金也於時皇淸承平已二百祀重熙纍洽遐邇禔安跂行喙息之倫莫不茹仁踐義時會可謂極隆而吾師入總百揆出領三輔門生故吏吐哺延接天憲出內曹司白事手批口答曰以百計而乃從容揮斥時從事於吟咏若行所無事者才分之優絀什百千萬如此其遠也觀吾師所際之時與夫詩之所詣而後知曩之宗韓歐之説者亦所謂察其一未睹其二者哉讀既竟因附陳微義識於簡端用質知言者焉道光二十有七年九月某日門人季芝昌謹序錢選制藝序乘椎輪於金根玉輅之旁夫人以為陋矣服草衣卉服於衮冕繡裳之朝夫人以為悖矣甚哉時之不可已也泥橇而山樏夏葛而冬裘適時則貴失時則捐昔馮唐終身不遇而曰文帝好老而臣尚少武帝好少而臣已老豈曰非材如不遇時何矧夫習制藝以弋取科名而有不附聲比貌求合時宜者乎雖然趨時之道豈一端哉天下之事其始蓋有一二巧者標新領異以駴羣聽其次則能者慕效之又其次則拙者剽竊之慕而效之是謂風氣剽而竊之是謂流弊不數十年而昔之新且異者將厭棄矣則又有巧者移易之又數十年而亦厭棄矣人情賤同而思異物窮則變自古然也故善趨時者貴先時不貴後時場屋之文何獨不然國家以制藝取士二百年來為體屢遷乾隆嘉慶之際學者研鍊經義負聲振采醲郁葩華道光初年稍患文勝詞豐而義寡梔蠟其外而塗泥其中者往往而有於是有志者慨然思以易之刊其支蔓矯以淸真當其始出若撥霧而見山厭肥膩而飮太羹也而今已二十年矣諺曰城中好高髻四方高一尺城中好廣眉四方成半額自往者標為淸真之目近乃頗事佻巧拋棄詩書或一挑半剔以為顯排句疊調以為徑抑之無實揚之無聲所謂歷久而厭棄者其不然乎所謂物窮則變者其將在茲乎善趨時者當以此時振翱翔之骨發鏗訇之響鎔經史而鑄偉詞揆以好異之人情驗以將變之風氣吾知其必有合也僕不敏嘗欲采近科墨彙為一帙以為趨時者先聲之導人事滋劇卒鮮休暇同年錢君崙仙頃出茲編見示揀新汰弊先得我心茍有能者慕效則風氣從此移易錢君其巧者與抑吾又有説焉風氣者必變者也而規矩者不變者也今夫斫木為輿軫方以象地蓋圓以象天可規可萭可水可縣可量可權而後出而合轍深衣之制袂圓以應規曲夾如矩以應方兼以應直應平而後非奇衰之服制藝之有規矩先輩蓋詳言之錢君此選奇正濃淡不名一能要其引繩削墨其有悖於前人之程式者鮮矣苟舍是而別求先時之巧是猶行遠者有説輻之占製錦者之不得要領也將可乎哉送郭筠仙南歸序凡物之驟為之而遽成焉者其器小也物之一覽而易盡者其中無有也郭君筠仙與余友九年矣即之也溫挹之常不盡道光甲辰乙巳兩試於禮部留京師主於余促膝而語者四百餘日乃得盡窺其藏甚哉人不易知也將別於是為道其深附於回路贈言之義而以吾之忠效焉蓋天之生材或相千萬要於成器以適世用而已材之小者視尤小者則優矣茍尤小者琢之成器而小者不利於用則君子取其尤小者焉材之大者視尤大者則絀矣茍尤大者不利於用而大者琢之成器則君子取其大者焉天賦大始人作成物傳曰人不天不因天不人不成不極擴充追琢之能雖有周公之才終棄而已矣余所友天下賢士或以德稱或以藝顯類有以自成者而若筠仙躬絶異之姿退然深貶語其德若無可名學古人之文章入焉既深而其外猶若鉏鋙而不安其無所成者與匠石斫方寸之木斤之削之不移瞬而成物矣及乎裁徑尺之材以為榱桷不閲曰而成矣及至伐連抱之楩楠為天子營總章太室之梁棟經旬纍月而不得成焉其器愈大就之愈艱淺者欲以一概律之難矣且所號為賢者謂其絶拘攣之見曠觀於廣大之區而不以尺寸繩人者也若夫逢世之技智足以與時物相發力足以與機勢相會此則衆人之所共覩者矣君子則不然赴勢甚鈍取道甚迂德不茍成業不茍名艱勤錯忤遲久而後進銖而積寸而纍既其純熟則聖人之徒其力造焉而無扞格則亦不失於令名造之不力歧出無範雖有瓌質終亦無用孟子曰五穀不熟不如荑稗誠哉斯言也筠仙勗哉去其所謂扞格者以蘄至於純熟則幾矣人亦病不為耳若夫自揣既熟而或不達於時軌是則非余之所敢知也送謝吉人之宫江左序吾湘鄉當乾隆時人才殷盛鄧筆山為雲南布政使羅九峯為禮部侍郎而謝薌泉先生為御史三人者皆起家翰林而御史君名震天下是時和珅柄國聲張勢厲家奴乘高車橫行都市無所憚御史君巡城遇焉捽之出而鞭之火其車於衢世所稱燒車御史者也其後二十餘年御史君之子果堂以河南縣令卓薦召見上從容問曰汝即燒車御史之子乎不數月遷四川知府又十餘年而謝吉人邦鑑復以進士出為江南縣令吉人御史君之孫而知府君之弟之子也將之官其常所酬酢者或為詩送之吉人乃索豫為序而乞言以糾其不逮於是拜手告曰子今長人矣四封之內尊無與二堂上頤指堂下趨者百人所識窮乏仰而待命設館以延賓友貌敬而情離即有不善彼所謂趨者待命者貌敬者或知之而不諫或諫焉而不力吾以其身巍然處於衆人之上而聰明識量又誠越而倍之前有唯後有諾於是豫聖自雄之習囂然起矣而左右之人又多其術以餂我內之傲者曰勝外之欺者曰衆茲其所以舛也昔者宓子賤治單父孔子曰子何施而衆悅對曰此地民有賢於不齊者五人不齊事之而稟度焉皆教不齊所以治人之道孔子歎曰其大者乃於此乎有矣魯使樂正子為政孟子曰好善優於天下東漢龐參為漢陽太守先候隱居任棠棠不與言但以薤一大本水一盂置戶屏前抱兒孫伏戶下參會其意曰水者欲吾淸也拔大本薤欲吾擊強宗也抱兒當戶欲吾開門恤孤也故古人之學莫大乎求賢以自輔小智之夫矜己而貶物以為衆人卑卑無足益我夫不反求諸己而一切掩他人之長而蔑視之何其易與詩曰國雖靡止或聖或否民雖靡膴或哲或謀或肅或乂謂求賢而終不能得者非篤論也今震澤宰左君靑峙吾湘鄉之賢者也任俠而不矜諳事而不計利害子往試求之必有所以益子者友仁以礪德利器以善事既以上繩祖武又以紹諸鄉先輩之徽無棄爾輔員于爾輻靑峙子之輔也抑吾聞江南為仕宦鱗萃之邦或因靑峙而得盡交其賢士大夫是尤余所望也送周荇農南歸序天地之數以奇而生以偶而成一則生兩兩則還歸於一一奇一偶互為其用是以無息焉物無獨必有對太極生兩儀倍之為四象重之為八卦此一生兩之説也兩之所該分而為三殽而為萬萬則幾於息矣物不可以終息故還歸於一天地絪縕萬物化醇男女搆精萬物化生此兩而致於一之説也一者陽之變兩者陰之化故曰一奇一偶者天地之用也文字之道何獨不然六籍尚已自漢以來為文者莫善於司馬遷遷之文其積句也皆奇而義必相輔氣不孤伸彼有偶焉者存焉其他善者班固則毗於用偶韓愈則毗於用奇蔡雍范蔚宗以下如潘陸沈任等比者皆師班氏者也茅坤所稱八家皆師韓氏者也傳相祖述源遠而流益分判然若白黑之不類於是刺議互興尊丹者非素而六朝隋唐以來駢偶之文亦已久王而將厭宋代諸子乃承其敝而倡為韓氏之文而蘇氏遂稱曰文起八代之衰非直其才之足以相勝物窮則變理固然也豪傑之士所見類不甚遠韓氏有言孔子必用墨子墨子必用孔子不相用不足為孔墨由是言之彼其於班氏相師而不相非明矣耳食者不察遂附此而抹摋一切又其言多根六經頗為知道者所取故古文之名獨尊而駢偶之文乃屏而不得與於其列數百千年無敢易其説者所從來遠矣國家承平奕􅥴列聖修禮右文碩學鴻儒往往多有康熙雍正之間魏禧汪琬薑宸英方苞之屬號為古文專家而方氏最為無纇純皇帝武功文德一邁古初徵鴻博以考藝開四庫館以招延賢俊天下翕然為浩博稽核之學薄先輩之空言為文務閎麗胡天遊邵齊燾孔廣森洪亮吉之徒蔚然四起是時郎中姚鼐息影金陵私淑方氏如碩果之不食可謂自得者也沿及今曰方姚之流風稍稍興起求如天遊齊燾輩閎麗之文闃然無復有存者矣間者吾鄉人淩君玉垣孫君鼎臣周君壽昌乃頗從事於此而周君為之尤可喜其才雅贍有餘地而奇趣迭生蓋幾於能者夫適王都者或道晉或道齊要於達而巳司馬遷文家之王都也如周君之所道進而不已則且達於班氏而不為韓氏所非又不已則王都矣周君以道光乙巳成進士選翰林院庶吉士值皇太后萬壽天子大孝錫類臣下得榮其親將奉誥命以歸覲出所為文示余余乃略述文家原委明奇偶互用之道假贈言之義以為同志者勗嗟乎區區而以文字相討論是則余之陋而不賢者識小之類也送陳岱雲出守吉安序道光二十五年十一月曰長至翰林編修茶陵陳君奉命出守吉安明曰入謝上曰禮官章上汝妻與請旌表有諸即頓首敬謝臣源兖妻蒙恩旌表孝行其可旌奈何則隱約情事具對十一上嘉歎所以尉敕良厚陳君出涕泣告人天子乃能省源兖家事源兖何以報先是陳君嘗大病妻易安人傾死力營救最後刲臂和藥飮君君病瘳而安人遘疾又數月而生子子生彌月而安人卒余昔銘其墓所稱憂勞積劇焉可支者也既歸喪陳君之母語其親戚曰是善事我又有功陳氏先祖語鄉人亦如之鄉人上其行有司以達於禮官禮官章上不數曰而陳君有吉安之命於是陳君益不自克且曰吾有君親殊恩妻又貰我死吾負三不報其何以酬向人輒吁歎曰夜嗛然內疚亡何將出國門國藩乃進而稱曰子之方寸幾矣抑未知所持也夫忠孝者每事而迹之則曰不勝要惟行吾心之不得已者斯可矣民之初蓋有不忍於其所生先王制為事親之禮溫凊而定省疾則嘗藥諫則號泣因人之情而為文達之其於事君也亦然父母者育我天者先父母而生我君者後天而成我者也有不忍忘本於父母者而後愛身以及子姓有不忍忘本於天者而後愛吾君以及人民庶物故入而供弟子之職出而力王家勤民事非直好為觀美內有所激發不得已而為之者也先王之教既熄人不能自道於道乃始慕名號而從事其中則漠無所動滫􅔱以養親而非必中有所愛踧踖以覲君而非必中有所敬及其居官朝令曰編保甲夕令曰興水利復常平擇名號尤美者而張之漫不省其所以然外之標識如彼內而隳壞如此故名目者所以喪人之良心而墮凡事也仲尼曰人而不仁如禮何言本心既亡不堪以文為塗附之也賢者思以易之獨宜求諸心之不得已者耳盜賊公行不得巳而立保甲旱潦飢饉不得已而興水利常平行之不合不得已而思亟思亟問必盡善而後已鍥而不舍靡物不斷古有刲臂療病而立應者彼迫於無可如何其神固已深入金石矣今或浮慕奇行而以號於衆曰吾將效刲肉故事要名之念熾於中責效之情流於外則臨事必不為為之且不應然則子欲上不負君親下不愧令妻可以知所從事矣吾辱相知重他無可言者至離合之故則別繫以詩送唐先生南歸序古者道一化行自卿大夫之弟子與凡民之秀皆上之人置師以教之於鄉有州長黨正之儔於國有師氏保氏天子既兼君師之任其所擇大抵皆道藝兩優教尊而禮嚴弟子摳衣趨隅進退必愼內以有所憚而生其敬外緝業以興其材故曰師道立而善人多此之謂也周衰教澤不下流仲尼干諸侯不見用退而講學於洙泗之間從之遊者如市師門之盛振古無儔然自是人倫之中別有所謂先生徒衆者非長民者所得與聞矣仲尼既沒徒人分布四方轉相流衍吾家宗聖公傳之子思盂子號為正宗其他或離道而專趨於藝商瞿授易於馯臂子弓五傳而為漢之田何子夏之詩五傳而至孫卿其後為魯申培左氏受春秋八傳而至張蒼是以兩漢經生各有淵源源遠流歧所得漸纖道亦少裂焉有宋程子朱子出紹孔氏之絶學門徒之繁擬於鄒魯反之躬行實踐以究羣經要旨博求萬物之理以尊聞而行知數百千人粲乎彬彬故言藝則漢師為勤言道則宋師為大其説允矣元明及我朝之初流風未墜每一先生出則有徒黨景附雖不必束修自上亦循循隅坐應唯敬對若金許嶭胡陸稼書張念芝之儔論乎其德則暗然諷乎其言則犂然而當理考乎其從遊之徒則踐規蹈矩儀型鄉國蓋先王之教澤得以僅僅不斬頑夫有所忌而發其廉恥者未始非諸先生講學與羣從附和之力也詩曰風雨如晦雞鳴不巳誠珍之也今之世自鄉試禮部試舉主而外無復所謂師者間有一二高才之士鉤稽故訓動稱漢京聞老成倡為義理之學者則罵譏唾侮後生欲從事於此進無師友之援退犯萬衆之嘲亦遂卻焉吾鄉善化唐先生三十而志洛閩之學特立獨行詬譏而不悔歲庚子以方伯內召為太常卿吾黨之士三數人者曰就而考德問業雖以國藩之不才亦且為義理所薰蒸而確然知大間之不可踰未知於古之求益者何如然以視夫世之貌敬舉主與厭薄老成而沾沾一得自矜者吾知免矣丙午二月先生致仕得請將歸老於湖湘之間故作師説一首以識年來嚮道之由且以告吾鄉之人茍有志於強立未有不嚴於事長之禮而可以成德者也送江小帆同年視學湖北序今天下郡縣牧民之吏大抵以刑強齊之耳任蚩蚩者自為啄息喜怒一不顧問至其犯法小者桎梏大者棄市豪強者漏網弱者糜爛苟以掩耳目而止原國家所以立法之意豈爾爾哉蓋亦欲守土者曰教民以孝弟仁義之經不率而後刑之其率教而有文者則以進於學使者而登之庠序既登之矣則以授於校官而常飭之故古者飮射讀法在今曰則守令之職而今之學政也者不過因文藝以別羣士之優劣因士之優劣以知守令教民之勤惰故巡撫者天子所使以察守土者餋民之善與否也學政者天子所使以察守土者教民之善與否也承平既久法意寖失郡縣有司不知三物為何事而教民之任獨以責之學政與校官而所謂校官者類多衰疾晚暮之徒其祿不足自贍往往與學宮弟子爭錐刀之末不特不克助宣教化或轉餂言以蔽學政之耳目彼學政者孤懸客寄於一行省之中守土者皆貌敬而神拒之曰憊精於文字而角機智於千百詭弊之場而欲以餘力教民以仁義孝弟之經其不亦難矣哉然則如之何而可弊之除也先其甚者利之興也先其易者其可矣自功利之説中於膏肓學者求速化之方束髮而敝精於制藝窮老而不休六經至不能舉其篇目何有於他書今欲稍返積習莫若使之姑置制藝而從事經史奬一二博通之士以風其餘於覆名扃試之外別求旁搜廣采之術凡郡縣莫不有書院大率廩給其才者而絀其不能者名曰膏火所以濟學校之不及也學政下車之始則牒各縣令曰明年吾視某縣學當以某經試士能背誦否某史試士能言否其為我播告偏隅咸使知之牒校官曰吾按臨之始每縣當選諸生草人説書有不至惟女罰及其按郡招諸生來前果使背誦某經説某史某卷大指能誦説者豫以書院之廩資尤能者倍之三之尤能者牒送省會之書院亦倍其廩資其不能者廩生削其餼附生懲辱之每縣試以三四人則餘者懼矣自六經外如史漢莊騷説文水經文選宋五子及杜韓歐蘇曾王專集之屬每縣使習一部焉歲試使習者科試則易之覆名試以制藝以彰朝廷之公令面試説書以鳴使者之私好二者並行而不悖皆善矣則拔而貢之成均使彼邦之人曉然知吾好博通之才庶幾由文以溯本舉一以勸百然後孝弟仁義之教可以漸而興也乘傳所徑之地有書院焉則入而詔諸生以大義彼邦有搢紳多聞者則禮而薦之為郡縣書院之長於是其亦可以樹之風聲矣同年友江君小帆之視湖北學也所以講求職思者甚備余乃別思一搜采之術無啓弊之竇而有補教之旌者於是以戔戔之説進焉送劉君椒雲南歸序聖人之異於衆人者安在乎耳目口鼻心知百體皆得其職而已矣天之生夫人也耳職聽而目職視口體職言動心職思非所聽而濫焉非所視而淫焉於官為不法可以視窮者而吾弗能盡焉可以聽達者而吾弗能盡焉於官為不稱其於口體心思也亦然不稱者才絀不法者知而姦之罪又甚焉聖人者不軌不耳不度不目其自一室之米鹽推而極於天下之大鬼神之幽離於人倫殽於萬事凡視聽所宜晰無不晰凡言動所宜審無不審凡心思所宜條理無不條而理之使夫一身得職而天地萬物各安其分以位以育以效吾之官司所謂踐形者也周公之所以為周公孔子之所以為孔子其不以此也哉今之君子之為學者吾惑焉耳無真受衆耳之所傾亦傾之目無真悅衆目之所注亦注之姦視而回聽言不道而動不端無過而非焉者曹好所在而不之趨焉則不相賓異矣為考據之説者曰古之人古之人如此則幾彼則否為詞章之説者曰古之人古之人如此則幾彼則否起一強有力者之手口羣數十百人蟻而附之朝記而暮誦課迹而責音竭己之耳目心思以承奉人之意氣曾不數紀風會一變蕩然澌滅又將有他説者出為羣意氣之所會則又焦神悴力而趨之鈞是五官百骸也不踐聖人之形而逐衆人之好疲一世以奔命於庸夫之毀譽竟死而不悔可謂大愚不靈者也漢陽劉君椒雲湛深而敦厚非其視不視非其聽不聽內志外體一準於法矣而所以擴充官骸之用又將推極知識博綜百氏以求竟乎其量余猶懼其敝身心以役於衆好也於其別也書是以貞之然余固亦頗涉前二説者之流而奔命於衆好之場者又因以自砭焉易問齋之母壽詩序古者以言相贈處至六朝唐人朋知分隔為餞送詩動纍卷帙於是別為序以冠其端昌黎韓氏為此體尤繁間或無詩而徒有序於義為已乖矣元明以來始有所謂壽序者夫人之生飢食而渴飮積曰而成年苟不已必且增至六十七十又不已則至大耋期頤彼特纍曰較多耳非有絶特不可幾之理也胡序之云而為此體者又率稱功頌德纍牘不休無書而名曰序無故而諛人以言是皆文體之詭不可不辨也道光乙巳六月為易柳恭人七十誕辰嗣君問齋郎中徵求士大夫之詩至數十篇而屬余為序其簡端問齋其能辨文體者矣余讀諸君詩知恭人事贈君先生豈非所謂代有終者哉初先生以長且賢理家事無劇易必躬占畢之業稍棄矣恭人來歸一代任焉米鹽淩雜不復關白先生由是得專精舉子業嘉慶戊午舉於鄉戊辰遂成進士蓋內顧無憂一志以底於成恭人之力也先生官陜西恭人以舅姑春秋高留侍養不隨之官所既而太夫人就養秦中恭人又留治家務既而先生移官山東恭人仍留里居計先生宦遊三十餘年而恭人僅一入秦再之山東之郯不過三年耳婦人類以從官為榮鄉里齷齪不足自適一旦朱幩翟茀稱為命婦入則鼎食出則武夫前呼侍女如雲此常情所最稱意恭人恬然不以為榮獨習勞居僻鄉為先生經畫家政敗袽敝革儲以待用甘粗糲以自菲歲時親戚承問無缺藥餌餘糧全活貧弱下戶躬操作以率先子婦此其識有過人者以視擁象輿以命婦自炫頤使侍婢俯仰如神者其賢否當有辨也詩人之祝女子曰無非無儀易此而以才能自詡則於道為悖矣如恭人者所事不出閨闥所行不越庸德獨其相夫以發名成業而不慕從官之榮此有人所難能而其他蓋可知矣余故揭其大者著於篇若其稱述懿行頌禱繁祉則諸君之詩實詳故不及云陳岱雲太守為母生曰宴集賓僚詩序易曰雷出地奮先王以作樂崇德蓋古者雖有艱大厄塞聖人窮力畢精削除荒纇人心夷悅而後作樂以宣幽滯譬若春雷奮發而秋冬之沈痼蔽塞於地中固已久矣故曰患難所以開聖憂勞所以興國古之通義也至夫賢逹之起卿大夫之家莫不以然其初類有非常之撼頓顚蹶戰兢僅而得全疢疾生其德術荼蘖堅其筋骨是故安而思危樂而不荒如彼其自克也豈偶然哉茶陵陳岱雲太守成童而喪父事無巨細一操於母劉太恭人家故微也又多奇閔藥醫不絶於室期功之喪不絶於門椸無縷盎無儲者數數然也方太守就傅於外天盛寒家惟二衾一實以棉一單衾耳太恭人不忍子以窶凍為人所詬強以棉衾豫太守而自以單衾擁二幼子太守不忍母寒而已獨溫則虛衾而終不御太恭人亦終不以酷窮而令子廢學居無何太守以進士通籍為翰林而家之艱於謀食如故而太恭人之勤約自刻亦如故道光二十四五年天子以海氛初靖亟思振興吏治以修內而攘外特簡近臣以守要郡乙巳仲冬太守用是有吉安之命明年量移廣信於是祿入稍豐寖寖怡裕矣其年十一月為太恭人六十生曰太守開閣觴客韻以絲竹本省之僚屬所部之士民與他邦之客遊茲土者凡若干人為詩歌上壽者凡若干篇乃書抵京師屬國藩序之夫陽不可盈樂不可極故禮主靜而樂主反勝則流矣太守思前者慈母支持之艱與今者天子簡用之重將必有穆然深念者是則承歡之大者歟唐鏡海先生七十生曰同人寄懷詩序善化唐太常先生以道光丙午致仕還湘明年年七十矣五月七曰實初度之辰六安吳君廷棟始為寄懷詩略寓詩人戩穀俾臧之義既而師宗竇君垿及某君某君皆踵為之凡得詩若干首大抵惜繼見之不可常頌長者之多祉先生之姊子黃君兆麟與其弟倬命國藩為之序竊嘗觀古之君子其載德而荷道者必有人焉帥而掖之而後後者有所階而進必有人焉輔而翼之而後前者有所託而傳水非水而不續人非人而不承蓋桐鄉張考夫先生之興則有凌渝安何商隱沈石長諸子為之附太倉陸道威先生之起則有盛聖傳陳確菴江藥園諸子為之與二先生之為道至寂寞也而諸子者相從於太羹元音之際殆於遁世不見稱而無怨彼各有其志爾唐先生之內召為太常卿也以道光庚子僦屋於內城之西南分聽事四之一為讀書之室袤得周尺之步廣半步耳自國藩之修候或月一至或再三至未嘗不見先生手一編危坐其中它人見者亦然此所謂寂寞者非邪民之情好聲利而惡淡泊淺者趨死祿仕深者博文多藝獵取浮譽亦足以降其好勝之私先生為外吏二十年蕭然無資積以自存既當世之所謂迂闊而其為學也又惟自治其身心之急或不沾沾於文藝之短長以故士之騖才技而競聲稱者亦罕過而勤焉而吳竇諸君子獨相尋於淡泊究道而考德夙參而莫造既其違離而作為詩歌以抒懷想斯豈曩者凌渝安何商隱及沈盛陳江之疇邪何其篤也自明代以來年齒至五十以上則人多為詩以祝之諛媚殆於亡等又有所謂壽序者余昔書歸有光文集已痛詆其陋其他則又不足譏今諸君子既舍聲利而別有所尚而其為詩又約旨斂辭頌無溢量豈不本末並茂不與人人同科者哉於是畢讀而序之世有達於文體之君子庶終覽焉朱心垣先生五十六壽序於余為兄弟行結交最少久而彌摯者屈指無幾人也則有若朱嘯山富春於余為父執又早器余余愛慕而不敢侮者亦無幾人也則有若姻伯心垣先生嘯山為先生冡嗣其交余也先生實令之也先是先生與家嚴君同學互相掖重兩家世好既篤重之以婚姻故余知先生特詳前歲丙申先生年五十嘯山謀稱觴乞余以言侑爵先生曰是何為者傳曰恆言不稱老今吾方託堂上之蔭將不以禮處我乎抑以諛詞誣我乎且古者下壽六十今吾猶未也固請不獲又數年嘯山舉於鄉偕余北上從容謂曰吾父所以固辭頌禱者善則歸親義不得專也今吾欲丐子文為寒門作家慶圖使吾父上有以承祖父母歡下有以自娛而即以為吾父壽可乎余曰可昔董召南隱居孝義昌黎韓子為詩紀其事姚氏三瑞堂世以孝稱東坡亦作詩美之今君欲以娛重闈者娛其親是孝子等而上之之義也賢哉吾不能以詩壽先生請覼陳君家天倫之樂以娛先生之志今夫科名宦達豈以寵身亦借以顯揚之資也先生以第一人補弟子員再躓場屋遂棄舉業其天懷恬淡視靑紫不值一吷耳乃其督課子姪則鋭意進取惟恐後時討論史事旁及制藝書學皆得窾卻而勗以法度在先生豈徒欲弋取時榮哉不過欲博膝下之歡使老人聞之曰阿孫才今試已列前茅矣阿孫能可以與賢書選矣因而鼓舞後進怡然忘老此其可娛者一也君家田園足以自給先生周視原野物土之宜稻粱之外雜蒔嘉蔬種秫二頃穫以釀酒名曰延齡殺雞佐之但以奉親不以勸客有餘則度置焉門外方塘廣可百畝旁置小艇宜釣宜網當春種魚秋則取之以強半供甘旨其他則請所與子姓醉飽波及羣下其可娛者又一也君家早歲頗有外侮自先生綜家政敬宗收族袒免以下一視同仁閭里細民強梗者鋤之不肖者勸之貧無告者周恤之竭力之所勝而不德焉比來一境怗然曩時箕舌之怨雀角之爭皆以潛消而高堂暮齒亦得晏安無患其可娛者又一也抑聞之夫妻好合兄弟既翕父母其順矣先生早占炊臼續以鸞膠不聞有遇虐後母之事非刑于之道乎方鳳台先生之以計偕入都也先生曰豫弟行役不可以勞門閭之望丈夫何憚萬里哉乃杖策送弟北征而衛以俱返不賢而能之乎邇年以來弟姪能文者先生為之延師課讀肄武者為之料量魚服竹閉之具使之皆得成名以故牀第之間秩如也昆弟翼翼如也寢門之內欣欣如也此甚可娛者一也又先生熟於形家之言往為大母卜佳城備極勞瘁終乃永臧今腰腳尚健暇則陟層嶺披蒙茸裹糧而從一奚遊覽既審歸而告於堂上曰某水某山大人所經歷也有佳兆當貴至徹侯某宅某田大人所釣弋之所也居之後必昌因與指畫形勢兼誦撼龍疑龍之經而堂上亦傾聽不倦或佯諾之微笑其幻渺此亦可娛之一端也夫天倫之樂豈有形哉曰用優遊之地行之而不著習矣而不察道路傳為盛談或油然興感而當境者行其心之所安視為固有而不足怪以先生之德之遇凡所謂可以自娛即以娛親者皆已自得之而自忘之不知此中真樂雖三公不足以易也卻老延年之道有進於此者乎嘯山歸述吾言酌而祝焉可也嘯山拜曰善遂書以為之序田崑圃先生六十壽序道光某年月為我年伯崑圃先生六十初度其嗣君敬堂同年丐余以文為壽且曰古者稱壽不必攬揆之辰壽人以序抑非古也然震川歸氏望溪方氏嘗為之是或有道焉余曰然壽序者猶昔之贈序云爾贈言之義粗者論事精者明道旌其所已能而蘄其所未至是故稱人之善而識小以遺巨不明也溢而飾之不信也述先德而過其實是不以君子之道事其親者也為人友而不相勗以君子者不忠也今子所以壽親者於意云何敬堂曰吾父固好質言凡生平庸行衆人所恆稱道者不足為君述吾父早歲以課徒為業迄今幾四十年嘗曰孰師鹵莽塞責誤人子弟不淺吾不敢也戊戌雨公幸成進士選庶常吾父書來戒以初登仕版勿輕干人於戲安得此有道之言乎蓋自秦氏燔羣籍教澤蕩然漢武帝始立五經於學宮使諸生各崇本師置博士舉明經而聖言乃絶而復續明太祖以制藝取士並立程朱之義使天下翕然尊尚而聖賢之精蘊始照灼於幽明二君者蓋見夫學校之不可復故定為功令使人以此為祿利之徒而陰以崇儒術而闡大義由今言之明聖道於煨燼之餘而炳若曰星表宋儒之精理使僻陬下士皆得聞道者不得不歸功於二君然使人人以詩書為干澤之具援飾經術而蕩棄廉恥者又未始非二君有以啓之也今世之士自束髮受書即以干祿為鵠惴惴焉恐不媚悅於主司得矣又挾其術以釣譽而徼福祿利無盡境則干人無窮期下以此求上以此應學者以此學教者以此教所從來久矣百步之矢視其所發差若毫釐謬以千里振古君子多塗未有不自不干人始者也小人亦多塗未有不自干人始者也今先生之誡子首在不輕干人則平曰之立教所謂不誤人子弟者概可知矣出處取與之間士大夫或置焉不講而鄉里老師耆儒往往以教其家繩其門徒吾父課徒山中亦有年所每戒小子輒曰儉約者不求人與先生辭旨略同而吾黨郭君雨三亦得父訓以成名當交相毖勉力求所以自立者以圖無忝所生不然先生不欲誤人子弟而吾輩一離膝下乃反自誤其身曰愒月玩委棄而不克自振終且不免於干人也吾言不足以重先生而猶不敢諛詞欺吾友是或為先生之所許乎敢以為長者壽朱玉聲先生七十三壽序天可補海可填南山可移日月既往不可復追其過如駟其去如矢雖有大智神勇莫可誰何夸父之追魯陽之揮戈陶士行之惜陰有以哉有以哉余與朱堯階以道光十年論交於長沙當時相見恨晚曾幾須臾遂閲一終一屋終矣前歲戊戌余乞假旋里值玉聲先生七十誕辰堯階以壽親之文見屬余欣然不辭遷延未報一諾三年甚哉光陰之遷流如此其足畏也人固可自暇逸哉以余玩愒時曰有言不踐學問不加進而堯階不務顯揚之實徒欲以祝史徽言娛親志二者均非先生之所許也何足以為先生壽雖然吾與堯階交舊矣不可不略抒固陋表先生之暗修以徵其所以延齡之由以卜將來無量之祜以慰吾堯階以勗吾堯階也蓋先生則可謂不自暇逸者矣先生少失怙既冠又失恃家成貧破屋數椽兄弟謀析産先生以其稍完者付諸昆而指其隙地一弓自豫去之賈不數年致千金已而散去又如是又散去屢裕屢絀晏如也先生有嫂早寡窮不能自存乃為之謀生計撫孤兒終節婦之世無衣食慮復出資為之表其節聞於有司與其大母並建總坊尤慷慨好義宗族中有不能自贍者佽之心給有沒不能終葬具者周之必無缺禮子姪有遊惰無常職者掖之培之視其材必俾有成他如聯族譜建支祠治祖塋置祭産凡事關本原之大者經之營之有廢必舉有初必終故其所以屢絀者人皆知之為其急公也為其義也其所以屢裕者人或不知傳曰民生在勤勤則不匱先生之所為常致充盈綽綽有餘者勤而已矣不自暇逸而已矣計自少壯以洎今曰拮據飄搖幾無虛曰今夫天恢恢大圓終古磨旋今夫山終古常峙海終古常流其盛大而生物不測由其不二不二故不息不息故久夫人也亦若是焉矣守其朴者完其素勞其力者貞而固戶樞不敝磨鐵不蝕胥是道也以先生之不自暇逸而得康強逢吉又何疑乎又何疑乎余與堯階相友以心相砭以道義今堯階幸得啜菽飮水承歡膝下而余一官匏繫既不能拾遺補闕有絲毫裨益於時又不能歸侍晨昏又不得奉板輿以迎養余自是有羈旋之感矣風有陟岵之章雅有四牡之什皆以行役在外眷懷門閭孔子曰父母之年不可不知也願吾堯階佩玦管調滑甘愛光陰如拱璧舞綵服如嬰兒由是而後先生樂孫曾之蕃昌欣琴瑟之靜好耄耋期頤怡然忘老則堯階庶不負讀書之志不忝於盛德大業耳君子進德修業欲及時也時乎時乎事親者可或忽乎此所以勗堯階以慰堯階而即以為先生壽者爾王翰城刺史五十壽序古無生日之禮顔氏家訓稱江南風俗是日有供頓聲樂蓋此禮始於齊梁之間後世自貴逮賤無不崇飾開筵稱壽習以為典癸卯夏王君翰城將出牧冀寧即於是秋五十壽辰同人或謀祝之翰城曰非古也其友人曾國藩亦曰非古也雖然子將別矣不可無以贈子蓋古者四十而仕五十服官政服政云者為大夫以長人布政得自專也古者建官無穴立法無繁故任人靡不專而事靡不理後世天下之事萃於六曹六曹之屬無慮千計法令日密吏胥便之每事至吏以意討例官則睨吏意以行吏頤使則官可之吏目止則官否之屬官所左卿長亦左之事無定見惟衆之隨故近日服官得專政者內惟樞府外惟牧令樞府數人或意見各歧則得專者尤莫如牧令也牧令朝行一政朝及於民福民則我實福之也殃民則我實殃之也然牧令或不賢往往不自為政上則伺大府之喜怒下則時胥徒之向背雖欲自專而有所不能翰城讀書四十餘年今以服政之日為天子之刺史吾知其能自專矣夫為刺史而得自專而不為大府與胥徒箝制者豈徒然哉其殆必有所以矣翰城勉乎哉他日聞有供頓聲樂躋堂而稱壽者必天子所付託刺史之百姓也子行矣吾以是贈即以為祝焉王蔭之之母夀序壽序非古也明歸太僕數鄙之而數為之以為崑山之俗張此尤盛閭巷之士狃於習而不求其説立言者雖知其事微薄而不忍拒孝養者之請牽率以從事宜也當是時吾同年王君蔭之以其母黃太安人之壽屬豫為序云蔭之知言者也不宜循世俗故事以娛其親仲尼曰麻冕禮也今也純儉吾從衆積習染人甚於丹靑久矣雖為父母者亦皆以生日為慶以文字道其生平為祥人子因而順之不亦可乎先是贈君琴雅先生之棄養蔭之與其仲氏皆未冠季尚毁齒耳內而饘粥零雜外而官租私逋皆太安人榷畫之贈君以諾名鄉里宿負故無劵主者以是弛責太安人曰夫子信者也是固然無疑立貨別業盡償之贈君疾革命曰雖飢寒母令吾兒廢學家故微也又歲經水潦益流落太安人力支之卒不令諸子遷業初服舅姑之服繼服夫之服哀毁至矣皆節以禮喪女子者四喪子婦者五悲傷之餘亦以禮裁之蓋蔭之之為余述者如此易曰地道無成而代有終方贈君顧命諄諄豈必後嗣果自成立今蔭之通籍為天子近臣文意爾雅率諸弟子姓為醇朴之學所謂代終非邪國家以大器儲詞臣不殽之以吏事使之優遊成德以餋公輔之望至深厚也以國藩之不肖謬廁斯任無足言矣如蔭之者要當博觀約守仔肩天下而後無忝是職不然彼太安人時時稱贈君之末命以相申警者豈徒在祿仕通顯也哉歐陽公之母常述父訓以教子卒為有宋名臣彼何人也吾何畏彼哉蔭之誠能曰進不怠太安人當益顧之適志怡然忘老矣余承蔭之之命終不敢以世俗之義為長者誦也於是為道其大焉者江小帆之母壽序古者設科有目如漢曰賢良方正曰直言極諫曰軍謀宏遠曰淳厚質直唐曰秀才曰明經曰進士曰明法曰明字曰明算若此者不一其稱惟人主之所欲而因時命名所謂目也明初盡革前制取士止進士一科則有科而無目矣既成進士天子親策於廷臨軒唱第分甲授職一甲止三人曰狀元榜眼探花制所定也士大夫稱為鼎甲云進取之途既隘天下魁傑瑰瑋之士莫不甘心於專科扼腕以求所謂鼎甲者而巴蜀滇黔西南萬里或數百年而不得一人蓋其難也慈父母之於子總角則祝之而令子順孫承歡堂上亦無先於此者至於今五百年矣同年友江君小帆故吾楚郴人也徙居四川之大竹道光戊戌以第三人及第四川之鼎甲自小帆始而小帆退然貶抑匔匔不足問之曰母教也余曰何如則盡述太安人之賢及贈君春湖先生之德而再誦焉且曰吾母今年六十矣吾子嫻古文義法其為我銓次太安人懿行略仿今世之壽敘而益以針言勗余使吾母歡慰而吾亦奉以為事親之則可乎余曰可蓋江氏之自楚而蜀家微矣贈君之與昆弟析居僅受田三畝耳而折償宿負者略半贈君力貧績學授讀鄉里稍佐饔飱太安人蒔蔬藝菽以精潔羞舅姑而以其惡者自御小帆兒時嘗隨太安人鋤豆於北原抬木棉於西澗之陂每語此未嘗不太息祿餋之已晚也嘉慶庚申辛酉之間四川遭教匪之亂鄉鄰依堡寨以居賊來恃堡為固賊去還家事耕作太安人提挈子女裹糗糧與贈君奔竄於風雨溪谷之中其事尤艱阻卒以無恐小帆既官編修太安人就餋京師而贈君道卒長安哀毀之餘毫髮盡禮與前服舅姑之服略同計太安人數十年中困於貧厄於兵顚沛於喪事而亦以勞矣傳所謂動心忍性生於憂患其不信然邪士大夫由科第通籍大抵先人茹其辛而後人食其報如小帆之掇取巍科三持文衡以詞賦受聖主特達之知豈可不知其所自邪自古舉士之法未有三百年不變者帝不沿樂王不襲禮物窮則易固其理也經義取士亦已久矣議者多謂帖括道卑難收得人之效小帆勉旃益務通經達用使天下後世謂偉人某某者未嘗不出制義之科也既以塞辨者之口又有以慰高堂無窮之望事親之則不當如是乎太安人聞之其必不訾吾言矣遂書以為壽何傅巖先生七十壽序國藩讀詩至常棣之篇而歎曰旨哉仁人之言也朋友平居宴樂有急則掉臂不顧兄弟天性也非至不仁可以手足而胡越乎同年友何君丹溪官編修其兄璜溪官武昌同知兄弟相敬愛至篤無已他曰余謂丹溪曰子之親未耄也二君者皆不迎養於義謂何則告曰吾大父母之棄養吾父七齡耳實依兩世父以生世父長曰晴瀾次曰雲巖吾父曰傅巖事兩兄維虔謀必咨出必告有財必歸之有疾侍藥必躬至以身禱雲巖世父下世事寡嫂尤恭今吾父母之不肯就餋官所徒以長兄寡嫂在耳余聞之悚然當吾世而猶有嚴於弟道如此者乎又二年而所謂長兄寡嫂者相繼逝璜溪執期之喪既除因卓薦入見天子遂乞假南歸躬迎二親養於武昌官舍又明年丙午春為傅巖先生及張太恭人七十誕辰同年生謀所以壽者屬余為頌禱之言丹溪曰子母效世俗人世俗所為壽序至陋而非古子但略述吾親實行使吾昆弟子姓有所法而向善而吾親亦將顧而忘老足矣勿虛諛也余曰子之親云何曰吾父年十八補縣學生嘉慶癸酉以選拔貢入成均凡試於鄉十六役不得售異時苗匪寇鄰縣世父率鄉勇出堵賊吾父守城書檄調遣胥出一手事平縣令暨監司適主鄉試闈事欲因以私報力謝之教人以立品敦倫為先前後從遊千餘人課徒所得餘金則盡刊印世所傳感應篇注案者以勸愚民吾母以不逮事舅姑為恨事夫之兄如嚴上事姒婦如姑蓋體吾父友恭之誠如此古者大功同財自秦人子壯出分後世沿以為俗兄弟有視如塗人者矣而為之婦者伺其夫之旨而加刻焉片語之隙荆棘叢生纍世不能泯其嫌夫一木之枝或榮或悴常也而常人之情睹他人之榮則以為分隔於已無與睹兄弟之榮以其切近則相妬相妬則爭而榮者之視悴者漠然而疏望望焉若將浼已蓋三物之教不行而俗之偷也久矣先生以次子嗣仲兄後顧不肯隨二子之官終不令己獨榮而兄與寡嫂獨落莫此其足以激薄俗為何如而其用心之仁厚豈有極哉余為揭其大者俾璜溪兄弟守此無怠則先生與太恭人所以娛老者或亦在此即以為長者壽可也郭璧齋先生六十壽序莊子曰木以不材自全雁以材自保我其處材不材之間乎旨哉斯言可以壽世矣雖然抑有未盡也此其中有天焉魁岸之材有深自韜匿者去健羡識止足天乃使之馳驅後先殫精竭力而不能自怡有鋭意進取者天或反厄之使之蓄其光采以昌其後而永其年迹似厄之實則厚之材鈞也或顯而吝或晦而光非人所能自處也天也我年伯璧齋先生天之處之殆厚矣哉先生少讀書有大志既冠補博士弟子員旋以優等食餼屢躓場屋貢入成均試京兆仍絀權當陽校官數月儒術濟濟翕然景從其居鄉也外和而中直不惡而人畏之優伶雜劇至不敢入境諺曰桃李無言下自成蹊直其表而影曲者吾未之聞也先生孝友可以施於政尊行可以加人課徒而得與校而士慕附處于鄉而不肖知勸此天豫以有用之材也使得所藉手舞長褎而回旋其展布當何如顧乃蹭蹬棘闈連不得志前歲乙未恭遇覃恩臣僚得榮其親維時先生之冢嗣觀亭前輩既由翰林官西曹兩世封贈如例而先生猶以有事秋試遷延不得請於是先生橐筆鄉闈十餘役矣從遊之士得其口講指畫或皆扶搖直上而觀亭前輩昆仲皆得庭訓而翔步詞林後先輝映獨先生黜抑良久曾不一騁騏驥之足固可解乎夫以先生之德之能於科名何與輕重其達觀內外何嘗不晲靑紫如粳粃然終不自畫誠欲有所白於時而又惡夫庸庸者一蹶而不復振乃借恬退之名以文陋而售其巧故思有以厲之耳以志則如彼以遇則如此此豈盡有司之咎哉蓋所謂天也天者可知而不可知無可據而自有權衡昆山之玉鄧林之大木生非不材也貢之廊廟非不貴也鑿之琢之尋斧縱之剖其璞傷其本向之潤澤而輪囷者蕩然無餘天欲厚之則不如韞於石而光愈遠叢之豐草之中而蔭愈廣而枝愈蕃向使先生假鴻漸之羽激昂雲路􅏡歷中外詎不快於志而裨益於時而所發既宏所積漸薄天與於前或靳於後精神有時而竭福蔭有時而單是亦琢玉斫木之説也謂能優遊林泉頤神彌性如今曰也乎謂能澤流似續光大門閥如今曰也乎本年某月先生六十壽辰次嗣君雨山與余為同年友謬相知愛將稱觴介壽屬余以言侑爵吾聞君子之事親也可以無所不至獨稱其親之善則不敢溢詞以鄰於誣君子之於友也可以無所不至道揚世德則不敢虛述以近於諛余悉先生嘉言篤行稔矣今欲敷陳盛美頌禱龐祺深懼其諛也故不具論第論天之生材此豐彼嗇大有權衡以徵先生所以延年受祉之由亦使觀亭前輩昆仲知今曰之蜚聲騰實其鬱積者有自非一朝一夕之故也欽念哉欽念哉小子竊祿於朝蓋吾父之溷迹名場撼頓不得伸亦有年矣持是以思則先生之緝熙純嘏天之厚之正未有艾耳質之先生或以斯言為不謬耶金殿珊先生六十壽序往余讀韓退之符讀書城南詩私怪彼不以聖賢之道教子而誘之以公卿祿位何其陋也既伏思之古今之所以設科取士何為也哉豈不欲得明先王忠孝之道而力行之者與之共天位乎道莫備於羣經故漢唐重明經之選而明及我朝皆以經義試士操其文以劵其行庶幾忠孝之彥之或出乎此是上之人法固未嘗不良而意固未嘗不美即為人父母者冀其子以文行上達於朝廷斯亦天理人情之至然則退之之志其亦未可深譏矣世衰而俗敝應舉者不揆君公求士之本義茍以獵取浮榮少壯而違父母之餋窮老而不歸耽耽於王畿勢要之場未仕則發憤忘家既仕則迎妻子與共安樂而父母以衰晚之年與子婦幼孫曠隔音書闊疏享封誥之虛名受枯寂寒飢之實禍雖疾病厄苦不忍告聞以恐其子而為子者冥然不以介懷方藉口於趙苞賊母溫嶠絶裾之義夫彼既恝棄其親尚何有於君國本先撥矣國家亦安貴此喪失良知之人而歲舉數千百輩以糜無窮之祿糈哉故吾嘗曰朝廷以忠孝求士未為失而士之應之大相悖也父母以仕宦望子未為失而子之於親大相悖也噫此豈細故也哉吾鄉金殿珊先生官翰林十載宦況絶迫隘力貧節用歲寄少資以佐甘旨既奉父諱哀毁滅性服闋矣依母徐太恭人不復欲仕久之嗣君可亭侍講舉於鄉徐太恭人強先生攜子北上乃朴被獨行留賢配楊恭人養姑維謹道光戊戌可亭以第二人及第先生曰兒輩幸有立吾親老矣即告餋歸與其弟承歡左右晷刻不離於戲先生其可謂無負朝廷之求無忝父母之所期者矣歲丁未為先生六十壽辰先歲可亭以陜甘學使任滿受代乃書告國藩曰僕將以瓜代之際乞假省親幸蒙天子錫類之恩得捧誥軸歸獻堂上吾父母誕辰洗爵上壽子若敘述吾意使吾親歡娛而盡釂貺莫大焉乃別紙述先生官侍御直聲震世家居訓課生徒周恤族黨恭人歉歲購婢賑窮豐歲擇配遣之諸善行甚悉余都不具論獨著其拳拳愛親之意俾可亭守此而不失使吾鄉後進應舉之士知舍此則悖乎朝廷之本義雖得之不足為榮庶以救末俗之偷而國藩守官八年不克歸侍晨昏又以志余之抱慚而不能自克也先生及恭人聞之儻肯為盡一觴乎黃矩卿師之父母壽序國家歲值大慶必推恩羣下褎及所生而吾師昆明少司馬黃公以乙巳覃恩得封我太公通奉大夫太母太夫人越二年丁未太公夀八十太母亦七十有四是歲春初天子以海內淸晏太和翔洽必有人瑞以潤色休嘉詔問一二品大臣有親年八十以上者有司以聞於是協揆濰縣陳公司馬江寧何公倉場侍郎新城陳公之母司空濱州杜公之父及吾師之父母並以遐齡上徹天聽賚勞有差其三月為太公攬揆之辰黃公稱觴京邸以揚家慶而銘君恩門下士相與言曰陳何諸公僅有母杜公僅有父因其所慶或觸所恤獨吾師以名儒位九列而二親大年賓敬不衰計德度祉當世無雙吾輩宜以文紀其盛且遙致私忱於太公若鞠􅎽奉斚者乃以諉國藩國藩伏思自宋景濂以壽文入集厥後踵為之者大抵甄敘行能終以諛頌雖以歸有光方苞之博通不能洗此陋習夫無故而敘述人之生平事迹與無故而貢人以譽二者皆達於文者之所譏也惟因事而致其敬相與為辭以示不忘則古多有之其為辭也貴約而韻質而不蔓君子尚焉吾師自總角以逮服官一秉庭訓其初入學則督之以討源之功先本而後華及視學四川無曰不面戒之弊孔之難塞士之十拔而虞一失官京朝無時不寓書而申警之富貴之靡常職思之不可須臾隕故吾師仕卿二而不驕年五十而恂恂有弟子之色未始非庭闈警敕之所致也今太公太母巋然為天下大老親見其子為聖主所毗道德文章冠冕人倫其娛樂蓋可度而知而吾輩出門下者獨托其教子之大節為之祝詞以託於因事致敬之義此固吾師所深願諒亦太公所許而不甚斁者巳於是及門各獻祝辭而國藩為之唱且為序之詩曰我皇膺運膏流滂溥誕降醇耆龐眉俁俁實育公孤陳何與杜維我黃公有恃有怙怙也園綺恃則孟桓帝褎厥德天露有漙春回南詔曰永長安仙醞三爵僚寀同歡文小南之父七十生日壽詩序道光二十有七年五月上旬為衡山荻堂文先生七十生日嗣君小南以農部入贊樞垣先二歲迎養京師至期將觴賓於邸第以博堂上一曰之歡於是鄉之人官輦下者各為詩篇以致頌禱奚斯歌魯麥邱獻齊幼之祝長與下之祝上其誼一也既成册以授國藩而屬序焉竊嘗維人之所以久視於世大端有二一者所踐甚厚居能移氣傳所稱取精多用物宏亦自足延歷歲年彼得之天焉者也一者履孝蹈友至行純備其精力不使敝於亡等之欲其惠氣所迓亦自以貞於永久此古守身之君子所從事者也外是二者則滔滔凡民天下皆是貿焉以生懵焉以長積曰既多亦不得不謂之修齡要之無譏焉耳先生總角孤露公私赤立非自營不得晏食非自憤不得就學其所踐之不厚而不克一曰為貿焉以生之凡民亦可知矣先生茹艱漬苦痛繩於學奉母之教事有命雖大不濡過有敕雖細不二既而餼於學官貢於成均母王太宜人每告人曰吾寡居四十年所堪報地下者有子克家耳方贈君琴臺翁之棄養先生甫四歲有弟二齡耳先生既績學發名而弟鬱悒不得伸又以脫略損資産及其逝也先生盡償其責恤其嫠而再以已子嗣焉由此觀之所謂履孝蹈友至行純備者非邪洪範曰不協於極不罹於咎皇則受之曰豫攸好德女則錫之福如先生之孝友純備豈直不協吉不罹咎之謂哉殆所稱好德而宜錫以福者矣然則先生迪嘉離祉而小南之食報無涯又何疑哉國藩固亦凡民之貿焉生懵焉長者因緣際遇忽不自知所踐之巳厚塵埃擾擾敝精從欲每覩先生之容未嘗不內恧而興企也故於鄉人之為祝詩輒為推明致此之由又以卜方來享年之未有屆為序其略如此亦別為詩以附於後詩曰昔我婦翁衡之歐陽屢道先生宜表宜坊我來曰下實交哲嗣修謁長者淵乎玉粹強圉之歲星煥南弧下爥蘭戺朗映中樞大斗分頌衆賓醉止各摛祝辭用介繁祉何母廖夫人八十生曰詩序道光二十有七年六月上旬吾鄉道州何母廖夫人八十生辰宮太保文安公之良配也先期鄉之人語國藩曰子夙陋明季文士遇人生曰輒以諛詞相溷為不達於屬文之律既聞其説矣竊聞古者因事致敬則相與為辭以篤不忘魯侯作閟宮奚斯有頌晉獻文子成室張老有禱施之少者有冠禮三加之辭施之老者有祝鯁祝噎之誼及敦彝款識亦往往祈以永命萬年蓋前以表德音後以敕方來詩人之教也今太和翔洽人瑞蕃臻而夫人以淳朴之德克享遐齡鄉之人相與作為祝辭託諸因事致敬之義不亦可乎國藩曰其可雖然君子於其所尊敬不敢為溢量之語故詩人戩穀俾臧諸篇其稱之也質其祈願也無奢今吾人欲託茲義則摛辭之斂侈可勿審諸蓋夫人之歸何氏家微也文安公陋巷孤貧貿力以食晝而授徒宵而自繩於學春而出長至而不歸家中有無一委夫人夫人綴畸緝斷公私井井厚其親以及其所愛無或不豐堅忍其身以及其子無或不嗇嘗攣生二子越三曰而襁兒出汲即子貞編修與其仲弟也又嘗負兒入山採薪竹萌拂左目迄亦廢視艱窮之境殆非人履而夫人泰然無不自得逮文安公及第以命服迎之入都而守約帥初不變既而公位尚書天子倚如柱石屢司文柄門下士且盈干編修昆季先後列甲乙科諸孫蔚然興矣而夫人卒帥初不變非布衣不御非粗糲不甘蓋余得之見聞者如此夫稱述艱難以慰膺者而飭無窮君子之義也貢人以諛而辰溢志亦非君子所宜出也以文安公創業之劬而夫人承之之不易推察受福離祉之由亦豈惟型吾鄉哉雖風天下可矣然則撰擬祝詩附諸古義以博長者之娛而與編修昆季相劭勉者宜在於此不得在彼於是鄉之人各賦一詩別繕為册而國藩和之且次其語而為之序詩曰九疑南奧有濂一溪在宋嘉祐大賢所栖閲祀七百閎儒纘烈光輔聖淸為天喉舌雖是閎儒遭家未肥舒屯倚困爰有淑妃宛宛女宗亦班亦姞百櫱在嘗曰甘如蜜台星雖悶婺女孔明暉澤四濩宜曜宜康亦有似君三館之特開閣觴賓以聲母德有酒如池有羞孔時四筵盡釂各補笙詩黎樾喬之兄六十夀序國家歲逢大慶嘉與臣下既褎揚其所生又令私其尤戚者得推已所宜膺之封以貤封之所以廣仁播誼至無巳也道光二十五年皇太后七十萬壽天子大孝錫類凡一命以上無不得曲展私親吾鄉黎樾喬侍御既榮其先人因謝已所宜膺者貤封其伯兄梅村先生為中憲大夫兄嫂為恭人明年函錦軸齎至其家又明年梅村君六十生曰侍御謀所以篤兄歡者乃放蘇氏兄弟以詩相壽之義自為一篇以寓祈禱又丐鄉人之老於文者各賦一章為老人光悅既繕册以授國藩而命序焉且言曰吾兄天性朴誠少依王父嫻篤幼儀王父棄養雖丱也哀毀如成人及事二親雖老也愛慕如嬰兒親有所欲不以貧而不致諸弟有所求不以瑣而不謀與人無賢愚一飮以和里有爭搆一諭以理初若難釋徐亦枝開節解怗然各退故自家之子姓鄉鄰之衆寡無不沐其誠服其直所之亦之焉有役則趨焉吾嫂陳恭人祇順劬恭羣女師慕蓋侍御為余述者如此近世以來士大夫相與為縣遁之言縣遁者設與之論東方則泛稱西事以應之又變而之北或變而之南將東矣則詭辭以遁之虛縣其語而四無所薄終不使其機牙一相抵觸友朋會合咨寒而問暄伺唯而共諾漠然不能相仁臣下入告則擇其進無所拂退無所傷者言之一有不安終不敢言一時率為孤縣善遁之習背怨向利所從來深已往者辛丑壬寅之際海國不恬侍御日夜憂維傾智倒慮思效片語以補萬一國藩頗感其誠又嘉其直今即侍御所稱梅村君者觀之以里巷雀鼠之小怨無關於己之端且竭誠以行直道如此况於身有言責而目擊艱大者乎昔司馬相如讓巴蜀之民不能急公冒義而歸咎於父兄之教不先然則侍御慷慨朴質之風亦可知其所自來矣君之仁於鄉者如彼教其弟子以施於邦國者又如此其造福於物蓋未有量豈論區區一身之康強久視者哉余善侍御之壽其兄有道既推明其所以而因以旁及乎薄俗之不可常使覽者有警焉曹潁生侍御之繼母七十壽序往余讀後漢書列女傳竊怪范氏自誇體大思精而不達於修史之義蓋司馬氏創立紀傳以為天地之所以不敝者獨賴有偉人焉以經緯之故備載聖君賢相瑰智瑋材謂若而人者皆以倫次乾坤法戒來葉而范氏乃取數女子廁其間於經世之旨何與焉且其所載如桓孟之流皆門內庸行無絶特可驚之迹抑又不足述私蓄此疑久矣既而思之天下者合億萬家以成天下者也一家之中男職外女職內其輕重略相等而女子所處往往有艱難迫隘處之曲當即曰用飮食之恆雖神聖當之不能越乎其軌然則婦女有可稱述固不宜聽其幽隱而不彰則范氏立篇之意誠亦不為無見也同年友曹潁生侍御之繼母李太恭人未笄而歸贈公禹川先生歸五年而寡處贈公之仕江西旋橐如灑其沒也責負如山太恭人盡徹服御一償宿逋既歸櫬堂上老姑年八十矣欲以夫喪入告則重傷姑心乃詭稱遷官遠郡外則針帨侍姑內則椎胸茹痛其視侍御兄弟戒敕而違嚴逾所生者倍焉願望而慰喜逾自得者倍焉侍御為詞臣無曰不厲以本原之學官諫垣巡視輦轂無曰不申警之以君恩之不易案牘之不可以漫慮國藩嘗即是求之豈所謂門內庸行無絶特可驚者邪抑艱難迫隘處之曲當神聖不能越其軌者邪今年春為太恭人六十生曰鄉之後進年家之子相與作為祝詩以致祈禱而命國藩序其端末世稱誦女史好道其奇特者或有刲臂徇身之事駭人聽覩而苦節之婦貞持數十年冰蘖百端兢兢細務反不得與彼激烈者速一曰之聲譽參觀並論久暫難易較然可辨自范氏創立女傳厥後晉魏諸史皆踵為之率以奇特相勝茍以新耳目而止而門內庸行恭儉劬苦反或置而不道使高者慕義而過激常者無稱而不知勸而後知范氏之識猶有見於古聖人正家之大原而未可深為譏議也余既承同人之屬為敘述其崖略而因以明夫至庸至難之道不事畸異為修史傳列女者訓焉楊母張孺人七十壽序豫既與湘潭袁潄六編修為篤古之交又申之以婚姻於是通知其內外戚好與其賢懿長者之行歲在戊申某月為編修之妻之母楊母張孺人七十生曰編修來告曰往豫家居歲時慶燕則鞠􅎽捧觴為尊者壽今官挂朝籍而外姑既耄不克前獻一尊於心嗛焉擬為詩一章遙展私忱祝其強飮強食深長難老使妻之兄弟歌之以侑其親子如韙余則請為敘述作詩之意而並致之對曰敬諾編修遂言曰外姑吾邑張顧堂先生之孫幼隨祖父汾州同知任張故巨室也年二十歸我外舅武陵楊介亭先生先生之父雲齋公官邳州知州外舅姑並侍官所邳州君之為政挈巨釐細秋豪必躬傾身從公凡私家之務外焉委之介亭先生內焉委其賢配劉太宜人而外姑實贊襄之矣外姑貰姑之勞代夫之劬先衆手而作後一家而息飮饌旨甘非親調不以進囊筐瑣雜非手鐍不以告由是闔署疏戚必是之為倚僕婢必是之為服邳州君既罷官家湘潭旋捐館舍介亭先生以哀毀得心疾或旬歲不省人事而劉太宜人亦以年邁羸弱不時病作外姑兩侍湯藥夙嚴莫戒既煩且殆未幾而太宜人棄養介亭先生亦貞疾不瘳沈廢二十餘年外姑飾性篤終畢慮自支自藥餌以及諸奇珍産凡可以衛夫之病亡所不致自己身以及子女之耆凡所以損家之故亡所不嗇蓋其行誼之稱於人者大率類此國藩窺觀世祿之家習佚崇奢安坐而不事事其端多起於婦人孺人以張氏之子室於楊氏張氏屢葉承明靑赤之綬數十孺人祖父皆為外吏叔父經田巡撫貴州愨田守衢州慧田官教諭而楊氏以宰相尚書之後華轂高蓋世不絶人孺人內外名家履豐薦盛其勢宜日即驕靡乃惇謹朴懿一法乎貧薄遠慮者之所為可謂秉心塞淵較然拔乎塵滓者也其膺多福不亦宜乎編修之為是詩亦頗表其履泰思約之德而推原其壽康之由故余為敘述大几亦以忝居婚媾之末欲使吾家女子聞此風範知所效法焉曹西垣同年之父母壽序子自道光乙未以公車應禮部徵即與同年友曹君西垣相善時則有若鄭君敦謹鄒君振杰金君樹榮王君永時鄧君庭楠數輩皆朝夕聚處醉飽歡虞意氣丰盛明年各報罷歸去又二年戊戌子成進士假歸一載而後還朝西垣亦再返再上不常處京師然豫與西垣未嘗匝歲而不相遇在京師未嘗五日而不見見未嘗不深語未嘗偶有射志也夫人情多溺於所同而蔽其所不見與野人道巖廊纓紱則茫然而駭與世祿之子語米鹽艱苦之事則倦聽而思臥子與西垣皆貧士也自先世忠厚之積田家耕織之劬閭里歲時問遺之狀兩家大率相類故常抵掌稱道彌瑣細而彌津津焉西垣之稱其親霽樓先生也以為勤無隙休儉無毛棄推讓晜弟卻肥而取瘠教督孫子多苛而少貰稱其母柳太孺人也以為奉事舅姑勺水必親嘗鞠育五子寸縷必手製皆與吾父母之行若合符契以是西垣於諸同年中尤昵好矣竊嘗慨夫世之馳逐於名位者營營焉而未有已時子一不知其指歸謂何方寸之口一日之需無幾七尺之軀一歲之靡無幾不必名位而後能給也而人皆曰為榮親計夫親之所賴於子者定省甘旨疾痛苛癢請席請袵亦不必名位而後能給也求而不得遠遊遲滯而父母之年加老焉至於衰髦而心思一見其子而口不言者往往然也人坐不察耳國藩竊祿冒利去家十年即西垣羈留京輦亦越七載於茲此又吾兩人所每懷內疚而未敢須臾忘者也歲在戊申西垣以教習宗室子弟期滿天子用為縣令將歸覲其親適直先生及太孺人六十壽辰同年鄭鄒諸君咸為詩贈送而屬國藩序之子乃追溯夫歷年之交契因概論事親之道在此不在彼者以勗西垣安居而弗出而志豫之愧焉霽樓先生及柳太孺人聞之其亦陶然而盡一觴也夫王靜菴同年之母七十壽序國藩嘗讀孝經竊歎仲尼所稱之孝與今之為人子者之從事則不侔矣其言自天子以至庶人其為道各不同蓋古者諸侯世國大夫世家士之子恆為士農之子恆為農貴有常尊賤有定等是以人各安其分而事其親而無敢妄干後世以制科爵人或布衣旦莫而至公卿於是人子咸思以祿仕尊其親而父母亦惟恐其子終身庶人而亟望其進取徼幸躁競之徒皆得藉口於榮親之説此今之言孝與古之道異者一矣經又曰立身行道顯名於後世古之所謂名者有孝悌之實達乎州巷播乎上下稱其內行無虧焉爾後世輕德術而右文藝雖有曾閔之行不敵帖括之工之馳譽速也一藝之能一文之善至薄也而國人稱願父母亦嘉許焉否則聞譽不著父母不欣此今之言孝與古之道異者二矣居今之曰而悖俗從古不藉祿與名而悅其親者雖賢者有所不能賢者之異於衆人獨能於祿與名之外別敦古人之至行以自力於門以內而已同年友王君靜菴惇朴而願懿自其少時聞望已傾輩流既成進士官水曹所謂祿與名亦既兼得而其內行肫焉常若不足奉母楊太宜人在官夙問而莫勤言警而行惕每食母以將子子以慈母未嘗不展轉溫劭每寢未嘗不再三周察為子稱太宜人之德自相夫教子以及娣姒僕婢浣濯刀匕之微未嘗纖末而不述言及贈君東堂先生之遺事未嘗不嗚噎語太宜人少歲飢寒黽勉之狀未嘗不茹喟無窮也余以是敬之處今之世競逐於聲利之場而其所事一合乎孝經之道固吾靜菴之自厲乎抑太宜人之敕於子而施於家者有以軼乎恆俗萬萬矣今歲十一月為太宜人七十生曰同人多為祝詩屬國藩敘其端余以素欽靜菴之至行不敢以末議陳長者之前因慨論夫古今言孝之變以勗靜菴亦以自策於隱微焉孫鼎菴先生六十夀序程子有言科舉之學不患妨功但患奪志蓋學者之始業於制舉之文也未嘗不稽經辨義求肖於聖人之言以得有司之一當其志猶射者之在鵠無惡於君子也其後熏心仕宦外以印綬饜其心目內習一切茍得之術猶挾寸餌以釣巨魚既得則並其綸竿而棄之曩時稽經辨義之志乃大為纍纍若若者之所奪此先儒所用為慨然也通州孫鼎菴先生阜學而績文其於六經之藴百氏精義之説亦既轢其庭而據其席矣乃屢應舉而不售十進於省試五上於春官僅而得償一似汲汲於科舉者及其既得則絶意仕宦去之唯恐凂焉其所求者正鵠反身之道而所棄者紛華溺心之場是豈非志定不奪之君子軼於末流萬萬者哉人之意量相去什伯干萬至不齊也鈞是試於科目也或爭榮一時偷以攫取富貴或謀慮深遠為積纍無窮之計各蓄所懷若背馳焉先生之先人自高祖以下兩世成名進士官中外各有聲先生念非發憤特達則無以趾前美而啓後光於是既自繩於學復篤敕其子先曰出而興後雞鳴而息寢有誠食有警逮甲午歲與嗣君蘭檢學士同舉於鄉而刻厲不改既而學士官詞曹屢操文柄門下士以百數而先生猶不改又數年以甲辰得雋禮部投紱歸去高臥林下宜可少弛矣而自繩以課孫者卒帥初而不改窺其意以為不得有司者之甄采終無以驗吾學之果成與否而子弟少年桀驁之氣非繩之以帖括繁重之業終無以內於程範而上紹纍葉詩書之澤於此見先生之意量為何如豈與夫尋常試於科目者比並而論短長哉今年十月為先生六十生曰同人各為祝詩彙書成帙屬國藩序其端余與學士同登乙科又忝翰林後輩幼承庭訓聞家大人之論急於科舉而淡於仕宦者又與先生之識趣相類故掇其大者著於篇冀以博長者之歡娛若其刑於家而式於鄉醇德穆行所以昭令問而膺多福者雜見於同人詩歌中非甚緒要遂不及云江岷樵之父母壽序道光二十有九年春正月吾友江君岷樵以縣令之官浙江將行告別於常所交知其色若歉焉內疚或問之曰得百里而長之以子之才行子之志天下之至裕也吳越湖山天下之至怡也而子歉焉疚者何也岷樵曰古者學而入官非以官學也吾智術短淺無以澤人一負疚吾父今歲年齒七十吾母六十七矣舍晨昏之餋而從事簿書其或不職又詒之羞二負疚抱此二者吾奚以自克於是交知感其意既以言贈別又別為歌詩致祝於封翁一峯先生與陳太孺人願長者眉壽無替以尉薦遊子孺慕之心既編次成册乃屬國藩序其端蓋先生之少則貧乏甚矣無田以為賴乃授徒而內其執贄之儀口敝而手疲昕警而夕戒終歲之人以十之六仰事堂上而中分其四半以為俯畜之需半以急鄉里之義舉邑中立賓興會以贍寒士省試之資行鄉約以殲妖賊之反側皆先生發之其赴義也蹈人之所不敢為而其自奉也極世之所不能堪太孺人承闕緝匱一秉夫志或纍歲食粥而舅姑甘旨甚渥也國藩與岷樵知好以來為余稱述者數數矣人情莫不耽逸而惡勞叨富貴而羞貧賤至學道之君子不然或忍飢甘凍窶於原顔而其中坦然有以自愈或峩冠曳綬呵前衛後而憂思展轉若旦夕不能自安者彼各有其志也南面而君一邑息動而雷震頤指而風行僕從一怒百姓重足識者固當自惕不當自喜而浙水東西自辛壬海上之役創夷未復有司者又刮其脂而吮其血譬若醫者撫積瘵之人有不蹙頞而思所振之豈情也哉岷樵自被命以後諏賢而訪友思其不逮而虞其墮職惴惴焉內疚無已此與先生之安貧自樂其志趣同耶否耶吾聞岷樵之需次入京師也先生屬曰吾不願女以美官博封誥無使百姓唾罵吾夫婦足矣如此見君子之教子視世俗相去何如而岷樵所以娛親而餋志者宜何道之從哉諸君子之為詩依於古人戩穀難老之誼所以祝禱先生與太孺人至周且厚余乃略述先生平曰學道之意以期岷樵之篤信而謹守而因以博長者之歡娛凡居官而言餋親者覽吾斯文亦將有所興起焉陳仲鸞同年之父母七十壽序天之生賢人也大氐以剛直葆其本真其回枉柔靡者常滑其自然之性而無以全其純固之天即幸而苟延精理已銷恆幹僅存君子謂之免焉而巳國藩嘗采輯國朝諸儒言行本末若孫夏峯顧亭林黃梨洲王而農梅勿菴之徒皆碩德貞隱年登耄耋而皆秉剛直之性寸衷之所執萬夫非之而不可動三光晦五嶽震而不可奪故常全其至健之質躋之大壽而神不衰不似世俗孱懦豎子依違濡忍偷為一切不可久長者也同年生陳君仲鸞與余交十餘年每相與議論平生慷慨不橈或品第當世人倫意所不可睥睨譏切無所復忌同人或謂仲鸞居吏部曹司身處卑穴更事未深宜其囂囂不詘若移置要地稍稍練習文法亦且破觚而為圓矣既而仲鸞果以考第入直軍機而戇直發憤芒角森然曾不減其曩者之舊吾乃私怪生民剛直之性其稟之有厚有薄未可以一概度量也間輒與仲鸞語家世之詳及太公太母之行仲鸞為余言封翁蔭召先生生而伉爽屢經艱險履之如夷遇人有心所不許雖豪貴人必唾棄之即心之所許雖孤嫠卑賤必引而翼之愈窮厄愈禮敬與鈞自親族州閭皆服其誠信遠近紛難就之決遣凡所論斷久而輒應封母高太恭人祗順惇篤尊尚節義蓋皆有剛直之風然後知仲鸞之激烈不阿雖受性獨厚亦其稟之庭闈者歲漸月染涵濡之久而不自知也人固視乎所習朝有媕婀之老則羣下相習於詭隨家有骨鯁之長則子弟相習於矩矱倡而為風效而成俗匪一身之為利害也今年八月為先生暨太宜人七十生曰年家之子同官之良咸稱觴仲鸞之邸第作為詩篇以祝難老屬國藩為之序余乃略述平昔與仲鸞言論大指以著先生之節概因推國初諸儒以剛直而享大年者為先生致善禱之誼亦使世之君子聞之而有所警焉季仙九師五十壽序粵以庚子之年建寅之月我仙九夫子大人奉命視學浙江門弟子等攜侯芭之酒薦顯父之蒲恭餞於國門之外淸風在道輿從無譁擊節而歌林木鏗其振韻刺船一去海濤起而移情是歲九月為夫子五秩夀辰乃復謀郵陳皇邸遙慶龎禠以祝史之徽言希君子之善禱奚斯頌魯麥邱祝齊斯事雖細不可闕也獨是二首六身乃藝林之陳語交梨火棗亦仙界之浮詞使徒侈説長生掞張繁祉比附陀移之國揣侔兜率之天文勝則史不其諛矣若第羡聲華之盛誇遭遇之隆則無雙之譽久齊聲於許愼稽古之力宜蔑視夫桓榮中朝大官咸詢以今事古事海內英彥早仰為經師人師覼縷稱揚抑又贅矣夫葆真純固當推其致此之由美意延年要識其本原之量母諛母贅請得而言今夫連抱之材經雪虐風叨而成用步光之劍因千辟萬灌而稱神從古至今偉人畸士莫不劬勞撼頓忍性動心何者精神以磨鍊而強智慮以艱危而邃夫子承廉吏之門風屬紹庭之多故楊太尉代傳淸德朱仲卿家靡餘財昔橋蔭之尚依已罍空之欲恥既而槐花強踏桂樹初攀跋浪南圖出門西笑陸生遠適鴻鵠之品望斯高伯樂難逢驊驑之霜蹄屢蹶由是以吳中才士為國子先生黃甲看人靑氊作客守生涯於粗繒大布嘗世味於朝􅐽莫鹽開筐而觀殘稿多於敝服借車而出飛埃盛於同雲蓋至壬辰年以第三人又第而前此之抑塞屈蟠非一曰矣然且不概於心彌貞於道刀無厚而善藏玉有輝而待賈此我夫子之歷練也若夫雙騶稱娛四牡侁征采東岱之琳民傳南宮之衣鉢藥籠儲於江右竹箭采於會稽英蕩持衡旋回舞袖斯固時人所震蕩今昔所同矜也而夫子匔匔如畏毣毣殫思巨眼澄空初心辛苦魚龍夜冷燒銀燭以照遺珠桃李春開灑金壺而濡甘露其於外也砥節首公樹聲示肅潁川文學能為執俎之容魯國諸生半在門牆之內修明雅術實竭勳勞今春去浙之前二曰猶指鬢髮示國藩曰昔校士臨淄猷為靡鹽既勤三載遂見二毛異時歸自浙東此毶毶者殆皓然矣鞅掌獨賢周詩有北山之什苞苴不竭漢使無南越之裝此我夫子之靖共也聖朝廷試詞臣數年一舉夫子再登上考洊陟崇階蘇頲為文書史防其脫腕相如作賦天子幸其同時中外人士亦既傾風而仰鏡企采而翹華矣而乃進思退思大讓小讓下問不恥多聞闕疑懼書馬之訛愼霓雌之辨早朝罷則陳書遍覽夜漏深而吟事方酣一字未安較輜銖於同輩片長必奬假毛羽於後生推之石奮家風過路馬而必軾晏嬰儉德衣狐裘而纍年此我夫子之敬愼也昔者崔邠側帽潘嶽奉輿母養之隆稱為盛事彼皆鄰於寵飾未必篤於屬離我夫子行不違仁恩能錫類感枯魚之銜索詠有獺之在河陟岵載瞻萬里而白雲無極循陔言采三春而愛曰常暉曩者瞻依今茲孺慕殊恩既被令問斯皇朱壽昌五十之年效萊子而添綵戲衛尚書八座之母有中丞以問起居敦牟卮匜龍為炙而玉為酒媊星卿月前有輝而後有光猶復喜懼交深形聲密察幾同厠牏之親滌無改菽水之昔歡此我夫子之孝思也夫瑞玉常堅藴蓄者久也戶樞不敝勤動者恆也愼戒必恭聖有謨訓大德必得古有明徵準斯四者可以言壽矣國藩醉翁門下之人補闕春官之士良苗不實有負煙鋤庸櫟非材曾經月斧金丹許換共絳帳以聆音玉署叨陪乃霓裳之同詠遙想錦樹山高之地黃花酒熟之天籌添望海之樓弧設重雲之會官吏黎收而拜門人繦屬而來習瓠葉者五百人祝靈椿以八千歲何其盛也繫匏有職負笈難從徒瓦奏而桴宣莫捧觴而僎爵區區此志能不懷哉道阻且長溯洄在西湖之水光遠有耀茀蔚瞻南極之星鋪張洪算肸飾龎祺知有能者匪所詳矣曾文正公詩集卷一四言題楊忠愍公二疏手草古孰無死曾不可班輕者鴻毛重者泰山楊公正氣充塞兩間遺文妙墨深播人寰馬市一疏聲振薄海更擊賊臣五姦十罪心追逢比身甘菹醢取義須臾歸仁千載翩翩諫草猶存手稿古柏拏空似枯彌好鬱此英風輔以文藻長有白虹爥茲瓌寶題易公筠亭遺像昔歲在丑哲人西遊我作挽辭比許文休馬磨既甘不競不絿亦有月旦胸剖九流東崖奉親朝戲綵舞暮歸讀書羣言藻斧鄉闈屢試爨無完桐文章憎命淚灑秋風不於其躬乃祚其子濯濯芳蘭芥拾靑紫弓冶不墮載述先芬瞻言遺像永播靑塵五古雜詩九首早歲事鉛槧傲兀追前軌張網挈陬維登山追岌嶬述作窺韓愈功名鄴侯擬三公渺如稊萬金睨如屣腸胃鬱千奇不敢矜爪觜稍待蘭蕙滋烈芬行可喜豈期撾駑駘前驅不踰咫滔滔大江流年光激若矢春秋三十一頑然亦如此染絲不成章橘遷化為枳壯盛百無能老蒼真可恥樗散吾所甘多是慚毛裏西山何鬱鬱白日馳昭昭六街淨如練雙闕淩神霄沈沈府中居員并鏤瓊瑤罘罳周四角窗霧漾鮫綃公子盛文藻九陌鳴金鑣羣從袂成幄掠風馬蹄驕紅燭舞絳雪會宴皆金貂朝餐羅鯖鯉晚衙沸笙簫今夕既相酢明日還見招天高地則厚何事不逍遙手皸不烘煁足趼不趨徑問我何自苦我歌君且聽激湍無駐波止水光凝凝榱棟與欂櫨豈曰非天定束蒿代虹梁於道未為稱朝菌濡濃露天天不及暝適意一須臾骨朽猶詬病可憐繁華子醉夢幾時醒炫妝豈無服自媒羞妾媵巳矣吾何營閉戶覽明鏡傷禽悲弦聲遊魚驚月影丈夫貴倔強女子多虛警強弧有時弛夷塗有時梗颶風揚海濤潮平已復靜君子別有憂衆人恐未省霜落萬瓦寒天高月浩浩美人在何許相思心如搗我昔覿美人對面如蓬島神光薄軒墀朱霞蕩初曉彩鳳儀丹霄顧視無凡鳥意密恩還疏微誠不敢道貽我彤管煒粲兮希世寶可憐金屋恩長門閟秋草謠諑日以多覯閔曾不少寵眷難再得蛾眉行衰老區區抱私愛夜夜祝蒼昊天雞鳴半夜六合未淸曉烏鵲鳴向晨羽毛誇矯矯一旦金丸驚戢翼喑百鳥鴟梟流惡聲萬方憂集蓼靑蠅鳴棘樊繆彰復虛皛間鳴百無補嗟爾秦吉了螻蟈草間鳴亂人徒擾擾入門忽恍恍出門復皇皇嗟我素心人各在天一方庸夫厭鼎食誼士謀糟粳奔走遍天下歸去仍空囊秋老江湖闊何以慰淒涼勿勞我之思我今足稻粱所憂非所職所樂殊未央日暮登高邱四顧何茫范落葉東南飛孤雁西北翔思君不得覯慘淡詠斯章松柏翳危巖葛藟相鉤帶兄弟非它人患難亦相賴行酒烹肥羊嘉賓填門外喪亂一以聞寂寞何人會維鳥有鶼鶼維獸有狼狽兄弟審無猜外侮將豫奈願為同岑石無為水下瀨水急不可磯石堅猶可磕誰謂百年長倉皇已老大我邁而斯征辛勤共粗糲來世安可期今生勿玩愒誰能烹雋燕我願燎桑薪誰能釣巨鼇我願理其綸南澗芼蘋藻可以羞鬼神大材與小辨相須會有因嗟余不足役豈謂時無人里胥牛羊忽竄突村社雜喧豗昨聞府牒下今見里胥來召募赴戎行羽檄馳如雷後期不汝宥行矣胡遲回老嫗捶胸哭哭聲亦何哀龍鍾六十餘伶仃惟一兒弱小不識事黃犢母之隨筋力儻可食或免一家飢薄命不足惜兒去傷永離老嫗泣未闌老翁跪致辭王事亦云棘婦人那得知螻蟻穴寸土自荷皇天慈天威有震疊小人敢疑猜貧者當敵愾富者當輸財便當遣兒去不勞火急催所愧無酒食與吏佐晨炊貧者勉自效富者更可悲隸卒突兀至誅求百不支蒨蒨紈袴子纍纍飽鞭笞前卒貪如狼後隊健如犛應募幸脫免傾蕩無餘資吁嗟朝廷意兵以衛民為守令愼其柄無使胥吏持此輩如狐鼠蓁蓁肆恣睢聊為遒人徇敢告良有司送吳榮楷之官浙江三首讀書三十年今來始一試自抱輪囷材搆廈隨所置世人苦寒儉舞褎先擇地斤削不能遷罌盎各自器君子儲百用多藏如列肆深厲與淺揭所向皆如志君本靑雲士摩空排健翅置之承明廬枚馬當偃幟才多厭間散翩然去作吏方今淸華秩駢拇僅云備不如膺專城張弛從吾意觀魚莫結網網過酷於餌治絲莫求多緒多亂神智聖朝淪洽恩陬澨實漸被可憐蚩蚩氓惸惸還好義願君愷弟思隨時勞撫字西湖吾未到夢想若遇之荷花夏如海當春萬柳垂秋月隨潮湧暮霽天無涯三百六十寺嵐翠渺迷離君去事幽討抉剔發天倪餘慳收昔遁奇賞獲新知朝餐吸山緑暮雨張水嬉尋碑嗅梅蘂獨往無人隨政成無一事風流方在茲懷抱一如彼江山復如斯此樂可持贈寄我千首詩鄉閭昔相從殷勤託詩酒再來長安道舟車並攜手如今彌曠遠脫然絶窠臼少年尚意氣崢嶸各自狃風塵飽所諳蒼然皆老醜激湍亦已平真氣充戶牖相見無藩籬灑落真吾友昨夜秋風來嫋嫋涼生柳念子當乖離旁皇如失守萬族各有營歡聚焉可久意趣茍無違秦越如左右後會知何年今茲歲在丑題錢崙仙同年慈竹平安圖二首冉冉南山竹柯葉互檀欒上有一片雲下有九畹蘭淸風相戛擊虛碧鳴秋寒竛竮走鞭散抗衡徑節干養成兩雛鳳文彩何姍姍高枝足棲宿芳實供朝餐歸昌忽采律言振九霄翰引吭發鈞奏俯視失鵷鸞卻顧篔簹谷依舊靑琅玕年年託美蔭歲歲祝平安紅塵日夜深遊子思無已倦鳥有時還桑弧有時弛我有山中廬槿籬夾緑水修竹倚大椿重重互幡纚發條播芳蕤淸陰亦何美依戀會有因庶往恭桑梓殷勤寸草心區區方在此寄懷劉孟容淸晨采黃鞠薄莫不盈襭寧知弟昆好忍此四年別四年亦云已萬事安可説昔者初結交與世固殊轍垂頭對鐙火一心相媚悅炯然急難情熒熒光不滅漣濱一揮手南北音塵絶君臥湘水湄辟人苦扃鐍懷璧誤一投巳遭官長刖我作燕山囚衾襪冷如鐵塵土塞中腸經旬間嘔泄夢魂互往還邂逅在嵽嵲君魂畏豺虎我魂阻蛇蠍明年會長沙對牀殊呐呐可憐郭生賢日夜依我闥三子展殷勤五旬恣猖獗自從有兩儀無此好日月決渠東西流人事有蹉跌當時別江干懸知成久闊郭生從我行再踏長安雪束蒿貢廊廟塗丹強作闑磐松困澗底千歲老不屈行藏一以歧會合焉可必知君障污塵憎我逐煩熱摧蘭搗作臡本馨固難奪皇天造羣倫位置各成列煌煌帝者都峩峩集勳閲前庭充組圭後閣暖淸瑟大馬疾如飛高車如電掣陋巷時騎過牆震窗紙裂而我支肘眠朦朧兀頑劣視蔭呼晚飯終年曾不缺癡兒亦肯堂四齡已叨餮所愧偷太倉無異哀窮乞羡君老巖阿間味甘於蜜嗟哉趣豈殊所處良不一坦蕩觀皇途轉側思家室永懷素心人悠悠難具述題周小村前輩塞外課經圖肉食多亨途通儒遘百閔時蹇心匪乖身窮道未窘周君信奇賅天機苦捷敏昔歲乘靑驄羣飛畏秋隼偶被金丸驚可憐翠羽隕十年遼海行九月邊風緊銅雀夢觚稜鐵衣錦繢純自信茲遊豪甘受世人哂日日抱叢書森森如束筍吾道儻欲東獨善良不忍此邦盛球琳多士紛簵箘斧斤試一施彀率聊可引弟子初反車先生大倒囷文囿張百旃經畬接千畛但期道傳薪未要歸載稛昨者唱刀環塞外回文軫勝事告友朋餘味足咀吮方今柄師儒華秩半卿尹虎觀車如龍辟雍市如蜃會看招旌旓且須嚴韅靷稽古榮復榮吾言非蠢蠢地用莫如馬二章思賢也地用莫如馬越險思驍騰豈無汗血種相求亮未曾萬鍾繼稟粟千金甃鉤膺隆儀茍一闕市駿休漫稱人用莫如龜幽室能廢燭告猶儻見從外侮敢余毒從短翻棄長惜哉支牀足良無藻梲登不如塗泥辱題龍九詩李唐盛聲律初響鏗華鐘逮及下衰時切切鳴寒蟲扶輿發朝氣百彙曜麟龍缺月夜騰光不與東升同秋霜入科木色黯蒿與蓬文章説心腑本不從窳隆能者自植立餘子靡隨風孰於衆音颯玉振開羣聾君才美無度大圭宜廟中君詩如春融秋爽亦自工肉好用為賢瑑刻生芒鋒南軺斐然作山水滌襟胸雜什多未芼略可芟厖茸要道鍥不舍金木隨所攻且況力肯窮奧阼辨西東終然到聖處今古誰雌雄贈李生生名嗣元是科四川十九名余在闈中最賞其文揭曉來謁則神淸似郭筠仙愈傾愛之看書亦不少真美才也年草二歲因作古風一首贈之云岷山萬仞雪太古人迹稀中有窈窕谷緑蕙芳以菲幽芬亦已鬱賞識方庶幾澗邊棘荆滿山上春草肥託根亮同地豈辨誰是非地亦不能易香亦不能飛忽逢荷樵子采擷盈裳衣臨風再三嗅俯仰情依依由來有臭味不必崇知希西征一首呈李石梧前輩我昨賦西征爞爞實朱夏烈日焚八荒息影無寸暇孱體甘所侵炎威肯少借一病罹百艱煩煎竟日夜夙昔傷徑弓聞弦神已怕一志事呻吟愆儀任嘲罵瘧疫難指名熱寒互嬗謝粒食經旬辭況能問燔炙帶月方首塗參橫未云罷顚簸筍輿中磋磨破腰胯奴子蒼黃詢庸醫再三詫猛然肆造攻云當一戰霸惡莠雖已鋤良苗亦失稼隔旦嘻其疲無復平生吒皮皺面有窪耳聾氣愈下慘淡過潼關沈昏渡淸灞赫赫李中丞觥觥范韓亞老羆臥三邊犬羊敢狙詐聞我至驪山材官百里迓秋雨長安邸征鞍庶一卸旅魄頗飄搖公來百慰藉遣僕炊香粳呼僮伺館舍徵醫未辭頻饋物不論價古誼暖於春美言甘於蔗我魂稍稍旋望蜀仍命駕裹藥充篋筐買飴養嬰奼漸覺身能輕如馬脫韁靶吾固慶生存衆雛亦嗟訝燕譽多親知艱難少姻婭永愧夫子賢高情壓嵩華賤子不足矜西人實沾化留侯廟小智徇聲榮達人志江海咄咄張子房身名大自在信美齊與梁幾人飽胾醢留邑茲巖疆亮無懷璧罪國仇亦已償不退當何待鬱鬱紫柏山英風渺千載遺蹤今則無仙者豈子紿朅來瞻廟庭萬山雪皠皠赤日巖中生照耀金銀彩亦欲從之遊惜哉吾懶怠柴關嶺雪我行度柴關山光驚我馬密雪方未闌飛花浩如瀉萬嶺堆水銀乾坤一大冶走獸交橫奔凍禽竄荒野揮手舞巖巔吾生此瀟灑忽憶少年時牽狗從獵者射虎層冰中窮追絶壁下幾歲馳虛名業多用逾寡久逸筋力頽回頭淚盈把廢邱關項王西入關叱吒何雄哉鼻息撼山嶽號令如轟雷分茅割大地駕馭英雄才六王既立後三將還西來降臣剖符竹洪度方洞開廢邱亦善地百里闢蒿萊桓桓章將軍仡仡貔虎材姦豎主帷幄大將終疑猜望夷不足惜此類良可哀行人一長歎萬壑悲風回岱雲同年喪妻為此詩譬之陳君喪厥妃善憂世無有情至生幻機有夢造王母紫殿何言言衆星挂戶牖穆滿翔其旁方朔戲其後陳某蟣蝨臣昧死訴左右彼有何德功鶼鶼到白首此獨何罪辜生世不少久剜肉補其天於德未為醜食貧八九年辛勤足梁笱何孽之難逭斬刈如惡莠王母返袂泣倉皇頗怩忸方朔踉蹡出曰余不執咎衆生自生滅非神有官守高秋金氣肅萬葉同衰朽朝落非獨殤夕脫非獨壽皇天了不知無人司薄厚不見狼㬻女蓬頭雙足垢一生不洗面媚夫稱佳偶亦有緑林豪掠人如雞狗堂前妖姬舞堂下鬼妾走彼雖得偕老於君意可否此雖中道捐名聲極萬口令妻果然令何必在駘耉惡妻不可言牀笫森械杻陳君翻然覺再拜謝善誘歡喜不復愁逢人但索酒寄弟昔我初去家諸弟各弱小阿季髧兩髦覷人眸子瞭後園偷棗栗猱升極木杪叔也從之求揖我謂我矯分甘一不均戰爭在毫秒余時輕別離昂頭信一掉老弟況童騃樂多憂愁少瞥然成六秋光陰如過鳥世味一飽嘗甘心厭荼蓼夢裏還鄉國溝塗苦了了朝企恆抵昏夕思或達曉君詩忽見慰回此肝腸繞生世非一塗處身貴深窈衆萬奔恬愈聖賢類悄悄二陸盛掞張鶴唳悲江表夷齊爭三光豈不在餓殍我今寄好語君聽其勿藐一願先知命再願耐劈摽乙巳春闈謝戴醇士前輩畫竹余少淪賤貧學書等畫墁中歲偷太倉誤為金紫絆文字雖所攻淺嘗不能半邇來又十年拋棄如土炭豈謂選佛場謬來事襄贊列仙盛瀛洲腰魚何璀璨禁院扃重棖沈沈窅桂觀鍵戶無一營馳箋鬬豪翰蘸藍掃秋葉斯須復堆案衆雛亦好事奔命極雨汗戴嵩聖雲孫三絶天所歎于謁填其廬鐵門説三換朅來困棘闈逢人丐脫腕為余寫新竹風筠兀繚亂呵壁呼老可筌寀何足算我雖不解畫耆古頗知岸但得琴中趣何必工抑接為報靑琅玕微詩庶一粲請醇士前輩畫竹歸貽樹堂題詩一首孔翠閉雕籠失羣忤本性懷我如玉人三旬闕賓敬老醇今鄭虔支離頗自聖余為揚其波畫詩極輝映寫此貽君子持將作寶鏡筠以喻其文幹方晚節徑桃李漫紛紛語君勿與競物外求交知塵中闢幽敻又贈筠仙一幅人生有乖隔咫尺成關山我心日百轉從來輸石頑日吾語戴侯君在張李間為君畫新竹幽淡不容攀我家雙溪上萬竹圍沙灣涼夜幽篁裏月冷水潺潺行攜子偕隱鹿豕相往還詩名滿天地蹤迹混榛菅送王子壽歸荆州五首以高步追許由為韻冠組墮塵海與世日滔滔豈知魯連子脫身美遁逃十輩蜩與鷽跳踉不能高黃鵠冥一舉大地如秋毫揮鞭拾科名咄嗟踏天路四十非不強萬卷非無具尋直如可期須臾得少駐側聞馮濳郎龐眉守故步盛年窟關輔結客頗支離負米半天下有婦愁朝炊詩名滿湖海持是欲安之菰中一漁笠懷哉不可追天人互轉旋時勢有虎鼠結交貴結心寧當變寒暑可憐拙匠斤謬被􅚽人許一杯君強釂無人解觴汝皇明爥八極小范臥西州嗟君老從事招招豈無舟廢興難可道時來不自由投竿要強起何代無馬周王君嘗為林少穆制軍幕府從事送陳岱雲出守吉安有序存文集驪駒且莫喧我歌始一放憶昔初逢君漢濱俯高浪同拾春官第天門踏閬閌射策干羲軒挾神一何王君喁我斯于躡履星辰上雙鳥不分飛短翎實所傍借屋兩頭居嬉遊不可狀六月寒瓜肥嚼氷滌府藏劈半持作冠狂呼極跌宕秋雨催歸人膏車各南向長沙揖君廬入門刪三讓拜母升後堂排筵倒家釀明歲同還朝百扶接居巷朝餐或來過夕渴還相訪問學商米鹽經綸説魚醬驅驢駕雞棲似狗頗茁壯有甑例宜塵無衣安用桁我道夫子賢世人或嘲謗世人病我頑夫子憐其誑袍笏雖支離貌卑心則亢平生企高遐力微不自量樹德追孔周拯時儷葛亮又兼韓歐技大言足妖妄夫子不豫譏和高越初唱洽比三四年為歡亦云暢卯歲夏之中九門盛炎瘴君實罹其災一病月三望毒熱轟外強客瘥兀中脹有婦賢且勤籲天事供養背分荀令涼饘進冀缺餉剜肉補其天有神實克相繄我相扶持計窮屢怏怏國工吳竹如與鄭小珊調齊妙心匠鬼録不見收人謀信可仗由來福與禍范范自天貺時月無幾何中饋遘死喪我時匍匐救倉皇事拼擋黃口抱呱呱稽首別繐帳移巢翼其兒室毀子無恙良人匪頑石焉能缺悽愴傾家營奠齋淚河送反葬我謂君已愚稽經懼失當君謂情自纏誰超六塵障展轉彌再期病貧互摩蕩南望問尸饔儲糧不盈盎摧腸與蹙眉萬端欲誰諒一朝被殊恩千憂始滌蕩士窮守艱危時來類放曠為君述前塵在莒愼無忘報恩不在他立德乃可尚丈夫要努力無為苦惆悵丙午正月二日作蹉跎三十五聞道其既晚去日良已富來程亮復遠自從伊閩亡大道閉元揵有瞽不識珠賣珠事驕蹇微數陳豆籩小知辨蜓蝘迂腐譏淵騫空疏訕商偃前者激波瀾後者恣鬬很大江日滔滔衆人死婉娩誰能抱孤芳寂寥守舊畹通經不達時失身下豬圈嗟豫局咫聞亦不工􅊱噂非仁不敢祖非義豈嘗本所學誠流俗攀躋但分刌不挂高明眼譏評肯少損民各有依倚吾寧變愚悃文字扃緘縢經綸在房梱浩蕩冠蓋場一心自嘉遁聊用陳區區夢魂庶謐穩題筤谷圖大雅即高詠耽隱靑山岑手折篔簹枝鏗為琅玕音松風石壁高箐霧林霏深幽幽人不知獨鶴明孤心送王孝鳳之雲南即題其尊人松菊圖纍世無咎繇冤民塞九縣數罟危衆魚吞舟不加譴王叟邦之良溫恭少側辨獄吏一牽連秋毫忤雷電田甲時見陵馬遷莫相援盆底無昊天荷戈出摩甸萬里蒲蠻道征人淚如霰草載餐氊糜衣無故時線回首望家山柴桑信所戀老松儻無恙叢菊向誰絢有子鏗華鐘蜚聲震金殿武庫羅其胸干將思一剸誓上緹縈書不乘長卿傳一麾首滇南征心已如箭預想王坦之初覲懷祖面抱持至膝上悲喜集一見萬事如浮雲滄海日千變獨有骨肉離重逢真可羡明歲唱刀環歡聲若雷忭歸食武昌魚比鄰張高宴鳳詔喧里閭純孝回天眷不學朱壽昌徒登獨行傳題錢崙仙㸐燭修書圖腐叟音塵湮千載無完史斷代自班生䤨摫破大體茂先賞三志編摩或索米舊書留釁瑕但為吳生詆數賢不足珍餘外況靡靡聖代盛文章羣英躐前軌殷鑒曩成編唐經今繼美磊磊南董倫彯纓足幡纚錢子邦之良弱冠捋金紫涇渭原胸中衮鈇極筆底朝踏東華路柴車等敗屣夜歸南窗下椽燭照大几一字褎幽潛片言殛姦宄曲直在豪端誰能矜爪觜我亦載筆臣大弨久復弛三載縻官錢甑塵亦莫洗披圖聊粲然作詩一灑恥題孫君采芝圖二首孫君名葆恬字劭吾善化人嘉慶己卯舉人道光六年以大挑選桃源縣學教諭芝房侍講之父也衆羽工飛騫先生獨摧挫十載桃花源寒氊屢告破古木發深彈從來拒俗和采蕨睎殷頑餐英補楚些自擷三秀芝窮年振寒餓豈謂人事乖悠悠即長臥掇草求長生無靈欲誰那長是拜畫圖千秋聆咳唾少室吾黨英儲能實完好韶齒殊不廉間偷仙人棗航海探琪花蹁躚踏三島根本良已深衆芳信在抱言采幽蘭歸種作階前草上有竹修修下有淸風掃竹節寒逾堅貞心永難老風暖扇餘馨繁香滿穹昊酬陳慶覃侍御赤水沈元珠千年遲象罔君子回深眷翻然辱旌奬馬走那解詩鉤章事鹵莽秋蟬挂高柳風過自成響豈意師曠聰偏聽發謬賞維君堅高壘無人敢掉鞅筆端一縷香百靈通肸蠁方今隆棟穹伊巫擁天仗巢燧無闕遺無處著崛強以茲得雍容間吟寄慨慷有書亦盈牀有沽亦盈盎六宇自冥冥湫塵莫豫網請君拊夔石豫亦擊堯壤小池屋後一枯池夜雨生波瀾勿言一勺水會有蛟龍蟠物理無定資須臾變衆竅男兒未蓋棺進取誰能料茲晨茲晨曷不樂端念良自尤自吾有爪觜半啄匪躬謀俯視見后土仰視見光浮關門赫婢僕雄長如諸侯專精事羹飯餘政及乾餱兵後物力絀平世生齒稠人人似我飽實重黃屋憂吾皇惕昧爽彼相爭前籌聖者自危厲愚者自優遊大哉六合內人類難等儔失題西山一夜雨秋氣入庭除淸晨展書坐翛然樂有餘天宇一何廓蕩蕩真吾廬熇熇夸毗子守隘無曠居衆鱗爭坳潦鬛鬐安得舒豈知逃間寂放蕩得尾閭吾樂正如此君樂復何如題泛海圖昔我棹瓜州金焦望㟞㟞靈山咫尺間不得窮􅑬嵼還家述遊蹤高堂一笑莞江湖險可吁泛海況不戁撫摩慰驚魂軟腳呼盤盞由來慈母心險夷最所揀孝廉本儒衣文章富編剗胡為涉遐思浮海窮覘矕有母足慈悲奉佛信瑟僩共道洛伽巖實惟仙藥産神人渡迷津福汝能簡簡虔禱或有憑孝思本無限圖此塞寸誠靈心聊結撰何知妄與真雲濤紛滿眼秋懷詩五首木葉下如雨西風吹我衣天地氣一肅回頭萬事非虛舟無抵忤恩怨召殺機年年絆物纍俯仰鄰詬譏終然學黃鵠浩蕩滄溟飛蟋蟀吟西軒商聲方茲始小人快一鳴得時亦如此大澤藏蟄龍嚴冬臥不起明歲澤九州功成返湫底吾道惡多言喧囂空復爾吾愛邵夫子謂仁和邵懿辰古之三益者鑿鑿攻我瑕不隨世人啞薄俗尊文章吾亦事茍且赫赫揚子雲末途裂於瓦再拜謝􅚽人斤斧行可捨城頭昨宵月今夕虧其圓丈夫矜小節一缺誰復全蝸廬抱奇景高視羲皇前蒼蠅黦尺璧江漢難洗蠲馬融頌西第今為時所憐吾友劉孟容遺我兩好書三年不報答幽怨今何如深山閟大寶光氣塞州閭樊英履壇席名業箕斗虛補天儻無術不如且荷鋤酬辥曉帆大谷閟幽蘭由來習霜雪摧挫彌歲年葳蕤減昔悅本性誠未移芬芳詎可滅時物一為遭適為吳人擷會合亦有宜廢興固難説旁有荷樵子殷勤事搴襭出山嗅懷褎餘馨亦未輟臭味良有然非渠獨明哲風騷難可熄推激惟建安參軍信能事聲裂才亦殫寂寞杜陵老苦為憂患干上承柔淡思下啓碧海瀾茫茫望前哲自立良獨難君今抱古調傾情為我彈虛名播九野內美常不完相期蓄令德各護淩風翰送舒伯魯神駒秉淸峻墮地淩無前男兒志萬里亦在華妙年舒生吾楚俊結髮疲丹鉛內外承嘉蔭託根魁斗躔迎婦范陽府結客彌幽燕遂來窟京輦滿月彎鳴弦謂言拾高第如掇牀頭錢人事有奇偶虎鼠非吾權文章不嫵媚例為時世捐芝蘭合鋤刈朝菌香徹天可憐壯夫志摧撼終不遷時時造我闥屛慮商詩篇高吟動厚地幽思縋重淵維桑古有敬況此接才賢昨來忽告別歸意何翩翩寢門疏定省肯為世網牽一鳴不稱意脫去如鷹鸇趙孟等間事難者參與騫馬走螙此間歲月逐風顚謀歸百不勇送女聊自鐫劉叟詩新寧江君忠源子之執友也數為豫稱其邑孝子劉叟者道光丁未叟年齒六十江君求豫以詩揚其行為老人光悅且以風里人夫甄采畸德作獨行傳之長編史氏之任也嘉善而懲不能勸一而勵百亦士大夫有風俗之責者事也故為之詩歌遠貽劉叟叟名某字某實縣學生金峯萬山輳劉叟巢山椒邦人所賓禮與山兩岧嶤天窮苦無告孤露初及髫傾家樹四壁馬磨風蕭蕭朝餐或恥盎夕飮恆賭瓢子襟式學省童冠各在招束修斂薄少歲穫償蓘穮上堂奉甘滑入室馨脂膋一噎三咻摩一食再溫劭蒸梨或忤志捐斥無寬條嬰兒抱酷愛畢世非一朝白日不東返孝養隨瞥飄所餘杯與棬傍身匝瓊瑤觸時即子卯有霣如春潮仰供不知劬俯畜安能饒舉家浩鵝雁妻餒兒號宵維叟不鹵莽長短與量料紉針教補裂呼粥權息囂鄉鄰敬其誼百里無飛梟長官式其賢唾息不敢驕噫乎血氣倫報本義所要人紀有乖沸茲實懸之杓惠迪經所訓物理亮非遙感歎遂成詠庶以風鄙澆送莫友芝豪英不地囿十九興偏邦斬崖撥叢棘往往逢蘭茳黔南莫夫子志事無匹雙萬書薄其服草載幽窮鄉今年偶作劇射策來都堂靑鞋側破帽日繹書賈坊邂逅一相見揖我謂我臧劉郎吾庸敬好事迷短長炙酒頳君頰亦用沾我腸微瀾時激引稍稍觀濤江可憐好手眼不達時溫涼果然被捐斥鋤刈不成芳誰能尼歸駕飄若驚鴻翔我時走其廬深語非淺商次及蓼莪痛老淚何浪浪嗟余亦心性內刺能不降賓然拜牀下十分肅老龐關山有乖隔人事不可詳萬里共日月肝膽各光芒作詩勗歲莫亦以勤劉郎劉郎謂茮雲題彭旭詩集後即送其南歸二首日日送歸客情抱難為佳老彭復去我內撫焉所偕往豫初遇子睇睞無等儕鷹眼迥高秋勢不甘塵埃自言困鄉國橫被口語猜絳侯畏牘背田甲欺死灰脫身來洛下稍攝驚魄回風波一震薄萬事何有哉雄篇忽枉我峻句何崔嵬險拔肝膽露憂患才地開終然達紫氣幽獄難可埋男兒要身在百忤寧足摧臨歧不知報努力乾深杯大雅淪正音箏琶實繁響杜韓去千年搖落吾安放涪叟差可人風騷通肸蠁造意追無垠琢辭辨倔強伸文揉作縮直氣摧為枉自僕宗涪公時流頗欣嚮女復揚其波拓茲疆宇廣大道闢榛蕪中路生罔兩孱夫阻半途老大迷歸往要當志千里未宜局尋丈古人已茫范來者非吾黨並世求人難勉旃各慨慷丁未六月草一為歐陽公生日集邵二寓齋分韻得是字宴飮非吾欣十招九不起豈不耽羣歡未諳諾與唯今日飮邵侯婆娑辦一喜多因坐上賓可人非俗子梅叟伯言名世姿蕭然紅塵裏蟬蛻三十年萬事如脫屣獨留文章性貞好無遷徙頗奬歐陽公時時挂牙齒後者開曾王前追韓與史自叟持此論斯文有正軌二三邦國英風流相依倚持斤向老鼻郢門欲成市邵侯宏其波崢嶸見爪觜時作好事人排蕩詩酒理長安三月雨炎威方一弛洗盞招近局衆賓稍填委尚想老醉翁茲辰實攬揆展圖拜光儀焚香追無始餒鰈初在嘗良琴復動耳跌宕宇宙間嘐嘐亦未已鄙人實昏頑百非遘一是麋鹿生野性謬來絆金紫紛華一蕩潏精光半銷毀常恐道未聞殞身同螻蟻苦緬六一公終古長不死名位匪絶人所貴不關彼作詩謝邵侯梅叟並送似送黎樾喬侍御南歸五首原六首其六係七古見二卷時歲善遒邁煩悰無少舒秋色滿大地良朋還去豫十年聚京輦並頭相詬濡深言洞金石密意安綦絇傾歡酌家釀鐙火照狂愚不能久依倚脫棄如驚鳧民生各時令進止非人圖物自持其末吾自敦其初高秋天萬里浩蕩一舂鉏平生秉微抱志與詩騷親孤音裂肝膈劃然震乾坤持用告庸子舉世褎不聞先生有妙鼻容吾揮一斤賞姸越恆理逐臭詫奇芬高歌切哀玉吹我上靑雲多譽墮盛德雖然豈不仁文章事微薄在物未為珍秋豪較得失老死相齗齗從今溉根本破硯吾欲焚萬歲行滔滔後水逐前水今古數達官河沙不可紀生存勢薰天死去飽螻蟻達人計深長誓不欲粳秕嗟余本野性邂逅絆金紫尺寸無功能高明畏神鬼雷同溷太倉或恐損廉恥倦羽企歸風余亦行休矣筐筍鍤松秧從君萬山裏逆夷昔爛漫兵甲禦南東殺人飼蛟鱷大海為之紅君時即我謀雪涕向蒼穹夜半草萬言朝奏甘泉宮道謀復旁午羣策雜昭聾聖擇有姑舍神斷自天聰自獻雖不效義憤侔賈終事往一回首人各發舊蒙所貴中無疚焉計達與窮洞庭天下闊淸傑橫六宇中有兩佳人乃是淵騫伍湖北字茮雲南曰孟容甫厥氏同劉宗神明本漢祖實惟吾友生交期徹肺腑乖隔漫關河夢魂奔越苦朝憶便成昏夜思或達午此士臥深山靜氣卻豺虎君去儻尋求夙鯁還一吐物外得真遊方寸能歌舞題季仙九師采蘭藝菊圖靈儀耀德輝昌期偶一造翽羽時倦飛丹穴仍高蹈吾師生民傑瑩粹邁圭瑁文章養其原木雞極啄菢詩老昔采風滇海蒸英髦聖皇豁四聰惇朴信所勞文軫馳西南武庫職旌纛夷然鎮廟堂羣士息浮躁秋月照琴心忽理思歸操東籬菊正肥南陔蘭可芼翩然謝綦簪巾車已復膏小子秉孱薄門牆備灑掃追隨漫十年未洗緇塵眊稻粱逼旅懷詩禮荒庭誥賦詩鐫此心搖搖如植翿題朱伯韓詩集後十首以才難不其然有亦未易諡二語為韻雞鳴足朝莫陰曀終不開高秋戰寒夜四壁轉風雷有客投明月驚顧非凡胎古人亦已矣吾猶及此才稂莠驕復驕桃李闃無言堂堂魏長史畫籌壁上觀丈夫有深意出手無俗彈恆沙閲人面相識良獨難明珠伏濁浪能媚不能流碩人力如虎折節師溫柔肝腸自骯髒面目自伊優再拜問君子此可言詩不金陵昔鍤血裂眥激癃疲事過付東風沓沓如故時豈非吾輩恥痛巨不可思三更荷戈起四問夜何其東家老鼻祖詔我三百篇造詞如日月萬古趨新鮮竊人者無恥自得斯為賢鄙夫目論爾君謂然不然吾子如春陽照臨列枯朽我亦無所知我亦無所有頗好感事詩善歌敵矇瞍歲晚脣又乾君須濡我酒吾國有狂生白眼善揮斥謂益陽湯鵬稱子賢無朋許豫曰頗亦中途生波瀾生死長乖隔靑山一抔土永埋壯士魄桂林天下秀生才雅且毅有美王與龍虎視令人畏謂馬平王錫振臨桂龍啓瑞誰道儒誤身等間拾富貴平津老封侯君今齒尚未甚矣吾其衰百思今廢置平生所好賢支離背時利明鏡承食漿干將不一試天高帝閽嚴薦達談何易舉世禮邱軻貌尊非心即草元二千年今無一人識思之復思之粒粟開八極君試騰汗漫我當借羽翼送黃恕皆使秦中輦轂蜂房聚萬人扃閉牢脫身得出走塵鞅方一逃黃君吾黨彥暗默謝羣囂持節下關隴太華秋氣高西北收功實自古産英髦聖朝枋儒術土室始深韜三徵臥不起四字爛天褎張呂去云久餘緒猶可繅丹穴鳳所都纍葉無凡毛猗蘭豈不馥所貴采擷勞三洗人天眼往觀大海濤􆈱盡波底蚌明月終在遭先民有遺紹邂逅入甄陶歸來謝天子亦用誇吾曹為已辨檠輔與世置夔皋北堂侍膳圖為姚吏部題二首脫葉辭喬柯回旋依舊畹行役有乖違梓桑終繾綣姚君虞舜裔純行亞圭琬伯瑜陳采服下堂自婉娩一從通朝籍鄉關日巳遠浮雲有東西遊子不得返樹蘭服衆芳誰能忘根本爰圖聖善容慰此深愛悃嘉魚初在烹新筍欲盈㯻不惜求取勞但虞珍膳損魏闕身事羈南陔歸夢穩移孝出忠勳邂逅還補衮題陳氏五世鄉賢遺像純皇撫九有至文耀天樞詔舉明經士四皓來于于介休薦梁叟江南顧與吳陳公實稱首人中見騶虞峩冠長太學魯國始一儒洪河無近脈崑山玉所都三朝襲令緒四世表其閭繄維聖舜胄家聲自古初義門翕惇穆太邱世簪裾門風不復墜繼踵踐天衢金籯澤易斬君子席詩書瞻言禮遺像杖几如可趨聊表先民軌一為薄俗模韓齋為孔舍人題西京大雅淪斯文日凋敗天不喪周孔使人續謦咳韓子興中原聖言始有賴孤竅吐雄奇金聲塞兩戒時於蕙蘭室中出蛟龍怪回首視齊梁有作頗衰憊一從茲塗闢來者方雲會豪彥仍響臻歐曾得兩大聖淸炳昌運方姚實孤邁魯叟有雲孫耆古百無懈齋祓奉蒸嘗但下昌黎拜大書榜其室夙莫見蓍蔡誰云千載遙神理與針芥湜翱漫親炙相夷等自鄶桐陰消夏圖為史吏部題炎曦灼大地蠕蚑同烹煎有生奔末利擾擾不遑安史君靜者流置身巢燧間緑天展珍簟桐葉生虛寒煮茶激淸吹拂箔回微瀾客來戒不報塵事莫相于頗亦哀老子佳眠未渠闌題苗先麓寒鐙訂韻圖大雅久淪歇正音委榛蕪永明肇四聲稍變周漢模開皇集八士牙曠相飾揄夜半畫綱紀韻學茲權輿承襲一千載灌莽成康衢韓公頗好古枉啜六經腴放者騁遊騎斂者如轅駒進退失所恃不得返皇初有宋盛文藻才老信狂夫陳生興晚明秉燭照幽墟勝廣驅除畢沛下風雲趨聖淸造元音崑山一鴻儒中天懸日月堂堂爥五書上追召陵叟千載若合符斯文有正軌來者何于于江戴揚其波段孔入其郛苗髯最晚出匯為衆説都精思屈鬼膝高論揖唐虞鬻熊皎入夢薪火耀天樞神光不可熄長夜一鐙孤風雪交四壁橫膏校殘書人謂髯何憊髯謂吾自娛自我與髯友大海禮間鷗時洗箏笛耳一聽秦靑謳物外有真知肝鬲助歌歈愛髯不忍別作詩寫區區養間草堂圖為潘博士題浩浩市聲沸塵霧如驚濤中有淡定人萬事渺秋毫家世東山舊諸謝各淸高末行濯德輝九天一羽毛豈謂回風徑修路滯將翱乾坤豈不大一笑解天􅋶四時足休息靜極思作勞時攜桑輿友物外得佳遨脫帽談虞夏生理寄濁醪歸來對虛室風日淡相遭老鶴傍人睡羣雞正喧嘈陶太常小像江波少還態耆宿日凋零豈知永嘉末吾猶及老成乾嘉昔云盛錢王蔚典型傳經孟喜膝問字子雲亭各奉本師説森然啓門庭先生時少壯槃敦接芳馨曾從大匠鼻揮斧動神靈跌宕五十載數輩倚聲名踏破九州莎依舊還天廷後生仍好事快覩先民程飄然好須鬢圖此歲星精柏寢話疇昔緒論吾嘗聆瞻言詠斯篇一寄思古情會合詩一首贈劉孟容郭伯琛咸豐五年秋月南康舟次東風吹片雲嘉客來千里喘如竹筒吹腐公跫然喜明僚雜迎笑吾亦倒吾屣各自衱其魂告曰某在此傾襟語晨夜爛漫不知止上言離別長歲月弦脫矢下言兵事殷成敗真夢耳江漢天下雄三年宅蛇豕王師有蹴踏戈船照淸泚掀浪煮黿鼉洪濤染為紫長驅下蘄黃鐵鎖沈江底羣龍水中生怒螳車下死英英塔與羅威名讋南紀倚嘯灊廬間天戈欲東指人事有變遷由來不可擬鬼火夜灼天壤雲壓高壘龍驤付一炬韓壁僅可抵偕行竟無衣存足乃無履夜半飢腸鳴大聲震江水腐公不知羞恬然矜爪觜謂言多難時從來福所倚在莒義不忘圖南風漸起稍稍召驚魂時哉可歸矣世論自悠悠冰膚生瘡痏困窮念本根風雨思君子艱難復相逢得非天所祉回首草年前志亢聲亦侈憂患閲千變返聽觀無始老夫苦多須須多老可鄙二子苦無髭無髭亦可恥自乏諧俗韻不關年與齒貞松無春競歲晏行可俟作詩志會合亦用砭窳呰王母方太夫人詩凡響無異材爨餘得佳桐衆卉競春華歲寒彰貞松坤德無咎譽非儀兩不蒙煢然遘閔凶高義古所崇中材利行之綽楔留芳蹤卓哉賢母德激烈乃過中別嫌謹錙銖年高茲益恭至性無矯揉情摯超凡庸無所為而為乃與神明通有孫立朝端蹇蹇蓋匪躬乃知玉泉流璇源已沖瀜白嶽黃山間靈氣鬱蔥蔥明靈永不泯奕世揚休風贈李眉生倦翮復南翔重眺鍾阜煙舊遊多環萃羣卉正芳鮮謂可擴吾襟孤懷乃悄然非材竊祿位俯仰慚高天術業一無成浩浩送流年窳惰常廢事識暗或蔽賢多病無安食多悔少佳眠無德居高明衆鬼瞰瑕愆無學臻衰耄但為時所鐫誰言所遇順撫衷百慮煎勤子來存訪至論探九淵鬱塞乃過我神困難為姸人世多乖忤圓一缺常干羲娥驅童丱舉世惜華顚天命誠足畏愁思且當捐靑松生危甗獨立向淸昶風韻戛韶咸交柯蟠龍象逸氣千層霄瀟灑謝塵坱廟廊搆瓌材羣工共嗟賞虹梁皎朱曦天門信蕩蕩豈知咫尺間歧路多回枉挽來不能寸推去或千丈託根倚峻巖植基固不廣孤高招烈風薄俗寧足仗蒼穹富雨露百昌日夜長大鈞一轉旋悱惻神所奬聊究莊生旨齊物尋影響行止皆有待還以咨罔兩題俞蔭甫羣經平議諸子平議後聖徂曠千祀微言久歇絶六籍出燔餘諸老抱殘缺尚賴故訓存歷世循舊轍從宋洎有明軌塗稍歧别皇朝褒四術衆賢互摽揭顧閻啓前旌江戴紹休烈迭興段與錢王氏尤奇傑大儒起淮海父子相研悅謂高郵王懷祖先生念孫及其子文簡公引之子史及羣經立訓堅於鐵審音明假借王氏精於古音謂字義多從音出經籍多假借字皆古音本同也課虛釋癥結王氏每於句調相同者取彼釋此謂之句例又戒不得增字以釋經皆係從虛處領會旁證通百泉淸辭皎初雪王氏立訓必有確據每譏昔人望文生訓或一字而引數十證其反覆證明乃通者必曲暢其説使人易曉九原如有知前聖應心折俞君一何偉䠑步追曩哲盡發高郵奧擔囊破其鐍君昔趨承明鳳鸞與頏頡軺車騁嵩洛康衢誤一跌子雲宦不達草元更折節文囿芟天葩經神供淸醊厖言頗抵排諸子亦梳抉復從羣賢後森然立綿蕝嗟余老無成撫衷恆惙惙閎才不薦達高位徒久竊茲編落吾手吟覽安可輟酬王壬秋徐州見贈之作戒徒事秋搜理棹及淮甸塵坱正紛拏邂逅接英彥乖離七易霜天遣更相見後車攜嘉客同馳彭城傳輕颸浣素襟名論回深眷自云尋絶學塗軌約三變僑居蒸水陽親知斷遊宴閉戶自高歌寒宵百慮戰羣聖下窺瞰憂喜相慶唁盡抉諸經心始知老儒賤探篋出新編照座光如電説易燭大幽箋書袪衆眩旁及莊生旨抵巇發英眄大雅久不作小知各自衒漢宋互嘲譏餘炎更相煽遲君紹微言豪芒辨素絢高揭姬孔情洪曦消積霰湖湘增景光老懷亦欣忭附忮求詩二首善莫大於恕德莫凶於妒妒者妾婦行瑣瑣奚比數己拙忌人能己塞忌人遇己若無事功忌人得成務已若無黨援忌人得多助勢位茍相敵畏逼又相惡已無好聞望忌人文名著己無賢子孫忌人後嗣裕爭名日夜奔爭利東西騖但期一身榮不惜他人污聞災或欣幸聞禍或悅豫問渠何以然不自知其故爾室神來格高明鬼所顧天道常好還嫉人還自誤幽明叢詬忌乖氣相回互重者災汝躬輕亦減汝祚我今告後生悚然大覺悟終身讓人道曾不失寸步終身祝人善曾不損尺布消除嫉妒心普天零甘露家家獲吉祥我亦無恐怖右不忮知足天地寬貪得宇宙隘豈無過人姿多欲為患害在約每思豐居困常求泰富求千乘車貴求萬釘帶未得求速償既得求勿壞芬馨比椒蘭磐固方泰岱求榮不知饜志亢神愈忲歲燠有時寒日明有時晦時來多善緣運去生災怪諸福不可期百殃紛來會片言動招尤舉足便有礙戚戚抱殷憂精爽日凋瘵矯首望八荒乾坤一何大安榮無遽欣患難無遽憝君看十人中八九無倚賴人窮多過我我窮猶可耐而況處夷塗奚事生嗟愾於世少所求俯仰有餘快俟命堪終古曾不願乎外右不求
