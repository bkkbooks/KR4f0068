body:
  text: 隨州李君墓表道光二十六年某月隨州李君年八十四考終於里第其兄之子戶部主事樹人聞赴京師將去官持喪余往弔語之曰於古期功之喪仕者去職緦之喪士不得應舉今子之歸禮也樹人曰豈以為禮致吾哀爾且泣曰叔父葬有日既埋石幽宮維墓道當別立碣將揭其行義以示來者敬以屬先生則為余縷述一一甚詳樹人事余甚敬又以禮請余其可辭惟君受性剛介於事無所不敢凡所力任必自於公或私於己豪毛不以措意人所愈憚當之愈勇嘉慶初川楚教匪蜂起漢沔荆襄蹂躪殆遍隨州之西有環潭者巨鎮也賊將大掠而窟之君戒鎮家出一人負薪一束執長竿籠一炬臨水雁列竟夕焚薪火光亙六七里賊不敢渡隨以不陷近村有田久沒於水吏責賦於比鄰民絶苦之君遍哀諸司乞蠲無田之賦竟以得請其他施於鄉者稱是是故邑有舉也非其倡不興里有爭也非其解不息其貴盛也人皆稱願之其疾皆奔視其沒也哭之皆哀云李氏世居隨州家微也君少與其兄某發憤力學自度終無以大其門乃去為賈纍致千金一以資兄宦學不問久之乃為兄納金縣官得除為丞稍遷至雲南嵩明州知州而君亦以武學生入資為都司於是諸子翩翩文學仕進寖昌大矣君諱某字某曾祖某祖某皆不仕考某以嵩明君貴誥封奉直大夫子二人長某以嵩明君得子遲與為嗣後遂不還次某孫某某自嵩明君之沒二十年君撫諸孤恩勤備至樹人之官京師君一資之如資其兄其視兄子不知其非已子其視已子不知其非兄之子也嗚呼自衆人論之彼施於鄉者博矣自知道者觀之獨其施於家者不可能耳不可能也則亦不可朽也錢塘丁烈婦墓表道光二十有七年十月錢塘丁士元圖其五世祖妣烈婦周安人之墓道又譜其世系述其節行踵吾門而告曰士元之五世祖妣周氏南疆繹史曾以綴之列女傳者也實以順治初殉難今二百載矣維塋域有下窆之石不克宣刻事迹暴諸道路懼終將晦湮且無以興敕世世子孫先生天下之夙於文如不余屛請為文揚之墓是寵施吾族而厚吾先世以不朽也國藩禮辭不獲則謹次丁氏之系烈婦之畸行與聖朝旌顯幽微之義有顚有委以激懦者其語曰丁氏之別子居山陰者曰際龍世農也其元孫曰瑞南始為賈杭州是為烈婦之夫烈婦生而篤孝其母患心痛絶急或稱海上方指血和藥可立已烈婦則盡刺十指劑血以進病良已瑞南既貿遷於杭家中有無一仰烈婦裁穴而緝匱贏事而縮食秩如也順治三年我大淸兵下紹興土賊乘間四出焚掠烈婦挈二子奔竄賊數規之烈婦度終不得脫乃以二子付族屬之老成者曰以纍若襁歸兒父吾不可為賊辱遂自投水賊追救之不殊凡三溺乃絶年二十有三歲瑞南在杭聞難奔焉三日矣尸不腐蚊蚋不集其卒以六月四日天盛暑也瑞南悼妻之義死痛土賊之獸心曰孰不可居又奚為於故里遂占籍杭州前烈婦所挈竄之二子長曰聘賢季曰茂卿至是聘賢始為錢塘人矣其後百有數載至乾隆十四年孫可學上其事於朝乃蒙恩豫旌表又數載以可學官某官贈烈婦為安人凡九十載至道光二十五年烈婦之裔孫士元以進士入翰林丁氏寖寖昌大矣維明季之亂匹夫匹婦蹈死如歸者所在多有而食祿者往往濡忍不決或偷活無幾時旋亦周章就斃等死也血氣之軀非必久長不敝之物也彼獨須臾不審耳人固有斷不可不愼之須臾如烈婦之光顯豈須臾也哉亦且長久焉爾桃源縣學教諭孫君墓表君諱葆恬字劭吾孫氏善化人祖繩武歲貢生考先振舉人直隸隆平縣知縣隆平君無子有兄曰先捷縣學附生晚而生君乃兼以後隆平君禮律所稱一子承二祧者也君生貴重兩翁絶憐之不欲苦以學業君曲承歡意進則奉槃疾趨嬉遊無度退則顓顓自敕鑽仰羣書本末交修既治且篤年十七補諸生中式嘉慶已卯科舉人於是贈翁始知君之學之勤人之所不見也道光六年以大挑選桃源縣學教諭始至學官弟子或丙夜蹐門曰願有謁也君訶禁立絶諸生相戒惕息不敢近君稍稍引進矜其不能有某生才而無檢提學使者將除其名君召而數之曰若以惡聞於一縣今當痛自艾掃地自新則生蹈故則否生頓首謝不敢負學使者亦竟不黜生又有數十人以錢糧浮收訴縣令於上官刻碑縣門頗劫持之冀薄斂以寬民力縣令大怒將名捕致之法君從容開説仆碑弛獄久之一解縣令邵君以事罰富人錢二十萬輸於學宮陰以乞君君別藏之及以憂去官召諸生使具狀出錢豫之貫則朽矣在桃源九年大計卓異例以知縣赴部謁選君曰今日令長豈得行其志者吾上有老親又奚為於選人道光二十一年四月某甲子卒官春秋四十有八卒後三年君之子鼎臣芝房以道光乙巳科進士改翰林院庶吉士君以覃恩晉贈儒林郎又二年次子頤臣以丁未科進士改兵部主事又三年今上即位晉贈奉直大夫明年子觀臣中式咸豐辛亥科舉人又明年以宣宗升祔恩晉贈中憲大夫是時粵匪洪楊諸逆方犯湖南聯巨艦浮江而東荆揚鼎沸芝房及其兩弟歸自京師又二年頤臣觀臣相繼淪逝又明年咸豐丁巳十二月某甲子君之配桂太恭人卒死喪頻仍家稍替矣太恭人孝恭任淑處變不驚鎮筸有卒譁戕其長官濱沅州縣洶洶東徙避亂流賊有自通城竄長沙者家人亦鳥徙避之太恭人晏然守靜不為訛言震駭卒以無事方從官桃源學署贈翁縣學君實在養每晨興君布席太恭人進饌贈翁年幾九十與子婦為辭讓者再太恭人執玉賓賓恆有嬰兒之色見之者不知其娶婦生孫子已登科也太恭人之沒後君十有六載咸豐九年二月某甲子芝房奉母合葬於赤江先塋先事屬友人曾國藩表其墓國藩因循未即為而芝房不幸死矣始君以朴學沖襟未竟其施士林惜之又頤臣觀臣以才子早世又益惜之至芝房秉父之訓立朝有風節著書廩廩近古矣復以憂死每加惜焉君子小人知與不知所共悼痛者也且所謂天者何也高高者與人世回絶其好惡固當大異於人不可究詰耶抑食報有時遲之又久而後大定耶以君之積善教子芝房之所成立如此卓卓而猶不克顯則將來所謂大定焉者又可必其盡如人意而祚之無已乎於是為鑱諸石揭諸墓道以俟夫異時觀化人者取驗焉武昌張府君墓表君諱以誥字兢安號經圃湖北武昌人生而祗愼鞠躬容儀几几與人無疏戚必先遂其所好而後已以聽之所遇和順則曰彼實宥我余非能善此不順或有曲囏隱抑則曰我之咎也彼何罪即非禮相加尤不肖益泊然避之即嚴事我尤卑賤尤磬折與之鈞等遠近從之者洎未嘗見其有所抵觸拂戾也曽祖斯錕祖維滄國子監生考本用歲貢生廣濟縣學訓導訓導君既以能文鳴於時生二子長曰以謨成嘉慶戊辰進士君以少子承父兄之業折節力學尤善為制舉之文每搆一篇目營四海精騖九天之上不可得而究也徐而洗心冥默若無可言往往鑿險鉤深歸諸平淡無有窕聲曼色坐是屢擯於有司君亦不少變以求速化其為之益勤自七經孟子下逮有宋諸儒者之説莫不鑽研以是澤其文訓其徒友亦以是行之於宗族鄉黨里有貧不能舉婚喪者別差等周之宿負逋租無多寡一蠲之乞人有強暴者羣乞擁之山中將椎殺之一人寤曰此張某家墓地也張公長者無以訟事污纍長者相與徙之他所主者果大困於是識者歎君之德感及頑族矣道光四年八月望日以疾卒春秋六十有三配余孺人子二善鏞縣學生善準歲貢生孫成縣學生裕銘裕鈞縣學廩生裕鎮裕釗道光丙午舉人諸子孫皆以文行紹其家學而裕釗賢而能古文日昌大不可量君以道光十七年三月壬辰葬於大冶縣杉木橋東之張家山凡二十二歲咸豐九年裕釗致父之命乞余表其墓自制科以四書文取士強天下不齊之人一切就瑣瑣者之繩尺其道固已隘矣近世有司乃並無所謂繩無所謂尺若閉目以探庾中之豆白黑大小惟其所值士之蓄德而不苟於文者將焉往而不黜哉余為述一二以彰君之懿行亦深譏當世君子有衡文取士之責者尚知警焉翰林院庶吉士遵義府學教授莫君墓表君諱與儔字猶人一字傑夫貴州獨山人先世居江南上元縣有名先者明宏治時從征都勻苗因留守家焉三傳至如爵纍官遊擊君高祖也祖嘉能考強州學附生兩世皆以君貴敕封文林郎翰林院庶吉士妣皆封孺人君少隨兄與班讀書發聞兄沒持期服不與有司之試旋以州學廩生中嘉慶三年舉人明年已未成進士改翰林院庶吉士為紀文達公及洪編修亮吉所器異六年散館改知縣署四川茂州事徙鹽源縣知縣縣俗富人好買無征之田貧人鬻産售九存一仍輸全賦久輒逃亡君按籍責賦富人而貰其隱占之罪河西有寧遠子稅所府隸橫征君上言稅所非經病民得裁去木裏喇嗎左所有山産銀銅郡守徇姦民之求請布政司符縣開礦君持不可上狀以為木裏喇嗎去鹽源且二千里朝廷特羈縻之非真利其土也彼土荍糧不足於食朝定開廠暮聚萬人運夫倍之不幸爐礦寡耗衆散為盜非土司受其殃則吾蜀承其敝且姦民所呈地圖開礦去左所經堂甚遠今得左所人訊之銅礦得十分二銀者即經堂山也貪小利賈大釁事誠不便大吏韙君狀檄君往左所覆勘春暮鏟雪而行至則礦山者果在其經堂右其衆嚴兵以待既瞻君貌又聆溫語乃皆解甲羅拜謝使君幸奠我居世世不敢忘行事縣令入土司境戶率錢二百五十雜市雞豚百物居有供行有餽君盡卻其物又懸之禁比還老幼遮道獻酒其酋項克珠進銅佛為壽填咽苦不得前由是舉治行卓異政以大成充甲子科鄉試同考官以父憂去職服闋母張太孺人年七十餘矣遂以終養請凡事母十有四年入則牽衣索棗聽於無聲出則生徒雲從多文而栗既除母喪吏部檄之復起君北行至襄陽歎曰吾壯也猶不能枉道事人今能老而詭隨耶立歸請改教職選遵義府學教授遵義之人習聞君名則爭奏就而受業學舍如蜂房又不足乃僦居半城市旦暮進諸生而詔之學以盡其下焉者而已上焉者聽其自至可也程朱氏之論窮神達化乃不越灑掃應對日用之常至六藝故訓則國朝專經太師實邁近右其稱易惠氏書閻氏詩陳氏禮江氏説文詁釋有段氏王氏父子蓋未嘗隔三宿不言言之未嘗不津津聽者雖愚滯未嘗不怡如旱苗之得膏雨也久之門人鄭珍與其第五子友芝遂通許鄭之學充然西南碩儒矣道光二十一年七月二十二日卒官春秋七十有九將絶戒曰貧不能歸葬葬吾遵義可也其明年十二月二日葬縣東靑田山配唐氏繼配李氏子九人希芝次殤次方芝州學增生秀芝友芝辛卯科舉人庭芝拔貢生瑤芝生芝州學附生祥芝湖南候補縣丞女七人孫十一人曾孫五人君所為書有二南近説四卷仁本事韻二卷詩文雜稿為族十攜至廣西佚去友芝掇輯編為四卷友芝又別記君言行為過庭碎録十二卷既葬十有八年友芝以書抵國藩乞為文表其墓當乾隆之季海內矜言考據宗尚實事求是之説號曰漢學嘉慶四年仁宗親政大興朱文正儀徵阮又達以巨儒為會試總裁是科進士如姚文田秋農王引之伯申張惠言皋聞郝懿行蘭皋皆以朴學播聞中外科目得人可云極盛君於是時寂寂無所知名及君出而為吏恩信行於異域退而教授儒術興於偏陬校其所得與夫同年生之炳炳者孰為多寡未易遽定也余為表章一二士之孤行而憂無和者可自壯也鄧湘皋先生墓表先生新化鄧氏諱顯鶴字子立晚歲學成遠近稱為湘皋先生先生自甫掇科名即已厭薄仕進慏然有志於古之作者與同里歐陽紹洛礀東以詩相厲客遊燕齊淮陽嶺南所至悲愈抑塞一寓於詩覷幽刺怪遏之使平終歲顓顓誓不履近人之藩而又恥不逮古人每有篇什輒就礀東與相違覆引繩落斧剖晰毫釐書問三反或終不得當交嘲互訟神囚形瘁已而窒極得通則又互慰大歡以為解此者天下之至豪也先生以嘉慶九年甲子科舉於鄉道光六年大挑二等官寧鄉縣訓導凡十有三年引疾歸其遺外時榮而有事箸述與礀東略同然礀東持律矜嚴體勢稍褊先生則波瀾益壯跌宕昭彰礀東牆宇自峻與人少可先生則闡揚先達奬寵後進知之惟恐不盡傳播之惟恐不博且久用是門庭日廣而纂述亦獨多詩歌所不能表者益為古文辭以彰顯之其於湖南文獻􅊧討尤勤如飢渴之於食飮如有大譴隨其後驅迫而為之者以為洞庭以南服嶺以北旁簿淸絶屈原賈誼傷心之地也通人志士仍世相望而文字放佚湮鬱不宣君子懼焉於是􅊧訪濱資郡縣名流佳什輯資江耆舊集六十四卷東起灕源西接黔中北匯於江全省之方輿略備巨製零章甄采略盡為沅湘耆舊集二百卷遍求周聖楷楚寶一書匡謬拾遺為楚寶增輯考異四十五卷繪鄉村經緯圖以詔地事詳述永明播越之臣以旌忠烈為寶慶府志百五十七卷武岡州志三十四卷衡陽王夫之明季遺老國史儒林傳列於册首而邦人罕能舉其姓名乃旁求遺書得五十餘種為校刻者百八十卷瀏陽歐陽文公元全集久佚流俗本編次失倫為覆審補輯若干卷大儒周子權守邵州録其微言副以傳譜之屬為周子遺書若干卷所至釐定祀典褎崇節烈為召伯祠從祀諸人録一卷朱子五忠祠傳略考證一卷五忠祠續傳一卷明季湖南殉節諸人傳略二卷嗚呼可謂勤矣蓋千秋者人與人相續而成焉者也惟衆人甘與草木者伍腐而腐耳自稍有智識即不能無冀於不朽之名智尤大者所冀尤遠焉人能宏道無如命何或碌碌而有聲或瓌材而蒙詬或佳惡同時同位同而顯晦迥別或覃思孤詣而終古無人省録彼各有幸有不幸於來者何與先生乃舉湖南之仁人學子薄技微長一一掇拾而光大之將非長逝者之所託命耶何其厚也先生生於乾隆四十二年十二月十六日卒於咸豐元年閏八月二十五日春秋七十有五曾祖元臣祖勝逵父長智妻曹氏仁厚淑愼里黨欽之妾何氏子二琳廩貢生候選訓導前卒琮道光丁酉科拔貢生癸卯科舉人父歿後一月以毀終女子子三人孫四光黼光緗光紱光組曾孫大程自先生以名儒篤行昌其家羣從子姓皆孝友力學兄子瑤尤賢而能文章先生之書其不係於湖南文獻者又有南村草堂詩鈔二十四卷文鈔二十卷易述八卷毛詩表二卷校勘玉篇廣韻札記二卷自訂年譜二卷瑤皆敬謹弆藏其未刻者皆寫定可傳於世先生內行完粹教澤在人瑤所為行狀甚詳茲故不著獨著其治詩之精與其有功於鄉先哲者揭於墓道以式鄉邦而訊異世戶部員外郎彭君墓表君諱永思號兩峯世居湖南長沙少而峻整自將忱恂縝栗呐呐如不能語事至則剖晰毫釐枝分縷解辨窮萬變而斷以片言長老往往驚異以為吏才天所授也年三十二以嘉慶五年庚申舉於鄉十四年已巳成進士即用知縣明年署雲南嵩明州知州斷獄八百民譽翔洽徙補楚雄縣楚雄故附郭劇邑君至一以治嵩明者治之訟牒入立判紙尾期以某日質訊出則聽民遮道自言停輿研鞫前者辭窮後者大畏或就逆旅操筆定讞且判且詰決遣如神尤善為離參之法離參者如欲知豆價則先以麥問甲次以稻問乙次以梁問丙離其事異其人而旁參之然後進退以定豆價百不失一君用此術多奇中他人效之亦不能得民情偽也大吏以君既政成常使兼聽鄰縣之訟大姚有嶭繼賢者殺人獄成省中覆核則詭辭翻異問官數易爰書數十易終不能決君訊之七晝夜卒以參鞫其子乃得情實論決如律某官解餉銀至省發封則失銀而得數石以獄屬君君察石有蟲齧痕非道途間物因問輦運之卒寧覺馱負左右敧乎頗憶敧側始何日乎卒對某日過某店始覺右敧君自省返楚雄挾此獄與卒與石俱行途中雜采羣石較之皆不類至某店得石與蟲齧者類一鞫而伏遂抵旅店主人於法五侯神者不知所起淫祀也土民與江西客商爭祀搆訟數十年君以黷祭宿獄終無已時令舁神像至縣庭取筆判八字曰爾像不滅訟端不絶立飭吏卒捽而毀之兩造相顧愕眙而散蓋君之明而能斷類如此嘉慶十七年大姚令上變告烏龍口有衆數千嘯聚為亂郡守夜召君問策君立與區畫草數書抵旁縣戒勿輕動遣數人偽與賊昵者風使解散而濳發輕兵掩捕擒七十人罪數人而事定於是遠近又歎君才堪濟變也在滇六年凡三署大姚四署廣通兩署南安州再為鄉試同考官上官方以治行卓異薦君而君以父命不樂久為吏遂援例改就京職官戶部員外郎貴州司行走兼管廣東司議蠲逋賦釐定鹺政多所匡贊道光二年丁家艱歸自是山居二十載養母教子收族振貧祭田義渡凡諸善舉皇然如有失而急圖之陶然與販夫農父相狎自忘其為宰官之身人亦忘之亦愈敬之道光二十二年八月二十一日以疾卒春秋七十有四曾祖從美祖必化貤贈奉直大夫考勝桂誥封奉政大夫以五世同堂獲旌於朝祖妣氏范妣氏黃皆封宜人君之配黃恭人以賢孝特為舅姑所倚嘗一從夫雲南官舍而未及從宦京師凡綜理彭氏家政七十餘年敕始毖終內外秩秩室靡棄物里無違言姒婦有先亡者叔早逝者撫其諸子女公早寡者撫其孤甥曲有恩紀齒逾八十猶篝鐙紡績不倦同治元年閏八月二日告終蓋九十有六矣子申甫道光乙未科舉人候選通判婦陶氏安化文毅公女也女三皆適士人孫樹森同治甲子科舉人志本序本豐本孚本孫女十二申甫以道光壬寅九月某甲子葬君於長沙之文家段蓮花台同治壬戌閏八月某甲子葬恭人於木魚山墳壠相望約二百步而近屬國藩表其墓於是敘述大節而綴以銘銘曰流水不腐古傳斯語賢侯之明積勤所補壽母之壽本諸勞苦居上而逸天所不許降福者天宰天者人治獄陰德恆大厥門科名賡續有子有孫更千萬䙫長裕後昆大界墓表王考府君以道光二十九年十月四日棄養倏歷二十三年當初葬時吾父以書抵京師命國藩為文紀述先德揭諸墓道國藩竊觀王考府君威儀言論實有雄偉非常之概而終老山林曾無奇遇重事一發其意其型於家式於鄉邑者又率依乎中道無峻絶可驚之行獨其生平雅言有足垂訓來葉者敢敬述一二以示後昆府君之言曰吾少耽遊惰往還湘潭市肆與裘馬少年相逐或日高酣寢長老有譏以浮薄將覆其家者余聞而立起自責貨馬徒行自是終身未明而起余年三十五始講求農事居枕高嵋山下壠峻如梯田小如瓦吾鑿石決壤開十數畛而通為一然後耕夫易於從事吾昕宵行水聽蟲鳥鳴聲以知節候觀露上禾顚以為樂種蔬半畦晨而耘吾任之夕而糞庸保任之入而飼豕出而養魚彼此雜職之凡菜茹手植而手擷者其味彌甘凡物親歷艱苦而得者食之彌安也吾宗自元明居衡陽之廟山久無祠宇吾謀之宗族諸老建立祠堂歲以十月致祭自國初遷居湘鄉至吾曾祖元吉公基業始宏吾又謀之宗族別立祀典歲以三月致祭世人禮神僥福求諸幽遐吾以為神之陟降莫親於祖考故獨隆於生我一本之祀而他祀姑闕焉後世雖貧禮不可隳子孫雖愚家祭不可簡也吾早歲失學壯而引為深恥既令子孫出就名師又好賓接文士候望音塵常願通材宿儒接迹吾門此心乃快其次老成端士敬禮不怠其下泛應羣倫至於巫醫僧徒堪輿星命之流吾屛斥之惟恐不遠舊姻窮乏遇之惟恐不隆識者觀一門賓客之雅正疏數而卜家之興敗理無爽者鄉黨戚好吉則賀喪則弔有疾則問人道之常也吾必踐焉必躬焉財不足以及物吾以力助焉鄰里訟爭吾嘗居間以解兩家之紛其尤無狀者厲辭詰責勢若霆摧而理如的破悍夫往往神沮或具尊酒通殷勤一笑散去君子居下則排一方之難在上則息萬物之囂其道一耳津梁道途廢壞不治者孤嫠衰疾無告者量吾力之所能隨時圖之不無小補若必待富而後謀則天下終無可成之事蓋府君平昔所恆言者如此國藩既稔聞之吾父暨叔父又傳述而告誡數數矣府君諱玉屛號星岡聲如洪鐘見者憚懾而溫良博愛物無不盡之情其卒也遠近感唏或涕泣不能自休配我祖妣王太夫人孝恭雍穆娣姒欽其所為自酒漿縫紉以至禮賓承祭經紀百端曲有儀法虔事夫子卑詘已甚時逢慍怒則竦息減食甘受折辱以回眷睞年逾七十猶檢校內政絲粟不遺其於子婦孫曾羣從外姻童幼僕嫗皆思有惠逮之權量多寡物薄而意長閲時而再施太夫人道光二十六年九月十八日卒春秋八十葬於木兜沖其後三年而府君卒春秋七十有六葬於八斗沖遷太夫人之柩祔焉其後十年為咸豐九年已未十二月均改葬於大界府君之先六世祖曰孟學初遷湘鄉者也曾祖曰元吉別立祀典者也祖曰輔臣考曰竟希曾祖妣氏曰劉祖妣氏曰蔣曰劉妣氏曰彭以國藩忝竊祿位府君初貤封中憲大夫後纍贈為光祿大夫大學士兩江總督祖妣初封恭人後纍贈為一品夫人聖朝推恩追而上之竟希公纍贈光祿大夫妣彭氏亦贈一品夫人府君生吾父兄弟三人仲父上台早卒季父驥雲無子以吾弟國華為嗣孫五人軍興以來惟國潢治團練於鄉四人者皆託身兵間國華貞幹沒於軍國藩與國荃遂以微功列封疆而膺高爵而高年及見吾祖者咸謂吾兄弟威重智略不逮府君遠甚也其風采亦可想巳曾孫七人元孫七人凡茲安居足食列於顯榮者繄維祖德是賴於是敘其大致表於斯阡令後嗣無忘彝訓亦使過者考求事實知有衆徵無虛美云台洲墓表嗚呼惟我先考先妣既改葬於台洲之十三年小子國藩始克表於墓道先考府君諱麟書號竹亭平生困苦於學課徒傳業者蓋二十有餘年國藩愚陋自八歲侍府君於家孰晨夕講授指畫耳提不達則再詔之已而三覆之或攜諸途呼諸枕重叩其所宿惑者必通徹乃已其視他學僮亦然其後教諸少子亦然嘗曰吾固鈍拙訓告若輩鈍者不以為煩苦也府君既纍困於學政之試厥後挈國藩以就試父子徒步橐筆以干有司又久不遇至道光十二年始得補縣學生員府君於是年四十有三應小試者十七役矣吾曾氏由衡陽至湘鄉五六百載曾無人與於科目秀才之列至是乃若創獲何其難也自國初徙湘鄉纍世力農至我王考星岡府君乃大以不學為恥講求禮制賓接文士教督我考府君窮年磨厲期於有成王考氣象尊嚴凜然難犯其責府君也尤峻往往稠人廣坐壯聲訶斥或有所不快於他人亦痛繩長子竟日嗃嗃詰數愆尤間作激宕之辭以為豈少我邪舉家聳懼府君則起敬起孝屛氣負牆踧踖徐進愈色如初王考暮年大病痿痺瘖啞起居造次必依府君暫離則不怡有請則如響然後知夙昔之備責府君蓋望之厚而愛之篤特非衆人所能喻耳咸豐二年粵賊竄湘攻圍長沙府君率鄉人修治團練戒子弟講陳法習技擊未幾國藩奔母喪回籍奉命督辦湖南團練明年又奉命治舟師援剿湖北府君僻在窮鄉志存軍國初令季子國葆募勇討賊既又令三子國華四子國荃募勇北征鄂東征豫章粗有成效而府君遽以咸豐七年二月四日棄養閲一年而國華殉難於三河又四年而國葆病歿於金陵朝廷褎恤並豫美諡而國藩與國荃遂克復安慶江寧兩省雖事有天幸然亦賴先人之教盡驅諸子執戈赴敵之所致也初國藩以道光間官京師恭遇覃恩封王考暨府君皆為中憲大夫祖妣暨先母皆為恭人逮咸豐間四遇覃恩又得封贈三代皆為光祿大夫妣皆一品夫人今上嗣位四遇覃恩又以戰績兄弟謬膺封爵於是曾祖府君儒勝王考府君玉屛暨府君皆封為大學士兩江總督一等侯爵曾祖妣氏彭祖妣氏王先妣氏江仍封一品夫人嗚呼叨榮至矣江太夫人為湘鄉處士沛霖公女來嬪曾門事舅姑四十餘年饎爨必躬在視必恪賓祭之儀百方檢飭有子男五人女四人尺布寸縷皆一手拮據或以人衆家貧為慮太夫人曰某業讀某業耕某業工賈吾勞於內諸兒勞於外豈憂貧哉每好作自強之言亦或諧語以解劬苦咸豐二年六月十二日疾卒九月二十二日葬於下要里宅後府君以七年閏五月初三日葬於周璧沖至九年八月某日並改葬於台洲之貓面腦府君有弟二人仲曰上台年二十有四而沒府君視病年餘營治醫藥旁皇達旦季曰驥雲推甘讓善老而彌恭無子以國華為之嗣後府君三年而沒女四人其二先卒其二繼逝諸子今存者惟國藩與國潢國荃三人諸孫七人曾孫七人於是略述梗概以著先人懿德垂蔭無窮而小子才薄能鮮忝竊高位兢兢焉惟不克負荷是懼云海寧州訓導錢君墓表君諱泰吉字輔宜號警石先世本何氏明洪武中有依海鹽錢翁鞠育者遂承錢姓厥後徙居嘉興代有聞人至文端公而益大文端公諱陳羣以侍郎豫告特加刑部尚書晉贈太傅君曾祖也祖汝愨早卒本生祖汝恭安慶府同知父復大興縣知縣君少而苦學濳心孤往從兄曰儀吉者字衎石博通羣籍早有高名君事之師友之間兄弟常以純儒相勉蓋自弱冠後遠近已盛稱嘉興錢氏二石云衎石以翰林改官戶部擢御史給事中久處京師其後客遊廣東汴梁君則以廩貢為海寧州訓導者近三十年與給諫君離多合少而書問叢沓咨詢學術動逾數千言自周秦諸子馬班羣史許鄭詁訓杜馬典章洛閩之淵源唐宋名賢之詩古文辭以及目録校讐金石書畫方志雜説一孔半枝無所不詢蓋亦無所不辨或獻一疑而詰難十返或尚諭前哲評隲時流雜以嘲詼鄙諺窮極理趣故二石家書蔚然天下之至文也給諫晚而搜刻經説刊正訛謬君自中年即好校古書假人善本及先輩評點之册寫而注之眉端如史記前後漢書晉書集韻元文類禮記集説等編皆勘校數周一字之舛旁求衆證嘗著曝書雜記以發其凡嘉慶中海內猶尚考據之説尊漢而黜宋先博覽而後躬行獨桐城姚氏鼐恪守程朱孤行不惑宗主義理不薄考據而二石風指乃與姚氏相近其論文亦頗法姚氏嘗稱以為字體故訓者漢儒之小學也曲禮少儀者宋儒之小學也二者皆扶植基本而宋重明倫於道為尤尊兄弟相與修飭人紀誦述先德給諫輯廬江錢氏藝文略君則饌淸芬世守録皆表一門之懿行以播芳馨而詒典則先是文端公嘗進呈其母畫册高宗賜題十詩發還原册並書淸芬世守四字逮文端公致仕還鄉高宗寄賜册卷詩篇纍數千首君饌輯此録具載君臣賡和曠古無倫又紀錢氏十餘世翰墨及名公巨儒題詠上以著祖宗文獻之盛下以勗後人孝友於弗替其敘軼事述彝訓懇懇乎懼來葉之遺墮有味哉其言之也咸豐庚申辛酉之際粵賊縱橫浙中君展轉播遷最後由江西以達安慶國藩乃獲與相見以飄泊兵間偷得骨肉完聚也則為之破顏一喜語及世事滄桑邱墓成毀不可知則又䀌焉以悲其明歲同治二年十一月草日卒於安慶旅舍將沒猶以先世文字之責未能及身整理為恨足以知其志之所存巳君配胡氏誥封恭人子二長炳森道光甲辰舉人出為家兄學源後前卒次應溥以拔貢官吏部主事軍機處行走加四品卿銜君以子貴纍封朝議大夫女六人孫七人孫女三人君所箸又有學職禾人考海昌備志甘泉鄉人稿亂後板燬僅有存者古今才智之士常思大有為於世其立言常雄駿自喜若文章不求雄駿而但求平淡德業不求施於世而但求善於一身一家此殆非智者愈快事也具無所不能之才斂之又斂彌晦焉而彌愈快則其自得於中者必大矣夫自得之學惟君其庶幾哉新寧劉君墓碑銘君諱時華字廷材號寶泉先世自江西徙湖南之新寧曾祖有義祖儒禹府學增生父世貴太學生家貧為商賈化居以自給君生有至性不忍其父久勞市􅒡乃跪請曰大人宜少休兄學且有成弟弱兒願代父勞而服賈矣遂遊資於江漢之間量物度時廣取而節用後人而往先人而歸家用阜康親以大悅父病在視終宵醫者言痰鹹可生淡則死君輒以手承痰嘗之味淡因大哭父沒母亦前卒則推其所以事父者以事繼母歸自武昌繼母不懌長跪自陳遲歸之咎繼母病服勞達旦營治藥物必自其手不自他人繼母沒則推其所以事親者以事長兄而蓄季弟兄病調護年餘兄卒弟後卒則又推恩以恤其嫠以鞠其孤子厥後兩家孤兒皆成立兩嫠皆旌表於朝壽皆七十八十涕泣頌君之德不敢忘云新寧山邑也僻在楚南黔粵之交巨嶺層巒穹窿雜襲鬱撓而不得少舒自古未聞偉人傑士出於其間亦乏甲乙科第居民治生纖嗇有唐魏之風獨君與江太公一峯輕財好義不屑屑於自殖江君之子諡忠烈者仕至安徽巡撫而君之子蔭渠今為直隸總督並有勳伐為時名臣蓋褊陋之俗一變而山川之氣昌矣當君初賈異縣頗求饒益以娛親心既而經紀有方智足以擴其業利足以仁其三族所得資財隨手散去一以濟物為功息耗都不訾省鄉里除道成梁捐金錢惟恐不贍施藥療疾惟恐不周嘗遇益陽大水買小舟拯百人藁葬數百人新寧大飢餼鄰里親舊粟日半升全活無算又嘗修育嬰堂建忠義節孝祠皆縣中前此所無自君創之城東北有義冢歲歲常以冬春培其陀塋而植其仆碑城南有義孰器物缺乏常於君家取給焉人或謂君歲入幾何施諸人者什七而自謀不及什三後將難繼何不頗買田宅為子孫稍立基業君笑謂家有薄田自足供疏食焉用多為吾以人情為田以培養士類為種耕不計年穫不計世庸詎知留貽子孫者不更大乎逮君沒而門內鼎興君子四人長名長佑即蔭渠也以拔貢生歷官廣西巡撫兩廣總督直隸總督加兵部尚書銜次長佐某官次長伸長健某官孫某某曾孫永祚永祺天子褎長佑功贈君暨君之祖父皆為光祿大夫君配鄭氏暨祖妣某氏妣李氏曾氏皆為一品夫人蓋君言於是果驗為善之報抑何捷也鄭太夫人恭儉寬仁悉秉夫教姒婦娣婦寡居敬之終身有恩紀君卒以道光三十年六月十四日壽六十有一太夫人先三日卒壽五十有九是歲十二月某甲子合葬新寧西鄉楊溪村之鸞嶺昔道光丁未戊申間江忠烈公嘗為余稱道蔭渠之賢兼述其世德及蔭渠入京聞親之訃求余文銘其墓展轉兵間久疏文字越今十有七年始得表而銘之銘曰舉世奔利獨行抱義庸言庸德感格天地外救飢溺內撫諸孤仁心難慊百憂一愈孰云不顯在幽彌馨孰云無報如影隨形神覿在室奇福在庭郎君崛起為國干城削平寇亂鼎祭鐘銘自天錫寵褎榮先隴夫彝之南萬山環拱我表其阡來者欽竦母弟溫甫哀詞咸豐五年十月賊目偽翼王石達開引其黨自湖北通城竄入江西別有廣東匪徒曰周培春葛耀明關志江者自湖南茶陵州竄入與石逆相聚於新昌縣周培春等投歸石逆部下願為前驅石逆授之偽職將軍總制軍師旅帥之類兩逆黨者合並為一江西亂民從之如歸贛水以西望風瓦解十一月初十日攻陷瑞州府明日陷臨江晦日袁州繼陷遂圍吉安明年正月二十五日陷之余檄副將周鳳山率九江之師入援二月十八日軍敗於樟樹鎮而撫州建昌兩府以是月之季相踵淪沒國藩躬率水陸諸軍自湖口入援而南康又沒於賊矣九江自為賊踞如故凡江西土地棄之賊中者為府八為州若縣若廳五十有奇天動地岌人心惶惶訛言一夕數驚或奔走奪門相踐死楚軍困於江西道閉不得通鄉書則募死士蠟丸隱語乞援於楚賊亦益布金錢購民間捕索楚人致密書者殺而榜諸衢前後死者百輩無得脫免吾弟國華溫甫自湘中間關走武昌乞師以拯江西於是與劉騰鴻峙衡吳坤修竹莊普承堯欽堂率五千人以行而巡撫胡公奏請以溫甫統領軍事出入賊地盛暑鏖兵凡攻克咸寧蒲圻崇陽通城新昌上高六縣以六月三十日鋭師翔於瑞州由是江西湖南始得通問而溫甫亦積勞致疾矣七月十六日棹小舟舁疾至南昌兄弟相見深夜愔愔喜極而悲涕泣如雨弟疾寖劇治之多方不效至九月乃痊復還瑞州營次瑞州故有南北兩城蜀水貫其中劉騰鴻軍其南溫甫與普承堯軍其西北賊於東隅通外援市易如故七年正月豫率吳坤修之師自奉新至東路始合長圍掘塹周三十里溫甫則大喜吾攻此城久不舉今茲事其集乎不幸遭先君子大故兄弟匍匐奔喪入里門宗族鄉黨爭來相弔亦頗相慶慰國藩得拔其不肖之軀復有生還之一日溫甫力也溫甫既出嗣叔父以咸豐八年二月降服期滿復出抵李君續賓迪菴軍中李君與溫甫為婚姻益相與講求戎政晨夕咨議是時九江新破強悍深根之寇一掃刮絶李君威名聞天下又克麻城蹴黃安喋血皖中連下太湖濳山桐城舒城四縣席全盛之勢人人自以無前師鋭甚溫甫獨以為常勝之家氣將竭矣難可深恃時時與李君深語悚切以警其下亦以書告豫旰上竟以十月十日軍敗從李君殉難廬江之三河鎮嗚呼痛哉曩吾弟以新集之師千里赴援摧江西十萬之賊而無所頓今以皖北百勝之軍萃良將徑卒四海所仰望者而一覆之而吾弟適丁其厄豈所謂命耶常勝之不足深恃吾弟之智既及之矣而不肯退師以圖全營壘以十三夜被陷而吾弟與李君以初十之夕並命同殉又不肯少待以圖脫免豈所謂知命者耶遂綴詞哭之詞曰觥觥我祖山立絶倫有蓄不施篤生哲人我君為長魯國一儒仲父早世有季不孤恭惟先德稼穡詩書小子無狀席此慶餘粲粲諸弟雁行以隨吾詩有云午君最奇挾藝干人百不一售彼粗穢者乃居吾右抑塞不伸發狂大叫雜以嘲詼萬花齊笑世不吾與吾不世許自謂吾虎世棄如鼠相舛相背逝將去汝一朝奮發仗劍東行提師五千往從阿兄何堅不破何徑不摧躍入章門無害無災塤篪鼓角號令風雷昊天不弔鮮民銜哀見星西奔三子歸來弟後季父降服以禮匝歲告闋靡念苞𣏌出陪戎幄匪辛伊李既克潯陽雄師北邁剗潛剜桐羣舒是嘬豈謂一蹶震驚兩戒李既山頽弟乃梁壞覆我湘人君子六千命耶數耶何辜於天我奉簡書馳驅嶺嶠江北江南夢魂環繞卯慟抵昏酉悲達曉莽莽舒廬羣凶所窟積骸成嶽孰辨弟骨骨不可收魂不可招崢嶸廢壘雪漬風飄生也何雄死也何苦我實負弟茹恨終古豫於道光甲辰寄諸弟詩有云辰君平正午君奇屈指老沅真白眉辰君謂弟澄侯生庚辰歲午君謂溫甫生壬午歲老沅即沅甫也吳君墓志銘吾邑吳君榮楷既以道光辛丑成進士將之官浙江乃手其先人狀請曰吾父母棄養十二年矣窀穸之事粗已安吉尚未有以銘幽室子其為我銘之固辭不獲按狀先生姓吳氏諱文深字致遠湘鄉人曾祖文章祖太若父振世皆以願謹稱家故饒振世公既老攜資客遊常德先生從之行留明遠翁家居明遠先生兄也常德去湘鄉千餘里逾二年而振世公卒鄰里無行者利其有率衆闖然至喪次叫囂隳突雜以胥役先生雞斯徒跣擊胸如壞牆號泣向衆曰孤兒在此環顧無功緦之戚無密友幹僕若輩不哀吾喪而迫人於難是可忍乎且胥役何為者孤兒請以泣血濺縣官之庭矣衆瞪視各鳥獸散乃部署喪事從容扶櫬歸湘時先生年十六歲也既歸事母益謹然家益落遂與明遠翁經營生計惟母養特豐他則皆從儉約久之復稍裕吳氏自鼎革後譜牒散佚先生力為倡修特徵詳核數年而成既又倡修家祠明遠翁捐基地數十畝先生竭力締搆夫其拮據漂搖之際旁午未遑而能敬宗收族先其大者可謂知本矣道光某年某月某日卒年八十有四葬某縣某里某原配宋孺人合葬焉宋孺人少先生十餘歲既來歸尤耐艱劬振世公之客常德孺人不逮事也逮事姑曲意承歡如恐失之性好恤窮困鄰婦紡績無資則罄所有給之先是明遠翁常外出有子名榮林者絶穎異先生擇師督讀視猶已子遂以成立為名諸生已而榮楷兄弟皆從之受業孺人之視榮林也不以為姪也以為師也邑人咸謂先生之教子孺人實贊之云某年月日以疾卒年六十有一子二人長榮楠邑庠生次即榮楷孫光煦邑庠生次某次某女孫七人銘曰少而禦侮豪強伏長而克家宗族睦耄而韜光訥且朴訥乎朴乎黑而雌者福乎斧之藻之舟之方之夫子之協琴瑟以將之宰樹靑靑有桐有梓我銘諸石以妥泉宮以昌其孫子彭母曾孺人墓志銘天道五十年一變國之運數從之惟家亦然當其隆時不勞而坐獲及其替也憂危拮據而無少補救類非人所為者昔我少時鄉里家給而人足農有餘粟士世其業富者好施與親戚存問歲時餽遺繦屬自余遠遊以來每歸故里氣象一變田宅易主生計各蹙任恤之風日薄嗚呼此豈一鄉一邑之故哉王姑彭孺人吾祖之伯姊其冢婦又吾姑也兩世之好視他戚尤厚已王姑之未嫁也事吾曾祖王父母以孝聞既適彭宜仁先生相夫敬克厥愛無片言稍忤自吾成童以後王姑已五十餘其堂上舅姑八十有奇矣每見王姑奉甘旨未嘗不潔議酒食未嘗不豫大而課讀勸農未嘗不營慮小而廁牏灑掃未嘗不躬親也蓋余所見賢母無如王姑勤者早歲物産殷饒內奉菲薄外圖豐潔比年以來稍稍歉絀矣已亥秋余將入都供職走辭王姑視其庭除氣象不侔憫其愈勤又驚其衰為之泣王姑亦泣蓋心知其不可復見而哽咽不能言也竟以次年春卒豈不悲哉王姑生乾隆二十九年甲申十一月十七日卒於道光二十年庚子三月二十三日壽七十有七葬湘鄉二十四都西坤山陽首辛趾乙子三人長慶齡豫姑夫也先孺人二年卒次慶吉次慶也好學能文孫六人育耒育楛育橘育椿育杖育麓女一孫女一人銘曰懿我王姑既莊以嬺佩管舟觿德容棣棣勗哉夫子儷光儕鴻五十餘載無遂有終曷瘁厥躬言育我鞠無恥我罍實繁旨蓄離離令問匪邇伊遙貽澤之蔭何幽不喬南山􅟭崒宰樹靑靑弗騫弗拜萬代千齡余安人墓志銘攸縣余世校客京師五年聞母訃將奔喪以銘墓之文來請且曰世校生不能侍槃匜歿不能視含斂是罪人也先生幸次吾母淑行以光幽室按狀安人姓談氏衡山舉人昌明之孫廣西巡檢禹門之女七歲喪母事繼母以孝聞適攸別駕余君君山襮順衷和翼翼如也久之別駕君之漢陽分府任以家事屬安人時堂上舅已棄養姑老矣諸子弱小不識事安人謀初毖終巨細必躬祭必虔奉免薧必時委諸子於學朝而蠲饎禮師夕而課男旋課女課畢而紡績而經營錢布如是者十餘年而精力衰矣道光辛丑某月某日以疾卒春秋六十有七以某年某月某日葬某縣某里某原子四人長世柄次即世校廩貢生次世芳次生春縣學生女一孫九人某某世校之入都也安人拊其背而戒之曰去去強飯鄉里齷齪終不得進取京師文物殷轔賢士大夫繹繹如繁星汝往勗哉名自可致學可染人道德有軌塗可循而靑紫可拾也往矣勿吾念今世校雖不得爵位而業日進聲聞日敷謂非安人之教哉嗚呼可謂知其大者巳是宜銘銘曰維車有輔員於輻維矢有房利於鏃維壼有賢維家之福光光別駕亦載其贄愔愔碩人既詒斯肄雖則詒肄無儀以無躓無躓於山曰巢於顚口卒瘏兮手復胼鳳之雛兮谷之遷不得反哺兮涕漣漣銘幽表淑兮千萬年石不爛山不騫陳岱雲妻易安人墓志銘道光二十四年正月陳君岱雲喪其配易安人則大戚哀溢於禮已而謂國藩曰子知吾之哀乎吾祖自康熙間由茶陵徙長沙六世百餘年今其存者五人吾門祚之衰可知也吾父之沒至今十六年而死亡相繼凡十三役吾母之不能一日以歡可知也吾妻從宦五年既沒而斂求衵衣無一完者吾之貧可知也人之居此世者謂何吾欲不過哀得乎則又曰吾妻之賢子宜有所知請為銘余曰然固知之蓋安人卒之前一歲陳君嘗大病余朝夕存問備得安人侍疾狀他日又得陳君所述以是頗詳陳君之病凡三閲月矣安人單憂極瘁衣不解帶者四十餘日凡可以自致者無弗致也久之則禱於室神求促其身之齡以益夫壽猶不應六月丙戌乃割臂和藥以進當是時安人之母弟易光蕙及陳君之友三數人者皆在惶愕不知所為國藩則仰天歎曰陳氏纍世賴以不墜者獨此人耳而有他乎然已無可奈何明日疾乍平則皆訝光蕙覘安人衣袖血迹稍廉得之不敢以詢又數日疾漸瘳乃詢之安人曰其有之此不幸事耳勿復言傷病者心也道微俗薄舉世方尚中庸之説聞激烈之行則訾其過中或以罔濟尼之其果不濟則大快姦者之口夫忠臣孝子豈必一一求有濟哉勢窮計迫義不反顧效死而已矣其濟天也不濟於吾心無憾焉耳安人本醴陵人居長沙處士昌綱之孫歲貢生履元之子以孝謹特為父母所愛生二十二歲矣而難其適有王秀才者自負知人謂歲貢君曰茶陵陳某神仙人也即擇壻不可失此子今貧不能衣食數年後當為達官不者且抉吾目也是時陳君之元配沒二年矣既歸陳不逮事舅以事其父者敬姑而以事其母者致愛焉以是得姑歡凡修所職皆衷於大體無巨細必慤詩曰何有何無黽勉求之茲可謂賢矣况有至行足感神明者哉安人生於嘉慶某年月日年三十有一生子男二人長遠謨次遠濟生四十日而安人卒女一人將以某年某月某日歸葬於某縣某鄉某原余既重其請乃先期銘之以激懦者亦少塞陳君之悲陳君名源兖今為翰林院編修纂修國史也銘曰民各有天惟所冶燾我以生託其下子道臣道妻道也以義擎天譬廣廈其柱苟頽無完瓦自今無以身代者有一於此雙蓋寡憂勞積劇焉可支天之所隕非人尸跖修淵短誰敢訾銘茲大節貞厥垂有他淑行以類推新化鄒君墓志銘君諱興愚字子哲鄒姓先世由江西再遷至湖南新化居焉有瑂玉者以選拔貢生官永明縣教諭是生祖詢縣學生於君為高祖曾祖某祖某皆不仕父某家貧客遊陜西紫陽族子有先家於是者遂因其戶籍補紫陽縣學廩膳生生二子長興魯次即君君生數歲而廩膳君卒依母曾氏力食僅存痛繩於學年十六仍補縣學生二十五舉道光庚子陜西鄉試甲辰再上公車不第歎曰吾不得祿餓死無所損然如吾母何益發憤不歸日刻錢以食為文務極思同業者或不能究其指明年乙巳二月疾作不得與禮部試竟以六月九日卒於京師年三十耳君性戇直糾友之違盡言無巽有餽以財辨義無小非其義卻之無大安貧若天性然庚子赴省試其師陳僅資之金君盡以金奉母而自囊錢八百負布被徒步露宿行千里僅益敬之僅故為紫陽令見君文奇之憐愛如親戚月繼米贍其家久之僅徙官他縣移君家就養官所而別以資贈君之京師君且死泣曰吾負大恩未報命也遂絶既卒其友人江忠源職其後事其從兄子律歸其喪紫陽將立其兄子隆岱為嗣而國藩買石先事為銘銘曰是人非蚓生世實艱爰有狷者伯夷是班有投以幣擲棄如菅或泰於取負恩如山恩不果酬母不終將又寡厥配厥氏維黃僅遺孑息天其俾臧吾言可信納劵於藏單縣典史張君墓志銘君諱鼎五字薌塍世居浙之蕭山曾祖朝琮直隸通永道祖文瑞山東靑州府海防同知考學斯廣東主簿主簿君兄弟三人長偉山次滌三皆不仕滌三以子湘崖官汀州知府故贈官如其子主簿君官粵噤不一施遽卒君時五歲耳依母童安人萬里返葬孤貧赤立斬焉自修久之乃遊楚依從兄黃陂令湘崖湘崖由楚徙豫三遷而官汀州知府君一從焉居亡何荆梁教匪蜂起蹂躪三省兵餉縻萬萬朝廷議民有輸金縣官得除為吏嘉慶四年君由是官山東署沂水縣丞補單縣典史單故多豪右素慢易尉君抑桀扶尫峻拒干謁傷恤獄囚痛與糞除漉其污溼而時其凍餓後三十年君退歸囚有流紹興者塗遇君匐伏叩頭君錯愕囚曰某單縣人也淸獄之惠不敢忘宦單十年歎曰尉所得為者吾既為之矣吾所欲為者豈尉謂哉間竟移病歸而山東舊僚酷慕君纍書招致乃復薄遊齊魯傳客淮泗之間至七十二歲始杜門不出又一紀乃考終云君於孝友若趨利然初喪父童安人撫之積劬僅存內外無倚寒飢力學夙興母爨汲君負薪恐傷母手盡拔芒刺然後之孰或竟日無所得炊母子對泣已而互慰汀州君以事牽連被劾君營護奔告凡四晝夜行千餘里卒脫汀州君於是人人翕然伏君之內行也道光壬寅十月四日卒配陳安人祗順敦儉見者師效子男子三人長錫戊浙江鄉試舉人次百揆以一甲進士通籍為翰林院編修次百衢殤女子三人長適某官某次適某官某次適某孫某某百揆之舉於鄉與余同年相善也以某年月日葬君某縣某原來徵銘銘曰析楠作桷蒿作梁大小易位今古傷有嘉一尉仁且強皓首卑栖不得驤身之乖時遌厥子愼終卜臧魂藏此我最其行垂孔軌萬千億年無壞毀前海寧州知州長沙李君母黃宜人墓志銘宜人善化黃君孝職之子長沙李君天錫之婦敕贈奉直大夫熙臣府君之妻而浙江海寧知州象昺之母也海寧之為良吏楚之賢者與浙東西之士庶莫不知聞而海寧君曰非吾之能繄吾母之勗宜人之歸李氏家微也歲入不足自贍贈君則奔走以取給大府之從事郡縣吏之賓客裘而往葛而不歸朔而寓書再晦而不達如是以為恆宜人挈巨省細一不假人督二子入學晨有責夕有程就傳之所需不足則貨田宅資之海寧以選拔貢生廷試為縣令每獄成宜人則詢曰母已冤乎族黨有來官所者則曰母貧乎即有平反而餽佽厚則宜人喜即無所平反或餽佽稍廉則慍見於色故海寧之發名樹績雖贈君亦嘗曰宜人之力也海寧以道光戊戌奉贈君之喪歸葬宜人雖老習勤不改又六年甲辰正月六日年七十二以卒即以其年某月日葬某鄉某原有子二人長象晟先十年卒次即海寧孫六人某某曾孫二人某某宜人以道光十四年册立孝全皇后恩敕封孺人卒後一年皇太后七十萬壽天子推恩錫類乃得誥贈宜人又二年乃諉余文其幽將追事焉末世稱述列女好道其奇特者異則異矣而難為式也方贈君客遊四方每出屬曰上吾父母下吾子以付女及宜人侍姑疾三年無絲毫異志舅病大漸贈君自客遠歸越夕而遭喪大慟不知所為而宜人於附身之具已夙嚴矣夫其教子也如彼而其事親又如此此殆庸行無足標絶者與然而難可幾矣銘曰洞庭之南有賢刺史龜食筮祥葬母於此誰與銘者漣水曾氏深刻大書以詔無止適朱氏妹墓志適朱氏妹吾父之第三女子也幼而病痀父母恐不賓于壻特愼許人年二十二矣友人某告余曰聞若為女弟擇所歸有朱氏子詠春願而敦訥而慈愛必得佳壻莫良此子國藩卜之吉請於父母而嫁與之道光十九年十月也是歲國藩以初廁詞臣乞假家居而朱氏之諸昆亦適有舉於鄉者兩家父母大父母各無恙里人頗稱門祚之盛親迎之夕姻婭族黨會者數百人越三日內無長幼皆以為賢外無戚疏皆以為祥比及反馬之期則舅姑之所職者悉以委決新婦妹故明慧粗解書數條分件布咸有節文由是遠近謂朱氏有賢幹婦矣二十六年丙午以産難卒凡春秋二十有九室於朱者八載有子一人某即於九月某甲子葬於某縣某里某山吾姊妹四人季者早殤二長者並窮約不得怡獨朱氏妹所處稍裕而少遘痼疾又離娩厄以死何命之不淑也妹卒以八月晦日不踰月而吾祖母棄養國藩竊祿京朝發一家書而兩遭期功之喪又何痛也於是泣識其略使詠春追埋諸幽且敘其內外家之系而聲以銘詩以宣吾悲銘曰有女曾姓聖為宗父班泮水祖辟雍兩世大夫帝褎封母江夫人劬且恭鞠茲惠質艱厥從嬪朱其先國比莒納夫方軌轡如組君舅鎮湘鄉所舉銘者母兄滌生父濫羼朝官無寸補滿妹碑志滿妹吾父之第四女子也吾父生子男女凡九人妹班在末家中人稱之滿妹取盈數也生而善謔旁出捷警諸昆弟姊妹並坐雖黠者不能相勝然歸於端靜笑罕至矧道光十九年正月晦日以痘殤明日吾兒子楨第相繼亡妹生於世十歲兒三歲也即日瘞諸居室之背高嵋山之麓吾母傷弱女與冢孫哭之絶痛間命諸子曰二殤之葬也無碑以識之即墳夷級陊誰復省顧者國藩敬諾亡何繫官於朝公有執私有濡久不得卒事越八年而適朱氏妹徂逝以其新悲觸其夙疚愴然不自知何以為人也於是粗述一二遺家人植石墓北且綴之辭使有垂焉銘曰去家不能三百武二殤相依宅茲土狐兔安敢侮荆門州學正郭君墓銘物有初阜或嗇其終有馝於後而窒其躬陶公之山濳蟠􅞀載雙雛雲興呿騰滄海持鐸再徇當陽荆門祁祁學子如飢授飧刑獄有針扇仁孔永胡德之遐光不長炳八龍岡下斑竹原中埋我銘語載奠幽宮善化夏母楊宜人墓志銘宜人寧鄉縣學士楊君開梅之孫處士應灼之女善化貤贈奉直大夫夏君諱某之子婦贈奉直大夫諱某之配也宜人在家則溫恭孝豈偏獲於親擇所宜歸莫良夏氏既歸事舅貤贈君及姑劉太宜人逆志而籌之未命而赴之甘旨之調不躬不進贈君前所配黃宜人者已早卒僅遺一女有兄與嫂亦卒遺三子贈君又仍歲多病家無巨細一委宜人宜人共潔祭祀斟藥禮醫裁贏補絀公私井井視前女如已女不敢毫末替焉視已子如從子不敢毫末加焉督諸子之學曰省而月稽師孰之饌豐倍其室就試於有司出必戒反必詰其見録也悅而不溢其黜也敕而不怒以是諸子皆底於成道光十七年次子家泰舉於鄉又三年庚子長子家鼎舉焉又三年癸卯季子家升繼之又二年乙巳家泰登名於禮部主政於吏部值皇太后七十聖節天子大孝錫類遂得覃封褎封兩世而家鼎亦以是年充景山官學教習蓋自贈君之歿至是二十年中間郡縣行省之試獲雋者無歲無人而婚嫁喪紀之役亦薦至不絶皆宜人一心營治而亦以勞肄甚矣道光二十六年八月十九日以疾卒春秋六十有八即以其年十二月某日葬於寧鄉黃花塘鳯形山之陽有子男六人長次即家鼎家泰又次家豫太學生又次家謙早卒又次即家升也又次家賁出嗣從祖兄弟萬程後女二人長適蔣前卒次適侯孫男十二降服孫二人孫女八曾孫女二人宜人寬仁周摯救困如焚深達大義不徇私愛疾篤顧言曰寄語鼎兒泰兒努力當官無以家為念以二子時在京師也將奔喪以銘屬國藩越二年乃銘之而追內諸幽銘曰𣏌恪賓周別氏維夏承馥遠牟踵興達者宛宛女宗亦大其閭迪將多子並騁天衢諸孤遺經草年手澤彯其羣起下報我特報以吾職不告實勞職之靡負厥伐斯高鐫於樂石千世其牢祖四世元吉公墓銘道光歲戊申家叔父為太高祖考妣置祠宇其明年又為修其墳域乃郵書於京師命國藩記其源委國藩於公為六世孫公之行事不盡悉謹按家乘及傳聞於祖父者以表於公之墓道公諱應貞字元吉遷湘四世祖也少貧手致數千金産室廬數處盡以豫其子而自置衡邑之靛塘灣田四十畝以老焉公沒後子孫歲分其租以為常至嘉慶歲丁巳家祖及族長尊三以彰二公糾族之人議積一歲之租以為公淸明之祀今所置圳上之田是也家叔父所修祠宇在焉而靛塘灣之田族之人又於嘉慶壬申議永為公祀田矣獨公之墓未修族衆憂之家叔父乃慨然任之糾工不一月竣距公沒時已八十餘年矣公生於康熙甲戌年二月草三日辰時沒於乾隆甲申年八月十五日巳時配劉太孺人生於康熙乙亥年三月十二日未時沒於乾隆甲申年三月初二日子時合葬於湘鄉大界鄉羅家屋場後之陽子六人長楚材次輔臣次文炳次明德次兼山次容若國藩乃公次子輔臣公之元孫也銘曰昔公創業源遠流長服疇食德寖熾而昌蓯蘢鬱積有耀其光千秋宰樹終焉允臧國子監學正漢陽劉君墓志銘道光二十有八年九月十八日吾友漢陽劉君卒於家年三十有一踰月訃至京師國藩為位哭於舍旁道院遂遍告諸友皆相弔哭有失聲者明年某月某日葬於某里某山劉氏先隴之次國藩乃為銘伐石於都下寓舟浮江以達於漢既不及事則追而埋諸墳之趾君之為學其初熟於德淸胡渭太原閻若璩二家之書篤嗜若渴治之三反既與當世多聞長者遊益得盡窺國朝六七巨儒之緒所謂方輿六書九數之學及古號能文詩者之法皆已規得要領采名人之長義與已所考證雜載於書册之眉旁求祕本鉤校朱墨並下達旦不休久之稍損心氣又再喪婦遂疾作不良食飮君自傷年少羸弱又所業繁雜無當於身心發憤歎曰凡吾之所為學者何為也哉舍孝弟取與之不講而旁騖瑣瑣不以傎乎於是痛革故常取濂洛以下切已之説以意時其離合而反覆之先是君官國子監學正薄有祿入而婦翁鄧氏資之數千金歲益饒給至是盡反金鄧氏而移疾罷官將家居食力以為養蓋浩然自得以歸歸未數月而奄及於死可哀也始君之歸嘗語國藩沒世之名不足較君子之學務本焉而已吾與子敝精於讐校費日力於文辭以中材而謀兼人之業僥幸於身後不知誰何者之譽自今以往可一切罷棄各敦內行沒齒無聞而誓不復悔國藩敬諾其後君歸果黽勉孝恭族黨大悅規畫家政條議粗具而君遽卒命之永不永不足憾獨其事親從兄之志之美且堅而不克竟其事茲其可悲者也而國藩之無似不克踐死別之約以一塞故人地下之望此又余所深恥而切痛者也君諱傳瑩字椒雲曾祖良琨祖方仍世有隱德父正柏以君官封徵仕郎母葉氏封孺人始娶湯繼娶陳皆前卒終娶鄧氏君之反婦家金鄧贊成之無子以兄子世圭嗣君之學業其考核載於書册之眉者與其詩古文皆不以刊布惟搜得朱子所輯孟子要略一書國藩為校刻行於世修君志也銘曰並吾之世江漢之濱有志於學者一人其體魄藏於此土其魂氣之陟降將遊乎在天諸大儒之門敢告三光幸照護乎茲墳錢塘戴府君墓志錢塘少司馬戴君既葬其親資政府君王太夫人六年未有以聲諸幽乃以命其友曾國藩國藩為譜其系述其行紀其恩遇因及其息以識其葬其系曰周植湯後於宋幽王時宋公諡戴後遂以公族為氏聖與德抉經闡教襲為通儒傳至南唐安為銀靑光祿大夫上柱國諡忠恭子奢始居新安之隆阜孫處居上溪口仍世為徽人至明崇禎間有一美者仕浙江都指揮經歷子孫遂為錢塘人曾祖永荃祖承徵考佳璸兩世皆封朝議大夫朝議君生四子長道亨鄉試為舉人次道立議敘府同知次道泰府君諱道峻字升甫其季也王太夫人考曰通泗贈奉直大夫其門族自為風氣杭人甲乙目之其行曰府君綜治羣書不以一流自域不與橫目之民爭利不與逆攖者校曲直改葬長兄之墓迎主於家而時其祭從父墓崩易棺而遷葬又葬其姊之夫又葬其師之無主後者少嗜碑碣繼耆古扇聚以千計老耆古金泉刀布幣兼收博考既寄於三者乃冥於萬物陶然自娛不為執必凡譽毀窮通有亡一等齊之終其身不以關於慮也太夫人操作暇豫而供具倍於衆手御下無甚色而僕婢肅然嫁衣燬於火而無戚容將死而無哀語其恩遇曰府君既補學官弟子七試於鄉而七黜以子熙貴敕封儒林郎誥封朝議大夫既沒而熙躋卿二國恩例晉資政大夫太夫人初封安人繼贈恭人亦例晉夫人其息曰男子三人長即熙以翰林三直南書房再視廣東學纍官至兵部右侍郎次曰煦府學生明天官算術次曰燾議敘府同知女子四人皆歸士族孫十一人有恆府學生以恆之恆縣學生可恆如恆果恆其恆斯恆所恆自恆爾恆孫女三人曾孫三人兆登兆春兆衡曾孫女一人其葬曰太夫人卒於道光十五年四月十八日年六十七明年九月十七日葬於西湖之三台山麓越七歲道光二十二年三月十七日而府君卒春秋七十有三即以其年十二月十一日穿太夫人之域而合葬既固既虔永貞無紀銘曰錢王湖濱有一士十年內廷書畫史曾使嶺南萬里行又坐樞府統九兵是為府君之令子實奉老親葬於此既葬六載吾為銘下告誰何上日星崇仁謝君墓志銘君諱廷恩字拜賡姓謝氏少則貧甚讀書裁盡論語遽去而之農又之商南入閩西入蜀逐物貴賤轉徙常贏嘗與鄧氏俱為賈主計者誤以金六百入君君密歸其金而戒主計者更易簿記鄧氏由是厚德君遠近布聞人人爭欲相倚助矣亦有天幸所居恆獲纍致巨萬羡輒散之為縣建義倉構廩四十二間貯穀萬六百石捐金凡千三百斤建育嬰堂捐金二千兩家置宗祠捐穀若干斛郡縣立羣祀廟捐錢若干緡學官於新進生例取束修之資新進生或貧乏無所出則又為捐四百萬錢君弱冠孤寒蜎蜎赤立商賈所入盡委義舉苟利於人不以絲毫自為顧計苟力所能劬勞百於人不辭也自太守縣令爭欲致君君終不一私謁邑有大役長官杖任羣目相屬君亦不以他人規我稍為辟縮蓋行之五十載靡財不可算而君年亦七十矣先是崇仁有黃洲橋屢修屢毀以資用浩博莫敢大興至是君出任之鎚石鎔金堰水淘沙衆匠束手卬君計畫橋成廣一丈九尺袤四十七丈費白金六萬而強以七十二歲而經始四載而畢畢工二載而君卒壽七十有七道光二十一年九月草四日也祖亮弼考上許並贈中憲大夫君以急公聞於朝議敘巡檢候選又以子貴贈中議大夫配周氏劉氏皆贈淑人子蘭階候選州同蘭生進士工部郎中蘭英優貢生蘭墀刑部員外郎蘭馪縣學生女五人孫男子十二人女子九人以某年某月日葬於某鄉某原既葬之幾歲蘭墀屬豫為銘而追事焉銘曰民之豐約有尸在天彼富而吝終或餧焉貧而能施積乃如山徒手十載富埒周公一毫匪義神鑒厥衷聚有神監散有天視利濟宏多人天駢喜占畢豈久僅盡魯論因心之矩粲其經綸光儀既蟄奕世承福載厥徽猷以愧儒服劉母談孺人墓志銘國藩不肖幸得內交於當世之通才碩學仁人君子不為不多而莫夙於里中劉蓉孟容誼亦莫隆焉以是㩧於人人亦襮之以謂兩人者天下之至愛也自余挂名朝籍待罪六官去父母之邦十有四年孟容之巾屨儀度不可接於吾之目其語笑不可際於吾之耳僅以書問勞遺然且闊絶或望甚私怨喁喁咸豐二年六月先太夫人棄養孟容亦以五月二十八口喪母國藩匍匐來歸兩人者相遇於縣門斬焉對泣自傷老大又離凶疚而是時粵中逆賊方渡湖而北聯巨艦數十里旌旗蔽江訛言雷動其後遂破漢陽陷武昌明年又殘九江掠安慶入江寧揚州而據之烽火達於淮徐天下震駴國藩以天子命治團練於長沙挾孟容以俱出苦語窮日夜相與悲憤追憾誠不意世變遽已抵此患氣之積有自來也五月辛亥孟容將葬母於樂善里莧沖山之陽乃不敢自致謹致其太公之命曰四方多難而陵谷有不可知汝既獲私於曾君葬有日宜從曾君謀所以識其葬者遂督銘銘曰談有淑妃衛薑之姨仍世不墮名媛紹之來室於劉莫逮先姑繼姑曰謝投溫承愈胡洪胡瑣室事敦我未匱先防有置無頗夫子人傑是名振宗畸以平劑如羽諧宮廣賚窮民鄉亭大悅身無華御終年補綴魚菽尸祭蠲饎必躬孝婦篤敬遂與天通篤生五子長其蓉也徑睎淵騫吾見亦寡二仲並殤化為黃上次葵次蕃驂駕如舞三女婉娩皆嫁士人兩孫葩茁玉立振振長曰培基幼者培垕女孫惟四不書誰某乾隆辛亥託生十月六二春秋返其大宅受形之初萬邦太和畢命之歲天地干戈生死盛衰難究難詳感慨泐銘以詔茫茫湘陰郭府君墓志銘君諱家彪字春坊郭氏湘陰人生而溫約夷愈與人無競不苟為和翕亦不為介介踔異之行卒然投之事變若不克辨其是非曲直也者及夫羣疑劫劫徐出一言折之關開節解風生冰釋雖強辨者常默然而內自詘也曾祖遇傑貤贈奉直大夫祖熊貢生誥贈奉直大夫考詮世縣學生世父世遵縣學廩膳生世遵無子以諸子家暾為嗣早世乃復以君為嗣家故饒贍諸父豪宕好施或日費數十萬錢無所惜君亦夷然不為有亡顧慮親故假貸每盈其意或他人相稱貸要君一言為質及期責償於君輒量償之又急則又旋歸之歲中為人理宿逋率三四役久之往往不讎則毀其約契會歲大祲家以中圯君故夙於淡泊豐約不以易其度布衣糲食蕭然自得益務濟人廣儲方藥病者踵門求乞手劑與之自尋常草木馬勃牛溲以至丹砂鍾乳千歲之苓尚方之參諸奇珍物可致與不可卒致無所不蓄蓋亦無所不施其尤貧者輔以羞餌使人日再問焉疾革躬三問焉君沒後里人劉氏言之涕泗交頤也君生以乾隆五十九年八月草四日沒以道光庚戌二月十六日春秋五十有七配張安人少君二歲以道光已酉七月十六日先君沒之七月而卒春秋五十有四張安人柔婉懿恭既篤既靜長沙舉人正旭之孫永州府儒學訓導鵬振之子自在其室以逮為婦為母莫不訓式始時家暾有婦吳氏早寡而卞急姑張太安人性亦嚴厲積不相善張安人既嗣為後恭以事嚴姑而卑以承姒婦先姑之意以隆其奉以推及於姒娣小姑無所不隆詘已之身以薄其給以達於已之子若女若婦無所不薄上尉下薦內外融融閭里親族無少長皆歎以為不可及覩其諸子貴盛皆頷首歎以為宜其沒也哭之皆哀有餘云子嵩燾道光丁未科進士改翰林院庶吉士咸豐三年以救援江西功聖恩特授編修崑燾道光甲辰恩科舉人宗室官學教習國子監助教崙燾縣學生候選訓導其季曰先樾早殤孫六人咸豐二年壬子歲三月十四日嵩燾與其弟奉君之喪葬於湘西善化楊梅山之原張安人祔焉又三年歲在乙卯國藩乃敘而銘之銘曰我有執友翰林郭君至交金石天下莫不聞昔歲在戌赴告親喪徵我銘刻用識幽藏曾幾須臾歲星周半大地戈鋋東南塗炭我以喪歸墨絰即戎葬不極禮筮不協從惟郭氏阡在嶽之麓雲合峰環龜蓍並穀不肖之嗛郭宗之祥詩於堅石以奠茫茫誥封光祿大夫曾府君墓志咸豐七年二月初四日我顯考曾府君卒於湘鄉里第春秋六十有八男國潢國葆謹視含斂男國藩降服男國華自江西瑞州軍營聞訃男國荃自吉安軍營聞訃皆奔喪來歸天子廣錫類之仁賜銀四百兩經理喪事閏五月初三日癸未卜葬於二十四都周璧衝山內從形家言丙山壬向去先世舊廬六里而強去梁江新宅八里而近國藩少長至冠未離親側讀書識字皆我君口授自竊祿登朝去鄉十有四年逮待罪戎行違晨昏者又五年府君之至言懿行不可得而盡識僅從季父驥雲所泣問近事而昆弟子姓諸姑姊妹亦稱述音容往往而悉其述府君侍先大父疾病至難能矣道光二十六年八月大父病痿痺動止不良明年冬疾益篤喑不能言即有所需以頤使以目求即有苦蹙額而已府君朝夕奉事常先意而得之夜侍寢處大父雅不欲頻頻驚召而他僕殊不稱意前後溲益數一夕六七起府君時其將起則進器承之少間亦如之聽於無聲不失分寸嚴寒大溲則令他人啓移手足而身翼護之或微沾污輒滌除易中衣拂動甚微終宵惕息明旦則季父入侍奉事一如府君之法久而諸孫孫婦內外長幼感化訓習爭取垢污襦袴浣濯為樂不知其有臭穢或挽箯輿遊戲庭中各有常程大父病凡三載有奇府君未嘗得一安枕愈久而彌敬是時府君年六十矣吾曾氏家世微薄自明以來無以學業發名者府君積苦力學應有司之試十有七始得補縣學生員不獲大施則發憤教督諸子國藩以進士入翰林七遷而為禮部侍郎歷官吏部兵部刑部工部侍郎遭逢兩朝推恩盛典褎封三世曾祖諱竟希誥贈光祿大夫曾祖妣彭氏誥贈一品夫人祖諱玉屛纍贈光祿大夫祖妣王氏纍贈一品夫人府君諱麟書字竹亭誥封中憲大夫疊晉榮祿大夫光祿大夫妣江氏誥封一品夫人小子非材微府君厚澤曷克成立以蒙茲光顯於是泣述一二並列刻系屬敬銘諸幽若其懿德純行宜傳不朽者將以俟諸知言君子銘曰西望新居東望舊廬此焉適中羣山所都我先人之靈其尚妥於斯而永於斯乎嗚呼男五人國藩配歐陽氏國潢監生候選縣丞配汪氏國華監生即補同知出繼叔父驥雲為嗣配葛氏妾歐陽氏國荃優貢生同知職銜配熊氏國葆縣學生配鄧氏女四人長適王鵬遠次適王家儲壻先卒次適朱氏先卒壻朱麗春季女殤孫八人紀澤二品廕生配賀氏紀梁聘魏氏紀鴻聘郭氏紀渠聘朱氏紀瑞聘汪氏紀官聘歐陽氏紀湘聘易氏紀淞聘王氏孫女九人先大夫以咸豐七年丁巳五月葬周壁沖至九年已未八月十六日癸丑改葬於二十九都台洲之貓面腦自丁巳九月男國荃復出治軍於吉安至戊午六月男國藩復出治軍於浙江皆以墨絰即戎而男國華降服期滿從軍皖北竟殉難於廬江之三河鎮至已未五月諸子服闋而男國潢亦治團練於鄉男國葆亦從軍於湖北歲月不居人事遷變輒因改葬補記一二俾後有考焉男國荃附記先妣江夫人生於乾隆乙巳年十一月初三日申時春秋六十有八咸豐壬子年六月十二日卯時沒於梁江新宅原厝宅後山內已未八月同日改葬於此與先大夫共一塋域國荃又記劉君季霞墓志銘君諱蕃字季霞吾友劉蓉孟容之弟也國藩治團練於長沙提水師自巴陵至九江及入江西屯軍南康孟容皆展轉相從三年奔走夷險共之季霞常以其太公之命省孟容於軍中出則美意相迎諷勉其兄歸則傅會吉語慰安其父咸豐四年三月嶽州官軍失利賊犯寧鄉季霞間關至長沙存問孟容孟容方以疾先歸其六月孟容將率舟師渡洞庭而北季霞復送至省垣明年八月又自其家二千里視孟容於南康中途聞羅君澤南督師至義寧州而西將掃蕩嶽鄂之交規復湖北孟容亦分領湘右軍從羅君俱西也季霞與兄會於羊樓洞時我師遠來新有濠頭堡之敗士氣初復料簡糧仗稍與休息賊據蒲圻縣得以其暇益築堅壘完守備十月十七日我師進營白石鋪以蒲圻南門地險而逼不利仰攻乃繞道出公安畈抵城西駐軍鐵山湖北巡撫胡君林翼以師來會二十一日辛亥分四路進攻賊厄險立柵穿塹數重鎗炮環擊不可近間出悍賊揚旗跳蕩自辰至午相持不決軍勢少卻季霞從兄督戰進曰事急矣賊將乘我遂棄所乘馬獨步而前賊遽奔之季霞發鎗斃二賊又鞭卒之少退者一賊伏下田發鎗中傷季霞仆地孟容舁其弟歸營而自麾衆禦之短兵確門驍將鋭卒傷亡數十人賊亦大創我軍乘間舉火燔其木柵煙焰蔽天五壘齊破是夕遂破蒲圻縣克之孟容還營視其弟創在臍旁氣息僅屬撫之大慟季霞徐曰兄勿爾命也語訖而絶春秋二十有五事聞諭旨追贈知縣照知縣例賜恤季霞事兄致嚴以順而風韻各異孟容於士類揚淸激濁而季霞不置臧否孟容稍立崖岸別白是非鮮所假借而季霞脫去畦封瞑無一語款誠相接其臭如蘭以是人樂近之劉氏世居湘鄉之四十都近歲兵事方殷有司分都團練季霞部勒鄉人獨嚴整喪歸自蒲圻族之少長遠近之耆德學徒與嚮者團結之丁壯會葬送死哭者至數千人如喪親戚然後知其得衆宿將不及也咸豐八年月日甲子葬於樂善里之王湖嶺配孔氏國子監學録廣璠之女生女一人無子以孟容子培垕為嗣銘曰元二之厄兵氣崢嶸方州大府鼠卻狐驚提戈殺賊年少書生厥少維何星終兩紀溫玉刻苕翱翔文史事親從兄辟咡而詔仗劍出門海飛龍嘯蒲首之山故壘嵯峨一儒奮臂永奠山河位豈在大齡豈在多我銘斯石萬代不磨季弟事恆墓志銘同治元年十一月十八日丙寅我季弟歿於金陵軍中逾月喪過安慶國藩設次哭奠如禮遣之反葬弟名國葆字季洪後更名貞幹字事恆少則落落自將脫去町畦視人世毀譽及書史褎譏媺惡不甚厝意不隨衆為疑信時或詰難參伍大破羣惑嘗應縣試及學政試再冠其曹已而厭薄舉業不肯竟學咸豐三年國藩奉詔討賊召募水陸諸軍季弟挈六百人以從提督楊載福侍郎彭玉麟始皆客季弟所為僚佐季亟薦此二人為英毅非常器已願下之四年三月嶽州兵敗季又亟白諸將無罪已願獨坐之其後楊彭二人果以水師雄視東南而諸將亦次第登用掇取高官大名獨季弟黯黮歸去築室紫田山中閉門絶人事身與世若兩不相收八年十月母弟國華戰歿三河季則大慟誓出殺賊以報兄仇而雪前恥鄂帥胡文忠公方廣求將材命季分領千人自黃州建旆而東十年正月連克太湖濳山三月始與叔弟國荃會師以圍安慶十一年八月克之明年為今皇帝元年弟以正月師次三山三山者宣池羣賊四萃之區軍入援絶寇十倍我乃以計招降三縣義民之陷賊者噢咻而厲使之得四千人編伍約法用破魯港克繁昌下南陵蕪湖而國荃亦以是時克東西梁山徇和州當塗奪采石兄弟復會師進薄金陵之雨花臺江東久虐於兵沴疫繁興將士物故相屬弟病亦屢瀕於危定議假歸養疾適以援賊大至強起戰守四十六日賊退而疾甚不可復治矣季弟初以功敘儒學訓導加國子監學正銜克復安慶晉秩同知賞戴花翎厥後連克繁昌三縣天子雖以國藩前有辭賞之奏猶特賜迅勇巴圖魯名號至大破援賊晉階知府命下而弟不及見矣事聞遂追贈按察使照軍營病故例議恤詔書謂朝廷早欲擢用特以國藩懇辭留以有待嗚呼聖主之於臣家恩寵不訾獨惜國家欲大用吾弟與吾弟欲得當以報國兩相須於微莫之中而卒不克少待以竟厥志嗚呼茲所謂命焉者非耶季弟生以道光八年九月二十日春秋三十有五曾祖諱竟希妣彭氏祖諱玉屛妣王氏父諱麟書妣江氏三代皆封光祿大夫妣皆一品夫人配鄧氏先弟十月卒兄弟五人自仲氏國潢外四人者皆從事戎行季無子以國潢子紀渠嗣同治二年某月某日甲子葬於某里某山之陽輒敘次事狀繫以銘語以寫吾哀銘曰智足以定危亂而名譽不並於時賢忠足以結主知而褎寵不逮於生前仁足以周部曲而妻孥不獲食其德識足以祛羣疑而文采不能伸其説嗚呼豫季缺憾孔多天乎人乎歸咎誰何矢堅貞而無怨儻彌久而不磨閩浙總督季公墓志銘公諱芝昌字雲書號仙九姓季氏道光之末咸豐之初公以正卿內知樞密外督封疆朝廷亟以大事相屬而公嗛然自以為不足海內賢士亦第宗其文章而若忘其政事之美公於文裁量完密宮徵鏘鳴當世歎為臺閣夷懌之音而又忘其營度之苦至其身世備歷諸艱則知者尤少也季氏世家江陰公曾祖諱愔祖諱熙歲貢生纍葉窮約至考諱麟字晴郊者始以拔貢舉人官巨鹿縣知縣嘉慶十四年公侍王父從巨鹿君於官所又迎婦於衛輝婦翁為王蘇儕嶠以翰林出守大郡兩家皆科第名宦政聲溢於河朔寖寖光大矣無何歲貢君卒於巨鹿巨鹿君坐不身捕妖民褫職遣戍新疆踰年沒於戍所公所生長子既殤又殤一女又殤次子而巨鹿君有官逋簿責益急籍家産輸之官親知不相省録胥吏侵侮殆無人理厥後以道光元年舉順天鄉試三年考取國子監學正學録薄宦京師生事日絀蓋至十二年成一甲三名進士而公之困厄餘二十載矣既以巍科改翰林院編修明年散館則大為宣宗所褎御書魁字於卷之傅別而大臣亦自登公首選旋又以大考翰詹列高等簡授山東學政任滿還京充戊戌會試同考官明年已亥大考復列高等奉使江西主考浙江學政纍遷至內閣學士兼禮部侍郎由是學朝慕公遇合之隆臺省耆宿交口稱公詩賦以諷勉後進儕輩斂袵皆以為不及高才未達皆傳鈔而模範之雖天子亦以君臣文字契合為足樂也公在浙丁母憂道光二十三年服闋入都與考試差翼日召對宣宗嘉歎公文以謂他人竭蹶喘汗有不能到汝則沛乎有餘譬之於射汝穿楊百中矣語畢大笑公且感且悚退而以不失鵠名其齋是歲擢禮部吏部侍郎督學安徽公益兢兢恐無以育才厚俗上負主知二十六年受代還朝明年充會試知貢舉殿試讀卷官經筵講官衡文之事無役不從四方學徒翰林新進輻輳造門請業而上察公忠謹廉介可任艱巨不復欲以校文角藝相屬蓋科目取士既久至爭聲律一字之得失而置軍國於不問宣宗晚歲遠覽唐季明末之陋恤焉思有以易之亦預憂治安之不可深恃也二十八年命公為倉場侍郎是冬命偕定郡王載銓查辦長蘆鹽務及天津所屬倉庫二十九年命偕大學士耆英查詢東南兩河穴員浮費又命公馳赴浙江釐剔鹽務淸查倉庫凡政有姦弊叢雜輒屬公梳抉而廓淸之公晝夜稽核不吳不揚盡得要領而於人無所乖忤使浙未返有詔簡授山西巡撫甫至晉又內召為軍機大臣三十年宣宗升遐與諸王大臣受遺輔政文宗繼序益欲以艱大付公會廣西軍興南服不靖遂命公總督閩浙公鉤校官書發舊牘與新事雜治廢寢忘食未幾疾作陳請開缺勿許咸豐二年病益劇屢疏乞退溫旨慰留最後十一月詔許回籍調理三年正月返蘇之常熟家焉二月金陵淪陷賊乃日熾公聞之大痛自以朝廷重臣出涖海疆不能濟弱扶傾副聖主倚卑之意而時事糜爛又不克力疾強起以效尺寸往往獨夜悲泣或為詩歌以鳴積鬱至咸豐六年而得偏痺之症十年蘇常失陷挈家北渡又聞九月淀園之變益憂憤內傷不復可支矣是歲十一月三十日薨於通州春秋七十自公之貴三代皆贈光祿大夫如公官曾祖妣趙氏祖妣趙氏妣史氏皆贈一品夫人妻王夫人妾郭恭人皆前卒妾吳氏公沒後自裁以殉旌表如例子念貽道光庚戌進士翰林院編修加四品卿銜女二人長適翰林院編修陳彝次適巨野縣知縣張彭年孫綸全邦楨曾孫厚坤厚基厚鎔公卒時渴葬通州城東同治四年八月十八日始卜葬於江陰長山南麓當公在閩引疾方怪宏才若彼重任如此何遽謙讓勇退及歸田數載而憂國乃更甚於當官之時而當世之自以為能負荷非常者覆轍相屬乃不忍聞然後知君子欿然之抱誠不易量度哉嗚呼是可銘已銘曰兩社貞卜實啓季宗世閟休德集於我公十韜一襮積塞乃通發為宏篇藻火笙鏞輶軒四出使節落旄冥索章句盡拔其豪靡幹不采何埴不陶天子曰咨時有屯蹇道有平頗著在前典良臣斡之天回斗轉斂此鴻文謀奠乾坤入管天樞出帥海濱鋤姦詰螙萬緒交紛每況彌恭若虛若無讓賢避位長往江湖心摧形瘁與世同臞我貢春官出公門下斯鑄斯鎔或躍於冶岱宗云頽有隕如瀉紀績埋幽用詔來者仁和邵君墓志銘位西仁和邵氏諱懿辰與國藩交二十餘年矣咸豐十年二月賊入杭州五日而復七月位西訪余祁門軍次語余以城破時盡室陷賊中賊退乃挈家東徙紹興老母考終粗得盡禮欲乞師以援兩浙不果遂別去明年十一月杭州再陷位西之妻余恭人二子順年順國轉徙滬上余聞而迎致之安慶順年語余以城破時盡室飢困其父麾家人出避圖延宗祀亦詭詞自稱將出遂泣別不復相聞國藩心知位西烈士也必不苟免其家固知之以無定問不敢發喪同治三年二月杭州克復順年奔哭周詢具得三日不食罵賊遇害狀實以十一年十二月朔日殉難於是始除次執喪赴告遠近浙江巡撫上其事天子下詔褎恤然後知親在則避親沒則死賢者遭難如是其不茍也位西之學初以安溪李文貞公桐城方侍郎為則擯斥近世漢學家言為文章務先義理不事縟色繁聲旁徵雜引以追時好厥後以舉人仕京師為內閣中書刑部員外郎入直軍機處與上元梅曾亮伯言臨桂朱琦伯韓數輩遊處博覽國故朝章其文益奧美盤折亦頗采異已之説以自廣詢訪高才秀士折節造請交譽互證酣恣而不厭狎習而彌虔然位西性故戇直往往面折人短以謂書籍所無公何得漫爾不應再糾焉猶不獲三諫焉無問新故疏戚貴賤時否一切蹙頞相繩人不能堪終以此取戾於世大學士琦善公在獄嘗發十九事難之大學士賽尚阿公視師廣西手疏七不可諍之諸公貴人病其峭直由是齵焉不得安其位咸豐四年坐濟寧防河無效吏議鐫職位西既罷歸則大覃思經籍饌箸尚書通義孝經通義詩古文若干卷飢餓圍城之中猶箸禮經通論誦聲鏘然徹於巷外亂後僅得禮經一卷文三十餘首刻之淮安蓋不能什之一二餘則散佚矣位西之曾祖王父寶勤王父又曾父宗贄本生父鳳儀世箸淸德有兄懿藩早喪無子以順年後之有女二人順年歸自杭州未得父尸大痛遘疾同治四年六月十三日沒於金陵余恭人少而刲股療親晚而事姑有聲既痛其夫又悲其子七月十二日亦卒嗚呼傷已國藩於是命順國與其壻鄭興儀具位西衣冠葬之西湖二龍山以余恭人及順年祔順年之妻伊氏前死賊中至是亦以衣冠祔葬銘曰城有時而為湖海有時而成田物固有非常之變烏可以常理測彼昊天善不必福久矣曾不自夫子而始然愍東南之大戾仁聖與螻蟻而同捐箸述衋其蕩盡僅弔煨燼之殘編文之精者不復存存者又未必果傳獨其耿耿不磨之志與日星而長懸魂無遠而不之魄則依妻子以全庶上為神祇所許而下為百世學者之所憐張君樹程墓志銘君諱善準字樹程號平泉晚更自號愚公武昌張氏考諱以誥國藩嘗表其墓既詳其世矣君孕育前徽出入造次不離古先之訓既補縣學生員以制舉之文震耀於時主學政者每嗟賞之舉以為羣士式君顧不以自喜獨有志於朴學之塗篤好浚儀王氏困學紀聞崑山顧氏日知録二書刪取其要別為一編手寫數通亟繹而不厭博覽而彌深前所謂舉業者漸高簡而不諧於衆遂為歲貢生以終與之遊者但見其於科目仕宦窮通得喪豐約毀譽泊乎未有以干其慮也及聞時政安危賢不肖進退當否乃憂之樂之如其家事則相與怵焉起敬粵賊之起賢人君子往往殉難或闔門同盡君聞輒悼痛語及卓行奇節則泫然泣下如喪周親一夕篝鐙讀書忽甚悲失聲舉家驚起趨視君方手一編顧曰有傳胡巡撫祭李帥文至者余讀之不覺哀而一號耳胡巡撫者益陽胡文忠公林翼李帥者湘鄉李忠武公續賓時方戰沒三河天下所共傷也自是兵事利鈍家人相戒不敢以聞閭里過從相與遣懷望治道吉語以忘憂君一接以恭謹遇耉長怡聲酬對如恐傷之自敵以下褎能奬善溫溫致敬終不以有故而加慢姻好或有患難疾疢早夜省視匍匐護持時其有無而周濟焉人咸謂君為慈惠之師緩急可倚杖矣然君性實剛介嫉惡如讐深恨昏墨之吏暨士人居家耆財利與賈豎競錙銖者以謂天下大亂端由此輩意不快則昌言誅責唾而斥之或以書抵友朋其語絶痛又嘗戒其子裕釗汝才薄愼無求仕苟仕愼無為身家謀居民上而黷貨是穿窬也神不福矣聞者凜凜然後知君之德不得僅以仁厚名也同治三年十二月十日卒於家春秋六十有九所箸有史學提要續編六卷妻金氏秉禮習勞儉而澤物子二人長裕鍇次即裕釗舉人積學能文女子二人孫幾人某某某年月日葬君於某縣某山裕釗來徵銘銘曰訥訥哲人斯須繩矩遇事激發剛亦不吐慟恤忠良有涕如雨譏貶姦貪有舌如斧能好能惡是謂至仁邈然物外未侵一塵樊口之南重湖之濱藏骨黃壤垂範千春苗先簏墓志銘君諱夔字先簏肅寧苗氏自幼讀書即異常童不好為科舉文藝而竊耆六書形聲之學讀許氏説文若有夙悟精研而力索滯解而趣昭已又得顧處士炎武音學五書慕之彌篤曰吾守此終身矣年二十餘即饌毛詩韻訂繼又饌廣籒一書授徒窮鄉制藝試帖之屬不中有司程度學子稍稍引去君益冥心孤往孑焉寡儔間之河間城外得漢時君子館磚又得開元瓦於獻王墓旁私獨欣喜以為神者餉我以慰寂寞久之道光十年縣令王君聞而敬異聘君主講翼經書院明年為學使沈侍郎維鎬所知舉辛卯科優貢生高郵大儒王氏念孫父子聞君之説禮先於君遂與暢論音學源流由是譽望日隆督學使者爭欲致之幕下與共衡校初隨編修汪君振基衡文山西繼隨祁文端公寯藻衡文江蘇所至甄拔宿儒周覽山水又以其暇編摩撰述從事於其所謂聲韻之學道光二十一年祁公還京師乃醵金刻君所箸説文聲訂若干卷説文聲讀表七卷毛詩韻訂十卷建首字讀一卷君以為許叔重遺書多有為後人妄刪或附益者乃訂正説文聲類八百餘事顧氏音學所立古音表十部宏綱已具然猶病其太密而戈麻既雜西音不應別立一部於是並耕淸及蒸登於東冬部並歌戈於支脂部定以七部櫽括羣經之韻書出識者歎其精審又數年侍讀馮君譽驥視學山東國藩薦君偕往役未畢而先歸於是君亦齒衰而倦遊矣道光之末京師講小學者卿二則祁公及元和吳公鍾駿庶僚則道州何紹基子貞平定張穆石舟晉江陳慶鏞頌南武陵胡焯光伯光澤何秋濤願船君既習於祁公又與諸君傾抱寫誠契合無間子貞嘗命工圖己及石舟及君三人貌蓑笠而處田間蓋三人者皆同年優貢又皆有逸士之風謂宜與負耒者伍也君既泊然無營暇則徒步造訪諸君與辨論前世音學暨近人江戴段孔諸家部分之多寡意指之得失褎譏亭決窮日夜不倦間亦過余劇談歸自山東余從容問東士亦有研究説文者乎有得見吾子著述者乎曰有之何以知之曰吾書中有自稱夔按云者東人稱引及焉曾不知夔之為誰氏名也則相與拊掌大笑君徐又曰吾家有戇僮昨者日晏吾責豎子何不具食僮輒報以錢物罄矣欲以何具吾柔聲謝之僮乃不遜竟去吾今方躬治爨耳則又相與大笑蓋君處困約有以自怡如此他日君又語余曰吾窮於世久矣甘之若飴死無所恨獨平生箸書尚有數種未及刊刻不能無耿耿於懷自余咸豐初出京展轉兵間至同治七年重入都門昔之與君遊者十人蓋八九死君之嗣子玉璞來告君以咸豐七年五月初七日逝矣春秋七十有五抱君所箸書曰説文聲讀考者曰集韻經存者曰韻補正者曰經韻鉤沈者述君遺命謂當送國藩觀覽且以銘墓之文相屬君且死戒其子必葬我衆書叢中其子乃擇君生平尤嗜之書納諸棺中以徇嗚呼斯亦篤古之徵已銘曰視以多歧而瞢聽以雜奏而聾技之精者不能兩工苦思專一可與天通課形而得聲勘異而得同黜陟百世惟許君是崇胡學之旁達而遇之不豐抱此孤賞永奠幽宮唐確愼公墓志銘公諱鑑號鏡海唐氏先世自江西豐城徙居湖南之善化四傳至諱煥者以舉人官至山東平度州知州公之祖也生子仲冕以進士即用知縣官至陜西布政使公之父也平度君以子貴誥贈通奉大夫配李氏談氏俱封夫人談夫人沒而葬於山東之肥城布政君及配寧夫人皆踵葬肥城公以父命徙籍山東故又為肥城人焉少而邁異精勤嗜學如渴以廩生入資為臨湘縣訓導嘉慶十二年舉於鄉十四年成進士改翰林院庶吉士又二年授職檢討又六年補浙江道監察御史充甲戌科會試同考官戊寅科順天鄉試同考官坐論淮鹽引地一疏吏議鐫級以六部員外郎降補會宣宗登極詔中外大臣各舉所知諸城劉文恭公鐶之薦公由是有廣西知府之命厥後再為平樂府知府一為安徽徽寧池太廣道量移江安十府糧道拜山西按察使遷貴州按察使擢浙江布政使遷江寧布政使敡歷於外蓋二十年其守平樂也亭平民猺之獄而解其仇屢磔劇盜境內肅然是時布政君解組東歸僑居金陵公聞母病即引疾去官省親江南既遭內外之艱皆北葬肥城廬墓讀禮服闋以例仍發廣西再守平樂道光十二年廣東湖南生猺為亂公出防邊圉內譏姦宄往來富川賀縣安撫熟猺獸擾而兒蓄之設立五原學舍延師教讀羣猺大悅擒郡中煽亂者談于先等十餘人立斬以徇而貰其脅從千餘火其名籍一無所問其按察貴州也平反疑獄歸美令長曰非吾能正之某縣尹來省自易之耳其在江寧拯災修廢百度畢張時總督陶文毅公澍寢疾公代行使院政事文牘如山賓僚填咽昧爽而勤􅕄丙夜而不休忘寢輟餐形神交瘁而言者乃劾其多病近藥廢閣公事又雜托他端以相訾毀朝廷遣使者按問率無左驗宣宗知公端謹一切弗論忌者或憚其方嚴未幾內召為太常寺卿道光二十年四月也公濳研性道宗尚洛閩諸賢所至以是敕其躬亦以牖於人亦時時論箸以垂於後在翰林時箸有朱子年譜考異省身日課畿輔水利等書在廣西著讀易反身録居喪著讀禮小事記官平樂時延納人士入署親與講授設立義孰誨誘寒畯官貴州時亦如之官江寧亦如之及入為九卿又著易牖學案小識等書扶掖賢俊倡導正學時如今相國倭仁艮峯侍郎吳廷棟竹如侍御竇垿蘭泉何文貞公桂珍輩皆從公考德問業國藩亦追陪几杖商榷古今觀其陋室危坐精思力踐年近七十斯須必敬蓋先儒堅苦者亞時賢殆不逮也已而致仕南歸主講金陵書院文宗踐阼有詔召公赴闕凡進對十有五次中外利弊無所不罄諭旨以其力陳衰老不復強之服官令還江南矜式多士公至金陵學徒益盛以賊犯湖南急欲歸展先塋咸豐三年乃自浙還湘卜居於寧鄉之善嶺山深衣疏食泊然自怡晚歲著讀易識編次朱子全集別為義例以發紫陽之蘊十一年辛酉正月十八日疾卒春秋八十有四其家函封遺疏郵寄東流軍中國藩以聞天子軫悼豫諡確愼配王氏楊氏皆封夫人前卒無子以弟子爾藻嗣女四人適某某孫男三人某某孫女三人某年月日葬公某縣某鄉某山又八年國藩始追為之銘銘曰俗學徇時行與名釣孰捐其華而練其要唐公翼翼與世殊趨懼明戒旦篤信程朱有譏其隘或諷以迂浩然不顧履我康衢顯皇初政詔徵國老造膝前陳嘉謨要道願致吾君上躋軒昊進退以禮斂茲宏抱宦遊所至我求童蒙晚居京國羣彥景從何才不育有金皆鎔以善孳善偕之大同播此芬韻昭示無窮歐陽府君墓志銘先生諱凝祉初名鼇晚易今名字福田歐陽氏先世自江西徙居衡陽曾祖天鼎祖心璥父順源並有淸德曾祖妣氏劉治家嚴肅祖妣氏蔡妣氏蔡均以節孝旌表於朝國藩所作歐陽氏姑婦節孝家傳者也先生生三歲而孤恪遵母訓跬步必謹母或戒之無觸忤人即終身不以言色加人或戒以愼無耽酒即沒齒不近杯勺稍長嶷然自厲於學不假董督日埤月增既入為學官弟子旋補廩膳生遠近歸仰交幣迎致適館課徒凡四十年主講蓮湖書院者又十年門下生箸籍數百人其高第者與之稽經講藝兼及敕躬之道成物之方其不帥教則訶求觥責屛斥門牆之外初雖怨望後常悔憾自愧不為良師所齒從之遊者恆守繩矩雖垂老而憚之如初先生疏於治生臨財則辨別精審若將凂焉一歲中學徒束修之資不足自給往往隨事散去少以孤童為叔父成材所養晚節竭力賙之宗祀不足於資先捐金以成之議為衡陽裁減錢漕浮費有啖以利而尼其事峻辭卻之事成而合邑德之其它人事問遺率常謝絶人謂先生少貶其節可致饒裕先生獨謂取舍有義神明難欺吾心所不許者天道亦不與也道光末以歲貢生候選訓導同治初誥封奉直大夫配邱氏誥封宜人子二人柄銓廩貢生候選訓導柄鈞光祿寺署正女子二長者歸於國藩次適彭治官孫六人定果湖北候補同知直隸州定楙侯選縣丞定枚府學生員定樞定楫定幹孫女五人曾孫二人同治八年五月初九日疾卒春秋八十有四自七十以後不復授徒遠方家居課孫細字鈔書講論不倦同治六年歲在丁卯孫定枚入學為附生先生以嘉慶丁卯入學授室至是六十年矣乃用昔者成婚之日燕客受賀遠近歎美夫婦既皆八十而先生之伯兄八十有五暇輒過從相與道幼時瑣語以為歡自詡為家門之祥人亦祥之夫其孝友雍雍敦善不怠殆所謂無怍於天人者復奚憾於其死邪嗚呼可銘也已銘曰衡西兩世貞節之門實生令德孝子孝孫上承慈訓下啓後昆位豈須顯身蹇道尊名豈須震多士崇信小叩大鳴甄陶羣俊奬誘自寬壇宇自峻七十碩師還山娛老耄而從兄推梨讓棗亦有孫曾質文完好金籯匪貴一經是寶家有休徵英彥輩興門有上瑞和氣薰蒸其休其瑞人世同稱若考隱德吾銘可憑翰林院侍讀學士丁君墓志銘君諱善慶字伊輔號養齋丁氏世居淸泉之白沙里幼孤從母劉太淑人育於外王父劉文恪公家自少而好惡欣戚不主於己惟母志之從長亦如之終身亦如之久處京師寄籍宛平由順天府學生中式道光壬午科舉人明年癸未成進士選翰林院庶吉士散館授編修其歷階為國子監司業詹事府右中允左中允右庶子翰林院侍講學士其任職為國史館總饌庶常館提調文淵閣校理奏辦院事日講起居注官其使事為戊子科貴州鄉試正考官辛卯科廣東鄉試正考官乙未科會試同考官其秋順天鄉試同考官丙申以後迭為廣西學政君雖暗然自敕無所矜異宣宗嘗從容問翰林中孰為篤學曹文正公舉君以對天子既異之在廷名卿耆德亦多稱歎以為令僕之器歲月可冀君以母老懷思鄉里歸自廣西遂解官養親於長沙早歲事母執爨必躬淅米必潔至是益加謹焉母或加餐輒喜述諸人以為至幸或有饋賜輒豐其好貨端篋而將之或體中不適則憂皇如不終日或意有不懌則長跪引咎既解乃起或將他適則先於其所往百物畢齎所欲立應室無纖埃庭無高語一身肅戒舉家兢兢宦遊餘財為其弟所耗君則經營置産以覆弟短而悅母心舅氏劉若圭謫官遠戍君又傾其前産以贖舅罪而慰母於地下蓋畢生孺慕自順親外不知天地更有何事也母沒數年而廣西寇賊大起咸豐二年秋攻圍長沙君矢死堅守寓書其弟曰城陷弟收吾骨於桂樹旁井中矣日夜令其子馴巡警周垣馴以勞致疾妻蔡氏刲股燎之不愈遂卒君乃曰兒致身衛國婦刲肉救夫吾門之祥也吾母幸而考終吾身若家皆可殉難尚何惜哉賊退則趣治戰船以濟水師立共武社使諸生與衆練卒肄習火器事上議敘加三品銜論者謂謹厚如君乃能臨危應變如是為不可測也同治八年六月十五日卒於家春秋八十其年十一月十六日葬於北關外洪山渡饗堂􅦨莊山之陽曾祖某祖某父某皆贈中憲大夫曾祖妣氏某祖妣氏某贈恭人妣氏劉纍封恭人晉贈淑人旌表節孝配陶氏某配周氏妾呂氏生子馴早卒乃以弟之子驊為後妾廖氏生子騤女六人孫四人焯煥煊烻皆驊出煥復出為馴後女孫二人君之學詳於治經尤嗜易春秋著有左氏兵論主講嶽麓書院二十餘年以洛閩正軌陶鑄羣弟子亦頗參陰德感應之説警發愚蒙生徒翼翼無敢軼踰法度庶幾以身教者銘曰不斫不礱不揭己以為崇公以校士毅以即戎勇以辭祿位而誠以啓羣蒙皆以仁孝為之本本立而用自不窮老成逝矣康此幽宮郭依永墓志銘依永名剛基一名立篪姓郭氏吾友筠仙中丞嵩燾之子而國藩之第四女壻也少而羸弱善病就學數歲猶戒其師無過督責年十四五筠仙奉命巡撫廣東依永從親於南海使院遜志研求學以大進其後從親還湘益有慕乎古人述作之林自場屋經義律賦試帖以至唐人楷法名家繪畫皆窺其藩而究其趣而於古近體詩為之尤勤同治七年以試藝冠其曹補縣學生員父兄或詔以專事科舉之業而於詩姑輟焉依永以為志廣塗遠安能敦敦獨事舉業退輒矯首長吟叢稿滿室有龍光輔樹棠者老僧東林者年皆六十與為忘年交時時相從倡和不厭或騎駿馬挾一僮薄暮遊古寺􅟪句以歸用是自適依永之詩嵯峨蕭瑟如秋聲夜起萬彙傷懷又如閲盡陵谷千變了知身世之無足控摶者長老皆怪名門少年不應有此東林亦嘗詰之依永則自謂吾每為詩百感中來不可遏抑竟以同治八年十二月四日病卒年才二十有一曾祖某祖某皆以筠仙貴誥贈榮祿大夫曾祖妣氏某祖妣氏某妣氏陳皆誥贈一品夫人子二本含本謀女生月餘而殤疾革援例為員外郎同治九年某月某甲子將以品官禮葬於某縣某山嗚呼衰齡而哭子仁慧而不壽皆人世所謂不幸然聖賢有遭之者矣豈天之所可否與人間所稱善惡禍福其説絶不類邪抑人事紛紜萬變造物者都不訾省一任其殃慶顚倒漫無區別邪天人感應之故自昔久無定論依永之生其詩巳頗知一得喪齊彭殤之旨今其既死殆將沛然而大學矣於是述吾所聞為之銘辭以質幽遐亦塞筠仙之悲銘曰吾聞君子之畏天命有如孝子之事庭闈苟遭禍謫敬受不疑恭若申生順若伯奇又聞道家之言與化推移縱心任運有若委衣雖宗旨之各別要安命而無違覽依永之詩篇似多見道之詞胡含愁而鬱鬱豈其中有不自持修德之報或爽雖神聖不能測其微主之人者為吾能為主之天者吾安敢與知等死生於晝夜信長短之有涯存者抑情而復禮逝者奠魄而永綏羅君伯宜墓志銘吾諱萱字伯宜湘潭羅氏處士某某之孫吾友候選內閣中書汝懷研生甫之子也少而穎特旁通飫聞庭訓多所開解咸豐四年國藩率師自嶽州逐賊東下強挈君以俱東是歲克武昌破田家鎮攻九江舟師不利於湖口明年國藩至南昌重立水軍進屯南康視陸師於湖口弔忠武公塔齊布於潯陽君展轉相從跬步必偕余或口占書疏君輒操筆寫録或危急之際君甘心同命而外則美言相溫諸將或輕重不得輒為之通懷使各當其意以去又明年羣寇環集江西陷沒五十餘城諸軍多壞散乃授卒三千人令君領之赴敵初戰建昌繼攻撫州既又會搗瑞州君之躬臨行陳自此始也其後湖南援師四至江西稍稍解嚴君以久役請急還湘國藩亦以咸豐七年丁憂去􅕄君既暫脫兵間則假館以課學僮製造詩詞以酬勝侶作蠅頭細字以與古人校離合於豪芒負篋走場屋以競得失於有司漠然若不知有世變者未幾駱文忠公秉章檄辦湘潭團練劉總兵培元招至鼎澧又招至衢州與謀軍事君稍規大計不肯久留自浙西旋省余於安慶又省其從兄逢元於當塗軍次亦不欲久居會所親黎福疇沒於涇縣君遂護其喪及其孤嫠以歸同治二年廣東巡撫郭公嵩燾招君至粵屬以創立水師君又遜謝而歸每歸從事文藝與諸生比肩就秋試如初久之佐某君治威信軍又自領一隊曰威震軍防禦粵賊事定散去蓋自是君亦倦遊不復有意於兵事矣七年冬記名按察使黃君潤昌征苗貴州要君偕行君慨然曰是足與有為吾所敬也吾不可以已八年正月至黔師比有功遂克鎮遠府衛兩城道員鄧君子垣提督榮君維善兩軍來會迭克關寨欲遂由施秉以達於黃平氣鋭甚師至小甕谷豅以道隘箐深為賊所困君與文武將辨十八人者皆死三月二十二日也嗚呼君之於戎事亟就之亟去之天於君之勳名若成之若吝之乃卒不得一當而委骨於荒徼絶壑之中果何為邪儻所謂命焉者非邪事聞諭旨照按察使陳亡例賜恤贈太常寺卿銜世襲雲騎尉恩騎尉罔替君幼有夙慧二歲能識風翦兩字自真草法書古文詩辭以至科舉之業俱有義法既入學為優行生從軍纍歲敘功至同知直隸州加知府銜其論吏治軍政皆貫徹古誼而不戾於時向使得守一官統一軍與當世之成名者校何渠不如邪然終不得藉手以一伸其志此君子有陶鑄人才之責者之咎國藩所以內疚而尤惜之也銘曰孰推焉而屢起孰尼焉而屢比孰豫以飛躍之資而不假以升斗之水出躍馬而橫戈入稽經而諏史亦何慊乎時賢胡亨於彼而屯於此終效命於蠻陬長賫志其何已蓋憐才者之悲而竊位者之恥寧津龐君墓志銘君姓龐氏諱朋字君錫以字行更字百朋先世有自昌黎遷河間之寧津者遂為寧津縣人大考復還考自誠皆以君子際雲貴誥贈通奉大夫祖妣孫氏妣李氏皆贈夫人君少而篤行劬學事父母存得其歡心沒能盡禮有兄四人以父命析居君所應得資産皆擇取劣下者又稍稍推其所有以全友愛讀羣經及諸子書能得要領手録口誦鍥鏤疲􅓈而自勉不衰尤耆宋儒程子朱子之説顧躬行何如不為空論屢試輒黜最後儀徵吳文節公視學直隸乃識君以為績學之士擢置上第補邑增生君既不屑為速化之術不得以其所學襮之於世則擇後生俊穎有志之才鍛厲而淬濯之笵成其器出君門下者率有聞於鄉里而君之子秉彝訓被知於有司通籍而仕者二人當咸豐癸丑之歲粵匪渡河北竄畿輔被擾運河以西郡縣騷動咸欲團結鄉勇各固境圉君建議阻運河而守可省徑兵數萬籌畫垂定會鄰邑爽約計以不行然寧津終得保全者資君所訓練鄉兵萬人之力由是遠近人知君不獨學優行高又有應變戡亂之略也際雲仕京師仕熱河數迎養君耽於田園之樂到官所未幾輒復旋里年七十有六以咸豐九年已未三月初五日卒於家同治九年庚午誥贈通奉大夫如其子際雲官娶同邑宋氏專靜煦願天性儉勤事舅姑事夫里之人稱曰賢婦教成其子服官中外所在著績人曰太夫人之誨實然稱為賢母以子際雲貴纍封夫人就養揚州逾月終於揚州公廨實同治九年十一月初八日壽九十距通奉公卒時十有一年矣子三人際韶力耕不仕際咸舉人官戶部主事際雲由翰林改官刑部以軍功洊擢江南鹽巡道權兩淮都轉鹽運使司女子二人適楊惠琇李萬倉孫二人作森澤鑾孫女十八嫁者七人先是江蘇巡撫丁公之母某太夫人將以九十生日稱觴先一日而卒際雲在揚州亦將以十月十四日肆筵娛賓為母宋太夫人壽而太夫人先六日卒江南之人皆謂兩太夫人德稱其福而微以不得旅進祝嘏為歉夫壽至九十有賢子孫此人間所不多覯兩太夫人可以無憾豈藉一二日之宴樂以為榮觀哉獨國藩重奉朝命蒞兩江疏陳衰年多疾不任艱劇不宜久點高位既不得請則私恃友朋之同官江南者匡余之不逮而共底於治今丁龐二君先後以母憂去職或南踰嶺嶠或北歸燕薊於余心不能無離別之愴爾際雲於咸豐丁未考覺羅官學教習庚戌考國子監學正余皆閲取其文故執摰於余又館余家教余子者數年同官江南亦數年為余言通奉公太夫人之德甚悉將以明年扶柩還里豫來乞銘銘曰通奉之阡祔者夫人孝視其事親共視其事晜行視其身學視其所尊慈惠感人視諸其鄰種德斂福視其子孫其永不朽視茲銘文遵義黎君墓志銘君諱愷字雨耕晚自號石頭山人遵義黎氏曾祖國柄祖正訓廩貢生考安理舉人山東長山縣知縣長山君二子長曰恂字雪樓雲南大挑縣知縣君其次也雪樓厚重寡言氣蓋一世君則倜儻通易周覽羣書兄弟間自為師友長山君少遭不造備歷艱險既見二子之成乃大歡慰二子翼翼趨承食必佐餕靧必奉槃應唯猶嬰兒也嘉慶十八年逆賊林淸等倡亂內煽京師外起滑縣河南北山東直隸震動時長山君仕山東雪樓侍於官所訛言四起或告於貴州曰長山破矣縣令殉城死矣雪樓殉父矣親屬都無存者僅存兩孺子漂轉吳楚間去矣君於時奉母楊太宜人在家聞則北望號痛請於母刻日戒途赴山東之難至長山則闔門故無恙傳者妄也由是遠近以孝歸之君曰父兄得全幸也庸有稱乎雪樓之自桐鄉以憂歸也家居十五六年君晨夕造請進止雍雍語或不合亦敬應之而徐理之終無所忤雪樓嘗病喉痺絶言與食君午夜禱於宗祏泣曰我不及兄兄不可死必死者請以我代喉亦旋愈其敬嫂也如嚴其兄其訓羣從如教其子蓋歷久而不改至其終身亦卒不少懈居京師有友曾某之喪新尸􅶃厲雖其兄亦畏惡不敢近君就舉而斂之必恪必躬見者感歎君少而善病長山君雅不欲強之學而博涉多通窺見百家要指以縣學生中式道光乙酉科舉人十五年乙未大挑二等補貴陽府開州訓導二十二年十二月辛卯以疾卒官春秋五十有五卒之日囊無十金之蓄士無識不識莫不惜君之位不稱其德又不獲耆壽以昌其教澤也嗛焉若有憾於天地至其孝友篤行饜於人人之心者則誠服而更無遺憾然則君之自省與後之論世者亦可以無憾已君配張氏妾吳氏劉氏子四人庶燾咸豐辛亥科舉人庶蕃壬子科舉人候選知州庶昌以諸生獻策闕廷天子褎嘉特授知縣候補直隸州知州庶諴女五人皆適士族孫四人孫女五人咸豐七年四月葬君於河西小靑棡林其後閲十五年庶昌乞余追為之銘銘曰賢聖盛業豈貴高名其道甚邇事親從兄穆穆碩儒黔南之特韜斂英奇以修內則聞變趨庭萬里戴星禱疾身代感徹百靈胡誠不格何施不普化被梟狼澤以甘雨生徒濟濟飭爾五常白華孔潔馨我膠庠亦有賢嗣文行並卓埋石茲邱永貞喬嶽劉忠壯公墓志銘君諱松山字壽卿少而沈雄豁達通曉家人生事親長稱譽以謂足昌吾門咸豐壬子癸丑之間粵賊度嶺北犯圍長沙陷武昌吾邑二三賢俊召募丁壯激揚家聲毅然有討賊之志君實隸王壯武公錱部下號曰老湘營轉戰湖南北江西諸省歷有名績王公既沒則從張忠毅公運蘭戰於江西饒信諸郡追餘寇於閩邊別擊逆黨於廣東廣西才望日彰超越輩流矣咸豐十年余檄老湘軍及鮑超之師防剿宣歙攻牢保危蹀血二年始克徽州寧國兩府張忠毅以疾歸里君乃與易紫橋分領老湘營之半自持樞柄堅守寧國涇縣等城屢卻巨敵以底於江浙大定同治四年國藩奉命攻討捻賊捻賊者始於安徽河南而蔓延於秦楚燕齊者也其叛亂稍後於粵匪而梟悍略同其步隊少於粵匪而驍騎逾萬剽疾過之湘中士卒慣戰江濱未習車騎馱運之勞不樂北征奬之而不勸痛之而不服君獨感奮請前部卒不願北渡者殺數人而事定師至臨淮易紫橋病歸定安謹按公此文係壬申歲正月作屬稿僅三百餘字病發輟筆距易簀時僅數日耳文雖未完不敢輕廢謹依元稿録出以見珍重手澤之意曾文正公詩集卷三五律早起憶九弟二首別汝經三月音書何太難夜長魂夢苦人少屋廬寒骨肉成飄泊雲霄悔羽翰朝朝鳥鵲噪物性固欺謾尚餘詞賦好隨衆頌康哉報國羌無力擎天別有才寒雲迷雁影遠道望龍媒百尺金臺矗看君躞蹀來得郭筠仙書並詩卻寄六律展轉看書字嗟君亦老蒼昊天真藐藐白日故堂堂與子相期事窮年恐不償憂來聊飽食吾壽會無央大雅悲淪歇斯文久不尊至情宜倔強吾道有籬藩仰首呼虞舜狂歌答屈原自非君子性茲意固難論垂耳甘芻豆儒冠信誤人長為羈旅客嗟汝少年身物極能思返天心會好仁鹿鳴歌旨酒滴滴入君脣間間觀物化耿耿究時喧誼士羞要譽廉夫重報恩賈憎惟片語求福實多門種蕙怡幽獨歸休勿復言昨來殊不適日落獨登樓西北看遼瀋東南望海陬蒼茫懷百代浩蕩足千愁畫肚思長策嗟余肉食謀日日懷劉子謂孟容時時憶郭生仰天忽長歎繞屋獨巡行雲暗乾坤隘風來戶牖鳴孤吟無與賞寸憾浩縱橫寄弟三首去年長已矣來日尚云賖身弱各相祝家貧儻有涯鄉心無住著望眼久昏花寥落音書闊多疑驛使差咄咄延平劍英英江夏黃求聲方出谷一別各他鄉東下江河駛南征道路長汝儕身手健看我鬢毛蒼黃子壽彭年後起之秀豫嘗命九弟與之納交夢裏攜子季亭亭似我長三年不相見一變安可量神駿初銜轡牽牛肯服箱朝朝偷芋栗知爾足奔忙季弟今年十四歲往年好食栗煨芋避人偷竊頑趣可掬獨出匪直完裘好今年故未寒晚來還獨出宇內一何寬銜尾千人聚高蹄百馬攢天街原蕩蕩辟路亦非難訪苗先麓苗精説文之學箸書四十年一貧如洗今年六十無子大隱東方朔箸書揚子雲出門無所詣落日一從君倦鳥宜何集間鷗亦有羣烹茶餘幾火小啜愧殷勤苗無僕從親煮茶敬客懷劉蓉我思竟何屬四海一劉蓉具眼規皇古低頭拜老農乾坤皆在壁霜雪必蟠胸他日余能訪千山捉臥龍歲暮雜感十首殘歲垂垂盡囂塵逐逐忙世人同一悔匪我獨顚狂身計嗟頻左家山亦未忘時猶憂世事此志固荒唐殺氣行南紀溫風轉北條陽和回地幹神鬼助天朝挾纊三軍舞層冰萬里消小臣長皞皞無術贊唐堯江浙去年大雪京師今歲不甚寒堯皋無並育天地詎終溫此日咸陽市當年上蔡門風雲悲昔遇霜露等深恩聞道南山木窮冬尚負暄壯歲耽經訓艱難始一隅力耕無近穫陟古有通衢茅塞由來久蓬生且待扶國讐猶未雪何處著迂儒四山仙侶會角逐事賡歌日日為詩祟人人被墨磨相從良可適不樂復如何尚有平生友飄零在澗阿久矣劉生隔孟容嗟哉信爾賢才高防作聖情極屢逃禪歧路多魑魅深山足歲年狂風能作劇吹我墮君前阿弟光明者沅甫愛兄心尚孩良時無汝共雅抱向誰開難就陸雲業多慙許武才皇都寧不美捨去竟何哉萬族求饒益吾謀頗用疏民生各心性天道有孤虛得俸堪加飯無錢且買魚逐貧思作賦才薄欲何如浩浩翻江海爭奔且未闌古來名利客誰不到長安獨立看參昂橫天如此寒肯能尋冷淡夜夜照簷端爆竹家家沸兒時此味長追歡斟緑蟻隨例祀黃羊明旦夔龍集中天日月光八年吟舊句回首但蒼范乙未年曾作歲暮雜感詩十首桂湖五首新都桂湖明楊升庵修撰故宅也使旋過此縣令張君宜亭招飮湖上為賦此詩遂别華陽國歸程始此賖翻然名境訪來及夕陽斜翠竹偎寒蝶丹楓噪暮鴉詞人云異代臨水一咨嗟短城三面繞淺水半篙寒鳥過穿殘日魚行起寸瀾秋來樓閣靜幽處地天寬平昔江湖性真思老釣竿十里荷花海我來吁已遲小橋通野港壞艇臥西陂曲岸能藏鷺盤渦尚戲龜傾城遊女盛好是采蓮時矮桂枝鉤褎叢篁葉打頭隄行皆仄徑路斷得高樓欄檻千回錦琉璃五色秋落霞沈水底綺散不能收跨水一樓名沈霞榭頗憶家山好去鄉茲六年此間行樂地小有洞庭天點綴須人力招尋信妙緣使君殊不俗把酒意茫然至日二首久行忘節序夙莫但奔忙茲旦即長至我征仍未央寒雲低樹白邊日際山黃時覩南來雁飄零不作行海市三年舶河源八月槎水衡勞碩畫漆室足咨嗟天步方長健民飢亦有涯燔柴崇大禮靈貺正來賖雨稍稍車塵隔安間一閉門高歌亦未輟驟雨方此喧宿霧依城靜低雲入樹昏空庭瀦盛水容易即江村送吳英樾之官浙江兼簡魏黃生大令三首一第尋常事服官方獨難書生良短淺世態自波瀾被褐欲誰語濫竽仍未安無言堪汝贈只是耐加餐大邑匪輕寄斯民會可蘇養魚防攪水牧馬合求芻兵甲連滄海瘡痍正道塗樂郊枯早久遲子一霑濡魏子好心事相從興頗賖與君聯肺腑棄我各天涯煙雨黔山道風濤海國槎東南彌萬里吟望一長嗟魏君與吳為婚姻謁選得貴州縣令也送鄧伯昭兼簡家伯醇秀才三首萬里西風道艱哉信爾行力耕無半穫寒日耐孤征身世嗟杭葦文章一覆枰平生餘意氣未惜為君傾君家老癡叔海內久詞宗謂湘皋廣文歲晚餐幽菊空山倚冷筇我今方速謗茲味亦非濃他日龐公榻來尋物外蹤吾宗良大雅老矣尚巖阿六載長乖隔百年能幾何高明遭鬼侮圭璧受沙磨動忍由來事無為棄斧柯莫過竹如維摩元未病子祀空復疑薄暮還相訪經旬繫我思深談四壁靜交道一鐙知天畢看西下來歸亦未遲東鄰杜氏義孰稍得塵埃隙來茲一散襟喧車閟四聽時鳥送餘音亦有邊韶懶誰能季主尋村童休問字剖璞方自今送王少鶴待爾雙雙至春回又一年開尊皆舊友發篋半新篇荔子紅時雨芭且緑外天江鄉好風景話向酒杯前送金竺虔之官閩中朋好翩翩去君今傷此行春風一杯酒舊雨十年情循吏平生志神仙薄幸名海隅氛正惡看汝斫長鯨七律歲暮雜感十首芒鞋鎮日踏春還殘臘將更卻等間三百六旬同逝水四千餘里説家山緇塵己自沾京雒羌笛何須怨玉關為報南來新雁到故鄉消息在雲間高嵋山下是儂家歲歲年年鬬物華老柏有情還憶我夭桃無語自開花幾回南國思紅豆曾記西風浣碧紗最是故園難忘處待鶯亭畔路三叉莽莽寒山匝四圍眼穿望不到庭闈絮飄江浦無人管草緑湖南有夢歸鄉思怕聽殘漏轉逸情欲逐亂雲飛敬從九烈神君訴遊子於今要換衣去年此際賦長征豪氣思屠大海鯨湖上三更邀月飮天邊萬嶺挾舟行竟將雲夢吞如芥未信君山剗不平偏是東皇來去易又吹草緑滿蓬瀛紛紛節候儘平常西舍東家底事忙十二萬年都小劫七千餘歲亦中殤蜉蝣身世知何極胡蝶夢魂又一場少昊笑儂情太寡故堆錦繡富春光韶華彈指總悠悠我到人間草五秋自愧望洋迷學海更無淸福住糟邱尊前瓦注曾千局腳底紅塵即九州自笑此身何處著笙歌叢裏合間遊為臧為否兩蹉跎搔首乾坤踏踏歌萬事拚同駢拇視浮生無奈繭絲多頻年蹤迹隨波譎大半光陰被墨磨匣裏龍泉吟不住問子何日斫蛟鼉舊雨曾遺尺鯉魚經年不報意何如自從三益暌違久學得五君世態疏碧樹那知離別憾靑鐙偏照故人書殷勤護惜金爐鴨香火因緣付與渠擬學坡公饋歲詩花箋何處寄相思陽和未老貂先敝暖氣初回鳥竟知遊子情懷隨地遠天家雨露及時施小儒莫獻升平頌幸傍龍樓覩上儀鼕鼕歲鼓走輕雷竹馬兒童綵戲才仙仗九重圍霧住宮花一萬鎖煙開迷離佳氣從空繞不斷狂香拂面來我比春風尤放蕩長安日日騁龍媒寄郭筠仙浙江四首一病多勞勤護惜嗟君此別太匆匆二三知己天涯隔強半光陰道路中兔走會須營窟穴鴻飛原不計西東讀書識字知何益贏得行蹤似轉篷碣石逶迤起陳雲樓船羽檄日紛紛螳螂竟欲當車轍髖髀安能抗斧斤但解終童陳策略已聞王歙立功勳如今旅夢應安穩早絶天驕蕩海氛無窮志願付因循彈指人間三十春一局楸枰虞變幻百圍梁棟藉輪囷蒼茫獨立時懷古艱苦新嘗識保身自愧太倉縻好爵故交數輩尚淸貧向晚嚴霜破屋寒娟娟纖月倚簷端自翻行篋殷勤􅟪苦索家書展轉看宦海情懷蟬翼薄離人心緒繭絲團更憐吳會飄零客紙帳孤鐙坐夜闌三十二初度次日書懷男兒三十殊非少今我過之詎足歡齷齪挈瓶嗟器小酣歌鼓缶已春闌眼中雲物知何兆鏡裏心情只獨看飽食甘眠無用處多慙名字侶鵷鸞憶弟二首無端繞室思茫茫明月當天萬瓦霜可惜良宵空兀坐遙憐諸弟在何方紛紛書帙誰能展艷艷鐙花有底忙出戶獨吟聊妄想孤雲斷處是家鄉忽憶他時襄水上惡風半夜撼春雷舟人捩舵聲同泣客子扶牀面已灰仰荷皇天全薄命信知浮世等輕埃汝今歸去復何似回首世途誠險哉襄陽遇風戊戌九月出都事弟今年南歸亦由襄水達武昌漫與今日今時吾在茲我兄我弟儻相思微官冷似支牀石去國情如失乳兒見慣浮雲渾欲語漫成詩句未須奇徑求名酒一千斛轟醉王城百不知聞客話里中近事蓬萊淸淺信推遷回首鄉關事可憐今日朝簪陪未秩早時社鼓舞華筵陳平宰國無消息庾信辭家有歲年蹙蹙生涯非我里滔滔四望極敷天元戎大旆元戎喜起歌舊時鼎鼐藉調和豐貂長組朝金闕駟馬雕弓照塞河黃閣居然元老在蒼生竟奈此人何誰憐寂寞揚雄宅獨抱繁憂臥薜蘿溫甫讀書城南寄示二首十年長隱南山霧今日始為出岫雲事業真如移馬磨羽毛何得避雞羣求珠采玉從吾好秋菊春蘭各自芬嗟我蹉跎無一用塵埃車馬日紛紛嶽麓東環湘水回長沙風物信佳哉妙高峯上攜誰步愛晚亭邊醉幾回夏后功名餘片石漢王鐘鼓撥寒灰知君此日沈吟地是我當年眺覽來早發沔縣遇雨此身病起百無憂敢為艱難一怨尤曉霧忽飛千嶂雨西風已作十分秋近知地利真堪恃早信人謀不自由昨日定軍山下過蒼天一望故悠悠初入四川境喜晴萬里關山睡夢中今朝始洗眼矇朧雲頭齊擁劍門上峯勢欲隨江水東楚客初來詢物俗蜀人從古足英雄臥龍躍馬今安在極目天邊意未窮梓潼道中有懷馮樹堂陳岱雲復嶂七盤相約束淸流九曲與周遭日高旌旆鳥蛇亂秋老爪牙鷹隼豪北望幽燕天漠漠東歸歲月水滔滔江山如此知交隔獨對菱花數二毛早發武連驛憶弟朝朝整駕趁星光細想吾生有底忙疲馬可憐孤月照晨雞一破萬山蒼曰歸曰歸歲云暮有弟有弟天一方大壑高崖風力徑何當吹我送君旁三十三生日三首三十餘齡似轉車吾生泛泛信天涯白雲望遠千山隔黃葉催人兩鬢華去日行藏同踏雪迂儒事業類團沙名山壇席都無分欲傍靑門學種瓜六載承明饜祕書河東一賦又吹噓多慙衮職無遺事實藉文言有慶餘白璧出山終就琢黃金擲谷總成虛何時卻返初衣好歸釣蒸溪縮項魚蒸水去吾家十里苦飫風塵未息機駑駘已絡紫金鞿詩禪入悟無三昧世路回頭有百非翁子少年原落拓承宮家世本淸微故山鷗鳥吾盟在謂劉大曾記江邊各忍飢國士橋趙城縣西亂鴉呼噪若為情疲馬逡巡尚欲驚遭遇一生容可再艱難萬死竟無成至今平楚風猶徑終古寒流意未平他日王孫知己感可憐鐘室淚縱橫哭少時同學某君嘗三試有司被黜以事牽連為吏胥奇辱貧鬱以死少日低飛各羽翰幾年茵溷不同看竟緣無食填溝壑終古銜羞在肺肝蟻戰莫償三北恥𧖟僵更吐一絲難寡妻弱子知何倚雪虐風叨可耐寒送妹夫王五歸五首飄然棄我即山林野服黃冠抵萬金滚滚污塵得少辟茫茫歧路一長吟梁鴻旅食妻孥共蘇季貧歸憂患深東去大江蘆荻老皇天颯颯正秋霖荆楚楩楠夾道栽於人無忤世無猜豈知斤斧聯翩至復道牛羊爛漫來金碧觚稜依日月崢嶸大棟逼風雷回頭卻羡曲轅櫟歲歲偷間作棄材高嵋山下草芊綿去國蹉跎今六年村老半聞悲薤露人間容易即桑田炎雲涼雨有翻覆舞榭歌臺況變遷莫訝榮枯無定態君今猶守舊靑氊王氏故富室今貧矣有齊季女吾弟行操臼君家老孟光曾是弋鳧相勞饗猶聞雛鳳已軒昂秦嘉上計心情薄王霸躬耕身世忘織屨辟纑終古事牛衣歲月即羲皇老弟三年困省門寒山無律可回溫由來命分政須爾久信文章不足尊南雁乖違少書信西風牢落對乾坤因君傳語告豫季失馬亡羊莫更論酬九弟四首違離豫季今三載辛苦學詩絶可憐王粲辭家遘多患陸雲入洛正華年輪轅塵裏鬢毛改鼙鼓聲中筋骨堅門內生涯何足道要須嘗膽報堯天漢家八葉耀威弧冬幹春膠造作殊豈謂戈鋋照京口翻然玉帛答倭奴故山豈識風塵事舊德惟傳嫁娶圖長是太平依日月杖藜零涕説康衢杜韓不作蘇黃逝今我説詩將附誰手似五丁開石壁心如六合一遊絲神斤事業無凡賞春草池塘有夢思何日聯牀對鐙火為君爛醉舞仙僛辰君平正午君奇屈指老沅真白眉人世巾袍各骯髒閉門諧謔即支離中年例有妻孥役識字由來教養衰家食等間不經意如今飄泊在天涯澄侯以庚辰生溫甫以壬午生贈梅伯言二首隘巷蕭蕭劣過車蓬門寂寂似逃虛為杓不願庚桑楚爭席誰名揚子居喜潑緑成新引竹仍磨丹覆舊讎書長安挂眼無冠蓋獨有文章未肯疏單緒真傳自皖桐不孤當代一文雄讀書養性原家教績學參微況祖風衆妙觀如蜂庤蜜獨高格似鶴騫空上池我亦源頭識可奈頻過風日中夜直苦寒白虎西流朱鳥高五更風利鸊鷈刀徑寒戰栗通心曲轖氣冰霜上口毛曠蕩靑天如可對折旋丹地敢辭勞頻聞交戰呵金馬驀入鐙廬炙凍毫吳宮黃病中屬市鹿尾越舫迎來手指千屋多不畏貯風偏華鐙鄉話初長夜藥碗吟愁欲雪天陽氣眉間回病客元精至後固崖仙內廚斫取殷紅色判費西淸月放錢臘八日夜直翻從官宿得間時仙掖深深晝掩帷靜向古人書易入寒偏今日酒堪持濃饘説獻宮中佛晴雪看分禁裏墀日暮武英門外望井闌冰合柳枯垂失題四首抽得間身鶴不如高秋酒熟鞠黃初便驅天駟識途馬歸釣江鄉縮項魚往日心情隨轂轉今來身世似舟虛不須更説知幾早且喜塵緣盡剗除蛋雨蠻煙日日催側身周望重低徊海濱膏血深無極帳下笙歌自莫哀安得賈生時痛哭可憐楊僕本庸才投章欲問茫茫意何處通天尚有臺金堤舊潰高家堰復道今年盛昔年自古塵沙同浩劫斯民塗炭豈前緣沈江欲禱王尊璧擊楫誰揮祖逖鞭大廈正須梁棟拄先生何事賦歸田兩度歸帆泝上流蕭蕭落木洞庭秋送君此去風前酒憶我當時月夜舟宏景舊居句曲洞杜陵新卜浣溪頭好栽修竹一千畝更抵人間萬戶侯丁未六月七日考試漢教習試院作二首潭潭深院鐍扃牢閼日溼雲作鬱陶薄茗何曾解消渴纖絺便欲等重袍高堂燕息尚如此矮屋蜂屯母已勞得失升沈紛滿眼世間人事等牛毛虞廷胄子肄聲律漢室小侯齒辟雍銀漢支流原博大璧門追琢要從容師儒落落渺千載針芥時時還一逢明日鄧林斤斧入可能澗底拔長松武會試闈中作禁闈蓮漏已宵深涼月窺人肯一臨此地頻來從案牘吾生何日得山林貔貅霧隱三更肅河漢天高萬籟沈火冷鐙靑無箇事可憐間殺愛才心送孫芝房使貴州二首妙年作賦動明光又策星軺赴夜郎文采邊陬瞻泰斗儀容寸步中宮商沅湘過訪三閭廟宛葉行經百戰場定有新詩傳萬口歸來吾與解奚囊六年陳迹吾能記病骨秋風入劍關曾洗人天淸淨眼飽看巴蜀怪奇山君今巖壑搜羣玉自有光芒照百蠻不似老夫徒碌碌崑岡一網手空還書邊褎石詩集後二首鐫章琢句尋常事激烈心情絶可憐今日詞臣須頗牧古來豪士出幽燕楊家忠義存三疏孫相威名在九邊莫藉文章追往哲要憑肝膽報皇天苦憶荆州王仲宣投簪浩蕩臥江天三年促膝從豫坐四海低頭道子賢北李南何各壇坫楓靑塞黑與纏綿因君更逐停雲想望斷襄陽落照邊送梅伯言歸金陵三首金門混迹髮蒼蒼從此菰蒲歲月長人世正酣爭奪夢老翁已泊水雲鄉自翻素業衡輕重久覺紅塵可憫傷祇恐詩名天下滿九州無處匿韓康徵君絶學冠寰瀛又見文孫樹立宏六葉弓裘傳柏梘百年耆舊數宣城緬懷仁廟虛前席盡訪鴻儒佐太平豈獨當時能感激至今臣子涕縱橫伯言宣城人著有柏梘山房詩文集文筆昌黎百世師桐城諸老實宗之方姚以後無孤詣嘉道之間又一奇碧海鼇呿鯨掣候靑山花放水流時兩般妙境知音寡它日曹溪付與誰酬李芋仙二首巴東三峽猿啼處太白醉魂今尚存遂有遠孫通肸蠁時吟大句動乾坤愛從吾黨魚忘水厭逐人間蝨處褌卻笑文章成底用千篇不值一盤飧徑翮摩空故絶倫吹噓曾未出風塵細思科第定何物卻是飢寒解困人大道但期三洗髓長途終遇九方歅高秋一放脫鞲去看汝飛騰亦有神次韻何廉昉太守感懷述事十六首域中哀怨廣場開屈宋而還第二回幻想更無天可問牢愁寧有地能埋秦瓜鉤帶何人種社櫟支離幾日培大冶最憎金踊躍那容世界有奇材慘淡兵戎春復秋濁醪誰信遣千憂戰場故鬼招新鬼丗事前漚散後漚馳逐幾同秦失鹿劬勞祇愧魯無鳩何時浩蕩輕鷗去一舸鴟夷得少休二月長安春始歸觚稜回首夢魂飛宮鴉掠日槐陰瘦廏馬嘶風柳絮肥東閣賜茶雙鳳闕西郊扈蹕九龍旗十年苦憶鈞天奏老大真憐未拂衣滄海橫流澤有鴻微生偶出一當熊千艘梭織怒濤上萬幕笳吹明月中屠罷長鯨波尚赤戰歸驕馬汗猶紅誰知春晚周郎老更與東皇乞好風鍾山祠廟巋然存憑弔湖湘烈士魂馬革裹尸男子志鸞刀祭膟聖明恩弓旌夜動神依戶簫鼓春祈福滿門萬世遊人應指點血殷篙眼古時痕潯陽江水接天長良將新祠皎雪霜半壁東南支柱石數州士女薦馨香竟無耆壽追充國猶有嘉名配武鄉匹馬寸金都謝絶三明何必數西涼山縣寒儒守一經出山姓字各芳馨要令天下消兵氣爭説湘中聚德星舊雨三年精化碧孤鐙五夜眼常靑書生自有平成量地脈何曾獨效靈猿鶴沙蟲道並消誰分糞壤與芳椒昨來皖水三河變堪痛阿房一炬焦句踐池邊醪易醉田橫墓上酒難澆同袍才俊雕零盡茍活人間只自嘲鴒原橫霣第三人鶴唳華亭不復春先軫歸元何日是虞翻相骨本來貧科名久滯靑雲路身手難扶赤日輪十二萬年香不滅從渠搗麝作灰塵江雪湖波路幾千壺頭歸葬事堪憐鑄金叩叩終何益埋玉深深不計年夜月一鉤涼蕙帳春風十萬散榆錢神靈甲馬如相助莫遣愁人歎逝川濫觴初引一泓泉流出蛟龍萬丈淵從古精誠能破石薰天事業不貪錢腐儒封拜稱詩伯上策屯耕在硯田巨海茫茫終得岸誰言精衛憾難填幕府山頭對碧天英英羣彥滿樽前共扶元氣回陽九各放光明照大千短李迂辛雜嘲謔箕張牛奮總安便獨憐何遜今漂泊望斷寒雲暮靄邊薇閣藤廳淡淡紅多君翔步五雲中良緣彩鳳雙飛翼慧業靈犀一點通典郡四旬書上考􅛶門八口祀昭忠災祥誰識天公意休向西風泣路窮由來忠孝易通神忉利華鬘識後身石爛海枯終有盡生天成佛豈無人關河庾信空蕭瑟形影陶潛孰主賓雞犬全家存帝所淮南生計未全貧荒城風雪臥袁安高節鴻才萬目看懶讀司空城旦法曾希柱後惠文冠出山馴雉網羅密失水神龍變化難猶有老梅嬌萼發先從三界解春寒聖主中興邁盛周聯翩方召並公侯神威欲挾雷霆下大業常同江漢流藻火但聞山甫衮桐廬豈有子陵裘鵷鸞臺閣方新構杞梓楩楠一例收讀吳南屛送毛西垣之即墨長歌即題其集十載鄉園獨爾思眼明今日見新詩嘗憂大雅終將絶豈意吾儕覩此奇木落千山初瘦削風回大海乍平夷此中真意憑君會持似旁人那得知人間骯髒一毛生與子交期如弟兄忽出國門騎瘦馬去看東海掣長鯨放歌一弔田橫島釃酒還臨樂毅城並入先生詩句裏干戈離別古今情五絶讀李義山詩集渺綿出聲響奧緩生光瑩太息涪翁去無人會此情七絶入陜西境六絶句十月一日西風已謝朔風遒客子勞勞且未休行過嘉陵三百里飛崖絶壁又秦州破曉七盤山上望回看蜀國萬峯環英雄割據終何有陵谷滄桑事等間南棧惟七盤嶺與朝天關最高亂山合處響沈沈古洞千年海樣深獨臥籃輿初夢覺時聞腳底老龍吟兩山忽合中如長虹名龍洞背下有洞可容數千人忽憶老筠吾匹儔謂郭大汨羅江上苦吟秋未成嘉會方王貢便恐才名駕應劉江流日夜走荆襄隴蜀由來四戰場故壘無人談往事空山有客弔斜陽入秦三十里為百牢關關以東水皆東流入沔關以西水皆西流入嘉陵江七二寒溪沒骭深溪邊茅屋隔楓林歸人正怯征衣薄又聽山城響暮占寧羌州多山澗病涉俗石名七十二道腳不乾題畫竹次醇士前輩韻二首森森鳳尾一時抽滿地孫枝翠篠稠老幹已淩霄漢上曲江猶自憶遨頭列仙不比山澤臞碧碗瓊漿事有無更向禪宗參玉版花豬竹􅔺肯分吾送唐鏡海先生九首六年高臥大江隈萬里蒲輪驛吏催京國諸儒齊額手溫公新自洛陽來金殿從容道古今高言字字印天心鐘聲送出東華路巳報槐階轉午陰摹天繪日本難工聖德何由測六龍白髮老臣私贊歎文如聖祖武高宗漳衛滔滔走帝都堯封何事闕溝渠草年深究齊民術一卷新呈水利書上相南征策衆材軍容十萬轉風雷書生卻進安民策盜弄潢池事可哀泰岱高雲不可攀曾興霖雨在人間如今老去神功斂祇就君王乞放還道德神仙各有謀行藏雖一事難侔功名不數种司諫出處羞稱李鄴侯熙朝正學要匡扶衆説紛紛各啓塗歸語江南諸父老太平天子好真儒枌榆後進謬升堂習習春風杖履旁此後追陪何日是鏡中吾亦鬢毛蒼壬戌四月沅弟克復巢縣和州含山等城賦詩四首濡須塢裏漲春波三月鶯啼氣正和一騎雲飛新報捷漢家收復舊山河碧血家家百草腥荒郊五夜泣坤靈將軍一掃陵陽道便有遊人説踏靑半壁山前鐵鎖橫當年諸將各聲名即今錐鑿西梁下益信先皇萬里明師淑韓公二十霜敢將裴令並論量諸君自有浯溪筆看取穹碑日月光沅圃弟四十一初度九載艱難下百城漫天箕口復縱橫今朝一酌黃花酒始與阿連慶更生陸雲入洛正華年訪道尋師志頗堅慚愧庭階春意薄無風吹汝上靑天幾年橐筆逐辛酸科第尼人寸寸難一劍須臾龍變化誰能終古老泥蟠廬陵城下總雄師主將赤心萬馬知佳節中秋平劇寇書生初試大功時沅甫初在吉安統兵二萬八年八月十五日克復府城楚尾吳頭暗戰塵江干無土著生民多君龕定同安郡上感三光下百神十一年八月初一日克復安慶欽天監奏是日四星聯珠日月合壁濡須已過厯陽來無數金湯一翦開提挈湖湘良子弟隨風直薄雨花臺邂逅三才發殺機王尋百萬合重圍昆陽一捷天人悅誰識中軍血染衣平吳捷奏入甘泉正賦周宣六月篇生縛名王歸夜半秦淮月畔有非煙河山策命冠時髦魯衛同封異數叨刮骨箭瘢天鑒否可憐叔子獨賢勞左列鐘銘右謗書人間隨處有乘除低頭一拜屠羊説萬事浮雲過太虛已壽斯民復壽身拂衣歸釣五湖春丹誠磨鍊堪千劫不藉良金更鑄人黃河餘潤沾三族白下飢民活萬家千里親疏齊頌禱使君眉壽總無涯童稚溫溫無險巇酒人浩浩少猜疑與君同講長生訣且學嬰兒中酒時甲子八月二十日沅甫弟四十一生日為小詩十三首壽之往在壬戌四月沅弟克復巢縣和州含山等城余賦詩四首一時同人以為聲調有似鐃歌而和之此詩略仿其體以徵和者且使兒曹歌以侑觴國藩識
